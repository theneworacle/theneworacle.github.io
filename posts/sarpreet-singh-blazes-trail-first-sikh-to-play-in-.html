ince qualifying in 1950 but withdrawing due to financial constraints.\u003c/p\u003e\n\u003cp\u003eSarpreet Singh's trailblazing effort is part of a growing trend of diverse representation in international football. This World Cup also features other players of Indian heritage representing different nations, such as Australia's Nishan Velupillay and Qatar's Tahsin Jamshid, further highlighting the global tapestry of the sport.\u003c/p\u003e\n\u003cp\u003eThe positive social media sentiment surrounding Singh’s achievement underscores the profound impact of seeing oneself represented on the world stage. As New Zealand prepares for their next Group G match against Egypt on June 22nd, Sarpreet Singh's legacy as an inspiration to aspiring footballers of South Asian descent is already firmly cemented.\u003c/p\u003e\n","title":"Sarpreet Singh Blazes Trail: First Sikh to Play in World Cup, Inspiring a Generation","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-19T16:12:19Z","summary":"New Zealand's Sarpreet Singh made history as the first Sikh footballer to play in a World Cup, an achievement he hopes will inspire a new generation of South Asian players.","tags":["Sarpreet Singh","New Zealand Football","World Cup","Sikh","South Asian","Football Inspiration","FIFA World Cup 2026","Diversity in Sport"],"sources":[{"url":"https://www.msn.com/en-gb/sport/cricket/soccer-new-zealand-s-singh-proud-to-blaze-a-trail-for-sikh-community-at-world-cup/ar-AA2621kD?ocid=BingNewsVerp","title":"Soccer-New Zealand's Singh proud to blaze a trail for Sikh community at World Cup"},{"url":"https://www.straitstimes.com/sport/football/new-zealands-singh-proud-to-blaze-a-trail-for-sikh-community-at-world-cup","title":"New Zealand’s Sarpreet Singh proud to blaze a trail for Sikh community at World Cup"},{"url":"https://www.msn.com/en-xl/asia/pakistan/new-zealand-singh-inspires-hope-for-south-asian-footballerspublished-on-june-19-2026-751-pm/ar-AA264zZB?ocid=BingNewsVerp","title":"New Zealand singh inspires hope for South asian footballers"},{"url":"https://www.msn.com/en-xl/sports/football/sarpreet-singh-proud-to-inspire-sikh-footballers-at-world-cuppublished-on-june-19-2026-1-04-pm/ar-AA263dtT?ocid=BingNewsVerp","title":"Sarpreet Singh proud to inspire Sikh footballers at World Cup"},{"url":"https://www.msn.com/en-in/sports/other/who-is-sarpreet-singh-first-indian-origin-player-to-start-a-fifa-world-cup-2026-match/ar-AA25LHXA?ocid=BingNewsVerp","title":"Who is Sarpreet Singh? First Indian origin player to start a FIFA World Cup 2026 match"},{"url":"https://www.msn.com/en-in/sports/football/meet-sarpreet-singh-indian-origin-attacker-from-this-team-who-starred-against-iran-in-fifa-world-cup-2026-match/ar-AA25LUbx?ocid=BingNewsVerp","title":"Meet Sarpreet Singh, Indian-origin attacker from this team who starred against Iran in FIFA World Cup 2026 match"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"sarpreet-singh-blazes-trail-first-sikh-to-play-in-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
