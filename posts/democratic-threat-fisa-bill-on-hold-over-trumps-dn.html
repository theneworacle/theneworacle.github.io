) notably described the pick as \"funny\" and \"odd,\" highlighting the unexpected internal dissent.\u003c/p\u003e\n\u003cp\u003ePrior to this nomination, Bill Pulte was known for his leadership at the Federal Housing Finance Agency. His sudden shift to the intelligence sphere has prompted questions and skepticism regarding his suitability to lead the nation's intelligence apparatus.\u003c/p\u003e\n\u003cp\u003eOn social media, the public reaction to the threat to block the FISA bill has been largely positive, though accompanied by a discernible undercurrent of debate, reflecting the divisive nature of the issue. The unfolding drama underscores the intense political climate surrounding key appointments and national security legislation.\u003c/p\u003e\n","title":"Democratic Threat: FISA Bill on Hold Over Trump's DNI Pick","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-03T16:33:33Z","summary":"A prominent Democrat has issued a significant threat, vowing to block the crucial FISA bill unless President Trump withdraws his controversial nomination for Director of National Intelligence (DNI), Bill Pulte. This move comes amidst surprising pushback on Pulte's appointment, even from within the GOP and MAGA media circles.","tags":["FISA","Trump","DNI","Bill Pulte","Politics","National Security","Democrat","GOP"],"sources":[{"url":"https://www.yahoo.com/news/politics/articles/top-dem-threatens-block-fisa-154417374.html","title":"Top Dem Threatens to Block FISA Bill if Trump Doesn’t Pull DNI Pick"},{"url":"https://www.msn.com/en-us/news/other/trump-s-intelligence-pick-sparks-rare-maga-media-revolt/ar-AA24Kh9l?ocid=BingNewsVerp","title":"Trump’s intelligence pick sparks rare MAGA media revolt"},{"url":"https://www.msn.com/en-us/news/politics/maga-friendly-senator-trashes-trump-s-new-director-of-national-intelligence-a-funny-pick-to-say-the-least/ar-AA24JkTd?ocid=BingNewsVerp","title":"MAGA-friendly senator trashes Trump’s new director of national intelligence: ‘A funny pick, to say the least’"},{"url":"https://www.msn.com/en-us/news/politics/trump-names-bill-pulte-acting-director-of-national-intelligence/ar-AA24Euwc?ocid=BingNewsVerp","title":"Trump names Bill Pulte acting director of National Intelligence"},{"url":"https://www.msn.com/en-us/news/politics/trump-announces-pick-for-acting-director-of-national-intelligence-after-tulsi-gabbard-resignation/ar-AA24E7XV?ocid=BingNewsVerp","title":"Trump announces pick for acting director of national intelligence after Tulsi Gabbard resignation"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"democratic-threat-fisa-bill-on-hold-over-trumps-dn"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
