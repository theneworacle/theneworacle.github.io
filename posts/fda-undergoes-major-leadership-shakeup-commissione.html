<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"fda-undergoes-major-leadership-shakeup-commissione","contentHtml":"\u003cp\u003eThe Food and Drug Administration (FDA), a pivotal regulatory body in the United States, is currently navigating a period of significant leadership transition. Dr. Marty Makary, who served as Commissioner for a tumultuous 13-month period, officially stepped down on May 12, 2026. His departure is closely followed by that of Dr. Tracy Beth Høeg, the top drug regulator overseeing both over-the-counter and prescription medications. These resignations signal a substantial shakeup at the highest echelons of the agency.\u003c/p\u003e\n\u003cp\u003eDr. Makary's tenure was characterized by considerable internal and external pressures. He reportedly found himself caught between the \"Make America Healthy Again\" (MAHA) movement, led by Health Secretary Robert F. Kennedy Jr., which criticized the pace of its agenda, and those who sought a more traditional, predictable approach to FDA regulation. President Trump, acknowledging Makary's departure, noted he was \"having some difficulty\" but also lauded his contributions, stating \"So much was accomplished under his leadership.\" Kyle Diamantas, previously the deputy commissioner for food, has been appointed as the acting head of the agency.\u003c/p\u003e\n\u003cp\u003eMakary's time at the helm was marked by several controversial decisions and events that sparked debate across various stakeholders:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVaccine Approvals:\u003c/strong\u003e The approval of updated mRNA vaccines against COVID-19 drew ire from the MAHA movement.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAbortion Medication:\u003c/strong\u003e The agency's approval of a second generic version of mifepristone disappointed abortion opponents.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVape Sales Pressure:\u003c/strong\u003e Makary reportedly faced pressure from the White House regarding the authorization of fruit-flavored vape sales.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInconsistent Drug Approval Processes:\u003c/strong\u003e Critics pointed to contradictory approaches, where Makary advocated for single pivotal clinical trials to accelerate drug approvals, yet the agency simultaneously requested additional studies from companies seeking approval.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eModerna Flu Shot Reversal:\u003c/strong\u003e An initial refusal to accept Moderna's mRNA flu shot application, followed by a swift reversal days later, led the pharmaceutical industry to question the FDA's regulatory predictability.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHormone Replacement Therapy Warnings:\u003c/strong\u003e The removal of longstanding warnings on certain hormone replacement therapy products without the customary advisory committee process, which Makary deemed \"bureaucratic, long, often conflicted and very expensive,\" also generated controversy.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIt's noteworthy that Dr. Makary's confirmation on March 25, 2025, coincided with mass firings orchestrated by the Department of Government Efficiency (DOGE), which resulted in hundreds of vacant positions within the FDA, potentially adding to the operational challenges during his leadership.\u003c/p\u003e\n\u003cp\u003ePublic reaction, as gauged by social media sentiment surrounding both Dr. Makary's and Dr. Høeg's resignations, appears to be largely positive, though accompanied by some debate. This mixed but generally accepting public reception indicates a complex landscape of opinions regarding the recent leadership changes at the FDA and the direction of the agency.\u003c/p\u003e\n","title":"FDA Undergoes Major Leadership Shakeup: Commissioner Makary and Top Drug Regulator Depart Amidst Turmoil","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-16T02:36:37Z","summary":"The Food and Drug Administration (FDA) is facing significant leadership changes with the recent resignations of Commissioner Dr. Marty Makary and Dr. Tracy Beth Høeg, head of the drug regulation division. Dr. Makary's 13-month tenure was marked by controversy, internal friction, and high-profile decisions that drew both praise and criticism.","tags":["FDA","Marty Makary","Tracy Beth Høeg","Resignation","Drug Regulation","Health Policy","Government Shakeup","Robert F. Kennedy Jr.","Trump Administration","Pharmaceutical Industry"],"sources":[{"url":"https://www.msn.com/en-us/health/other/fda-shakeup-continues-with-departure-of-top-drug-regulator-just-days-after-agency-chief-resigns/ar-AA23j3AF","title":"FDA shakeup continues with departure of top drug regulator, just days after agency chief resigns"},{"url":"https://www.msn.com/en-us/news/politics/marty-makary-resigns-as-fda-commissioner-following-industry-and-white-house-backlash/ar-AA231I0X?ocid=BingNewsVerp","title":"Marty Makary resigns as FDA commissioner following industry and White House backlash"},{"url":"https://www.wvik.org/npr-top-stories/2026-05-12/fda-commissioner-resigns-after-tumultuous-tenure","title":"FDA commissioner resigns after tumultuous tenure"},{"url":"https://www.washingtontimes.com/news/2026/may/12/marty-makary-resigns-pressure-head-fda/","title":"Marty Makary resigns under pressure as head of the FDA"},{"url":"https://www.msn.com/en-us/news/politics/marty-makary-s-tenure-as-head-of-fda-ends-with-difficulty/ar-AA231YXn?ocid=BingNewsVerp","title":"Marty Makary’s tenure as head of FDA ends with ‘difficulty’"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"fda-undergoes-major-leadership-shakeup-commissione"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
