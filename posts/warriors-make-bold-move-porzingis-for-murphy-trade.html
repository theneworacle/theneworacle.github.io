u003eTrey Murphy III has emerged as a highly sought-after talent. The Pelicans forward averaged 21.5 points, 5.7 rebounds, 3.8 assists, and 1.5 steals per game last season, showcasing a well-rounded offensive game and switchable defensive capabilities that perfectly align with the Warriors' system. His availability, initially seen as tight, is reportedly increasing, positioning the Warriors as a leading contender to land the promising young star.\u003c/p\u003e\n\u003cp\u003eThe prospect of adding Murphy to an already formidable Warriors lineup, potentially alongside LeBron James, has ignited a fervent discussion among fans and analysts. Social media sentiment reflects this excitement, with a predominantly positive reception to the trade rumors, albeit with some ongoing debate about the implications of moving Porzingis so soon after his signing.\u003c/p\u003e\n\u003cp\u003eShould this trade materialize, it would undoubtedly signal the Warriors' unwavering commitment to contending for championships, demonstrating their willingness to make bold, calculated risks to assemble a super team capable of attracting the league's biggest names. The question remains: will this audacious gambit pay off, bringing Trey Murphy III to Golden State and, perhaps, securing LeBron James's commitment?\u003c/p\u003e\n","title":"Warriors Make Bold Move: Porzingis-for-Murphy Trade on the Horizon to Lure LeBron?","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-03T07:03:37Z","summary":"Despite recently signing Kristaps Porzingis, the Golden State Warriors are reportedly targeting New Orleans Pelicans forward Trey Murphy III in a trade that could see Porzingis on the move again. This aggressive strategy aims to make a significant splash to attract LeBron James to the Bay.","tags":["NBA","Golden State Warriors","Trey Murphy III","Kristaps Porzingis","LeBron James","NBA Trade Rumors","Basketball"],"sources":[{"url":"https://sports.yahoo.com/articles/warriors-predicted-steal-celtics-top-220040342.html","title":"Warriors predicted to steal Celtics' top $112 million trade target in Kristaps Porzingis trade"},{"url":"https://www.msn.com/en-us/sports/nba/warriors-kristaps-porzingis-plan-thrown-into-chaos-by-anthony-davis-pursuit/ar-AA26NEvE?ocid=BingNewsVerp","title":"Warriors’ Kristaps Porzingis plan thrown into chaos by Anthony Davis pursuit"},{"url":"https://www.eastbaytimes.com/2026/06/29/kristaps-porzingis-extension-golden-state-warriors-nba-free-agency/","title":"Kristaps Porzingis returns to Warriors on two-year extension, Melton declines player option"},{"url":"https://www.msn.com/en-us/sports/nba/kristaps-porzingis-agrees-to-2-year-40m-deal-with-warriors/ar-AA26PM6d?ocid=BingNewsVerp","title":"Kristaps Porzingis agrees to 2-year, $40M deal with Warriors"},{"url":"https://bleacherreport.com/articles/25444504-new-nba-rumors-warriors-trey-murphy-iii-trade-talks-ahead-draft-amid-links-lakers-more","title":"New NBA Rumors on Warriors' Trey Murphy III Trade Talks Ahead of Draft Amid Links to Lakers, More"},{"url":"https://sports.yahoo.com/articles/rumored-warriors-trade-target-trey-122520537.html","title":"Rumored Warriors trade target Trey Murphy III reportedly could be more available"},{"url":"https://sports.yahoo.com/articles/latest-trey-murphy-iii-trade-225219186.html","title":"Latest Trey Murphy III trade update is bad news for Warriors and Celtics"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"warriors-make-bold-move-porzingis-for-murphy-trade"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
