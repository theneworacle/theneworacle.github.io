<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"trumps-tumultuous-meet-the-press-exit-a-clash-over","contentHtml":"\u003cp\u003eIn a highly anticipated and ultimately chaotic segment, former President Donald Trump's interview on NBC's \"Meet the Press\" with moderator Kristen Welker came to an early, dramatic end. The interview, intended to cover pressing political issues, quickly veered into a contentious confrontation as Welker challenged Trump on his claims regarding past elections and the events of January 6th.\u003c/p\u003e\n\u003cp\u003eAccording to reports, the former president grew increasingly agitated under Welker's questioning. He reportedly lashed out, labeling elections, major news networks, and even Welker herself as \"crooked.\" Trump accused NBC of being a \"one-sided crooked network,\" a statement that preceded his abrupt departure. He removed his microphone, tossed it aside, and walked out, ignoring Welker's attempts to continue the discussion.\u003c/p\u003e\n\u003cp\u003eFollowing the tumultuous interview, NBC News issued a \"litany of fact checks\" to address numerous assertions made by Trump. For instance, Trump claimed he had \"totally obliterated\" an Iranian nuclear site with B-2 bombers and that Iran's navy, air force, and anti-aircraft capabilities were \"gone.\" NBC News countered that intelligence assessments indicated Iran had not decided to build nuclear weapons, only one nuclear site was mostly destroyed, and while significant damage was inflicted on Iran's conventional navy and missile facilities, half of its unconventional navy remained intact. Furthermore, despite Trump's past campaign pledges of not starting new wars, he defended his military actions in Iran, stating he \"didn't guarantee no war.\"\u003c/p\u003e\n\u003cp\u003eOn the economic front, Trump asserted that gas prices would immediately decrease once a deal with Iran was reached. However, oil executives cited by NBC News stated that it would take at least four to six weeks to normalize global supply chains and potentially until the first or second quarter of 2027 to restore full pre-conflict oil flows. Regarding the proposed $1.8 billion \"anti-weaponization\" fund for his allies, Trump defended the initiative, even though the Justice Department had indicated the fund was \"not going forward.\"\u003c/p\u003e\n\u003cp\u003eThe January 6th Capitol riot also became a point of contention. Trump claimed that FBI agents had \"ushered\" people into the building and that rioters who pleaded guilty to assaulting police officers did so out of fear. NBC News clarified that there is no evidence to support the claim of FBI agents ushering individuals into the Capitol, and highlighted that some of the most violent rioters never even entered the building, yet received significant sentences.\u003c/p\u003e\n\u003cp\u003eThe incident sparked a widespread reaction across social media and news platforms. Many commentators described Trump's behavior as \"wild, unhinged,\" \"demented and deranged,\" and heavily criticized his apparent inability to handle direct pushback or substantiate his claims with evidence. Journalists and public figures alike weighed in, emphasizing the importance of holding political figures accountable for their statements. The overall social media sentiment appeared to be largely supportive of the fact-checking efforts and critical of Trump's walk-out, though some debate around the situation was also present.\u003c/p\u003e\n\u003cp\u003eThis latest episode underscores the ongoing tensions between political figures and the media, particularly when it comes to the verification of facts and the expectation of accountability. As the political landscape continues to evolve, the role of rigorous journalism in challenging unsubstantiated claims remains more critical than ever.\u003c/p\u003e\n","title":"Trump's Tumultuous \"Meet the Press\" Exit: A Clash Over Facts and Accountability","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-08T03:35:40Z","summary":"Donald Trump's recent \"Meet the Press\" interview with Kristen Welker devolved into a heated exchange, culminating in the former president's abrupt walk-out and a subsequent \"litany of fact checks\" from NBC News. This incident has ignited a firestorm of public and media commentary on journalistic integrity and political accountability.","tags":["Donald Trump","Meet the Press","NBC News","Fact-checking","Kristen Welker","Politics","Media","Interview","Accountability","Iran","January 6th","Gas Prices"],"sources":[{"url":"https://www.yahoo.com/news/politics/articles/nbc-news-posts-litany-fact-184016528.html","title":"NBC News Posts Litany of Fact Checks Following Trump’s Wild Meet the Press Interview"},{"url":"https://www.msn.com/en-us/news/other/nbc-news-posts-litany-of-fact-checks-following-trump-s-wild-meet-the-press-interview/ar-AA252Ee4?ocid=BingNewsVerp","title":"NBC News posts litany of fact checks following Trump’s wild Meet the Press interview"},{"url":"https://www.msn.com/en-us/news/politics/fact-checking-trump-s-interview-with-nbc-news-meet-the-press/ar-AA252Hj3?ocid=BingNewsVerp","title":"Fact-checking Trump’s interview with NBC News’ ‘Meet the Press’"},{"url":"https://www.huffpost.com/entry/trump-storms-off-meet-the-press-interview-kristen-welker_n_6a2596f5e4b012c51770dfb2","title":"'Dude Is Losing His S**t': Trump Clowned For Rage Quitting On 'Meet The Press'"},{"url":"https://www.nbcnews.com/politics/donald-trump/fact-checking-trump-interview-meet-press-june-2026-rcna348518","title":"Fact-checking Trump’s interview with NBC News’ ‘Meet the Press’"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"trumps-tumultuous-meet-the-press-exit-a-clash-over"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
