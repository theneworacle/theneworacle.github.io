<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"the-ohio-high-school-football-shake-up-feister-bro","contentHtml":"\u003cp\u003eThe Ohio high school sports scene is buzzing with the news of a significant transfer that promises to reshape the competitive landscape. Brothers Brayton and Brydon Feister, two of the state's most talented athletes, are making the high-profile move from Akron Archbishop Hoban to the storied program of Massillon Washington. This transfer is being hailed as \"huge news\" for good reason, impacting both football and wrestling at the elite level.\u003c/p\u003e\n\u003cp\u003eBrayton Feister, a formidable four-star football recruit and rising senior, brings a proven track record of dominance to Massillon. His 2025 season was nothing short of spectacular, with an impressive 133 tackles, including 13 sacks, and a remarkable 17 rushing touchdowns. His addition is expected to provide an immediate and substantial boost to Massillon's football offense and defense.\u003c/p\u003e\n\u003cp\u003eNot to be outdone, his younger brother, Brydon Feister, a three-star football recruit entering his junior year, is already a two-time state wrestling champion. While his football talent continues to develop, Brydon is anticipated to make an indelible mark on the wrestling mat for Massillon, adding another layer of athletic prowess to the school's programs.\u003c/p\u003e\n\u003cp\u003eThe magnitude of this transfer is amplified by the reputations of the institutions involved. Archbishop Hoban stands as a premier Division II football program, while Massillon Washington boasts a rich history as a Division I powerhouse, having secured an astounding 25 state championships. The move signals a strategic strengthening of Massillon's athletic roster, particularly as the team looks to build on its 9-4 season.\u003c/p\u003e\n\u003cp\u003eThe news has resonated across various media outlets, with \u003cem\u003eThe Columbus Dispatch\u003c/em\u003e and \u003cem\u003ecleveland.com\u003c/em\u003e among those highlighting the significant \"firepower\" the Feister brothers bring to Massillon. Social media discussions around the transfer are predominantly positive, reflecting the excitement and anticipation surrounding the brothers' impact, though some debate is naturally emerging regarding the broader implications for Ohio high school sports.\u003c/p\u003e\n\u003cp\u003eThis transfer is more than just a change of schools; it's a testament to the dynamic and competitive nature of high school athletics in Ohio, and a clear signal that Massillon is gearing up for an even more formidable presence on the football field and wrestling mat.\u003c/p\u003e\n","title":"The Ohio High School Football Shake-Up: Feister Brothers' Blockbuster Transfer to Massillon","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-04T17:30:35Z","summary":"The highly anticipated transfer of four-star Brayton Feister and two-time state wrestling champion Brydon Feister from Archbishop Hoban to Massillon Washington is set to send seismic waves through Ohio high school football and wrestling, transforming the competitive landscape.","tags":["Ohio High School Football","Ohio High School Wrestling","Brayton Feister","Brydon Feister","Massillon Washington","Archbishop Hoban","High School Transfers","College Recruiting"],"sources":[{"url":"https://sports.yahoo.com/articles/why-feister-brothers-transfer-hoban-144441113.html","title":"Why Feister brothers transfer from Hoban to Massillon is huge news in Ohio HS football, wrestling"},{"url":"https://www.dispatch.com/story/sports/high-school/fridaynightohio/2026/05/04/massillon-football-transfers-brayton-feister-brydon-hoban/89453703007/","title":"Feister brothers transfer adds more firepower to Massillon football"},{"url":"https://www.cleveland.com/highschoolsports/2026/05/two-of-northeast-ohios-top-football-recruits-have-transferred-to-massillon.html","title":"Two of Northeast Ohio's top football recruits have transferred to Massillon"},{"url":"https://www.msn.com/en-us/sports/football/brayton-feister-brydon-feister-transferring-to-massillon-ohio-washington/ar-AA22lTV1","title":"Brayton Feister \u0026 Brydon Feister transferring to Massillon (Ohio) Washington"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"the-ohio-high-school-football-shake-up-feister-bro"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
