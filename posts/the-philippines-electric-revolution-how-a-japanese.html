<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"the-philippines-electric-revolution-how-a-japanese","contentHtml":"\u003cp\u003eThe iconic, colorful jeepneys have long been the lifeblood of public transportation in the Philippines, but recent months have seen a significant disruption. Skyrocketing gasoline and diesel prices, exacerbated by a 'national energy emergency' declared by President Ferdinand Marcos Jr., have forced many traditional jeepney drivers off the road, leaving countless commuters stranded.\u003c/p\u003e\n\u003cp\u003eHowever, where a challenge arose, a significant opportunity presented itself – and a Japanese startup, ASSEMBLEPOINT, seized it. This Tokyo-based EV company established a manufacturing plant near Manila, rolling out 10-seat electric minibuses designed to modernize and electrify the nation's public transport fleet.\u003c/p\u003e\n\u003cp\u003eWhat started as a promising venture quickly turned into an unexpected surge. The conflict in the Middle East and the effective closure of the Strait of Hormuz sent global crude oil prices spiraling. This energy crunch became an unforeseen catalyst for ASSEMBLEPOINT, driving inquiries from municipal governments and private fleet operators to an astonishing five times their pre-conflict levels.\u003c/p\u003e\n\u003cp\u003eDespite the overwhelming demand, the young enterprise faces its share of hurdles. President Miyashita Takashi acknowledges that the company is currently 'hamstrung by its manufacturing footprint' and reliant on imported components, leading to frustrating production bottlenecks and a 'sold-out situation.'\u003c/p\u003e\n\u003cp\u003eNevertheless, the impact of these e-jeepneys is already being felt. Approximately 100 electric jeepneys are now operating on Philippine roads, with both passengers and drivers offering glowing reviews. Passengers praise the vehicles for being 'small, but very comfortable,' while drivers are particularly enthusiastic about the reduced operational costs, with one noting, 'Electric vehicles are just better.'\u003c/p\u003e\n\u003cp\u003eLooking ahead, ASSEMBLEPOINT has ambitious plans to expand its reach beyond Manila, aiming to serve outlying island regions like Cebu. Miyashita expresses a commitment to 'cover every last mile for people in the Philippines,' with the ultimate goal of delivering e-jeepneys to all of the nation's 7,000-plus islands.\u003c/p\u003e\n\u003cp\u003eSimulated social sentiment surrounding this e-jeepney shift is largely positive, reflecting public optimism for a greener, more cost-effective future for public transport, though discussions continue. As fuel prices continue to reshape the transportation landscape, ASSEMBLEPOINT's initiative marks a pivotal step towards a more sustainable and resilient public transport system in the Philippines.\u003c/p\u003e\n","title":"The Philippines' Electric Revolution: How a Japanese Startup is Powering the E-Jeepney Shift","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-13T12:31:22Z","summary":"Amidst soaring fuel prices and a national energy emergency, a Japanese EV startup, ASSEMBLEPOINT, is spearheading the transition to electric jeepneys in the Philippines, transforming public transport and offering a sustainable solution.","tags":["Philippines","E-Jeepney","Electric Vehicles","ASSEMBLEPOINT","Sustainable Transport","Energy Crisis","Japan","Public Transportation"],"sources":[{"url":"https://www3.nhk.or.jp/nhkworld/en/news/backstories/4958/","title":"Japan EV startup drives Philippines e-jeepney shift"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"the-philippines-electric-revolution-how-a-japanese"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
