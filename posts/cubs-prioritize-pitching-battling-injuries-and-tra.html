"harsh reality\" for the team's World Series pursuit.\u003c/p\u003e\n\u003cp\u003ePresident of baseball operations Jed Hoyer has already begun reaching out to other organizations, actively making calls and texts to secure new talent. Among the names being circulated as potential targets, Minnesota Twins pitcher Joe Ryan has emerged as a prominent candidate. Ryan, who is under team control through 2027, presents an appealing option beyond just a rental for the current season.\u003c/p\u003e\n\u003cp\u003eHowever, the path to bolstering the rotation is not without its challenges. While social sentiment among fans and analysts leans generally positive regarding the team's trade strategy, some reports suggest that a significant deadline acquisition might be difficult given the Cubs' recent trade history. There are also discussions around specific \"hurdles\" and \"warnings\" concerning particular player acquisitions, hinting at the complexities of navigating the trade market.\u003c/p\u003e\n\u003cp\u003eDespite these potential obstacles, the Cubs' commitment to improving their pitching staff is undeniable. With their championship aspirations hanging in the balance, the coming trade deadline promises to be a pivotal moment for the organization.\u003c/p\u003e\n","title":"Cubs Prioritize Pitching: Battling Injuries and Trade Deadline Hurdles","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-18T15:02:05Z","summary":"The Chicago Cubs are making a clear statement ahead of the MLB trade deadline: starting pitching is their top priority. With a roster decimated by injuries, the front office is actively seeking reinforcements to keep their World Series aspirations alive.","tags":["Chicago Cubs","MLB","Trade Deadline","Starting Pitching","Baseball","Injuries","Jed Hoyer","Joe Ryan"],"sources":[{"url":"https://sports.yahoo.com/articles/cubs-reveal-top-priority-mlb-143512028.html","title":"Cubs reveal 'top priority' for MLB trade deadline"},{"url":"https://sports.yahoo.com/articles/cubs-dealt-harsh-reality-starting-211731575.html","title":"Cubs dealt harsh reality with starting rotation amid World Series pursuit"},{"url":"https://heavy.com/sports/mlb/chicago-cubs/joe-ryan-star-pitcher-top-trade-fit/","title":"Chicago Cubs Named a Top Trade Fit for Twins Star Pitcher"},{"url":"https://www.msn.com/en-us/sports/baseball/chicago-cubs-recent-history-suggests-big-trade-deadline-move-may-not-happEN/ar-AA24RfYD?ocid=BingNewsVerp","title":"Chicago Cubs: Recent history suggests big trade deadline move may not happen"},{"url":"https://www.msn.com/en-us/sports/baseball/cubs-receive-serious-trade-deadline-warning-about-one-particular-player/ar-AA25ixm3?ocid=BingNewsVerp","title":"Cubs receive serious trade deadline warning about one particular player"},{"url":"https://www.msn.com/en-us/sports/baseball/chicago-cubs-biggest-mlb-trade-deadline-hurdle-is-blatantly-obvious/ar-AA24Z2y8?ocid=BingNewsVerp","title":"Chicago Cubs’ biggest MLB trade deadline hurdle is blatantly obvious"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"cubs-prioritize-pitching-battling-injuries-and-tra"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
