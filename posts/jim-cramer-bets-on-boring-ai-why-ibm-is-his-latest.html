<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"jim-cramer-bets-on-boring-ai-why-ibm-is-his-latest","contentHtml":"\u003cp\u003eThe AI gold rush has sent tech stocks soaring, with investors eagerly chasing the next big winner. But amidst the clamor for data-center darlings and chipmakers, a seasoned voice on Wall Street is urging a different approach. Jim Cramer, the outspoken host of CNBC's Mad Money, is advising investors to look beyond the obvious and consider a familiar name with a surprisingly strong AI story: IBM.\u003c/p\u003e\n\u003cp\u003eWhile initial reports hinted at AI stocks boasting astronomical gains of 460% and 1,300% since 2023, the deeper dive into Cramer's recent recommendations reveals a strategic pivot. His focus has shifted to companies that offer a more grounded, yet equally compelling, investment thesis in the burgeoning AI landscape.\u003c/p\u003e\n\u003cp\u003eCramer's pitch for IBM is rooted in several key factors that set it apart from its high-flying peers:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAttractive Valuation:\u003c/strong\u003e In a market where many AI stocks trade at forward earnings multiples north of 40x, IBM stands out with a more modest 22x forward P/E. This valuation, described by Cramer as \"almost quaint,\" suggests significant upside potential for investors seeking value in the AI space.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRobust Financial Performance:\u003c/strong\u003e IBM delivered a strong Q1 2026, beating both revenue and EPS estimates. The company reported impressive growth in its Software segment (up 11.3%), with Red Hat contributing 13% and Data growing 19%. Perhaps most notably, IBM Z mainframe revenue surged by an astonishing 51% year-over-year, demonstrating the company's foundational strength.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAccelerating Generative AI Business:\u003c/strong\u003e Far from being a bystander in the AI revolution, IBM's generative AI book of business has already crossed $12.5 billion inception-to-date. This accelerating segment, with significant contributions from both Consulting and Software, indicates a tangible and growing involvement in cutting-edge AI applications. IBM's fully populated Z mainframes can handle an estimated 450 billion inferences a day, showcasing its capacity for enterprise-level AI workloads.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReliable Dividend:\u003c/strong\u003e Unlike many growth-focused AI companies, IBM offers the stability of a consistent dividend. The company recently raised its dividend to $1.69 per share, marking its 31st consecutive annual increase, a \"ballast\" that provides an income floor for investors.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnalyst Endorsement:\u003c/strong\u003e Bank of America recently upgraded IBM, raising its price target to $330, citing software strength, Confluent synergies, and the company's dividend record.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eOf course, no investment comes without its caveats. Bearish concerns include whether AI is merely cannibalizing older consulting services, given that consulting revenue grew only 4% despite holding the largest share of IBM's AI business. However, Cramer's overall call remains coherent: a compelling dividend yield, a reasonable forward multiple, a rapidly growing AI business, and a resilient mainframe cycle.\u003c/p\u003e\n\u003cp\u003eFor investors looking for AI exposure without the extreme volatility and elevated valuations of some market darlings, Jim Cramer's recommendation of IBM offers a thoughtful alternative. It's a bet on a legacy tech giant that is quietly, but effectively, carving out its significant role in the artificial intelligence era.\u003c/p\u003e\n","title":"Jim Cramer Bets on 'Boring' AI: Why IBM is His Latest Recommendation","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-12T17:04:41Z","summary":"Jim Cramer, known for his bold market calls, is now steering investors away from the typical AI darlings towards a surprising legacy tech giant. Discover why IBM is catching Cramer's eye with its attractive valuation, strong financials, and robust generative AI business.","tags":["AI Stocks","Jim Cramer","IBM","Investing","Stock Market","Tech Stocks","Generative AI","Wall Street","Investment Strategy","Financial News"],"sources":[{"url":"https://247wallst.com/investing/2026/07/07/cramer-says-forget-the-data-center-darlings-this-boring-ai-stock-at-22x-is-the-buy/","title":"Cramer Says Forget the Data-Center Darlings. This ‘Boring’ AI Stock at 22x Is the Buy."},{"url":"https://www.insidermonkey.com/blog/jim-cramers-5-stocks-calls-like-nvidia-meta-and-advice-to-stick-with-large-tech-1799612/","title":"Jim Cramer’s 5 Stocks Calls Like NVIDIA, Meta, and Advice to Stick with Large Tech"},{"url":"https://www.cnbc.com/2026/07/06/jim-cramer-says-this-ai-play-up-85percent-this-year-is-headed-even-higher.html","title":"https://www.cnbc.com/2026/07/06/jim-cramer-says-this-ai-play-up-85percent-this-year-is-headed-even-higher.html"},{"url":"https://www.cnbc.com/2026/05/27/jim-cramer-says-ask-yourself-this-question-when-looking-for-ai-winners-to-buy.html","title":"https://www.cnbc.com/2026/05/27/jim-cramer-says-ask-yourself-this-question-when-looking-for-ai-winners-to-buy.html"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"jim-cramer-bets-on-boring-ai-why-ibm-is-his-latest"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
