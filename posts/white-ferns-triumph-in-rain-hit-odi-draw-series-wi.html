<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"white-ferns-triumph-in-rain-hit-odi-draw-series-wi","contentHtml":"\u003cp\u003eA thrilling conclusion to the One Day International series between New Zealand and England saw the White Ferns emerge victorious in a rain-truncated third match in Cardiff, drawing the series at 1-1. The Duckworth-Lewis-Stern (DLS) method ultimately decided the fate of the contest, with New Zealand ahead when rain halted play.\u003c/p\u003e\n\u003cp\u003eEngland, batting first in the reduced 33-over-per-side encounter, posted a total of 181 for 7 wickets. Alice Capsey was a standout performer for the home side, contributing a solid 45 runs to their innings. However, persistent rain made conditions challenging for both teams, adding an unpredictable element to the game.\u003c/p\u003e\n\u003cp\u003eIn response, New Zealand showcased resilience and strategic batting. When the heavens opened for the final time, bringing an end to the match in the 25th over, New Zealand had reached 141 for 4 wickets, putting them 17 runs ahead of the DLS par score. Brooke Halliday was the architect of their chase, delivering a player-of-the-match performance with an unbeaten 42 runs, skillfully navigating the tricky conditions.\u003c/p\u003e\n\u003cp\u003eThe match held particular significance for New Zealand cricket as it marked the final One Day International appearance for the iconic Suzie Bates. A legend of the game, Bates received a fitting send-off with a series-drawing victory. Adding to New Zealand's accolades, Maddy Green was deservedly named the player of the series for her consistent contributions.\u003c/p\u003e\n\u003cp\u003eBoth captains reflected on the challenging conditions and their teams' efforts. England's Charlie Dean acknowledged the difficulty of managing tempo in shortened overs, while New Zealand's Melie Kerr expressed satisfaction with the win against a formidable England side, praising the composure of Halliday, Green, and Izzy Gaze under pressure.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment surrounding the series has been largely positive, reflecting the competitive nature and engaging moments of the matches, albeit with some typical sporting debate among fans. Looking ahead, cricket enthusiasts can anticipate more excitement as these two nations prepare to clash in a three-match T20 international series, promising further thrilling encounters as they build towards the T20 World Cup.\u003c/p\u003e\n","title":"White Ferns Triumph in Rain-Hit ODI, Draw Series with England","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-18T16:31:01Z","summary":"New Zealand secured a dramatic 17-run victory over England in a rain-affected third One Day International in Cardiff, leveling the series 1-1. The match, decided by the Duckworth-Lewis-Stern method, saw Brooke Halliday shine and marked the emotional farewell of White Ferns legend Suzie Bates from ODI cricket.","tags":["Cricket","New Zealand","England","ODI","Sports","Suzie Bates","Brooke Halliday","Series Draw","Women's Cricket","White Ferns"],"sources":[{"url":"https://www.bbc.com/sport/cricket/live/cgjwxnx5gg0t","title":"New Zealand beat England in rain-hit third ODI to draw series - reaction"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"white-ferns-triumph-in-rain-hit-odi-draw-series-wi"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
