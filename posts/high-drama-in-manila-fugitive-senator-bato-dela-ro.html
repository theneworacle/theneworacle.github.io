<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"high-drama-in-manila-fugitive-senator-bato-dela-ro","contentHtml":"\u003cp\u003eThe halls of the Philippine Senate recently became the scene of high drama and a chaotic escape attempt. Senator Ronald 'Bato' dela Rosa, a key figure in former President Rodrigo Duterte's controversial 'war on drugs,' evaded arrest by the International Criminal Court (ICC) after gunshots reportedly rang out within the legislative building.\u003c/p\u003e\n\u003cp\u003eDela Rosa, 64, a former national police chief and staunch ally of Duterte, is sought by the ICC on charges of crimes against humanity. These charges stem from his alleged role as a top enforcer in the anti-drug campaign, which human rights groups estimate led to thousands of extrajudicial killings between 2016 and 2019. The ICC unsealed its arrest warrant against dela Rosa after an earlier secret issuance in November saw him disappear from public life.\u003c/p\u003e\n\u003cp\u003eThe senator reappeared in the Senate, reportedly to cast a deciding vote in a leadership contest. However, law enforcement agents were waiting. What followed was a dramatic standoff, culminating in reports of gunfire as armed soldiers attempted to apprehend him. Dela Rosa, denying any involvement in the killings, managed to flee the building, with his current whereabouts unknown.\u003c/p\u003e\n\u003cp\u003eIn the wake of the incident, Philippine Justice Secretary Fredderick Vida affirmed the validity of the ICC warrant and pledged the government's cooperation. However, this cooperation is pending a Supreme Court decision on dela Rosa's petition against the warrant's legality. Border officials have been put on alert to prevent any attempt by the senator to leave the country, with Vida warning that aiding his escape would be considered a 'mockery of justice.'\u003c/p\u003e\n\u003cp\u003eDela Rosa has vowed to 'exhaust all available remedies' to block his transfer to The Hague, where former President Duterte is already held in ICC custody facing similar charges. The unfolding events underscore the deep divisions and legal complexities surrounding the 'war on drugs' legacy in the Philippines. Social media sentiment surrounding the incident appears to be mostly positive, with some ongoing debate, reflecting the polarizing nature of the issues at hand.\u003c/p\u003e\n\u003cp\u003eThis high-stakes pursuit highlights the ICC's continued efforts to bring those allegedly responsible for grave human rights violations to justice, even against powerful political figures. The coming days will likely see further developments as the Philippine Supreme Court weighs in and the international community watches closely.\u003c/p\u003e\n","title":"High Drama in Manila: Fugitive Senator 'Bato' Dela Rosa Evades ICC Arrest Amidst Senate Chaos","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-15T16:05:38Z","summary":"A dramatic shootout in the Philippine Senate building marked the attempted arrest of Senator Ronald 'Bato' dela Rosa, wanted by the International Criminal Court for alleged crimes against humanity during the country's deadly 'war on drugs.' As authorities pledge cooperation with the ICC, the fugitive senator remains at large.","tags":["Philippines","ICC","Ronald Dela Rosa","Bato Dela Rosa","Rodrigo Duterte","Drug War","Crimes Against Humanity","Senate","Fugitive","International Law"],"sources":[{"url":"https://www.aljazeera.com/news/2026/5/15/philippines-vows-to-hand-fugitive-senator-to-icc-following-shootout","title":"Philippines vows to hand fugitive senator to ICC following shootout - Al Jazeera"},{"url":"https://www.msn.com/en-us/news/world/philippines-suspends-senate-security-chief-after-shootout-escape-of-politician-wanted-by-icc/ar-AA23f4JS","title":"Philippines suspends Senate security chief after shootout, 'escape' of politician wanted by ICC - MSN"},{"url":"https://time.com/article/2026/05/14/philippines-senate-shooting-ronald-bato-dela-rosa-drug-war-duterte-icc-arrest/","title":"Gunshots, Mayhem in Philippines’ Senate: What to Know About Senator at the Center of the Chaos - TIME"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"high-drama-in-manila-fugitive-senator-bato-dela-ro"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
