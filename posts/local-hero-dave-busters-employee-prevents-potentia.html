<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"local-hero-dave-busters-employee-prevents-potentia","contentHtml":"\u003cp\u003eIn a heartwarming display of civic duty and quick thinking, Izabella Drumheller, a 23-year-old bartender and server at Dave \u0026#x26; Buster's in Port St. Lucie, is being celebrated for her pivotal role in stopping a suspected impaired driver. Her actions on the early morning of June 30th likely prevented a potential tragedy, earning her widespread praise from local law enforcement.\u003c/p\u003e\n\u003cp\u003eThe incident unfolded around 12:45 AM when Drumheller was alerted by a co-worker to a man passed out in his running vehicle in the parking lot on SW Gatlin Blvd. With a background in EMT training, Drumheller immediately sprang into action. She approached the vehicle and discovered Anthony Rosales, 38, of Port St. Lucie, unconscious at the wheel. A strong odor of alcohol permeated the car, and an empty vodka bottle was clearly visible.\u003c/p\u003e\n\u003cp\u003e\"I went and checked on him, like, shook him, made sure he was awake, um, checked his pulse, so I couldn't really feel anything on his wrist, so then I checked his neck, he wasn't waking up,\" Drumheller recounted. After successfully rousing him, she quickly realized he was severely intoxicated and in no condition to drive. Without hesitation, she called 911 and patiently remained nearby until police arrived on the scene.\u003c/p\u003e\n\u003cp\u003eUpon the arrival of the Port St. Lucie Police, Rosales was arrested. Breath tests later revealed his blood alcohol content to be .124 and .120, both significantly above Florida's legal limit of .08. Rosales now faces a litany of charges, including DUI, resisting an officer with violence, operating a motor vehicle without a valid driver's license, battery on a law enforcement officer, and making threats to law enforcement. Disturbingly, it was also noted that Rosales had a previous DUI conviction in January 2026.\u003c/p\u003e\n\u003cp\u003eDrumheller, who harbors aspirations of becoming an EMT-paramedic, emphasized her motivation: \"I'm just thankful I was there. Just stay safe. Don't drink and drive. Ubers. Call a friend. There are so many options, you know?\" Her empathetic approach and commitment to public safety serve as a powerful reminder of the impact one individual can have.\u003c/p\u003e\n\u003cp\u003eThe Port St. Lucie Police Department has publicly commended Drumheller for her vigilance and courage. Her decisive intervention underscores the critical importance of remaining aware of our surroundings and acting responsibly when faced with potential dangers. Izabella Drumheller's story is a shining example of how everyday citizens can make a profound difference in their communities.\u003c/p\u003e\n","title":"Local Hero: Dave \u0026 Buster's Employee Prevents Potential Tragedy in Port St. Lucie","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-12T13:12:40Z","summary":"A quick-thinking Dave \u0026 Buster's employee in Port St. Lucie is being hailed as a hero after her decisive actions led to the arrest of a suspected DUI driver, potentially saving lives and preventing a serious accident.","tags":["Port St. Lucie","DUI","Dave \u0026 Buster's","Izabella Drumheller","Community Hero","Public Safety","Drunk Driving Prevention","Florida News","Law Enforcement"],"sources":[{"url":"https://www.msn.com/en-us/news/crime/dave-buster-s-employee-helps-police-stop-suspected-dui-driver-in-port-st-lucie/ar-AA26TRC3?ocid=BingNewsBrowse","title":"Dave \u0026 Buster’s employee helps police stop suspected DUI driver in Port St. Lucie"},{"url":"https://www.yahoo.com/news/us/articles/did-thing-dave-busters-employee-182702009.html","title":"\"They Did the Right Thing\": Dave \u0026 Buster's Employee Helps Unconscious Driver in Running Car, Leading to DUI Arrest"},{"url":"https://cbs12.com/news/local/port-st-lucie-police-praise-dave-busters-employee-actions-stopped-impaired-man-driving-under-influence-florida-news","title":"Dave \u0026 Buster's employee hailed for stopping suspected impaired driver in Port St. Lucie"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"local-hero-dave-busters-employee-prevents-potentia"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
