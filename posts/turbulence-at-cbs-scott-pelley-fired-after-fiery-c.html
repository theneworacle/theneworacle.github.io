<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"turbulence-at-cbs-scott-pelley-fired-after-fiery-c","contentHtml":"\u003cp\u003eA seismic shift has rocked the hallowed halls of CBS News, as longtime '60 Minutes' correspondent Scott Pelley was fired in the wake of a bitter public dispute with the network's new leadership. The dramatic exit of Pelley, a fixture on the iconic news program, follows a contentious all-staff meeting where he reportedly lashed out, accusing CBS News Editor-in-Chief Bari Weiss of 'murdering' the show and questioning the qualifications of newly appointed '60 Minutes' Executive Producer Nick Bilton.\u003c/p\u003e\n\u003cp\u003ePelley's fiery outburst was reportedly fueled by what he dubbed 'Black Thursday' – the abrupt dismissal of several '60 Minutes' staffers, including correspondents Sharyn Alfonsi and Cecilia Vega, and executive producer Tanya Simon. Bilton was named Simon's successor on the very day of these controversial firings, signaling a swift and sweeping overhaul of the program's editorial direction.\u003c/p\u003e\n\u003cp\u003eIn a strongly worded memo to Pelley, Bilton condemned his actions, stating that Pelley had 'hijacked' their initial meeting to 'disparage' him and his intentions with 'remarkable incivility and contempt.' Bilton emphasized Pelley's apparent lack of interest in collaborative work or the show's future success. Prior to the public confrontation, CBS News leadership, including Weiss and Bilton, had reportedly attempted to engage Pelley in private conversations, expressing their desire for him to remain a correspondent. Weiss is also said to have requested an apology from Pelley, accusing him of fostering a hostile work environment.\u003c/p\u003e\n\u003cp\u003eHowever, Pelley offered a starkly different account, leveling accusations of 'incompetence and unprofessionalism' against the new management. He claimed he had been instructed to inject 'falsehoods and bias' and 'unverified assertions' into politically sensitive stories, mandates he asserted he had resisted. Pelley had previously voiced concerns about external pressures from Paramount, CBS News' parent company, allegedly influencing content due to a potential merger with Skydance Media and a lawsuit initiated by Donald Trump. These concerns, he argued, threatened the essential editorial independence required for honest journalism.\u003c/p\u003e\n\u003cp\u003eBari Weiss was appointed CBS News' editor-in-chief by David Ellison, the new CEO of Paramount (Skydance Media), a move that appears to have precipitated significant changes within the news division.\u003c/p\u003e\n\u003cp\u003eThe incident has ignited a firestorm of discussion across social media, with simulated sentiment indicating a 'mostly positive' reaction mixed with 'some debate.' This suggests a divided public opinion regarding the changes at CBS News and Pelley's dramatic departure, highlighting the ongoing tension between traditional journalistic values and evolving media landscapes.\u003c/p\u003e\n","title":"Turbulence at CBS: Scott Pelley Fired After Fiery Clash with New '60 Minutes' Leadership","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-03T08:55:30Z","summary":"Veteran '60 Minutes' correspondent Scott Pelley has been terminated from CBS News following a dramatic confrontation with Editor-in-Chief Bari Weiss and new Executive Producer Nick Bilton, sparking debate over journalistic integrity and editorial control within the venerable news program.","tags":["CBS News","Scott Pelley","Bari Weiss","60 Minutes","Nick Bilton","Journalism","Media Industry","Newsroom Drama"],"sources":[{"url":"https://www.yahoo.com/entertainment/tv/articles/scott-pelley-fired-accusing-cbs-015154976.html","title":"Scott Pelley fired after accusing CBS News boss Bari Weiss of ‘murdering’ 60 Minutes"},{"url":"https://www.foxnews.com/media/scott-pelley-fired-cbs-news-after-blowups-bari-weiss-new-60-minutes-producer","title":"Scott Pelley fired at CBS News after blowups with Bari Weiss, new '60 Minutes' producer"},{"url":"https://www.eonline.com/videos/2502245955558/why-60-minutes-scott-pelley-accused-bari-weiss-of-murdering-the-cbs-news-show","title":"Why 60 Minutes' Scott Pelley Accused Bari Weiss of \"Murdering\" the CBS News Show"},{"url":"https://www.sfgate.com/entertainment/article/scott-pelley-fired-from-60-minutes-deepening-22288806.php","title":"Scott Pelley fired from '60 Minutes,' deepening turmoil at CBS News"},{"url":"https://www.yahoo.com/entertainment/tv/articles/cbs-fires-scott-pelley-sharp-080606118.html","title":"CBS Fires Scott Pelley After His Sharp Attack on New Boss Over ’60 Minutes’"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"turbulence-at-cbs-scott-pelley-fired-after-fiery-c"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
