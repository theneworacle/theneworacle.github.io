<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"parents-charged-after-six-children-including-infan","contentHtml":"\u003cp\u003eSalina, Kansas – In a shocking incident that has drawn widespread public concern, a couple has been arrested and charged after allegedly leaving six young children, including two 7-month-old infants, unattended in a sweltering car while they ate at a local Wingstop restaurant. The temperature outside at the time of the incident was a scorching 97 degrees Fahrenheit, with a heat index climbing to 102 degrees.\u003c/p\u003e\n\u003cp\u003eAuthorities were dispatched to the Wingstop at 1621 S. Ohio in Salina after receiving reports of multiple children left in a vehicle in the parking lot. Upon arrival, officers discovered a non-running car with only one window slightly ajar, containing two 7-month-old babies, a 2-year-old, a 4-year-old, a 5-year-old, and a 13-year-old. The children had been left in the perilous conditions for approximately 20 to 30 minutes, according to Salina Police Captain James Feldman.\u003c/p\u003e\n\u003cp\u003eThe parents, identified as 53-year-old Michael Krueger and 40-year-old Tiffany Krueger, both of Salina, were located inside the restaurant. Witnesses confirmed that the couple had been inside for an extended period without checking on the well-being of the children.\u003c/p\u003e\n\u003cp\u003eSalina EMS personnel responded to the scene to evaluate the children, who were subsequently taken into protective custody. Michael and Tiffany Krueger were arrested and booked into the Saline County Jail on six counts each of Aggravated Endangerment of a Child. The incident has sparked a significant discussion online, with social media sentiment largely reflecting public outrage and concern for the children, alongside a strong disapproval of the parents' actions.\u003c/p\u003e\n\u003cp\u003eThis incident serves as a grim reminder of the dangers of leaving children or pets unattended in vehicles, especially during extreme heat. Experts consistently warn that car interiors can reach life-threatening temperatures within minutes, even with a window slightly open.\u003c/p\u003e\n","title":"Parents Charged After Six Children, Including Infants, Left in Scorching Hot Car Outside Kansas Wingstop","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-11T16:54:48Z","summary":"A Salina, Kansas couple faces aggravated child endangerment charges after allegedly leaving six children, two of whom were infants, in a non-running car on a 97-degree day while they dined at a Wingstop restaurant. The children were rescued after being left for nearly half an hour with only one window partially open.","tags":["Child Endangerment","Hot Car","Kansas","Salina","Wingstop","Child Safety","Crime"],"sources":[{"url":"https://hayspost.com/posts/4f6c045d-8bfb-47b3-a96a-c76154fd078b","title":"Parents jailed after children
