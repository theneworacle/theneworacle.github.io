<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-rocked-by-political-upheaval-senator-e","contentHtml":"\u003cp\u003eManila, Philippines - The political landscape of the Philippines is currently gripped by a severe crisis, centered on Senator Ronald \"Bato\" dela Rosa, a close ally of former President Rodrigo Duterte and his ex-national police chief. Dela Rosa is now a wanted man by the International Criminal Court (ICC) for alleged crimes against humanity, specifically the documented murder of at least 32 individuals during the brutal anti-drug crackdowns he oversaw from 2016 to 2018.\u003c/p\u003e\n\u003cp\u003eThe volatile situation reached a critical point following the unsealing of an ICC arrest warrant against dela Rosa. The senator had sought sanctuary within the heavily fortified Philippine Senate to avoid apprehension. However, chaos erupted when gunshots were reportedly fired by Senate security personnel during a confrontation with a government agent. This incident is now suspected of having been orchestrated to facilitate dela Rosa's escape from the building. President Ferdinand Marcos Jr. has appealed for public calm, and a police investigation is actively underway, scrutinizing suspicions that the entire event was staged to provide cover for dela Rosa's flight.\u003c/p\u003e\n\u003cp\u003eIn response to this unfolding drama, the Philippine government, through the Office of the Solicitor General, has formally requested the Supreme Court to deny dela Rosa's petition to block his arrest. Conversely, Senate President Alan Cayetano, a staunch supporter of Rodrigo Duterte, asserted that he had not seen any official ICC warrant and that the senator was free to leave the premises. This stance has drawn significant criticism from those who believe Cayetano and the Senate's security apparatus bear responsibility for dela Rosa's evasion.\u003c/p\u003e\n\u003cp\u003eThis high-stakes drama is set against a backdrop of profound political divisions and escalating tensions between the influential Duterte family and President Marcos. Vice President Sara Duterte, the daughter of the former president, has openly accused Marcos of orchestrating her father's \"kidnapping\" and subsequent handover to a foreign court. Further exacerbating the nation's political instability, Sara Duterte herself was recently impeached by the House of Representatives, a body largely controlled by Marcos's allies. The impeachment proceedings stem from serious allegations of unexplained wealth, misuse of state funds, and a public threat against President Marcos, his wife, and the House speaker. While denying any wrongdoing, Sara Duterte has notably refrained from addressing the specific allegations in detail. The Senate is now preparing to convene as an impeachment court to commence the Vice President's trial.\u003c/p\u003e\n\u003cp\u003ePublic sentiment surrounding both Senator dela Rosa's ICC arrest and Vice President Duterte's impeachment has been observed as \"mostly positive, with some debate\" across social media, signaling a deeply divided national opinion on these pivotal political developments.\u003c/p\u003e\n","title":"Philippines Rocked by Political Upheaval: Senator Evades ICC Arrest Amidst VP Impeachment","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-18T19:43:52Z","summary":"Senator Ronald \"Bato\" dela Rosa, sought by the International Criminal Court for alleged crimes against humanity, has dramatically evaded arrest in the Philippines Senate, sparking a nationwide police investigation. This incident unfolds amidst Vice President Sara Duterte's impeachment trial, deepening the political crisis and exposing widening rifts within the nation's leadership.","tags":["Philippines","ICC","Ronald dela Rosa","Sara Duterte","Impeachment","Political Turmoil","Rodrigo Duterte","International Criminal Court","Crime Against Humanity","Senate","Marcos"],"sources":[{"url":"https://www.npr.org/2026/05/14/g-s1-122021/philippines-senator-escape-wanted-icc","title":"A Philippine senator wanted by the International Criminal Court flees from Senate"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-rocked-by-political-upheaval-senator-e"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
