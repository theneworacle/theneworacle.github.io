 up to roughly $5 million, timed before a significant Meta chip-deal announcement. This move proved prescient, preceding AMD’s 128% year-to-date surge and NVIDIA’s 85% year-over-year revenue growth in Q1 FY27, with data center revenue growing 92%.\u003c/p\u003e\n\u003cp\u003eBeyond the silicon giants, Trump's portfolio also saw additions to government-tech firms Palantir Technologies (PLTR) and Axon Enterprise (AXON). Palantir, known for intelligence and defense data integration, and Axon, specializing in policing and counter-drone systems, are strategically positioned to benefit from federal procurement priorities. Palantir’s Q1 2026 U.S. government revenue notably grew 84% to $687 million, aligning with the significant $20.5 billion allocated for cyberspace activities in the FY 2027 defense budget request.\u003c/p\u003e\n\u003cp\u003eThe overarching takeaway for investors isn't merely to replicate these specific trades, especially given that NVIDIA and AMD are now trading at post-recovery prices, while Palantir and Axon remain below their year-end 2025 marks. Instead, the actionable insight lies in the framework: investing in AI infrastructure leaders during periods of weakness and identifying government-tech exposure aligned with current budget priorities. This approach suggests a focus on understanding market cycles and governmental spending trends rather than blindly following high-profile investments.\u003c/p\u003e\n\u003cp\u003eThis active trading period, marked by a significant pivot from bonds to stocks by Trump's trust, has generated considerable discussion, with simulated social sentiment indicating a mostly positive, though debated, public reaction to these AI-focused investments.\u003c/p\u003e\n","title":"Donald Trump's Q1 2026 AI Playbook: Millions Poured into 'Unstoppable' AI and Government Tech Stocks","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-06-19T18:05:11Z","summary":"A deep dive into Donald Trump's Q1 2026 portfolio reveals a significant pivot towards artificial intelligence, with millions invested in leading AI infrastructure companies like NVIDIA, AMD, and Broadcom, alongside strategic plays in government technology firms Palantir and Axon. This aggressive trading strategy capitalized on a March market dip, highlighting a calculated approach to the burgeoning AI sector.","tags":["Donald Trump","AI stocks","investing","NVIDIA","AMD","Broadcom","Palantir","Axon","Q1 2026","stock market","technology","government tech","portfolio"],"sources":[{"url":"https://247wallst.com/investing/2026/06/18/donald-trumps-q1-portfolio-was-just-revealed-he-just-poured-millions-into-these-3-unstoppable-ai-stocks/","title":"Donald Trump’s Q1 Portfolio Was Just Revealed. He Just Poured Millions Into These 3 Unstoppable AI Stocks."},{"url":"https://www.forbes.com/sites/kylemullins/2026/06/02/here-are-donald-trumps-10-worst-stock-trades-of-2026/","title":"Here Are Donald Trump’s 10 Worst Stock Trades Of 2026"},{"url":"https://www.msn.com/en-us/money/top-stocks/trump-loaded-up-on-servicenow-stock-at-the-peak-of-saas-pocalypse-fears-what-comes-next-for-software-stocks/ar-AA24Xfvh?ocid=BingNewsVerp","title":"Trump loaded up on ServiceNow stock at the peak of SaaS-pocalypse fears. What comes next for software stocks?"},{"url":"https://uk.finance.yahoo.com/news/trump-takes-stake-mara-holdings-050900909.html","title":"Trump Takes Stake In MARA Holdings As Bitcoin And AI Risks Mount"},{"url":"https://www.investopedia.com/trump-trust-made-a-hard-pivot-from-bonds-to-stocks-this-year-what-the-thousands-of-trades-reveal-11978579","title":"Trump's Trust Made a Hard Pivot from Bonds to Stocks This Year—What the Thousands of Trades Reveal"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"donald-trumps-q1-2026-ai-playbook-millions-poured-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
