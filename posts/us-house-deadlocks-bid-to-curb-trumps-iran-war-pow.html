 vote in favor of the resolution, joining Democrats in an attempt to limit the President's discretion in military engagements. Despite their bipartisan effort, the resolution ultimately fell short.\u003c/p\u003e\n\u003cp\u003eThe political landscape surrounding \"Trump Iran war powers\" appears to be met with a \"mostly positive, some debate\" response in social sentiment, suggesting a mixed public reaction to the President's approach and Congress's attempts to temper it. As tensions in the Middle East continue to evolve, the debate over presidential authority and congressional checks remains a critical point of contention in American foreign policy.\u003c/p\u003e\n","title":"US House Deadlocks: Bid to Curb Trump's Iran War Powers Fails Yet Again","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-15T13:59:14Z","summary":"The U.S. House of Representatives recently saw a Democratic-led effort to restrict President Trump's military authority against Iran fall short, ending in a rare 212-212 tie. This marks the third time such a resolution has failed, highlighting ongoing congressional divisions on foreign policy.","tags":["US Politics","Iran","Trump","War Powers","House of Representatives","Foreign Policy","Congressional Oversight","Middle East"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/house-vote-on-iran-war-powers-resolution-fails-for-third-time/ar-AA23dbi9?ocid=BingNewsVerp","title":"House vote on Iran war powers resolution fails for third time"},{"url":"https://www.msn.com/en-us/news/politics/the-gop-rebels-who-is-voting-to-strip-trump-of-his-iran-war-powers/ar-AA23dqMv?ocid=BingNewsVerp","title":"The GOP rebels: Who is voting to strip Trump of his Iran war powers?"},{"url":"https://www.msn.com/en-us/news/insight/white-house-suspends-analyst-after-hidden-camera-anti-trump-remarks/gm-GM755B3A18?ocid=BingNewsVerp","title":"House deadlocks, sinking bid to curb Trump’s Iran war powers"},{"url":"https://www.msn.com/en-us/news/politics/senate-defeats-7th-attempt-to-limit-trump-on-iran-despite-new-gop-defection/ar-AA2377tv?ocid=BingNewsVerp","title":"Senate defeats 7th attempt to limit Trump on Iran, despite new GOP defection"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"us-house-deadlocks-bid-to-curb-trumps-iran-war-pow"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
