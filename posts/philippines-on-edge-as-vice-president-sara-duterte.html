<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-on-edge-as-vice-president-sara-duterte","contentHtml":"\u003cp\u003eThe Philippines finds itself at a pivotal political juncture as the impeachment trial of Vice President Sara Duterte officially gets underway in the Senate. The proceedings are unfolding amidst a highly charged atmosphere, marked by a significant deployment of over 6,000 police officers, including anti-riot squads, around the Senate building in anticipation of protests from both supporters and opponents of the Vice President.\u003c/p\u003e\n\u003cp\u003eThe trial, projected to last 92 days, is more than just a legal battle; it is a direct reflection of the escalating political feud between Vice President Duterte and President Ferdinand Marcos Jr. Once running mates in a powerful alliance that combined two of the nation's most formidable political dynasties, their union has rapidly dissolved.\u003c/p\u003e\n\u003cp\u003eVice President Duterte faces serious allegations, including the amassing of unexplained wealth, misuse of confidential state funds, and even a public threat to assassinate President Marcos Jr. and his allies. She vehemently denies all charges. A conviction in this trial would carry severe consequences, potentially leading to her permanent disqualification from public office and effectively ending her aspirations for the presidency in 2028.\u003c/p\u003e\n\u003cp\u003eAdding another layer of complexity to the already tense situation, several senators allied with Vice President Duterte have faced legal challenges. Senator Jinggoy Estrada was arrested on a non-bailable plunder charge related to a bribery scandal, while Senator Rodante Marcoleta faces similar charges. Furthermore, Senator Ronald dela Rosa, former national police chief under Vice President Duterte's father, former President Rodrigo Duterte, is reportedly in hiding after an International Criminal Court warrant was issued for his arrest in connection with Duterte-era killings.\u003c/p\u003e\n\u003cp\u003eThe political differences between the Marcos and Duterte camps extend to foreign policy. President Marcos Jr. has strengthened defense ties with the United States and taken a firm stance against China's actions in the South China Sea. In contrast, former President Rodrigo Duterte had fostered closer relations with Beijing and Moscow. Vice President Duterte has drawn criticism for her perceived silence on China's aggressions in the disputed waters.\u003c/p\u003e\n\u003cp\u003eWhile social media sentiment around the trial is diverse, a significant portion appears to lean positively towards the proceedings, though considerable debate continues. With a two-thirds vote (16 of 24 senators) required for conviction, the eyes of the nation, and indeed the world, will be watching closely as this politically volatile trial progresses, shaping the future of Philippine politics.\u003c/p\u003e\n","title":"Philippines on Edge as Vice President Sara Duterte's Impeachment Trial Begins","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-06T06:28:34Z","summary":"A politically charged atmosphere grips the Philippines as the impeachment trial of Vice President Sara Duterte commences, set against a backdrop of high security, political rivalries, and arrests of her allies. This trial could redefine the nation's political landscape.","tags":["Philippines","Sara Duterte","Impeachment Trial","Philippine Politics","Ferdinand Marcos Jr.","Rodrigo Duterte","Political Scandal"],"sources":[{"url":"https://www.nbcnews.com/world/asia/impeachment-trial-begins-philippine-president-sara-duterte-rcna353100","title":"Impeachment trial begins for Philippine Vice President Sara Duterte"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-on-edge-as-vice-president-sara-duterte"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
