oth professional and local sports.\u003c/p\u003e\n\u003cp\u003eCantu's selections are sure to ignite discussions among sports enthusiasts, and indeed, social media sentiment surrounding his list is already reflecting a 'mostly positive' reception, albeit with some lively 'debate' – a testament to the passionate nature of sports fandom and Cantu's ability to stir conversation. His career has been a masterclass in capturing the essence of competition, and his farewell list serves as a poignant reminder of the incredible athletic feats he witnessed and shared with his readers.\u003c/p\u003e\n\u003cp\u003eRick Cantu's retirement marks the end of an era, but his contributions to sports journalism and the memories he helped create will undoubtedly endure.\u003c/p\u003e\n","title":"A Legend Retires: Rick Cantu's 45 Years of Sports Journalism and His All-Time Top Teams","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-13T10:27:49Z","summary":"After 45 illustrious years, American-Statesman sportswriter Rick Cantu is hanging up his pen. Join us as we celebrate his incredible career and dive into his highly anticipated list of the top 15 teams he's ever covered, sparking lively debate among fans.","tags":["Rick Cantu","Sports Journalism","American-Statesman","1995 Cowboys","2021 Westlake Football","Best Teams","Sports History","Retirement"],"sources":[{"url":"https://www.msn.com/en-us/sports/other/1995-cowboys-2021-westlake-football-and-more-best-teams-rick-cantu-saw-over-45-years/ar-AA24MaR6","title":"1995 Cowboys, 2021 Westlake football and more: Best teams Rick Cantu saw over 45 years"},{"url":"https://www.msn.com/en-us/sports/other/10-epic-texas-sports-moments-rick-cantus-favorite-stories/ar-AA24P3ui","title":"10 epic Texas sports moments: Rick Cantu's favorite stories"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-legend-retires-rick-cantus-45-years-of-sports-jo"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptL
