<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"media-spotlight-leads-to-bond-revocation-for-domes","contentHtml":"\u003cp\u003eA Davidson County judge has revoked the bond of domestic violence suspect Peter Sonier, following a compelling FOX 17 News report that brought his alleged repeat offenses while out on bond into public view. This decision brings a measure of relief to Taryn Lynae, the woman who says she survived his violence and had spent eight months fighting for justice.\u003c/p\u003e\n\u003cp\u003eLynae recounted a harrowing incident in August 2025 at her Antioch apartment, where Sonier allegedly became physically violent and attempted to strangle her. Despite Sonier's initial arrest, the criminal justice system, according to Lynae, failed her multiple times. He was reportedly released on bond without an ankle monitor and subsequently accused of violating an order of protection at least twice, even as Lynae pleaded to keep him incarcerated.\u003c/p\u003e\n\u003cp\u003eFeeling that her efforts through traditional channels were proving fruitless, Lynae turned to FOX 17 News. The station aired her story on Friday, April 24, which remarkably coincided with the District Attorney's Office filing a motion to revoke Sonier's bond. By the following Monday, Davidson County Judge Allegra Walker had made the pivotal decision to revoke his bond.\u003c/p\u003e\n\u003cp\u003e“I feel absolutely fantastic now that his bond has been revoked. I feel more safe,” Lynae shared, expressing her conviction that the media's involvement was crucial. “I think that having the public eye on the DA’s office and on the judge itself brought some things to light.”\u003c/p\u003e\n\u003cp\u003eThe case is still pending, with a grand jury yet to decide on an indictment. If indicted, Lynae hopes Sonier receives the maximum sentence. Due to the ongoing nature of the case, neither the judge nor the District Attorney’s Office could provide further comment. Social sentiment surrounding the bond revocation is largely positive, albeit with some ongoing debate about the circumstances.\u003c/p\u003e\n\u003cp\u003eThis case underscores the critical role that local journalism can play in advocating for victims and ensuring accountability within the justice system, especially when individuals feel their voices are not being heard.\u003c/p\u003e\n","title":"Media Spotlight Leads to Bond Revocation for Domestic Violence Suspect in Davidson County","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-25T21:04:40Z","summary":"After months of alleged repeat offenses and a victim's pleas for justice, a Davidson County judge has revoked the bond of domestic violence suspect Peter Sonier, a decision significantly influenced by a FOX 17 News investigation.","tags":["Domestic Violence","Bond Revocation","Davidson County","Criminal Justice","Media Impact","Victim Advocacy","Peter Sonier","Taryn Lynae","FOX 17 News"],"sources":[{"url":"https://fox17.com/news/local/davidson-county-judge-revokes-bond-of-domestic-violence-suspect-after-fox-17-news-report-judge-allegra-walker-taryn-lynae-peter-sonier","title":"Davidson County judge revokes bond of domestic violence suspect after FOX 17 News report"},{"url":"https://hoodline.com/2026/05/nashville-judge-yanks-bond-after-local-tv-expose/","title":"Nashville Judge Yanks Bond After Local TV Exposé"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"media-spotlight-leads-to-bond-revocation-for-domes"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
