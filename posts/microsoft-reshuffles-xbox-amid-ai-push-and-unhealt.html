<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"microsoft-reshuffles-xbox-amid-ai-push-and-unhealt","contentHtml":"\u003cp\u003eMicrosoft is undertaking a substantial restructuring, with approximately 4,800 jobs, or 2.1% of its global workforce, being eliminated. A significant portion of these cuts, including an initial 1,600 and a planned total of 3,200 for the current fiscal year (representing 20% of the Xbox workforce), are concentrated within its Xbox gaming division.\u003c/p\u003e\n\u003cp\u003eThe decision comes as new Xbox CEO Asha Sharma candidly described the gaming business as \"not healthy.\" The division has been operating with significantly lower margins—between three to ten times lower—compared to its competitors. Efforts such as the Game Pass subscription service and multi-platform expansion did not yield the anticipated growth, further compounded by what the industry is facing: a \"severe hardware crisis.\"\u003c/p\u003e\n\u003cp\u003eThese layoffs are not solely a response to Xbox's performance issues but are also intricately linked to Microsoft's broader strategic pivot and aggressive investment in AI infrastructure. The company is re-evaluating its entire operating model to become more focused and efficient, with artificial intelligence at the core of its future growth.\u003c/p\u003e\n\u003cp\u003eAs part of the Xbox overhaul, Microsoft is resetting its content portfolio. This involves several key changes, including Compulsion Games and Double Fine Productions returning to independent management, while Ninja Theory and Undead Labs are transitioning to new ownership. Mojang and King, two of Xbox's largest studios by monthly active players, will now report directly to CEO Asha Sharma, signifying their increased strategic importance as platforms. Importantly, no first-party publicly announced games or projects are being canceled as part of these reductions.\u003c/p\u003e\n\u003cp\u003eThe restructuring also targets platform simplification, aiming to reduce management layers to a maximum of five, and ideally three, to foster a flatter, more accountable organization. Helen Chiang has been promoted to Chief Operating Officer, taking on end-to-end P\u0026#x26;L responsibility across content, hardware, platform, and services, to streamline operations and ensure clear investment decisions.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment regarding the \"Microsoft Xbox layoffs AI\" is mixed, though leaning towards \"mostly positive, with some debate.\" This suggests a degree of understanding, perhaps acknowledging the necessity of such drastic measures for long-term viability and the strategic emphasis on AI.\u003c/p\u003e\n\u003cp\u003eUltimately, these changes underscore Microsoft's commitment to a \"bigger future for XBOX,\" albeit one built on greater focus, discipline, and clarity, with a strong emphasis on leveraging AI to drive innovation and return to growth by 2027.\u003c/p\u003e\n","title":"Microsoft Reshuffles Xbox Amid AI Push and \"Unhealthy\" Business","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-08T06:32:27Z","summary":"Microsoft announces significant job cuts, primarily impacting its Xbox division, as the company grapples with an \"unhealthy\" gaming business and prioritizes massive investments in AI infrastructure. This strategic overhaul aims to streamline operations and reorient the company towards future growth fueled by artificial intelligence.","tags":["Microsoft","Xbox","AI","Layoffs","Gaming Industry","Tech News","Business Restructuring","Asha Sharma","Game Pass","Artificial Intelligence"],"sources":[{"url":"https://www.msn.com/en-us/money/technologyinvesting/microsoft-slashes-xbox-workforce-amid-underperforming-role-in-global-ai-race/ar-AA27q4S5","title":"Microsoft slashes Xbox workforce amid underperforming role in global AI race"},{"url":"https://www.msn.com/en-us/money/careersandeducation/microsoft-cuts-4800-jobs-about-2-globally-revamps-salesforce-and-launches-massive-xbox-overhaul/ar-AA27jAPZ","title":"Microsoft cuts 4,800 jobs, about 2% globally, revamps salesforce and launches massive Xbox overhaul"},{"url":"https://www.msn.com/en-us/money/companies/microsoft-cuts-4800-jobs-as-xbox-restructuring-deepens/ar-AA27oNN0","title":"Microsoft cuts 4,800 jobs as Xbox restructuring deepens"},{"url":"https://www.businessinsider.com/xbox-cuts-employees-with-plans-to-shed-more-workforce-2026-7","title":"Microsoft's Xbox cuts 1,600 employees, with plans to shed 20% of its workforce this year"},{"url":"https://www.msn.com/en-us/technology/tech-companies/microsoft-cuts-4-800-job-as-it-revamps-xbox/ar-AA27ka8V","title":"Microsoft cuts 4,800 jobs as it revamps Xbox"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"microsoft-reshuffles-xbox-amid-ai-push-and-unhealt"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
