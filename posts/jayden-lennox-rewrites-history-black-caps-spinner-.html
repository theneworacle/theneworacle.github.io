e and decisive. His exceptional control and wicket-taking ability ensured that the West Indies were bundled out for a low total, providing the platform for New Zealand to chase down the target comfortably. The victory was crucial for the Black Caps, bringing them back into contention in what promises to be an exciting series.\u003c/p\u003e\n\u003cp\u003eThe cricketing world and fans alike have reacted with widespread positivity to Lennox's heroics, acknowledging the brilliance of his record-breaking achievement. While discussions and debates naturally follow such a significant event, the overwhelming sentiment celebrates the rise of a new talent and a memorable moment in New Zealand cricket history.\u003c/p\u003e\n","title":"Jayden Lennox Rewrites History: Black Caps Spinner Delivers Record-Breaking Performance","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-14T07:15:22Z","summary":"New Zealand's left-arm spinner, Jayden Lennox, made headlines with a career-best 5/19 against the West Indies in the second ODI, leading the Black Caps to a crucial series-leveling victory.","tags":["Cricket","New Zealand","Jayden Lennox","ODI","Black Caps","West Indies","Sports Record"],"sources":[{"url":"https://www.msn.com/en-nz/news/other/new-zealand-s-jayden-lennox-sets-new-benchmark-with-record-breaking-performance/ar-AA27RNJ9?ocid=BingNewsVerp","title":"New Zealand's Jayden Lennox sets new benchmark with record-breaking performance"},{"url":"https://www.msn.com/en-us/sports/cricket/2nd-odi-jayden-lennox-s-five-for-powers-new-zealand-to-series-levelling-win-over-west-indies/ar-AA27R5iq?ocid=BingNewsVerp","title":"2nd ODI: Jayden Lennox's five-for powers New Zealand to series-levelling win over West Indies"},{"url":"https://www.msn.com/en-nz/news/national/cricket-jayden-lennoxs-five-wicket-haul-sets-up-black-caps-odi-win-over-west-indies/ar-AA27QD2z?ocid=BingNewsVerp","title":"Cricket: Jayden Lennox's five-wicket haul sets up Black Caps ODI win over West
