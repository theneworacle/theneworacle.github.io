<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"devine-intervention-new-zealand-level-series-again","contentHtml":"\u003cp\u003eIn a dramatic second T20 International on May 23, 2026, New Zealand staged a remarkable comeback to defeat England by 14 runs, leveling the three-match series at one win apiece. The match, filled with twists and turns, showcased the resilience of the White Ferns and the explosive talent of Sophie Devine.\u003c/p\u003e\n\u003cp\u003eEngland started brilliantly after winning the toss and electing to field, with Linsey Smith spearheading their attack. Smith's exceptional bowling saw New Zealand reeling at a mere 11 runs for four wickets early in their innings, taking three crucial wickets in her first two overs, including the quick dismissals of Georgia Plimmer and skipper Melie Kerr.\u003c/p\u003e\n\u003cp\u003eHowever, what followed was a masterclass in recovery. Sophie Devine, scoring a magnificent 87 runs off just 57 balls, joined forces with Maddy Green, who remained unbeaten on 56. This formidable duo put together a superb 159-run partnership, the highest ever for New Zealand in women's T20s against England. Their incredible stand propelled the White Ferns to a competitive total of 170 for five.\u003c/p\u003e\n\u003cp\u003eChasing 171 for victory, England's openers, Sophia Dunkley (26) and Alice Capsey (22), provided a solid start. Yet, New Zealand's bowlers, energized by their team's batting heroics, applied relentless pressure. Crucial wickets fell at regular intervals, including the run-out of captain Heather Knight (25) and the dismissal of Maia Bouchier (38) shortly after. Despite late efforts from Dani Gibson and Freya Kemp, England ultimately fell short, finishing their innings at 156 for six.\u003c/p\u003e\n\u003cp\u003eSophie Devine's all-round performance was instrumental in New Zealand's victory, earning her player of the match accolades. Linsey Smith's impressive three for 25 for England also deserves mention for her early breakthroughs. The series is now perfectly poised for a thrilling conclusion, with the decider scheduled to take place at Hove.\u003c/p\u003e\n\u003cp\u003eSocial sentiment surrounding the match was largely positive, with fans debating the dramatic swings of fortune and celebrating New Zealand's gritty performance.\u003c/p\u003e\n","title":"Devine Intervention: New Zealand Level Series Against England in Thrilling T20","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-25T05:27:27Z","summary":"New Zealand's White Ferns defied an early batting collapse, thanks to a record-breaking 159-run partnership between Sophie Devine and Maddy Green, to secure a stunning 14-run victory over England in the second T20 International. The win levels the series at 1-1, setting up a thrilling decider.","tags":["Cricket","Women's Cricket","England","New Zealand","T20","Sophie Devine","Maddy Green","Linsey Smith","Sports News"],"sources":[{"url":"https://sports.yahoo.com/articles/england-fail-most-flying-start-170003416.html","title":"England fail to make most of flying start as New Zealand recover to level series"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"devine-intervention-new-zealand-level-series-again"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
