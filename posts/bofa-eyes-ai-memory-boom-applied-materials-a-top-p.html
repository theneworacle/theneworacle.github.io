an initial Investing.com report could not be fully confirmed, other prominent financial news outlets point towards Applied Materials as a leading contender in this space. The company, a major supplier to the semiconductor industry, is well-positioned to capitalize on the massive capital expenditure by hyperscalers and data centers eager to build out their AI capabilities.\u003c/p\u003e\n\u003cp\u003eThe sentiment surrounding BofA's focus on AI memory demand and the prospects of companies like Applied Materials is largely positive across social and financial discussions. Investors are increasingly looking beyond the direct AI model builders to the companies providing essential components like advanced memory chips (DRAM, NAND) and the equipment needed to manufacture them.\u003c/p\u003e\n\u003cp\u003eExperts suggest that AI data centers alone could consume an astounding 70% of all memory chips by 2026, underscoring the critical role these components play. This projected consumption points to a powerful, long-term growth trend for memory chip manufacturers and, by extension, the companies that supply the machinery to produce them.\u003c/p\u003e\n\u003cp\u003eAs the AI infrastructure buildout continues, creating what some describe as a 'multi-year infrastructure and capital formation supercycle,' the spotlight remains firmly on the semiconductor and chip-equipment sectors. Companies enabling this foundational growth are seen as crucial investments in the unfolding AI era.\u003c/p\u003e\n","title":"BofA Eyes AI Memory Boom: Applied Materials a Top Pick in the Chip-Equipment Sector","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-13T17:59:49Z","summary":"Bank of America (BofA) analysts are bullish on the long-term growth potential of chip-equipment companies, driven by the insatiable demand for AI memory. While specific picks vary, Applied Materials is emerging as a frequently cited leader in this crucial infrastructure sector.","tags":["AI",
