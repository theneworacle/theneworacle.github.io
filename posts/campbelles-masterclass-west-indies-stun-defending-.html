he West Indies' Aaliyah Alleyne was the standout bowler, tearing through the middle order with an impressive spell of 4/27, ensuring New Zealand couldn't fully capitalize on their strong start.\u003c/p\u003e\n\u003cp\u003eThe chase for 163 began with an early setback for the West Indies, losing a wicket to a run-out. But it was the partnership between Hayley Matthews (48 off 37 balls) and the indomitable Shemaine Campbelle that truly turned the tide. Campbelle, in particular, delivered a career-defining performance, smashing an unbeaten 90 runs off just 62 deliveries. This remarkable innings, her first T20I fifty in a long international career, was a masterclass in calculated aggression, as she punished loose balls and expertly capitalized on a series of missed fielding chances by the New Zealand side.\u003c/p\u003e\n\u003cp\u003eWith Campbelle leading the charge, the West Indies steadily chipped away at the target, ultimately reaching 163/3 in 19.5 overs. This dramatic victory not only marks a strong start for the West Indies in the World Cup but also serves as a powerful statement to other contenders. Social media has been abuzz with positive sentiment, celebrating the Windies' unexpected triumph and Campbelle's phenomenal individual effort, while also sparking discussions around the defending champions' performance. This match has certainly set a high bar for excitement in the tournament!\u003c/p\u003e\n","title":"Campbelle's Masterclass: West Indies Stun Defending Champions New Zealand in T20 World Cup Opener","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-14T11:36:32Z","summary":"An exceptional unbeaten 90 from Shemaine Campbelle powered the West Indies Women to a thrilling seven-wicket victory over defending champions New Zealand in their opening match of the ICC Women's T20 World Cup 2026.","tags":["Women's Cricket","T20 World Cup","West Indies","New Zealand","Shemaine Campbelle","Aaliyah Alleyne","Cricket Upset","Sports News"],"sources":[{"url":"https://www.outlookindia.com/sports/cricket/west-indies-vs-new-zealand-icc-womens-t20-world-cup-2026-match-4-toss-update-playing-xis-wi-w-vs-nz-w-report","title":"West Indies Vs New Zealand, Women's T20 World Cup 2026: Campbelle Masterclass Stuns Defending Champions"},{"url":"https://www.msn.com/en-in/sports/cricket/west-indies-stun-sloppy-new-zealand-as-shemaine-campbelle-has-her-moment-in-the-sun/ar-AA25zJT2?ocid=BingNewsVerp","title":"West Indies stun sloppy New Zealand as Shemaine Campbelle has her moment in the sun"},{"url":"https://www.msn.com/en-gb/sport/cricket/shemaine-campbelle-s-unbeaten-90-powers-west-indies-to-thrilling-win-over-new-zealand/ar-AA25zRm6?ocid=BingNewsVerp","title":"Shemaine Campbelle's unbeaten 90 powers West Indies to thrilling win over New Zealand"},{"url":"https://guyanachronicle.com/2026/06/14/2026-icc-womens-t20-world-cup-campbelles-historic-night-leads-windies-women-past-woeful-new-zealand/","title":"2026 ICC Women’s T20 World Cup… Campbelle’s historic night leads Windies Women past woeful New Zealand"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"campbelles-masterclass-west-indies-stun-defending-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
