<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"the-trump-accounts-app-a-new-era-for-child-investm","contentHtml":"\u003cp\u003eThe much-anticipated \"Trump Accounts\" app has officially arrived, marking a significant step in a program designed to foster long-term savings for American children. This new initiative provides a $1,000 federal investment for eligible children, managed through an intuitive mobile application.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat are Trump Accounts?\u003c/strong\u003e\nCreated under a federal program, Trump Accounts aim to empower families to build a financial future for their children through investments. Children under 18 years old with a Social Security number are eligible to have an account opened in their name. The cornerstone of the program is a $1,000 federal seed contribution for children born between January 1, 2025, and December 31, 2028, who are U.S. citizens. For those born outside this window, the account is still available, though without the initial federal contribution.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHow Does the App Work?\u003c/strong\u003e\nThe \"Trump Accounts\" app serves as the primary portal for families. Users can sign up, verify their child's eligibility, and, once contributions go live on July 4th, set up and track investments. The Treasury, in collaboration with Bank of New York Mellon and Robinhood, developed the app. Treasury Secretary Scott Bessent emphasized the app's role in making it \"easy for millions of Americans to sign up, contribute, and watch their investments grow.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKey Features and Eligibility:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInitial Federal Investment:\u003c/strong\u003e A $1,000 contribution for eligible newborns (U.S. citizens born between Jan 1, 2025 – Dec 31, 2028).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBroad Eligibility:\u003c/strong\u003e Any U.S. child under 18 with a Social Security number can have an account.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContribution Rules:\u003c/strong\u003e Once active in July, parents, grandparents, and family members can contribute a combined $5,000 per child annually. Employers can also contribute up to $2,500, which is non-taxable income for the employee.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInvestment Strategy:\u003c/strong\u003e Funds within the Trump Accounts are invested in low-fee U.S. equity index funds, tracking the overall stock market.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSecurity Alert:\u003c/strong\u003e The Treasury will only contact users via a specific email address, advising vigilance against potential scams via calls or texts.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eSurge in Downloads and Public Sentiment:\u003c/strong\u003e\nSince its launch, the app has seen a surge in downloads, with nearly 6 million children already signed up for Trump Accounts, according to the Treasury. Public sentiment, as simulated, appears largely positive, reflecting an eagerness among families to leverage this opportunity for their children's financial well-being, though some debate around the initiative still exists.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLooking Ahead:\u003c/strong\u003e\nWith the official July 4th launch for contributions approaching, the \"Trump Accounts\" app represents a significant new tool for family financial planning. It encourages long-term savings and investment, potentially empowering a new generation with a head start on their financial journey. Families interested in participating should ensure they have completed IRS Form 4547 and download the app to prepare for the full activation.\u003c/p\u003e\n","title":"The 'Trump Accounts' App: A New Era for Child Investment?","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-04T21:34:33Z","summary":"The new 'Trump Accounts' app has launched, promising a $1,000 federal investment for eligible children and a platform to manage long-term savings. But what does this mean for families, and how does it work?","tags":["Trump Accounts","Federal Investment","Child Savings","Financial Planning","Investment App","Personal Finance","US Politics"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/trump-accounts-app-launches-to-manage-1000-federal-investment-per-child/ar-AA24hwoG","title":"'Trump accounts' app launches to manage $1,000 federal investment per child"},{"url":"https://www.statesman.com/news/article/trump-accounts-1000-payment-eligible-children-22282248.php","title":"Who gets $1,000 from Trump Accounts, and when?"},{"url":"https://finance.yahoo.com/economy/policy/articles/trump-accounts-app-launches-today-140231169.html","title":"Trump Accounts app is now available. Here's what to know."},{"url":"https://finance.yahoo.com/economy/policy/articles/trump-accounts-app-downloads-surge-152818684.html","title":"Trump Accounts App Downloads Surge. Here’s Who’s Eligible"},{"url":"https://finance.yahoo.com/economy/policy/articles/downloaded-trump-accounts-app-newborn-083450167.html","title":"I downloaded the Trump Accounts app for my newborn — here's how it worked, and w..."},{"url":"https://www.fool.com/money/buying-stocks/articles/the-trump-accounts-app-just-launched-heres-how-to-register-before-the-july-4-rollout/","title":"The Trump Accounts App Just Launched. Here's How to Register Before the July 4 Rollout"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"the-trump-accounts-app-a-new-era-for-child-investm"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
