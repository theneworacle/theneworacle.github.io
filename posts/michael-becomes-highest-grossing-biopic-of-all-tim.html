<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"michael-becomes-highest-grossing-biopic-of-all-tim","contentHtml":"\u003cp\u003eIn a monumental achievement for cinematic biopics, Antoine Fuqua's 'Michael' has officially been crowned the highest-grossing film of its genre, raking in an astounding USD 977 million worldwide. This puts the Michael Jackson story ahead of previous record-holders, including Christopher Nolan's critically acclaimed 'Oppenheimer', which grossed USD 975 million, and the popular musical biopic 'Bohemian Rhapsody', with USD 911 million.\u003c/p\u003e\n\u003cp\u003eMore than just a box office success, 'Michael' has also emerged as Lionsgate's most successful film to date, surpassing their own blockbuster 'The Hunger Games: Catching Fire'. The film's impressive earnings are split between USD 370.2 million domestically and a substantial USD 607.2 million internationally, distributed by Universal.\u003c/p\u003e\n\u003cp\u003eThe film, developed with the support of several members of the Jackson family, offers an 'honest portrayal of the brilliant yet complicated' music icon. It stars Michael Jackson's real-life nephew, Jaafar Jackson, in his compelling acting debut as the King of Pop. Colman Domingo and Nia Long also feature, portraying Michael's parents, Joe and Katherine Jackson. The narrative meticulously follows Jackson's incredible journey from his early days with the Jackson 5 to his unparalleled global superstardom, concluding its story in 1988. Notably, the film consciously omits coverage of the allegations that emerged in later years of his life.\u003c/p\u003e\n\u003cp\u003eFollowing this overwhelming success, reports suggest that Lionsgate is already planning another film centered around the life and legacy of Michael Jackson. Social media sentiment surrounding the film has been largely positive, though, as with any high-profile biopic, some healthy debate continues.\u003c/p\u003e\n","title":"'Michael' Becomes Highest-Grossing Biopic of All Time, Surpassing 'Oppenheimer' and 'Bohemian Rhapsody'","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-09T17:54:49Z","summary":"The highly anticipated Michael Jackson biopic, 'Michael', has made cinematic history, becoming the highest-grossing biopic ever with a staggering global box office of USD 977 million. The film, starring Michael's nephew Jaafar Jackson, has outpaced blockbusters like 'Oppenheimer' and 'Bohemian Rhapsody'.","tags":["Michael Jackson","Biopic","Box Office","Hollywood","Film","Music","Jaafar Jackson","Antoine Fuqua","Lionsgate"],"sources":[{"url":"https://www.republicworld.com/entertainment/hollywood/michael-box-office-jaafar-jackson-starrer-becomes-highest-grossing-biopic-of-all-time-2026-06-29-130413","title":"Michael Box Office: Jaafar Jackson Starrer Becomes Highest-Grossing Biopic Of All Time"},{"url":"https://www.billboard.com/lists/top-grossing-music-biopics-movies/walk-the-line-2005/","title":"'Michael' Pulls Further Ahead of 'Bohemian Rhapsody' as Top-Grossing Music Biopic Worldwide: See the Top 25"},{"url":"https://www.msn.com/en-us/movies/news/box-office-michael-beats-oppenheimer-becomes-highest-grossing-biopic/ar-AA26Jvru","title":"Box Office: 'Michael' Beats 'Oppenheimer', Becomes Highest Grossing Biopic"},{"url":"https://www.msn.com/en-us/movies/news/michael-surpasses-bohemian-rhapsody-as-highest-grossing-biopic/ar-AA25AATK","title":"'Michael' Surpasses 'Bohemian Rhapsody' As Highest-Grossing Biopic"},{"url":"https://www.msn.com/en-au/movies/news/michael-becomes-highest-grossing-biopic-of-all-time/ar-AA26Miaa","title":"Michael becomes highest-grossing biopic of all time"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"michael-becomes-highest-grossing-biopic-of-all-tim"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
