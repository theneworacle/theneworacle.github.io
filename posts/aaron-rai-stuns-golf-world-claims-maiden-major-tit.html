e growing financial stakes in professional golf.\u003c/p\u003e\n\u003cp\u003eBeyond the impressive prize money, Rai's win had a significant impact on the FedEx Cup standings. He collected 750 FedEx Cup points, propelling him an astounding 84 spots up the leaderboard to 24th place. Other notable movers included Matti Schmid, Alex Smalley, Justin Thomas, and Max Greyserman, all gaining over 20 positions. While Ludvig Aberg broke into the top five, Cameron Young, Scottie Scheffler, Matt Fitzpatrick, and Collin Morikawa maintained their stronghold at the top of the standings.\u003c/p\u003e\n\u003cp\u003eHistorically, Rai's achievement places him in an elite group, as he became only the second Englishman to win the PGA Championship, following in the footsteps of Jim Barnes, who won the inaugural two championships in 1916 and 1919. The social media sphere has largely reacted positively to Rai's unexpected victory, though discussions and debates around the tournament's outcome are also present.\u003c/p\u003e\n\u003cp\u003eAaron Rai's breakthrough performance at Aronimink will undoubtedly be remembered as a career-defining moment, a testament to his skill and composure under pressure on golf's grandest stage.\u003c/p\u003e\n","title":"Aaron Rai Stuns Golf World, Claims Maiden Major Title at 2026 PGA Championship","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-18T18:05:37Z","summary":"English golfer Aaron Rai, 31, defied expectations to clinch his first major title at the 2026 PGA Championship, securing a record $3.69 million winner's purse and making a dramatic leap in the FedEx Cup standings.","tags":["PGA Championship","Aaron Rai","Golf","Major Championship","FedEx Cup","Aronimink Golf Club","Sports News","Golf Tournament","Prize Money","Wanamaker Trophy"],"sources":[{"url":"PGA Championship Leaderboard 2026, FedEx Points and Prize Money for Top Stars","title":"PGA Championship Leaderboard 2026, FedEx Points and Prize Money for Top Stars"},{"url":"P
