<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"tragedy-in-tacloban-high-school-shooting-kills-thr","contentHtml":"\u003cp\u003eA rare and devastating high school shooting in Tacloban City, Philippines, has sent shockwaves across the nation, resulting in the deaths of three students and injuries to at least 20 others. The incident, which occurred on a Monday morning, saw two students, aged 14 and 15, open fire at San Jose National High School, prompting an immediate response from authorities and a presidential directive for heightened security.\u003c/p\u003e\n\u003cp\u003eInitial police investigations reveal a disturbing motive: the two suspects, identified as close friends, claimed to have been victims of bullying within the school. The weapons used – a 9mm pistol reportedly obtained from a police officer aunt (now under investigation) and a .38 caliber revolver – highlight concerns over the proliferation of unlicensed firearms and lax campus security, with reports indicating only one guard was on duty at multiple entrances and exits.\u003c/p\u003e\n\u003cp\u003eThe attack unfolded rapidly, with the suspects allegedly pursuing victims into a second classroom after the initial volley of shots. Most of the casualties were female students. Harrowing videos circulated online depict students cowering under desks, their screams and sobs mingling with the sound of gunfire, while others fled the campus in visible terror.\u003c/p\u003e\n\u003cp\u003ePresident Ferdinand Marcos Jr. has condemned the incident, ordering a thorough investigation and calling for an immediate boost in security measures across all schools, workplaces, and public areas nationwide. The case has also thrust the Philippines' juvenile justice system into the spotlight. As minors, the arrested students will be turned over to government welfare officers. A critical aspect of the investigation will be to determine if the 14-year-old suspect can be held criminally liable under a 2006 Philippine law, which sets the minimum age of criminal liability at 15 and requires proof that a suspect was clearly aware of the crime and its repercussions.\u003c/p\u003e\n\u003cp\u003eWhile firearm-related crimes are a persistent issue in the Philippines due to the prevalence of unlicensed weapons, school shootings remain an exceptionally rare occurrence. This tragedy underscores an urgent need for comprehensive solutions addressing bullying, gun control, and school safety protocols to prevent such heartbreaking events from ever happening again.\u003c/p\u003e\n","title":"Tragedy in Tacloban: High School Shooting Kills Three, Ignites Debate on Juvenile Justice","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-04T11:27:12Z","summary":"A high school in the central Philippines became the scene of a tragic shooting incident that left three students dead and at least 20 injured. Two teenage suspects have been arrested, sparking a national conversation about school security, gun control, and the country's juvenile justice system.","tags":["Philippines","School Shooting","Tacloban","Juvenile Justice","Gun Violence","Education Security"],"sources":[{"url":"https://www.dailynews.com/2026/06/22/students-kill-three-in-philippines-high-school-shooting/","title":"High school shooting in the Philippines kills 3, and police arrest 2 students - Daily News"},{"url":"https://www.yahoo.com/news/world/articles/shooting-high-school-philippines-kills-043513274.html","title":"2 students in custody after shooting at high school in Philippines kills 3 and... - Yahoo News"},{"url":"https://www.msn.com/en-us/news/world/2-students-in-custody-after-shooting-at-high-school-in-philippines-kills-3/ar-AA26eirG?ocid=BingNewsVerp","title":"2 students in custody after shooting at high school in Philippines kills 3 - MSN News"},{"url":"https://www.msn.com/en-ph/news/other/school-shooting-kills-3-students-in-tacloban/ar-AA26ipz2?ocid=BingNewsVerp","title":"School shooting kills 3 students in Tacloban - MSN News"},{"url":"https://www.yahoo.com/news/world/articles/misleading-claims-philippine-juvenile-justice-050946059.html","title":"Misleading claims about Philippine juvenile justice law spread after rare school... - Yahoo News"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"tragedy-in-tacloban-high-school-shooting-kills-thr"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
