<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"pldts-landmark-move-first-data-center-reit-listing","contentHtml":"\u003cp\u003ePLDT, a dominant force in the Philippine telecommunications landscape, is embarking on a pioneering initiative by announcing its plan to list VITRO Inc., its data center business, as a Real Estate Investment Trust (REIT) on the Philippine Stock Exchange. This landmark decision marks the nation's first-ever data center REIT listing, poised to open new avenues for investors in the rapidly expanding digital infrastructure market.\u003c/p\u003e\n\u003cp\u003eThe telecommunications giant anticipates raising a substantial sum, estimated between $300 million and $400 million, from this offering. The proceeds are earmarked for a crucial purpose: to fortify PLDT's financial position by bringing down its existing debts, a strategic move as the company prepares for what its chairman describes as \"tougher times ahead.\"\u003c/p\u003e\n\u003cp\u003eVITRO Inc. currently boasts a robust network of 11 data centers spread across the archipelago. Initially, eight of these state-of-the-art facilities will form the core portfolio of the REIT, with potential for further asset infusions based on market demand. A highlight of VITRO's impressive infrastructure is VITRO Sta. Rosa, a powerhouse designed with a substantial 50-megawatt capacity.\u003c/p\u003e\n\u003cp\u003eThe impetus behind this strategic pivot is the escalating global demand for data center services, driven by the likes of tech titans such as Amazon, Google, and Meta. PLDT's leadership recognizes the immense value locked within its digital assets and aims to unlock this potential through the REIT listing. This approach aligns with VITRO's demonstrated success, which saw a remarkable 15% colocation growth in 2025 and achieved an impressive 74% occupancy rate across its data centers. The information and communications technology revenues, significantly bolstered by VITRO's contributions, reached P36.3 billion last year, constituting a dominant 75% of PLDT's total enterprise income.\u003c/p\u003e\n\u003cp\u003eThe path to this historic listing involves navigating regulatory landscapes, requiring approvals from both the Philippine Stock Exchange and the Securities and Exchange Commission. To ensure a meticulously crafted listing structure, PLDT has engaged the expertise of renowned investment banks UBS AG and BPI Capital Corp.\u003c/p\u003e\n\u003cp\u003eEarly indications of social sentiment surrounding PLDT's REIT listing are predominantly positive, reflecting optimism about the venture's prospects, though some discussions and debates are ongoing.\u003c/p\u003e\n","title":"PLDT's Landmark Move: First Data Center REIT Listing Set to Raise Up To $400 Million","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-09T16:34:45Z","summary":"Philippine telecommunications giant PLDT is making a significant stride in the digital infrastructure sector by listing its data center arm, VITRO Inc., as the country's first Real Estate Investment Trust (REIT). This strategic move aims to raise between $300 million and $400 million, primarily to reduce the company's debt and capitalize on the surging demand for data center services.","tags":["PLDT","REIT","Philippines","Data Center","VITRO Inc.","Telecommunications","Investment","Digital Infrastructure","Philippine Stock Exchange"],"sources":[{"url":"https://www.philstar.com/business/2026/06/10/2534016/pldt-eyes-400-million-data-center-listing","title":"PLDT eyes $400 million in data center listing"},{"url":"https://www.msn.com/en-ph/money/real-estate/pldt-oks-reit-listing-plan-for-data-center-unit-eyes-raising-300m-400m/ar-AA25cdNr","title":"PLDT OKs REIT listing plan for data center unit, eyes raising $300M-$400M"},{"url":"https://manilastandard.net/business/314750938/pldt-eyes-400m-from-reit-offering.html","title":"PLDT eyes $400m from REIT offering"},{"url":"https://www.msn.com/en-ph/money/investment/pldt-revives-reit-listing-plan-for-epldt/ar-AA1QxQko","title":"PLDT revives REIT listing plan for ePLDT"},{"url":"https://www.crowdfundinsider.com/2024/03/222517-philippines-pldt-launches-digital-payments-platform-digico/","title":"Philippines: PLDT Launches Digital Payments Platform Digico"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"pldts-landmark-move-first-data-center-reit-listing"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
