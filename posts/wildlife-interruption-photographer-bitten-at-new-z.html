le for the bite, with possibilities ranging from a shark to a sea lion, though the latter is considered more likely. Sloane himself expressed gratitude for the rapid response from the water patrol, medical team, and all supporting teams, adding that he 'loves this place and can't wait to watch an epic Finals Day.'\u003c/p\u003e\n\u003cp\u003eThe competition resumed later the same day at 1:05 p.m. NZST, following consultations with surfers and stakeholders. To ensure the safety of all participants, heightened wildlife surveillance measures were implemented, including the deployment of jet skis, drones, and dedicated spotters. The incident, while momentarily startling, concluded with positive sentiment regarding Sloane's recovery and the event's professional handling.\u003c/p\u003e\n","title":"Wildlife Interruption: Photographer Bitten at New Zealand Surf Event","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-25T18:30:33Z","summary":"A World Surfing League event in Raglan, New Zealand, saw an unexpected halt when an Australian water photographer suffered a 'wildlife injury' to his foot. The competition resumed with enhanced safety measures after the photographer was reported to be in good spirits.","tags":["surfing","New Zealand","wildlife","injury","World Surf League","Ed Sloane","Raglan","sports news"],"sources":[{"url":"https://sports.yahoo.com/articles/zealand-surfing-event-halted-water-051011283.html","title":"New Zealand surfing event halted after water photographer bitten"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"wildlife-interruption-photographer-bitten-at-new-z"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
