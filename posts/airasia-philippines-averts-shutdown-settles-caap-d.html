<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"airasia-philippines-averts-shutdown-settles-caap-d","contentHtml":"\u003cp\u003eManila, Philippines – Travelers can breathe a sigh of relief as AirAsia Philippines has successfully settled its substantial dues with the Civil Aviation Authority of the Philippines (CAAP). This crucial payment, amounting to PHP 271.94 million (approximately US$4.7 million), has averted a looming operational shutdown that threatened to disrupt flights across the country.\u003c/p\u003e\n\u003cp\u003eThe budget carrier had been under a strict cease-and-desist order issued by CAAP on June 2, 2026. The order mandated the airline to halt operations at all government-managed airports within three days unless the outstanding balance was cleared by the deadline of June 6, 2026. The unpaid fees, accumulated from 2021 to May 2026, covered critical operational costs such as air navigation charges, aircraft landing and parking fees, and domestic passenger service charges.\u003c/p\u003e\n\u003cp\u003eInitially, AirAsia Philippines faced an even larger liability, with a total of PHP 833.7 million (US$14.5 million) in outstanding fees. Through a series of diligent payments, the airline significantly reduced this amount to the final PHP 271.94 million that was due. Despite the initial threat, AirAsia Philippines had maintained its commitment to uninterrupted service, assuring the public of continued operations while working towards resolving the financial dispute.\u003c/p\u003e\n\u003cp\u003eThe confirmation from CAAP that AirAsia Philippines has cleared its obligations is a positive development for both the airline and its passengers, ensuring stability in its flight schedule. The news has been met with a largely positive sentiment on social media, with some discussions reflecting on the incident's implications for the aviation sector.\u003c/p\u003e\n\u003cp\u003eThis resolution underscores the importance of regulatory compliance in maintaining the smooth operation of vital public services and reassures the traveling public of AirAsia Philippines' commitment to its operations within the country.\u003c/p\u003e\n","title":"AirAsia Philippines Averts Shutdown, Settles CAAP Dues","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-04T16:55:44Z","summary":"AirAsia Philippines has successfully settled its PHP 271.94 million (US$4.7 million) outstanding obligations with the Civil Aviation Authority of the Philippines (CAAP), averting a potential operational shutdown and ensuring continued flight services. The airline faced a June 6 deadline to clear its debts, which included air navigation, landing, parking, and passenger service charges.","tags":["AirAsia Philippines","CAAP","Aviation","Philippines","Flight Operations","Debt Settlement","Airline News"],"sources":[{"url":"https://www.aerotime.aero/articles/airasia-philippines-faces-shutdown-order-over-us4-7m-in-unpaid-airport-charges","title":"AirAsia Philippines faces shutdown order over US$4.7M in unpaid airport charges"},{"url":"https://www.msn.com/en-ph/news/other/caap-sets-june-6-deadline-for-airasia-philippines-to-settle-unpaid-fees/ar-AA24N5V2?ocid=BingNewsVerp","title":"CAAP sets June 6 deadline for AirAsia Philippines to settle unpaid fees"},{"url":"https://www.msn.com/en-my/money/other/caap-confirms-philippines-airasia-has-cleared-outstanding-payments/ar-AA24PeS4?ocid=BingNewsVerp","title":"CAAP confirms Philippines AirAsia has cleared outstanding payments"},{"url":"https://www.msn.com/en-ph/news/national/airasia-philippines-settles-caap-dues-averts-flight-disruption-threat/ar-AA24Pu9n?ocid=BingNewsVerp","title":"AirAsia Philippines settles CAAP dues, averts flight disruption threat"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"airasia-philippines-averts-shutdown-settles-caap-d"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
