<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"the-ai-jobs-apocalypse-google-and-openai-say-not-s","contentHtml":"\u003cp\u003eThe drumbeat of an impending 'AI jobs apocalypse' has been a persistent hum in Silicon Valley, sparking widespread concern about the future of work. However, a top Google executive, James Manyika, Senior Vice President at Google-Alphabet and a respected AI researcher, is urging a reality check. Manyika contends that the tech industry, and others, are largely overstating the immediate threat of AI-driven mass unemployment.\\n\\nThis more optimistic perspective is echoed by leading minds at OpenAI, the very forefront of AI development. Their economists suggest that only a relatively small fraction of U.S. jobs – approximately 18% – are at a 'relatively higher risk' of immediate elimination due to AI. Even for these roles, the actual integration and widespread usage of AI tools is still lagging, indicating a slower, more gradual shift than alarmist headlines might suggest.\\n\\nAdding historical context to the debate, Bank of America's global research team highlights a crucial point: 60% of of today’s jobs didn’t even exist in 1940. This historical precedent implies that while some jobs may evolve or be replaced, the emergence of entirely new professions driven by AI innovation is not only possible but probable. The narrative isn't just about displacement; it's also about transformation and the creation of unforeseen opportunities.\\n\\nThe societal conversation around AI's impact on employment reflects this nuanced view, with social sentiment appearing mostly positive, albeit with some ongoing debate. While the fear of significant job disruption is understandable, the consensus from these influential voices points towards an evolutionary rather than revolutionary change in the job market, characterized by adaptation, reskilling, and the continuous emergence of new roles in an AI-integrated world.\u003c/p\u003e\n","title":"The AI Jobs Apocalypse? Google and OpenAI Say Not So Fast","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-05-21T08:01:51Z","summary":"Amidst growing anxieties about AI's impact on employment, a top Google executive and economists from OpenAI offer a more optimistic outlook, suggesting the 'jobs apocalypse' might be largely overblown and that new opportunities will emerge.","tags":["AI","Jobs","Employment","Google","OpenAI","Future of Work","Automation","Technology","Economy"],"sources":[{"url":"https://finance.yahoo.com/sectors/technology/articles/top-google-executive-says-silicon-183803287.html","title":"A top Google executive says Silicon Valley is overstating the AI jobs apocalypse"},{"url":"https://www.msn.com/en-us/money/markets/even-openai-s-top-economist-thinks-the-ai-job-apocalypse-is-overstated-here-s-why/ar-AA218tUj?ocid=BingNewsVerp","title":"Even OpenAI’s top economist thinks the AI job apocalypse is overstated. Here's why."},{"url":"https://www.msn.com/en-ca/money/news/bofa-throws-cold-water-on-ai-apocalypse-panic-60-of-today-s-jobs-didn-t-exist-in-1940/ar-AA22n6wQ?ocid=BingNewsVerp","title":"BofA throws cold water on AI apocalypse panic: 60% of today’s jobs didn’t exist in 1940"},{"url":"https://www.nytimes.com/2026/05/03/opinion/ai-jobs-unemployment-silicon-valley.html","title":"Why the A.I. Job Apocalypse (Probably) Won’t Happen"},{"url":"https://www.morningstar.com/news/marketwatch/20260417145/even-openais-top-economist-thinks-the-ai-job-apocalypse-is-overstated-heres-why","title":"Even OpenAi's top economist thinks the AI job apocalypse is overstated. Here's why."}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"the-ai-jobs-apocalypse-google-and-openai-say-not-s"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
