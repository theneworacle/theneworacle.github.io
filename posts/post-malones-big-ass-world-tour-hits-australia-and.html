<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"post-malones-big-ass-world-tour-hits-australia-and","contentHtml":"\u003cp\u003eMusic sensation Post Malone is set to electrify Australia and New Zealand this October with his highly anticipated \"BIG ASS World Tour.\" This marks his first return to the region in three years, promising fans an unforgettable experience across four major stadium shows and several festival appearances.\u003c/p\u003e\n\u003cp\u003eThe tour kicks off on October 9th at Marvel Stadium in Melbourne, followed by a stop at Brisbane's Suncorp Stadium on October 12th, Sydney's ENGIE Stadium on October 15th, and concluding at Auckland's Go Media Stadium on October 21st. In addition to these stadium spectaculars, Post Malone will also grace the stage at the Strummingbird Festival in Ballarat on October 10th, Newcastle on October 17th, and the Sunshine Coast on October 18th. Fans will also be treated to performances by special guest Don Toliver.\u003c/p\u003e\n\u003cp\u003ePost Malone is no stranger to the Australasian music scene. He previously opened for the Red Hot Chili Peppers' stadium tour in early 2023 and headlined the Spilt Milk festival later that year, where he famously performed a \"shoey,\" endearing himself further to local audiences. His strong connection to the region is also evident in his impressive chart history, with all seven of his albums landing in the ARIA top 10.\u003c/p\u003e\n\u003cp\u003eThis tour is particularly exciting as it showcases Post Malone's evolving musical direction, with a recent pivot towards country and roots-influenced sounds. While fans eagerly await these performances, it's worth noting that Post Malone had previously postponed the opening of his U.S. tour to dedicate time to finalizing his forthcoming album, reportedly titled \u003cem\u003eThe Eternal Buzz\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eTickets for the \"BIG ASS World Tour\" will be available with an artist presale starting Tuesday, May 26th, followed by general sales commencing on Thursday, May 28th. Social media sentiment surrounding the tour is largely positive, reflecting the excitement for his return. Don't miss your chance to see Post Malone live!\u003c/p\u003e\n","title":"Post Malone's 'BIG ASS World Tour' Hits Australia and New Zealand","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-24T05:07:42Z","summary":"Get ready, Australasia! Post Malone is bringing his \"BIG ASS World Tour\" Down Under in October 2026, featuring special guest Don Toliver, for his largest headline shows yet.","tags":["Post Malone","BIG ASS World Tour","Australia","New Zealand","Concerts","Music","Don Toliver","Tour Dates","Stadium Tour","Strummingbird Festival"],"sources":[{"url":"Post Malone Sets ‘Big Ass’ Stadium Tour of Australia and New Zealand","title":"Post Malone Sets ‘Big Ass’ Stadium Tour of Australia and New Zealand"},{"url":"MSN","title":"MSN"},{"url":"MSN","title":"MSN"},{"url":"Post Malone Cancels First Few Weeks of ‘Big Ass Stadium’ Shows With Jelly Roll, Citing Need to Finish New Album: ‘We Ain’t Ready for Tour Just Yet’","title":"Post Malone Cancels First Few Weeks of ‘Big Ass Stadium’ Shows With Jelly Roll, Citing Need to Finish New Album: ‘We Ain’t Ready for Tour Just Yet’"},{"url":"Post Malone postpones Big Ass Stadium Tour dates to finish new double album","title":"Post Malone postpones Big Ass Stadium Tour dates to finish new double album"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"post-malones-big-ass-world-tour-hits-australia-and"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
