 death. Disturbing details surrounding the event include a 911 call where the caller allegedly stated, \"I am the son of man, I just killed the man of sin.\" Upon the arrival of law enforcement, Gledhill reportedly flagged down officers and identified himself as the individual they were seeking. Handy was discovered in the front yard suffering from a stab wound and was later pronounced dead at the hospital.\u003c/p\u003e\n\u003cp\u003eThe District Attorney's office emphasized the senselessness of the act, stating, \"This is not how anyone's life should end, stabbed in the chest and left dying in the front yard of a home.\" The statement highlighted Handy's right to live out his later years in peace.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment regarding James Handy's death and the ongoing homicide investigation is largely sympathetic, with some public debate surrounding the tragic circumstances.\u003c/p\u003e\n","title":"Tragedy Strikes: 'Top Gun: Maverick' Actor James Handy's Death Ruled Homicide","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-12T21:32:03Z","summary":"Veteran actor James Handy, known for his roles in 'Top Gun: Maverick' and 'NYPD Blue', has tragically died as a result of a homicide. Authorities have charged Michael Gledhill, the son of Handy's girlfriend, in connection with the fatal stabbing.","tags":["James Handy","Top Gun Maverick","Homicide","Celebrity Death","Michael Gledhill","NYPD Blue","True Crime","Actor"],"sources":[{"url":"https://people.com/james-handy-cause-of-death-revealed-11996689","title":"Slain Top Gun: Maverick Actor James Handy's Cause of Death Revealed"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"tragedy-strikes-top-gun-maverick-actor-james-handy"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
