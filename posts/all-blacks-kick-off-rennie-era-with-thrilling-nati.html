crucial 34-25 lead with just nine minutes left on the clock.\u003c/p\u003e\n\u003cp\u003eThe game started with an immediate challenge for the All Blacks when Ruben Love received an early yellow card. However, New Zealand quickly found their rhythm, demonstrating a high-tempo, rapid ball-recycling game that Rennie praised. \"I love the effort. I love the optimism,\" said the new head coach, acknowledging his team's commitment to running and attacking rugby.\u003c/p\u003e\n\u003cp\u003eFrance, however, refused to back down. They started both halves strongly, with Damian Penaud scoring an early try, followed by efforts from Antoine Hastoy and Matthieu Jalibert. Jalibert's late try in the final minutes narrowed the gap to just two points, setting up a tense finish. But the All Blacks' forwards held their nerve, retaining possession from the restart to seal the hard-fought victory.\u003c/p\u003e\n\u003cp\u003eWhile delighted with the win, Rennie also highlighted areas for improvement, noting errors and a mixed defensive effort. \"We’ve got to be a lot more accurate,\" he stated, emphasizing the need for more time to refine combinations and apply greater defensive pressure. Nevertheless, the positive social media sentiment surrounding the match underscores the excitement this victory has generated, signaling a promising start for New Zealand under their new leadership in the Nations Championship.\u003c/p\u003e\n","title":"All Blacks Kick Off Rennie Era with Thrilling Nations Championship Victory Over France","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-04T14:43:41Z","summary":"New Zealand's All Blacks, under new head coach Dave Rennie, secured a dramatic 34-32 victory over an under-strength French side in Christchurch, marking a high-tempo start to the inaugural Nations Championship.","tags":["Rugby","All Blacks","New Zealand","France","Nations Championship","Dave Rennie","Sports"],"sources":[{"url":"https://www.theguardian.com/sport/2026/jul/04/all-blacks-france-nations-championship-2026-match-report","title":"All Blacks edge France in thriller to open Nations Championship in style"},{"url":"https://www.msn.com/en-us/sports/other/new-zealand-edge-france-34-32-in-thriller-to-open-nations-championship/ar-AA27bxc4","title":"New Zealand edge France 34-32 in thriller to open Nations Championship"},{"url":"https://www.msn.com/en-gb/sport/rugbyleague/rugby-rennies-new-zealand-claim-34-32-cliffhanger-over-france/ar-AA27bWla?ocid=BingNewsVerp","title":"Rugby-Rennie's New Zealand claim 34-32 cliffhanger over France"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"all-blacks-kick-off-rennie-era-with-thrilling-nati"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
