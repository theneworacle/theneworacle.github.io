<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"the-ai-inference-supercycle-is-here-these-2-stocks","contentHtml":"\u003cp\u003eThe world of artificial intelligence is constantly evolving, and we are now standing at the precipice of a significant new phase: the 'AI Inference Supercycle.' This megatrend is poised to redefine the winners and losers in the tech investment space, shifting the focus from initial AI model training to the practical application of these models in real-world scenarios.\u003c/p\u003e\n\u003cp\u003eFor years, much of the AI discussion centered on the intensive process of 'training' AI models – the computationally heavy work of feeding vast datasets to algorithms to learn patterns. However, the market is now rapidly transitioning to 'inference' workloads. Inference involves using these already trained AI models to make predictions, generate content, or perform decisions in real-time. Industry experts, including McKinsey, forecast that AI inference workloads will significantly surpass training by 2030, fueling an immense demand for specialized and energy-efficient processors.\u003c/p\u003e\n\u003cp\u003eWhile companies like Broadcom and Intel have been significant players in the broader semiconductor industry, the AI Inference Supercycle is revealing a new set of clear frontrunners, and some underappreciated champions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWho Are the New Powerhouses of the Inference Supercycle?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eSeveral companies are strategically positioned to capitalize on this shift:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eAMD:\u003c/strong\u003e Advanced Micro Devices is emerging as a formidable contender, effectively repositioning itself for both inference and the burgeoning field of agentic AI. Analysts suggest that the AI boom is expansive enough for both AMD and Nvidia to thrive, with AMD carving out a strong niche in inference.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eNvidia:\u003c/strong\u003e While the post title hints at others, Nvidia remains a pivotal force. The company continues to be a key player in the AI chip market, benefiting from the overall exponential growth in AI demand, and is actively adapting its offerings for inference workloads.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eArm Holdings:\u003c/strong\u003e Anticipating a substantial surge in revenue and earnings over the next half-decade, Arm Holdings is set to play a crucial role. Its energy-efficient AGI CPUs are particularly well-suited for the demanding, yet power-conscious, requirements of inference at scale.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eMemory Manufacturers (DRAM and NAND):\u003c/strong\u003e The intensified focus on inference is expected to ignite a 'memory boom.' Inference tasks require rapid access to large amounts of data, thereby driving up demand for high-performance DRAM and NAND components.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eData Center REITs:\u003c/strong\u003e Often overlooked, data center Real Estate Investment Trusts are the 'underappreciated winners' of this AI revolution. They provide the essential, robust, and scalable backend infrastructure – the physical homes – for the servers and hardware that power AI operations, making them an indispensable part of the ecosystem.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSocial sentiment surrounding 'AI Inference Supercycle stocks' is largely positive, reflecting growing investor awareness and excitement about these new opportunities. As AI moves from the lab into everyday applications, the companies enabling this 'inference' phase are poised for significant growth and impact. Investors looking to navigate this evolving landscape would do well to consider these critical players beyond the most traditional names in the chip industry.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe AI Inference Supercycle isn't just a buzzword; it's a fundamental shift that will reshape technology and investment for years to come.\u003c/strong\u003e\u003c/p\u003e\n","title":"The AI Inference Supercycle Is Here. These 2 Stocks Will Be the Biggest Winners of This Megatrend (Hint: It's Not Broadcom or Intel)","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-05-19T03:46:05Z","summary":"The artificial intelligence landscape is rapidly shifting, moving beyond the initial phase of AI model training into an 'inference supercycle.' This critical evolution is creating new investment opportunities, with companies like AMD, Arm Holdings, and even data center REITs emerging as prime beneficiaries, while the spotlight moves from traditional chip giants.","tags":["AI Inference Supercycle","AI Stocks","Investment","Technology","AMD","Nvidia","Arm Holdings","Data Centers","Memory Chips","Tech Investment","Semiconductors"],"sources":[{"url":"https://www.msn.com/en-us/news/other/ai-chip-market-shifts-to-inference-as-arm-memory-and-utilities-gain/gm-GMB7B83DFC?ocid=BingNewsVerp","title":"AI chip market shifts to inference as Arm, memory, and utilities gain"},{"url":"https://www.fool.com/investing/2026/04/03/amd-vs-nvidia-the-ai-supercycle-is-big-enough-for/","title":"AMD vs. Nvidia: The AI Supercycle Is Big Enough for Both. Here's the Better Buy."},{"url":"https://www.aol.com/articles/ive-changed-mind-amd-stock-172000462.html","title":"I've Changed My Mind on AMD Stock. The AI Supercycle Has Room for More Than Just Nvidia."},{"url":"https://www.cnbc.com/2026/05/17/these-underappreciated-winners-of-ai-also-pay-solid-income.html","title":"These ‘underappreciated winners of AI’ also pay solid income"},{"url":"https://www.msn.com/en-us/money/general/the-next-phase-of-the-ai-chip-supercycle-is-here-1-growth-stock-buy-before-it-is-too-late-hint-it-isn-t-intel-or-broadcom/ar-AA230vfI?ocid=BingNewsVerp","title":"The Next Phase of the AI Chip Supercycle Is Here. 1 Growth Stock Buy Before It Is Too Late (Hint: It Isn't Intel or Broadcom)"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"the-ai-inference-supercycle-is-here-these-2-stocks"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
