<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"haiti-dominates-new-zealand-in-world-cup-warm-up-a","contentHtml":"\u003cp\u003eHaiti asserted its dominance with a commanding 4-0 victory over New Zealand in a World Cup warm-up friendly held in Miami. This emphatic win provides a significant morale boost for Haiti as they fine-tune their preparations for challenging Group C encounters against Scotland, Morocco, and Brazil.\u003c/p\u003e\n\u003cp\u003eThe goals for the Caribbean nation came from Ruben Providence in the 12th minute, followed by substitute Lenny Joseph who doubled the lead six minutes after halftime. Frantzdy Pierrot extended Haiti's advantage with a header after the hour mark, and Markhus Lacroix sealed the impressive victory with a long-range effort in the 87th minute.\u003c/p\u003e\n\u003cp\u003eNew Zealand, featuring players like Nottingham Forest striker Chris Wood, Motherwell's Elijah Just, and Dundee United's new signing Jesse Randall, currently holds the distinction of being the lowest-ranked nation at this summer's World Cup finals.\u003c/p\u003e\n\u003cp\u003eThe Haitian squad, however, did face a pre-match hurdle when midfielder Woodensky Pierre, their only player based in the Caribbean nation, encountered visa complications. His visa was not approved by US authorities until halftime, unfortunately preventing him from joining his teammates on the pitch for the friendly.\u003c/p\u003e\n\u003cp\u003eAdding a unique subplot to New Zealand's World Cup journey, defender Tim Payne has unexpectedly become a viral sensation across social media platforms. From relative obscurity, Payne's online presence exploded after an Argentine influencer launched a campaign to promote the \"least known player\" at the tournament. This surge in popularity has even bewildered his coach, highlighting the immense power of social media in modern sports. Despite the team's loss, social media sentiment surrounding the match remains largely positive, with ongoing discussions around both Haiti's performance and Payne's newfound fame.\u003c/p\u003e\n","title":"Haiti Dominates New Zealand in World Cup Warm-Up as Tim Payne Becomes Viral Sensation","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-03T13:22:22Z","summary":"Haiti delivered a resounding 4-0 defeat to New Zealand in a pre-World Cup friendly in Miami, showcasing strong form for their upcoming Group C clashes. Meanwhile, New Zealand defender Tim Payne unexpectedly surged to social media stardom ahead of the tournament.","tags":["Football","World Cup","Haiti","New Zealand","Friendly","Tim Payne","Soccer","Sports"],"sources":[{"url":"https://www.bbc.com/sport/football/live/cz92774n70lt","title":"Scotland opponents Haiti thump New Zealand in friendly"},{"url":"https://sports.yahoo.com/articles/haiti-routs-zealand-tim-payne-023754453.html","title":"Haiti routs New Zealand (and Tim Payne) 4-0 to delight crowd in World Cup tuneup"},{"url":"https://www.the-sun.com/sport/16447063/haiti-new-zealand-woodensky-pierre/","title":"World Cup star only let into USA at half-time of friendly but team win 4-0"},{"url":"https://sports.yahoo.com/articles/viral-fame-nightmare-haiti-thrashed-024900055.html","title":"From viral fame to a nightmare: Haiti thrashed Tim Payne's New Zealand"},{"url":"https://sports.yahoo.com/articles/zealand-tim-payne-went-unknown-192747415.html","title":"New Zealand’s Tim Payne went from unknown to World Cup social media sensation"},{"url":"https://sports.yahoo.com/articles/soccer-zealands-payne-handling-viral-041615912.html","title":"Soccer-New Zealand's Payne handling viral social media fame well, says bewildered coach"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"haiti-dominates-new-zealand-in-world-cup-warm-up-a"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
