s via a pre-recorded message, the energy of a live appearance will be missed. This news comes on the heels of their recent high-profile date night in New York City and their courtside presence at a Knicks-Cavaliers game, fueling hopes for more joint public outings.\u003c/p\u003e\n\u003cp\u003eHowever, it's not all \"disappointing news\" for the pop icon. Swift is set to be inducted into the prestigious Songwriters Hall of Fame on June 11, where she plans to perform a song. This exclusive event, described by insiders as \"the hardest ticket to come by in the music biz,\" offers a different kind of spotlight for the celebrated artist. Travis Kelce's attendance at this ceremony remains uncertain, as it clashes with his mandatory minicamp with the Chiefs from June 9-11. While players face fines for absence, there's a slim chance he might be released early on the final day to support his fiancée.\u003c/p\u003e\n\u003cp\u003eBeyond award shows and induction ceremonies, the couple continues to generate buzz with ongoing speculation about their reported July 3 wedding in New York City. Whispers suggest an air of secrecy surrounding the nuptials, with reports indicating that some family members might even be kept out of the loop to prevent leaks from \"loose cannons.\"\u003c/p\u003e\n\u003cp\u003eIn other news, Travis Kelce recently joked about wanting to be \"more of a man\" around Taylor Swift, hinting at personal growth and a desire to impress his partner. Meanwhile, the power couple's rumored ownership stake in a horse named \"The Puma\" has also hit a snag, with the horse being a late scratch from significant races like the Kentucky Derby and Preakness Stakes due to a leg injury.\u003c/p\u003e\n\u003cp\u003eDespite these varied updates, the overall social sentiment surrounding Taylor Swift and Travis Kelce remains overwhelmingly positive, with fans continuing to engage with every development in their high-profile relationship.\u003c/p\u003e\n","title":"Swifties' AMA Disappointment: Taylor Swift and Travis Kelce Skip Awards, But New Horizons Await","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-24T07:00:30Z","summary":"Taylor Swift and Travis Kelce fans are facing some \"unfortunate news\" as the power couple will not be attending the 2026 American Music Awards. However, a prestigious induction ceremony and persistent wedding rumors keep the celebrity duo firmly in the spotlight.","tags":["Taylor Swift","Travis Kelce","AMAs","American Music Awards","Songwriters Hall of Fame","NFL","Kansas City Chiefs","Celebrity News","Pop Culture","Wedding Rumors","The Puma"],"sources":[{"url":"https://heavy.com/sports/nfl/kansas-city-chiefs/fans-get-disappointing-taylor-swift-travis-kelce-date-night/","title":"Fans Get Disappointing Taylor Swift News After Travis Kelce Date Night"},{"url":"https://www.totalprosports.com/nfl/kansas-city-chiefs/taylor-swift-cut-off-travis-kelce-family-member-wedding-plans/","title":"Taylor Swift Reportedly Cut Off Travis Kelce Family Member From Wedding Plans For Being a “Loose Cannon”"},{"url":"https://www.yahoo.com/entertainment/celebrity/articles/taylor-swift-travis-kelce-leave-090000956.html","title":"Taylor Swift And Travis Kelce Leave Parents Out Of Wedding Plans"},{"url":"https://heavy.com/sports/horse-racing/taylor-swift-news-chiefs-rumors-boyfriend-travis-kelce/","title":"Taylor Swift \u0026 Travis Kelce Dealt Unfortunate News at Preakness Stakes"},{"url":"https://www.msn.com/en-us/entertainment/celebrities/travis-kelce-jokes-he-wants-to-be-more-of-a-man-around-taylor-swift/ar-AA22ypSZ?ocid=BingNewsVerp","title":"Travis Kelce Jokes He Wants to Be 'More of a Man' Around Taylor Swift"},{"url":"https://www.msn.com/en-us/music/celebrity/travis-kelce-comments-as-wedding-rumors-with-taylor-swift-swirl/ar-AA22wwxK?ocid=BingNewsVerp","title":"Travis Kelce comments as wedding rumors with Taylor Swift swirl"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"swifties-ama-disappointmen
