<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"a-game-changer-new-zealand-rugby-and-touch-new-zea","contentHtml":"\u003cp\u003eIn a move set to redefine the landscape of New Zealand sport, New Zealand Rugby (NZR) and Touch New Zealand have officially unveiled a landmark partnership. This agreement formally recognizes touch rugby as the nation's official non-contact summer variant of rugby, promising to forge one of the largest participation footprints in New Zealand sport.\u003c/p\u003e\n\u003cp\u003eThe strategic alliance is designed to foster closer collaboration across a multitude of areas, including participation initiatives, community engagement programs, events, marketing strategies, and commercial growth. The overarching goal is clear: to significantly increase player numbers across all forms of the game, creating a more robust and inclusive rugby environment.\u003c/p\u003e\n\u003cp\u003eA key element of this agreement is the initiation of Touch NZ's journey to become an Associate Member of NZR, a step that will grant the organization voting rights at next year’s annual general meeting. This integration signifies a deeper level of commitment and shared vision between the two bodies.\u003c/p\u003e\n\u003cp\u003eNZR chief executive Steve Lancaster hailed the deal as a “no-brainer,” emphasizing its reflection of the evolving ways New Zealanders interact with sport. “We’ve seen an opportunity in recent years that we could be stronger together, work together to promote the game, promote events and get more Kiwis active,” Lancaster stated. He highlighted the mutual benefits, noting that touch rugby's non-contact, summer format makes it accessible to all generations, effectively broadening rugby’s appeal and offering.\u003c/p\u003e\n\u003cp\u003eTouch NZ chief executive Joe Sprangers echoed this sentiment, describing the formalization of their relationship as a natural progression, following several years of discussions. Sprangers anticipates considerable opportunities for combining resources, working synergistically, and achieving greater economies of scale. He also acknowledged that many people already assumed a unified system, and this partnership now officially brings that perception to fruition.\u003c/p\u003e\n\u003cp\u003eWith over 150,000 individuals playing touch rugby across New Zealand each year, it stands as one of the country's most widely played team sports. This partnership is expected to amplify those numbers and integrate the touch rugby community more closely with the broader rugby family.\u003c/p\u003e\n\u003cp\u003eInitial social sentiment surrounding the partnership has been largely positive, with some discussions focusing on the long-term implications and future directions for New Zealand sport. This union is poised to unlock new potential, ensuring rugby remains a vibrant and accessible sport for all New Zealanders, year-round.\u003c/p\u003e\n","title":"A Game Changer: New Zealand Rugby and Touch New Zealand Unite in Landmark Partnership","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-19T05:07:52Z","summary":"New Zealand Rugby (NZR) and Touch New Zealand have announced a historic partnership, formally recognizing touch rugby as the official non-contact summer form of rugby. This collaboration aims to significantly boost participation and strengthen the country's year-round rugby ecosystem.","tags":["New Zealand Rugby","Touch New Zealand","Rugby Partnership","New Zealand Sport","Non-Contact Rugby","Community Sport"],"sources":[{"url":"https://www.nzherald.co.nz/sport/rugby/new-zealand-rugby-announces-landmark-partnership-with-touch-new-zealand/65A37VFOCVB55IBTIMU4CVJ7XA/","title":"New Zealand Rugby announces landmark partnership with Touch New Zealand"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-game-changer-new-zealand-rugby-and-touch-new-zea"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
