<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"wellington-under-water-state-of-emergency-declared","contentHtml":"\u003cp\u003eWellington, New Zealand's vibrant capital, has been plunged into a state of emergency following an onslaught of torrential rain that has brought the city to a standstill. Record-breaking downpours, with an unprecedented 77mm falling in less than an hour on Monday, have overwhelmed urban infrastructure, leading to widespread severe flooding and dangerous landslides.\u003c/p\u003e\n\u003cp\u003eThe extreme weather has transformed city streets into raging torrents, submerging vehicles, uprooting trees, and causing significant damage to homes and property. The deluge has also exacerbated problems at the Wellington Water treatment plant, resulting in a wastewater failure that has compounded the city's woes.\u003c/p\u003e\n\u003cp\u003eAuthorities have reported at least one person missing, and more than a dozen residents have been evacuated from flood-prone areas. The national weather agency has issued red warnings for heavy rain, signaling a continued threat to life from dangerous river conditions and further slips.\u003c/p\u003e\n\u003cp\u003eWellington Mayor Andrew Little described the situation as \"wild weather,\" noting that the flooding was strong enough to move cars and lift manhole covers. Residents recounted harrowing experiences, with one describing a \"huge deluge, flow, river in fact, flowing through the garden.\"\u003c/p\u003e\n\u003cp\u003eIn response to the escalating crisis, local authorities have urged residents to hunker down, cut or delay all non-essential travel, and for those in low-lying or flood-prone areas to consider relocating to safer ground with friends or family for at least the next 24 hours. The Wellington City Mission has also been set up to provide shelter for those in need.\u003c/p\u003e\n\u003cp\u003eThis latest series of flash floods comes less than a week after Cyclone Vaianu swept through the North Island, highlighting a period of intense and challenging weather for the region. As emergency services continue to monitor the situation, the emphasis remains on public safety and preparedness for the ongoing severe weather conditions.\u003c/p\u003e\n","title":"Wellington Under Water: State of Emergency Declared as Record Rains Overwhelm Capital","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-05T05:25:09Z","summary":"New Zealand's capital, Wellington, has declared a state of emergency after torrential rainfall triggered severe flooding, landslides, and a critical wastewater failure. Record downpours have submerged roads, necessitated evacuations, and left one person missing, as authorities urge residents to prioritize safety.","tags":["New Zealand","Wellington","Flooding","State of Emergency","Wastewater Failure","Extreme Weather","Landslides","Heavy Rain","Cyclone Vaianu"],"sources":[{"url":"https://saudigazette.com.sa/article/660690/world/state-of-emergency-declared-as-flash-floods-hit-new-zealand-capital","title":"State of emergency declared as flash floods hit New Zealand capital"},{"url":"https://www.msn.com/en-my/news/other/new-zealand-capital-flooded-with-faeces-after-wastewater-failure/ar-AA24ShHr?ocid=BingNewsVerp","title":"New Zealand capital flooded with feces after wastewater failure"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"wellington-under-water-state-of-emergency-declared"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
