<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"economists-and-tech-leaders-unite-a-stark-warning-","contentHtml":"\u003cp\u003eA powerful coalition of over 200 economists, including sixteen Nobel Laureates, and prominent tech figures such as former Google CEO Eric Schmidt and Anthropic co-founder Jack Clark, have released a sobering open letter. Under the banner of \"We Must Act Now,\" this group is sounding the alarm about AI's potential to trigger an \"unprecedented transformation\" of the global economy—a shift they predict will be larger than the Industrial Revolution, yet unfold over a vastly shorter timeframe.\u003c/p\u003e\n\u003cp\u003eThe open letter underscores the dual nature of this coming wave: while it presents opportunities for \"major gains in living standards,\" it also carries the significant risk of \"large-scale job displacement.\" The signatories are urging both technology leaders and policymakers to take immediate and decisive action. Their call to action emphasizes the critical need to fully grasp the economic implications of transformative AI and to establish the necessary incentives, safeguards, and institutions that can steer AI development in a direction that genuinely complements human capabilities and benefits society as a whole.\u003c/p\u003e\n\u003cp\u003eThe concerns raised are not abstract. Evidence of AI's impact on employment is already mounting. In 2025 alone, an estimated 50,000 jobs were reportedly lost due to AI integration. This trend has continued into 2026, with major corporations like Amazon, Meta, Atlassian, Block, Fiverr, Pinterest, and Snap announcing layoffs directly linked to AI initiatives. A survey conducted in May 2026 revealed that a staggering 99% of executives among 12,000 respondents anticipate that AI will lead to at least some reduction in their workforce within the next two years.\u003c/p\u003e\n\u003cp\u003eSome political leaders are beginning to respond to these challenges. California Governor Gavin Newsom, for instance, launched an \"AI-Unemployment Tracker\" after Meta's 8,000 AI-related layoffs, aiming to monitor the real-time impact on the state's workforce.\u003c/p\u003e\n\u003cp\u003eEconomist Erik Brynjolfsson, a key organizer of the \"We Must Act Now\" group, articulated the urgency of the situation: “AI capabilities are advancing far faster than our understanding of the economic implications. In that gap lie the greatest opportunities of our era. We must act now to guide AI to complement humans rather than simply imitate them — and to generate prosperity for the many, not just the few.”\u003c/p\u003e\n\u003cp\u003eThe public discourse surrounding this critical issue appears to be largely positive, indicating a general acknowledgment of its importance, although debates continue regarding the specific threats and optimal solutions. The message from this esteemed group is clear: proactive, thoughtful governance and collaboration are essential to harness AI's potential for good while mitigating its risks.\u003c/p\u003e\n","title":"Economists and Tech Leaders Unite: A Stark Warning on AI's Threat to Jobs","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-13T21:02:15Z","summary":"An open letter signed by over 200 economists, including Nobel Laureates, and tech giants like Eric Schmidt, cautions against the rapid, unprecedented economic transformation AI could bring, highlighting both job displacement risks and opportunities.","tags":["AI","Artificial Intelligence","Job Displacement","Economy","Technology","Eric Schmidt","Reid Hoffman","Economists","We Must Act Now","Future of Work","Policy"],"sources":[{"url":"https://www.msn.com/en-us/money/other/read-the-letter-eric-schmidt-reid-hoffman-and-top-economists-signed-warning-about-ais-threat-to-jobs/ar-AA27OOEx","title":"Read the letter Eric Schmidt, Reid Hoffman, and top economists signed warning about AI's threat to jobs"},{"url":"https://mashable.com/tech/we-must-act-now-economists-issue-ai-job-loss-warning","title":"Over 200 economists warn that more AI job losses are coming: \"We must act now\""},{"url":"https://www.nytimes.com/2026/07/13/business/economists-ai-threat-jobs.html","title":"Nearly 200 Economists and Tech Leaders Warn of A.I. Threats"},{"url":"https://finance.yahoo.com/technology/ai/articles/read-letter-eric-schmidt-reid-125618599.html","title":"Read the letter Eric Schmidt, Reid Hoffman, and top economists signed warning about AI's threat to jobs"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"economists-and-tech-leaders-unite-a-stark-warning-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
