<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"us-house-rejects-bid-to-curb-trumps-iran-war-power","contentHtml":"\u003cp\u003eIn a deeply divided vote of 213-214, the US House of Representatives has once again rejected a resolution aimed at reining in President Donald Trump's war powers concerning Iran. This narrow defeat underscores a profound partisan chasm in Washington regarding American military engagement in the Middle East, with Republicans largely aligning with Trump's assertive stance and Democrats vocalizing grave concerns.\u003c/p\u003e\n\u003cp\u003eDemocrats championed the resolution, driven by anxieties over the potential for the United States to become further entrenched in another costly and prolonged conflict. They highlighted the significant financial toll, with billions already spent, and mourned the loss of at least 13 service members. Economic repercussions, such as soaring gas prices reaching $7 in some states, and fissures with long-standing allies who do not support Trump's actions, were also central to their arguments. New York Rep. Gregory Meeks, the ranking Democrat on the House Committee on Foreign Affairs, warned, “We’re standing at the edge of a cliff and Congress must act before the president pushes off. Every day we delay, we inch closer to a conflict with no exit ramp.” Rep. Pramila Jayapal, D-Wash., further emphasized the lack of a clear strategy, pointing out that an additional 10,000 US troops are being sent to join 50,000 already stationed in the Middle East.\u003c/p\u003e\n\u003cp\u003eConversely, Republicans staunchly defended President Trump's decisive actions, characterizing them as necessary measures against an Iranian government they contend has long terrorized the Middle East and its own people. Florida Rep. Brian Mast, chairman of the committee, accused Democrats of hypocrisy, recalling previous military engagements, such as attacks on Iranian-backed Houthis in Yemen in 2024 under a Democratic president, where similar war powers resolutions were not pursued. “When Joe Biden was responding to merchant marine vessels being attacked, it was OK. No war power needed. It went on for about a year,” Mast stated, highlighting the perceived inconsistency. Rep. Joe Wilson, R-S.C., affirmed, “President Donald Trump has sent a message that those who threaten the United States and our partners will be ultimately held accountable.”\u003c/p\u003e\n\u003cp\u003eThis vote occurs in the immediate aftermath of recent US-Israeli strikes on Iran and a currently fragile ceasefire. The legislative body also faces a looming deadline under the War Powers Act of 1973, which mandates congressional authorization for the use of force within 60 days. Notably, only a handful of lawmakers crossed party lines: Rep. Thomas Massie (R-KY) voted in favor of the resolution, while Rep. Jared Golden (D-ME) voted against it.\u003c/p\u003e\n\u003cp\u003eSimulated social media sentiment on this topic indicates a mostly positive reaction, albeit with some ongoing debate. As the US grapples with its foreign policy in the Middle East, the rejection of this resolution signals continued executive latitude in military action, fueling an enduring debate over the balance of power between the presidency and Congress in matters of war.\u003c/p\u003e\n","title":"US House Rejects Bid to Curb Trump's Iran War Powers: A Deep Divide","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-15T21:00:10Z","summary":"The US House of Representatives narrowly voted down a resolution to restrict President Donald Trump's military actions in Iran, revealing a stark partisan split over America's involvement in the Middle East. This decision comes amidst ongoing US-Israeli strikes, a fragile ceasefire, and mounting concerns from Democrats about potential prolonged conflict, economic strain, and lack of clear strategy.","tags":["US House","Iran","War Powers","Donald Trump","Middle East","Foreign Policy","Congress","Democrats","Republicans"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/us-house-narrowly-rejects-bid-to-rein-in-trump-iran-war-powers/ar-AA23dxQE","title":"US House narrowly rejects bid to rein in Trump Iran war powers"},{"url":"https://apnews.com/article/iran-war-trump-war-powers-iran-congress-e85410b6f404ddd45a9da0a09f1c285f","title":"House rejects effort to withdraw US forces from the Iran war as Republicans stick with Trump"},{"url":"https://www.nytimes.com/2026/05/15/us/politics/iran-war-powers-congress.html","title":"Republicans Waited to Challenge Trump on the Iran War. Now It May Be Too Late."}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"us-house-rejects-bid-to-curb-trumps-iran-war-power"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
