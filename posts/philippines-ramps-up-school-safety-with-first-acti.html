<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-ramps-up-school-safety-with-first-acti","contentHtml":"\u003cp\u003eThe tranquility of Philippine schools was shattered last month by a rare and tragic active shooter incident in Tacloban City. Two teenage students opened fire, claiming the lives of three schoolmates and injuring 20 others. In a direct response to this unprecedented violence, the Philippines has launched its first active school shooter drills, signaling a new era of safety protocols in educational institutions nationwide.\u003c/p\u003e\n\u003cp\u003eAt a recent drill in a Manila educational campus, hundreds of students and teachers engaged in practical exercises designed to enhance their survival in an active shooter scenario. This included the swift barricading of classrooms using desks and chairs and maintaining absolute silence as a simulated armed intruder patrolled the halls. Education Secretary Sonny Angara underscored the necessity of these drills, attributing the rise in violent incidents to exposure to damaging social media content, negative influences, and online recruitment by terrorist groups. He emphasized the need for creative and adaptive responses to evolving threats, with plans to replicate these exercises across all public schools.\u003c/p\u003e\n\u003cp\u003eThe Tacloban shooting, where the 14 and 15-year-old suspects reportedly obtained their handguns from relatives, sent shockwaves through the nation. Despite strict gun ownership laws, weak enforcement has unfortunately made weapons accessible, contributing to such rare but devastating events. For those directly involved, the drills offer a measure of reassurance. Julie Anne Ramirez, a teacher at Manila Science High School, highlighted the newfound importance of preparing students for what was previously an unthinkable emergency. Similarly, Grade 12 student Josephine Mikaela Segarra expressed a greater sense of security knowing that authorities are actively addressing their safety.\u003c/p\u003e\n\u003cp\u003eWhile school shootings remain exceedingly uncommon in Southeast Asia compared to the alarming frequency seen in the United States, other regional nations are also bolstering their preparedness. Thailand, for instance, implemented active shooter drills after a horrific 2022 mass shooting at a nursery. However, the introduction of these drills in the Philippines has not been without its critics. The Alliance of Concerned Teachers-Philippines argues for a stronger focus on preventive measures, advocating for schools to remain \"genuine zones of peace and safety.\" They caution against a future where active shooter drills become a regular necessity because the underlying conditions fostering insecurity remain unaddressed.\u003c/p\u003e\n\u003cp\u003ePublic sentiment, as simulated, appears largely positive regarding the drills, reflecting a desire for increased safety. Yet, a healthy debate continues on the efficacy of such measures versus the crucial need to tackle the root causes of violence. As the Philippines navigates this new challenge, the balance between immediate preparedness and long-term prevention will be key to ensuring the true safety and peace of its educational environments.\u003c/p\u003e\n","title":"Philippines Ramps Up School Safety with First Active Shooter Drills After Tragic Incident","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-15T11:29:42Z","summary":"Following a rare and fatal school shooting in Tacloban City, the Philippines has initiated its first active shooter drills in schools, aiming to prepare students and faculty for violent incidents. This proactive measure, however, sparks debate on balancing preparedness with preventive action.","tags":["Philippines","School Safety","Active Shooter Drills","Education","Tacloban Shooting","Gun Violence","School Security","Sonny Angara","Student Safety"],"sources":[{"url":"https://www.thestar.com.my/aseanplus/aseanplus-news/2026/07/15/philippines-holds-first-active-shooter-drills-after-school-shooting-killed-three","title":"Philippines holds first active shooter drills after school shooting killed three"},{"url":"https://www.msn.com/en-gb/news/world/philippines-rethinks-school-safety-after-rare-shooting-kills-three/ar-AA26kOSb?ocid=BingNewsVerp","title":"Philippines rethinks school safety after rare shooting kills three"},{"url":"https://www.msn.com/en-ph/education-and-learning/secondary-education/deped-to-launch-active-shooting-drills-in-schools/ar-AA27rKyg?ocid=BingNewsVerp","title":"DepEd to launch 'active shooting drills' in schools"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-ramps-up-school-safety-with-first-acti"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
