turn to the Test side, was named Man of the Match for his stellar seven-wicket haul (5-39 and 2-38), demonstrating his impact and improved form. Debutant opener Emilio Gay also made a significant contribution, scoring the highest individual innings of the match with 57 runs in the second innings.\u003c/p\u003e\n\u003cp\u003eThe pitch conditions at Lord's played a pivotal role, with a high number of dismissals occurring by being bowled or leg before wicket. New Zealand captain Tom Latham acknowledged the unexpected nature of the surface but expressed optimism for more favorable conditions in the upcoming second Test at The Oval.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment has been largely positive regarding England's victory, with discussions revolving around the team's promising start to this new phase of 'Bazball' cricket.\u003c/p\u003e\n","title":"England's 'Bazball' Reset Kicks Off with Dominant Win Over New Zealand at Lord's","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-08T05:57:05Z","summary":"England secures a convincing 115-run victory against New Zealand in the first Test at Lord's, signaling a successful 'Bazball' reset with standout performances from Gus Atkinson, Ollie Robinson, and debutant Emilio Gay.","tags":["Cricket","England Cricket","New Zealand Cricket","Bazball","Lord's Test","Gus Atkinson","Ollie Robinson","Emilio Gay"]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"englands-bazball-reset-kicks-off-with-dominant-win"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
