<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"wellington-under-siege-11-meter-waves-force-mass-e","contentHtml":"\u003cp\u003eWellington, New Zealand's vibrant capital, has been plunged into crisis as an extraordinary weather phenomenon unleashes its fury. Waves reaching a staggering 11 meters (36 feet) have relentlessly pounded the city's coast, accompanied by fierce gale-force winds, prompting authorities to declare a state of emergency and execute widespread mandatory evacuations.\u003c/p\u003e\n\u003cp\u003eHundreds of residents in vulnerable coastal areas, including Owhiro Bay, Island Bay, Houghton Bay, and Breaker Bay, were ordered to abandon their homes. A stark warning was issued: emergency services would be unable to respond within these evacuated zones, underscoring the gravity of the situation.\u003c/p\u003e\n\u003cp\u003eThe Wellington Region Emergency Management Office reported significant disruption, with monstrous swells overtopping coastal roads and wind gusts nearing 100 km/h at Wellington Airport. The wider Wairarapa region experienced even more extreme conditions, with gusts recorded at a ferocious 137 km/h.\u003c/p\u003e\n\u003cp\u003eTransport networks bore the brunt of the tempest. Flights in and out of Wellington were severely impacted, resulting in numerous cancellations and even one small aircraft being toppled by the wind. Cook Strait ferry services, vital links operated by Interislander and Bluebridge, were suspended, further isolating the capital.\u003c/p\u003e\n\u003cp\u003eWhile average wave heights hovered around six meters, the MetService confirmed that peak waves almost doubled that, indicating the immense power of the ocean surge. These severe conditions are projected to persist, with evacuation orders expected to remain in effect until Wednesday morning. Authorities have implemented extensive road closures along the south coast and issued urgent pleas for the public to steer clear of all exposed coastal areas, emphasizing the inherent dangers.\u003c/p\u003e\n\u003cp\u003eOfficials are deeply concerned that these long-period swells could inflict substantial coastal damage, potentially surpassing the devastation witnessed during a 2020 storm that brought 5.5-meter waves and widespread evacuations. The scale of the current event suggests a far greater threat to infrastructure and property.\u003c/p\u003e\n\u003cp\u003eAmidst the unfolding crisis, simulated social media sentiment regarding the evacuations revealed a mostly positive response, with some debate, likely reflecting a mix of concern for safety and discussions around preparedness and response.\u003c/p\u003e\n","title":"Wellington Under Siege: 11-Meter Waves Force Mass Evacuations in New Zealand Capital","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-10T16:41:10Z","summary":"New Zealand's capital, Wellington, is grappling with a severe weather event as colossal 11-meter waves and gale-force winds have battered its coastline, leading to the mandatory evacuation of hundreds of residents and a declared state of emergency.","tags":["New Zealand","Wellington","Extreme Weather","Evacuation","State of Emergency","Coastal Storm","Natural Disaster"],"sources":[{"url":"https://www.msn.com/en-us/news/world/hundreds-evacuated-as-waves-batter-new-zealand-capital/ar-AA259aZi?ocid=BingNewsVerp","title":"Hundreds evacuated as waves batter New Zealand's capital"},{"url":"https://www.msn.com/en-in/public-safety-and-emergencies/natural-disasters/new-zealand-issues-state-of-emergency-as-11-metre-waves-batter-wellington-coast-hundreds-evacuated/ar-AA259dsa","title":"New Zealand issues state of emergency as 11-metre waves batter Wellington coast; hundreds evacuated"},{"url":"http://www.chinaview.cn/20260609/557e4b26fe57433a9cbe94a96b30bfeb/c.html","title":"Massive swells, gales batter New Zealand capital"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"wellington-under-siege-11-meter-waves-force-mass-e"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
