rable occasion, marking a new chapter for the Miss Philippines Earth organization and ushering in a fresh face to lead its advocacy. While a recent report also highlighted Barcoma's defense of a hosting job amid some criticism, overall social sentiment regarding her reign and the upcoming pageant appears to be largely positive, reflecting the public's excitement and anticipation for the coronation.\u003c/p\u003e\n","title":"Countdown to Coronation: Joy Barcoma to Crown Miss Philippines Earth Successor in Malitbog","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-06T05:53:50Z","summary":"Reigning Miss Philippines Earth, Joy Barcoma, is set to conclude her impactful reign by crowning her successor in the scenic province of Bukidnon. The highly anticipated 26th edition of the national beauty pageant culminates on June 27th in Malitbog, where 33 hopefuls will vie for the prestigious title.","tags":["Miss Philippines Earth","Joy Barcoma","Malitbog","Bukidnon","Pageant","Coronation","Beauty Contest","Philippines","Environmental Advocacy"],"sources":[{"url":"https://www.msn.com/en-ph/news/other/joy-barcoma-to-crown-miss-philippines-earth-successor-in-malitbog/ar-AA24SRYZ","title":"Joy Barcoma to crown Miss Philippines Earth successor in Malitbog"},{"url":"https://manilastandard.net/showbiz/celebrity-profiles/314744036/joy-barcoma-defends-hosting-job-amid-criticism.html","title":"Joy Barcoma defends hosting job amid criticism"},{"url":"https://www.msn.com/en-ph/general/general/33-aspirants-eye-joy-barcoma-s-miss-philippines-earth-crown/ar-AA22VaYM","title":"33 aspirants eye Joy Barcoma's Miss Philippines Earth crown"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"countdown-to-coronation-joy-barcoma-to-crown-miss-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
