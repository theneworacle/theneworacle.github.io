.\u003c/p\u003e\n\u003cp\u003eReports of sightings poured in from various locations, describing a bright object streaking across the sky before the ground-shaking boom. Social media was abuzz with discussions, ranging from awe and wonder to theories about the mysterious noise. While the event sparked considerable debate online, the overall sentiment leaned towards fascination with this rare natural phenomenon.\u003c/p\u003e\n\u003cp\u003eThis incident serves as a powerful reminder of the dynamic nature of our solar system and the incredible forces at play even far above our heads.\u003c/p\u003e\n","title":"East Coast Rattled by Massive Meteor Explosion and Sonic Boom","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-06T13:25:32Z","summary":"A colossal meteor recently disintegrated over the northeastern United States, unleashing a powerful sonic boom that shook homes and startled residents across the East Coast, from Massachusetts to New York. NASA confirmed the event, detailing the immense energy released by the celestial visitor.","tags":["meteor","sonic boom","East Coast","NASA","space","astronomy","fireball"],"sources":[{"url":"Massive meteor explosion equal to 300 tons of TNT triggers sonic boom, rattling East Coast","title":"Massive meteor explosion equal to 300 tons of TNT triggers sonic boom, rattling East Coast"},{"url":"Update: NASA confirms fireball meteor exploded over northeastern US with force of 230 tons of TNT","title":"Update: NASA confirms fireball meteor exploded over northeastern US with force of 230 tons of TNT"},{"url":"Meteor explodes over Massachusetts, setting off loud booms","title":"Meteor explodes over Massachusetts, setting off loud booms"},{"url":"Meteor explodes over Boston as sonic boom rings out across Massachusetts","title":"Meteor explodes over Boston as sonic boom rings out across Massachusetts"},{"url":"Meteor explodes over New England, sonic boom heard in parts of New York","title":"Meteor explodes over New E
