<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"analyst-bullish-on-oruka-orka-following-abbvies-ap","contentHtml":"\u003cp\u003eThe biopharmaceutical landscape is abuzz with recent developments, as H.C. Wainwright has maintained its 'Buy' rating on Oruka Therapeutics (NASDAQ:ORKA), setting an optimistic price target of $120. This positive outlook follows closely on the heels of AbbVie's strategic acquisition of Apogee Therapeutics, a move that is sending ripples through the industry.\u003c/p\u003e\n\u003cp\u003eAt the heart of H.C. Wainwright's reaffirmed confidence lies a compelling connection between Oruka and Apogee. Both companies, initially spun out of privately-held Paragon Therapeutics, share a dedicated focus on advancing novel treatments for inflammatory and immune-related diseases, with a particular emphasis on challenging inflammatory skin conditions.\u003c/p\u003e\n\u003cp\u003eAbbVie's acquisition of Apogee brings a diverse and promising pipeline into its fold, featuring several clinical-stage candidates. Notably, this includes zumilokibart (APG777), a subcutaneous, half-life extended monoclonal antibody targeting IL-13, currently under development for atopic dermatitis – a chronic, inflammatory skin condition. Additionally, Apogee's pipeline includes APG273, a combination therapy (zumilokibart and APG333, an anti-TSLP monoclonal antibody) being explored for the treatment of asthma.\u003c/p\u003e\n\u003cp\u003eOruka Therapeutics, for its part, continues its mission as a biopharmaceutical company committed to developing innovative biologics for chronic skin diseases. The recent acquisition by AbbVie of a company with such strong foundational similarities to Oruka underscores the significant potential and perceived value within this specialized area of drug development.\u003c/p\u003e\n\u003cp\u003eInitial social sentiment surrounding the Oruka and Apogee acquisition news is largely positive, albeit with some ongoing discussions. This development signals a vibrant and evolving sector, poised for continued innovation in addressing the unmet needs of patients suffering from inflammatory and immune-mediated conditions.\u003c/p\u003e\n","title":"Analyst Bullish on Oruka (ORKA) Following AbbVie's Apogee Acquisition: What it Means for Inflammatory Disease Treatment","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-01T21:44:55Z","summary":"H.C. Wainwright has reaffirmed its 'Buy' rating for Oruka Therapeutics (ORKA) with a $120 price target. This comes after AbbVie's acquisition of Apogee Therapeutics, highlighting the shared focus of these biopharmaceutical companies on pioneering treatments for inflammatory and immune-related diseases.","tags":["Oruka Therapeutics","Apogee Therapeutics","AbbVie","H.C. Wainwright","Biopharmaceutical","Inflammatory Diseases","Atopic Dermatitis","Asthma","Stock Market","Healthcare Investment"],"sources":[{"url":"https://www.insidermonkey.com/blog/h-c-wainwright-keeps-buy-rating-on-oruka-orka-after-apogee-acquisition-news-1793308/","title":"H.C. Wainwright Keeps Buy Rating on Oruka (ORKA) After Apogee Acquisition News"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"analyst-bullish-on-oruka-orka-following-abbvies-ap"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
