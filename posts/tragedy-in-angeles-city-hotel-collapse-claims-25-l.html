<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"tragedy-in-angeles-city-hotel-collapse-claims-25-l","contentHtml":"\u003cp\u003eAngeles City, Philippines – A devastating incident has rocked Angeles City in the northern Philippines, as a nine-story hotel still under construction collapsed, claiming the lives of at least 25 individuals. The tragic event, which occurred after a fierce thunderstorm, initially left scores trapped under a colossal pile of concrete slabs, twisted iron bars, and aluminum scaffolding.\u003c/p\u003e\n\u003cp\u003eRescue operations, spearheaded by firefighters and police, became a desperate race against time. Emergency personnel worked tirelessly, navigating precarious debris and the scorching summer heat in a valiant effort to extricate survivors. Heartbreaking scenes unfolded as rescuers struggled to revive trapped workers, some of whom ultimately succumbed despite all efforts to provide water and medicine intravenously.\u003c/p\u003e\n\u003cp\u003eInitially, reports confirmed four fatalities, including a Malaysian tourist staying in a nearby budget inn that was partially hit by the debris avalanche, with 17 others listed as missing, mostly construction workers. However, subsequent reports have indicated a grim increase in the death toll, rising to 25 as more bodies were recovered from the immense rubble.\u003c/p\u003e\n\u003cp\u003eAngeles City Mayor Carmelo Lazatin initially held onto hope for more survivors, emphasizing that operations would not shift to mere body retrieval. However, the anxiety among waiting relatives intensified as the slow and dangerous nature of the rescue work became apparent, with huge concrete slabs posing a constant threat to rescuers.\u003c/p\u003e\n\u003cp\u003eNational police chief Gen. Jose Melencio Nartatez Jr. has pledged full support for an ongoing investigation to determine the precise cause of the collapse and identify any potential violations of safety and building regulations. Early findings suggest the building, approved as a nine-story condo-hotel, was constructing a tenth floor for a pool, raising questions about adherence to permits and structural integrity.\u003c/p\u003e\n\u003cp\u003eAngeles City, known as a bustling commercial and tourism hub due to its proximity to the former U.S. Clark Air Base, is now grappling with the aftermath of this disaster. The incident has prompted widespread calls for stricter enforcement of construction standards and accountability to prevent future tragedies. Social sentiment largely reflects support for the victims and rescue teams, coupled with a strong public demand for a thorough investigation into the building's collapse.\u003c/p\u003e\n","title":"Tragedy in Angeles City: Hotel Collapse Claims 25 Lives, Investigation Underway","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-06T08:31:27Z","summary":"A nine-story hotel under construction in Angeles City, Philippines, tragically collapsed, leading to the deaths of at least 25 people. Rescue efforts faced immense challenges as authorities launch an investigation into potential safety and building regulation violations.","tags":["Philippines","Angeles City","Building Collapse","Hotel Collapse","Construction Safety","Disaster","Philippines News","Investigation"],"sources":[{"url":"4 dead, 17 mostly workers still missing, in collapse of unfinished hotel in the Philippines - AP News","title":"4 dead, 17 mostly workers still missing, in collapse of unfinished hotel in the Philippines - AP News"},{"url":"Angeles City building collapse death toll now 25 - MSN","title":"Angeles City building collapse death toll now 25 - MSN"},{"url":"3 dead, 17 mostly workers still missing in collapse of unfinished hotel in Philippines - Las Vegas Sun","title":"3 dead, 17 mostly workers still missing in collapse of unfinished hotel in Philippines - Las Vegas Sun"},{"url":"One dead, 21 feared trapped under rubble after Philippines building collapse - ABC News","title":"One dead, 21 feared trapped under rubble after Philippines building collapse - ABC News"},{"url":"At least three dead and many people missing after major hotel collapse - MSN","title":"At least three dead and many people missing after major hotel collapse - MSN"},{"url":"Angeles City mayor urges cooperation in condo-hotel collapse probe - MSN","title":"Angeles City mayor urges cooperation in condo-hotel collapse probe - MSN"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"tragedy-in-angeles-city-hotel-collapse-claims-25-l"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
