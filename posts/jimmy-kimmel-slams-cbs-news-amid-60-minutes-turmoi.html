urmoil reportedly gripping CBS News. Insiders are buzzing about the uncertain futures of other prominent figures, including Nick Bilton and Bari Weiss, as the network navigates what appears to be a period of significant restructuring and ideological clashes.\u003c/p\u003e\n\u003cp\u003eOn social media, the public reaction has been largely engaged and somewhat polarized. While many express agreement with Kimmel's strong critique and concern over the allegations, others are debating the nuances of the situation, highlighting the sensitivity and political charge surrounding media impartiality in today's climate. This unfolding drama underscores the intense scrutiny under which major news outlets operate and the public's demand for transparency and integrity.\u003c/p\u003e\n","title":"Jimmy Kimmel Slams CBS News Amid '60 Minutes' Turmoil and Pelley's Exit","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-04T08:20:18Z","summary":"Late-night host Jimmy Kimmel has ignited a firestorm, publicly denouncing CBS News as having \"Trump suck-ups\" following the controversial departure of veteran journalist Scott Pelley from \"60 Minutes.\" This accusation comes amidst reports that Pelley believes his termination was a calculated move by Paramount's David Ellison to appease Donald Trump, stirring significant debate and internal unrest within the network.","tags":["Jimmy Kimmel","CBS News","Scott Pelley","60 Minutes","Donald Trump","Media Bias","Journalism","Paramount","David Ellison","News Turmoil"],"sources":[{"url":"https://www.msn.com/en-us/tv/news/jimmy-kimmel-rips-the-trump-suck-ups-at-cbs-news-after-scott-pelleys-60-minutes-termination-video/ar-AA24MZMJ?ocid=BingNewsVerp","title":"Jimmy Kimmel Rips the ‘Trump Suck-Ups’ at CBS News After Scott Pelley’s ’60 Minutes’ Termination"},{"url":"https://www.msn.com/en-us/tv/news/scott-pelley-says-paramounts-david-ellison-is-casting-aside-60-minutes-to-curry-favor-with-trump/ar-AA24H1VB?ocid=BingNewsVerp","title":
