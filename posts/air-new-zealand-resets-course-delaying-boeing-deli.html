<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"air-new-zealand-resets-course-delaying-boeing-deli","contentHtml":"\u003cp\u003eAir New Zealand is charting a new course to navigate current economic headwinds and return to profitability within the next two years. The airline has announced a comprehensive strategic reset, a key component of which involves re-evaluating its fleet expansion plans, specifically the deferral of several Boeing 787 aircraft deliveries.\u003c/p\u003e\n\u003cp\u003eInitially, two Boeing 787s were slated for delivery in fiscal year 2026. However, due to ongoing manufacturing delays from Boeing and a quicker-than-anticipated return of previously grounded aircraft, Air New Zealand has opted to postpone these deliveries. This decision allows the airline to streamline its capital expenditure and align its fleet growth more closely with its strategic objectives.\u003c/p\u003e\n\u003cp\u003eAs part of this significant overhaul, the airline has also appointed Kris Cudmore as its new Chief Financial Officer, signaling a renewed focus on financial discipline. The strategic reset emphasizes aggressive cost reduction initiatives, with a specific target of an additional NZD100 million (approximately USD56.6 million) in annualised cost savings, with benefits expected to begin accruing from the financial year ending June 2027. This, alongside a concerted effort to attract high-value premium tourists, is seen as crucial for bolstering the airline's revenue streams.\u003c/p\u003e\n\u003cp\u003eThe public and industry reaction to Air New Zealand's strategic moves has been largely positive, reflecting an understanding of the challenges faced by airlines in the current global climate. While some discussions and varied opinions exist regarding the long-term implications, the overall sentiment indicates support for the airline's proactive approach to securing its financial future.\u003c/p\u003e\n","title":"Air New Zealand Resets Course: Delaying Boeing Deliveries for Profitability Push","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-02T05:05:04Z","summary":"Air New Zealand is embarking on a strategic overhaul, including delaying Boeing 787 deliveries and targeting NZD100 million in annualised cost savings, as it aims to return to profitability within the next two years.","tags":["Air New Zealand","Boeing 787","airline industry","strategic reset","cost cutting","profitability","aviation","New Zealand news","NZD100 million savings"],"sources":[{"url":"https://www.reuters.com/business/air-new-zealand-names-kris-cudmore-cfo-delays-boeing-787-deliveries-2026-06-29/","title":"Air New Zealand seeks to delay Boeing 787 deliveries, cut costs in strategic reset"},{"url":"https://www.ch-aviation.com/news/168950","title":"Air New Zealand to defer new B787 as grounded units return"},{"url":"https://www.bloomberg.com/news/articles/2026-06-29/air-nz-to-defer-aircraft-deliveries-to-cut-costs-stem-losses","title":"Air NZ to Defer Aircraft Deliveries to Cut Costs, Stem Losses"},{"url":"https://www.msn.com/en-gb/news/other/air-new-zealand-seeks-to-delay-boe_ing-787-deliveries-cut-costs-in-strategic-reset/ar-AA26Rhc5?ocid=BingNewsVerp","title":"Air New Zealand seeks to delay Boeing 787 deliveries, cut costs in strategic reset"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"air-new-zealand-resets-course-delaying-boeing-deli"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
