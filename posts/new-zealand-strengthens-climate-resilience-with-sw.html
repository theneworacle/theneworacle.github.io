<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealand-strengthens-climate-resilience-with-sw","contentHtml":"\u003cp\u003eNew Zealand is making significant strides in its commitment to addressing climate change, announcing comprehensive reforms to its Climate Change Response Act. These strategic amendments are designed to create a more efficient, cost-effective, and robust framework for managing the nation's growing climate risks. Climate Change Minister Simon Watts emphasized that the proposed changes will streamline \"complex and overlapping requirements,\" ensuring the country's climate change framework remains \"practical, efficient and fit for purpose.\"\u003c/p\u003e\n\u003cp\u003eA cornerstone of these reforms is the \u003cstrong\u003eintroduction of mandatory adaptation plans for local councils\u003c/strong\u003e. For the first time, local authorities will be required to develop 30-year adaptation strategies for communities identified as high-risk. These plans will meticulously outline staged actions and necessary investments to effectively manage climate-related natural hazards over the long term. This forward-thinking approach is expected to provide communities with greater clarity, mitigate risks proactively, and ultimately prevent higher costs down the line. Minister Watts highlighted that this measure will also foster greater consistency in climate adaptation efforts nationwide.\u003c/p\u003e\n\u003cp\u003eFurther enhancements are being made to the \u003cstrong\u003eNew Zealand Emissions Trading Scheme (ETS)\u003c/strong\u003e. The reforms include stronger governance of the secondary market, aimed at boosting transparency and integrity within the scheme. Additionally, the amendments seek to remove disincentives for decarbonization and establish clear pathways for the inclusion of carbon removals or new emissions sources into the trading scheme, with agriculture being the sole exclusion.\u003c/p\u003e\n\u003cp\u003eThese reforms underscore New Zealand's dedication to achieving its climate targets and fostering a more resilient future. The initial social sentiment surrounding these reforms has been largely positive, reflecting a broad understanding of the urgency and necessity of these changes, though some debate naturally accompanies such significant policy shifts.\u003c/p\u003e\n","title":"New Zealand Strengthens Climate Resilience with Sweeping Reforms to Climate Change Act","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-15T10:57:05Z","summary":"New Zealand is taking decisive action to combat climate change, implementing targeted reforms to its Climate Change Response Act. These changes aim to enhance efficiency, reduce costs, and fortify the nation's ability to manage escalating climate risks, introducing mandatory adaptation plans for local councils and strengthening its Emissions Trading Scheme.","tags":["New Zealand","Climate Change","Climate Change Response Act","Climate Resilience","Adaptation Plans","Emissions Trading Scheme","ETS","Decarbonization","Climate Risks","Simon Watts"],"sources":[{"url":"https://www.thestar.com.my/aseanplus/aseanplus-news/2026/07/15/new-zealand-reforms-climate-change-act-to-improve-risk-planning","title":"New Zealand reforms climate change act to improve risk planning"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealand-strengthens-climate-resilience-with-sw"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
