. Iran, however, fought back, with Ramin Rezaeian leveling the score before halftime.\u003c/p\u003e\n\u003cp\u003eUndeterred, New Zealand regained the lead in the 54th minute. Sarpreet Singh's incisive pass found Just, who, after another neat one-two with Wood, powered his second goal into the net. Yet, Iran, demonstrating resilience, equalized once more through Mohammed Mohebi's brilliant header, ensuring the spoils were shared.\u003c/p\u003e\n\u003cp\u003eBeyond the pitch, the encounter was shrouded in a challenging political backdrop. The match was reportedly overshadowed by protests outside the Los Angeles Stadium against FIFA's banning of the pre-revolutionary Iranian flag, adding another layer of complexity to an already high-stakes game for the Iranian side.\u003c/p\u003e\n\u003cp\u003eNew Zealand's performance has resonated positively, with social media sentiment largely praising Elijah Just's breakthrough and the team's gritty display. Despite the external pressures and their underdog status, both teams delivered an entertaining contest, with the result leaving all four nations in Group G level on one point as they look ahead to crucial upcoming fixtures. This draw serves as a powerful statement that New Zealand belongs on the World Cup stage, capable of challenging formidable opponents.\u003c/p\u003e\n","title":"Elijah Just's Historic Brace Secures Gritty World Cup Draw for New Zealand Against Politically Charged Iran","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-16T14:17:38Z","summary":"Motherwell star Elijah Just made history by scoring two goals for New Zealand in a thrilling 2-2 draw against Iran at the FIFA World Cup 2026. Despite being the lowest-ranked team, New Zealand's resilient performance against a backdrop of political protests showcased their determination on the global stage.","tags":["Football","World Cup","New Zealand","Iran","Elijah Just","Soccer","FIFA World Cup 2026","Sports"],"sources":[{"url":"https://www.msn.com/en-gb/sport/football/motherwell-star-scores-brace-in-iran-new-zealand-draw-but-protests-overshadow-world-cup-match/ar-AA25KQxk?ocid=BingNewsVerp","title":"Motherwell star scores brace in Iran, New Zealand draw but protests overshadow World Cup match"},{"url":"https://www.khou.com/article/syndication/associatedpress/elijah-justs-2-goal-world-cup-breakthrough-lifts-new-zealand-to-a-gritty-2-2-draw/616-f23b76a7-6686-4463-9d96-5bcead2729ba","title":"Elijah Just’s 2-goal World Cup breakthrough lifts New Zealand to a gritty 2-2 draw"},{"url":"https://sports.yahoo.com/articles/iran-2-2-zealand-just-031000580.html","title":"Iran 2-2 New Zealand: Just’s brace cancelled out in entertaining contest"},{"url":"https://www.msn.com/en-in/news/other/iran-vs-new-zealand-highlights-fifa-world-cup-2026-irn-vs-nzl-match-iran-begin-politically-charged-campaign-with-2-2-draw-vs-nz/ar-AA25Js6s?ocid=BingNewsVerp","title":"Iran vs New Zealand highlights | FIFA World Cup 2026 IRN vs NZL match: Iran begin 'politically charged' campaign with 2-2 draw vs NZ"},{"url":"https://www.msn.com/en-in/sports/fifa_world_cup/iran-rally-twice-to-hold-new-zealand-2-2-in-fifa-world-cup-2026-group-g-opener/ar-AA25LLrK?ocid=BingNewsVerp","title":"Iran rally twice to hold New Zealand 2-2 in FIFA World Cup 2026 Group G opener"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"elijah-justs-historic-brace-secures-gritty-world-c"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
