, their determination to play through pain highlights their commitment to the team.\u003c/p\u003e\n\u003cp\u003eTheir presence on the court is vital for San Antonio's offensive flow and playmaking capabilities, especially against a formidable opponent like the Thunder. The initial social sentiment surrounding this news has been largely positive, reflecting the relief and excitement among fans and commentators alike. While there might be ongoing discussions about the long-term implications of playing injured, the immediate focus is on their availability for Game 4.\u003c/p\u003e\n\u003cp\u003eThis development could significantly impact the dynamics of the upcoming game, providing the Spurs with their full arsenal as they aim to even the series. Fans will be eager to see how Fox and Harper perform and contribute to what promises to be an intense showdown.\u003c/p\u003e\n","title":"Spurs Get Crucial Injury Boost: Fox and Harper Expected for Game 4","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-24T17:00:34Z","summary":"San Antonio Spurs fans can breathe a sigh of relief as key players De'Aaron Fox and Dylan Harper are both expected to play in the crucial Game 4 against the Oklahoma City Thunder, despite recent injury concerns.","tags":["NBA","San Antonio Spurs","De'Aaron Fox","Dylan Harper","Basketball","NBA Playoffs","Injury Update"],"sources":[{"url":"https://clutchpoints.com/nba/san-antonio-spurs/spurs-news-deaaron-fox-dylan-harper-game-4-injury-status-thunder","title":"Are Spurs' De'Aaron Fox, Dylan Harper on Game 4 injury report vs. Thunder?"},{"url":"https://sports.yahoo.com/articles/spurs-big-aaron-fox-dylan-194744103.html","title":"Spurs Get Big De’Aaron Fox, Dylan Harper News Before Game 4"},{"url":"https://heavy.com/sports/nba/san-antonio-spurs/spurs-deaaron-fox-dylan-harper-injury-update-thunder/","title":"Spurs Get Major De’Aaron Fox, Dylan Harper Injury News For Game 4 Vs Thunder"},{"url":"https://www.expressnews.com/sports/spurs/article/mitch-johnson-reveals-spurs-plans-fox-harper-22273738.php","title":"Mitch Johnson reveals Spurs' plans for De'Aaron Fox, Dylan Harper for Game 4"},{"url":"https://www.si.com/nba/spurs/onsi/spurs-optimistic-that-de-aaron-fox-dylan-harper-will-play-in-game-4-against-thunder","title":"Spurs Optimistic That De'Aaron Fox, Dylan Harper Will Play in Game 4 Against Thunder"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"spurs-get-crucial-injury-boost-fox-and-harper-expe"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
