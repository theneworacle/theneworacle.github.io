<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealand-women-fight-back-to-post-competitive-t","contentHtml":"\u003cp\u003eIn a crucial Group 2 encounter at the Women's T20 World Cup in Southampton, New Zealand's White Ferns demonstrated resilience to post a competitive total of 140 for 6 against Ireland. After Ireland won the toss and elected to bowl, New Zealand faced an early onslaught, losing Plimmer, Gaze, and Green within the first four overs, putting them on the back foot.\u003c/p\u003e\n\u003cp\u003eHowever, the White Ferns steadied their innings thanks to a vital partnership between Brooke Halliday (34 runs) and Izzy Sharp (36 runs). Halliday, though initially struggling for fluency on a pitch described as slower than expected, played an important role in rebuilding the innings. Sharp, on the other hand, showed intent and looked to accelerate, striking crucial boundaries.\u003c/p\u003e\n\u003cp\u003eIreland's bowling attack was disciplined throughout, with Orla Prendergast and Cara Murray particularly effective. The Irish spinners proved tricky to get away, offering little pace on the ball. Despite a dropped catch off Izzy Sharp, Ireland continued to apply pressure.\u003c/p\u003e\n\u003cp\u003eHalliday's dismissal at 110-5 brought Suzie Bates to the crease. Bates then provided a late flourish, including a six off the final ball of the innings, pushing New Zealand to a respectable 140 for 6 from their allotted 20 overs. Ireland will now need 141 runs to secure their first win of the tournament, with both teams having lost their opening two games.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment surrounding the New Zealand Women's T20 World Cup campaign has been largely positive, with some debate, reflecting the team's fighting spirit in this key fixture.\u003c/p\u003e\n","title":"New Zealand Women Fight Back to Post Competitive Total Against Ireland in T20 World Cup Clash","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-19T19:01:45Z","summary":"Despite a rocky start, New Zealand Women's cricket team recovered to set a challenging target of 141 for Ireland in their Group 2 T20 World Cup match. Key partnerships and disciplined batting helped the White Ferns overcome early wickets.","tags":["Cricket","Women's T20 World Cup","New Zealand","Ireland","Sports"],"sources":[{"url":"https://www.bbc.co.uk/sport/cricket/live/cwy382ww9ndt","title":"Women's T20 World Cup: New Zealand recover to post 140-6 against Ireland"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealand-women-fight-back-to-post-competitive-t"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
