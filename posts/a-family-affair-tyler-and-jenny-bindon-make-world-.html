 stage.\u003c/p\u003e\n\u003cp\u003eThe news of their unprecedented achievement has resonated widely, garnering mostly positive reactions across social media platforms. Fans and commentators alike have celebrated this unique bond and the inspiring journey of a family dedicated to the sport. While some discussions and debates may arise, the overriding sentiment is one of admiration for this extraordinary mother-son pairing. Their story serves as a powerful reminder of the enduring spirit of sport and the ties that bind us, both on and off the field.\u003c/p\u003e\n","title":"A Family Affair: Tyler and Jenny Bindon Make World Cup History for New Zealand","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-18T12:31:54Z","summary":"New Zealand's Tyler Bindon and his mother Jenny have achieved a remarkable feat, becoming the first mother-son duo to play in the World Cup. This heartwarming story unfolded as Tyler debuted against Iran, sparking widespread positive sentiment.","tags":["New Zealand","World Cup","Tyler Bindon","Jenny Bindon","Football","Soccer","Sports History","Family in Sport"],"sources":[{"url":"New Zealand's Tyler Bindon and mom Jenny are the first mother-son duo to play in the World Cup","title":"New Zealand's Tyler Bindon and mom Jenny are the first mother-son duo to play in the World Cup"},{"url":"New Zealand's Tyler Bindon and mom Jenny are the first mother-son duo to play in the World Cup","title":"New Zealand's Tyler Bindon and mom Jenny are the first mother-son duo to play in the World Cup"},{"url":"5 storylines to follow 5 days into the World Cup","title":"5 storylines to follow 5 days into the World Cup"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-family-affair-tyler-and-jenny-bindon-make-world-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
