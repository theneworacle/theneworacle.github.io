<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"remembering-troy-hamster-hirst-a-kiwi-surfing-lege","contentHtml":"\u003cp\u003eThe surfing world is reeling from the sudden loss of Troy Hirst, a beloved and highly influential Kiwi surfing star who passed away recently in Indonesia. Affectionately known as \"Hamster\" to his countless friends and fellow surfers, Hirst had made Indonesia his home for over a decade, living there with his family.\u003c/p\u003e\n\u003cp\u003eTroy Hirst's impact on the New Zealand surfing scene was immense. A true prodigy, he etched his name into the sport's history books in 1993, becoming the youngest ever winner of the New Zealand Open Men’s Division at a mere 17 years old. His talent and fearless approach in the water were legendary, particularly his mastery of heavy, barrelling waves at iconic spots like Lakey Peak – a place he considered his spiritual home. Friends and peers consistently recall his \"larger-than-life presence\" and his unwavering drive to push the boundaries of the sport.\u003c/p\u003e\n\u003cp\u003eBeyond the competitive circuit, Hirst dedicated over two decades to the craft of surfboard shaping. His expertise and passion for the sport shone through in every board he shaped, as he generously shared his vast knowledge with aspiring surfers. He was a foundational figure in Auckland’s West Coast surfing community and a proud founding member of the Māori Bay Board Riders Club.\u003c/p\u003e\n\u003cp\u003eTributes have poured in from both New Zealand and Indonesia, painting a picture of a man deeply cherished by those around him. The Māori Bay Board Riders Club, in a heartfelt tribute, spoke of Troy's \"indelible mark\" on the Muriwai community and surfing globally. They highlighted how he \"influenced many of the up-and-coming groms at the Bay back in the day who looked up to him as he pushed the bar constantly and pushed them to become better surfers.\"\u003c/p\u003e\n\u003cp\u003eWhile his competitive achievements were significant, the club, along with his family and friends, emphasized that Troy's greatest legacy was his role as a loving son, brother, father, husband, and a truly great friend to many. He leaves behind his parents Paula and Richard, siblings Brodie, Ryan, and Cooper, his wife Yuni, and his children Westen and Mikayla.\u003c/p\u003e\n\u003cp\u003eThe outpouring of grief and warm remembrances across social media reflects the profound positive impact Troy Hirst had on countless lives. His spirit, his talent, and his unwavering passion for the ocean will be deeply missed but never forgotten.\u003c/p\u003e\n","title":"Remembering Troy 'Hamster' Hirst: A Kiwi Surfing Legend Leaves an Indelible Mark","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-09T22:29:30Z","summary":"New Zealand and Indonesia's surfing communities are mourning the sudden passing of Troy Hirst, affectionately known as 'Hamster.' A formidable talent who became the youngest winner of the NZ Open Men's Division, Hirst's legacy extends beyond his competitive triumphs to his dedication as a surfboard shaper and his profound impact as a friend, father, and community pillar.","tags":["New Zealand","Surfing","Troy Hirst","Obituary","Surf Legend","Kiwi","Indonesia","Māori Bay","Muriwai"],"sources":[{"url":"https://www.indianweekender.co.nz/news/kiwi-surfing-star-troy-hirst-passes-away-in-indonesia","title":"Kiwi surfing star Troy Hirst passes away in Indonesia"},{"url":"https://www.nzherald.co.nz/sport/kiwi-surfing-great-troy-hirst-mourned-by-muriwai-and-maori-bay-communities/P4JQJBQFTND55L5BTTKRZZ4R4E/","title":"Kiwi surfing great Troy Hirst mourned by Muriwai and Māori Bay communities"},{"url":"https://www.msn.com/en-us/sports/surf/kiwi-surf-star-troy-hirst-mourned-across-new-zealand-and-indonesia/ar-AA25cuga","title":"Kiwi Surf Star Troy Hirst Mourned Across New Zealand and Indonesia"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"remembering-troy-hamster-hirst-a-kiwi-surfing-lege"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
