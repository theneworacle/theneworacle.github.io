ir and Robinson has generated a largely positive response across social media platforms, though, as with any selection, a degree of debate is also present among the cricketing fraternity. This opening Test promises to be a thrilling start to what is expected to be a fiercely contested series between two strong cricketing nations. All eyes will be on Lord's as England looks to make a strong start against the formidable New Zealand side.\u003c/p\u003e\n","title":"England Recalls Bashir, Robinson for New Zealand Test Series Opener","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-03T06:10:42Z","summary":"England has announced its 12-player squad for the first Test against New Zealand, featuring the recall of Shoaib Bashir and Ollie Robinson, alongside potential debutants Emilio Gay and Sonny Baker. The highly anticipated series kicks off on June 4th at Lord's.","tags":["England Cricket","New Zealand Cricket","Test Series","Shoaib Bashir","Ollie Robinson","Emilio Gay","Sonny Baker","Lord's","ECB","Cricket News","Sports"],"sources":[{"url":"https://www.newsbytesapp.com/news/sports/england-announce-squad-for-1st-test-against-new-zealand/story","title":"England announce XII for Lord's Test against NZ; two debutants"},{"url":"https://www.indiatvnews.com/sports/cricket/england-name-xii-for-lord-s-test-against-new-zealand-emilio-gay-set-to-make-test-debut-2026-06-02-1043403","title":"England name XII for Lord's Test against New Zealand, Emilio Gay set to make Test debut"},{"url":"https://www.sportsmole.co.uk/cricket/preview/first-test-england-vs-new-zealand-prediction-squads-start-time_598553.html","title":"Preview: England vs. New Zealand - First Test prediction, squads, start time, Lord's pitch lowdown"},{"url":"https://www.msn.com/en-us/sports/other/england-announce-12-man-squad-for-first-test-vs-new-zealand-shoaib-bashir-and-ollie-robinson-recalled/ar-AA24FncA","title":"England announce 12-man squad for first test vs New Zealand, Shoaib Bashir a
