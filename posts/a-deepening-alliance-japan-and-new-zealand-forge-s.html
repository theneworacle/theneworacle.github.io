<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"a-deepening-alliance-japan-and-new-zealand-forge-s","contentHtml":"\u003cp\u003eIn an era of shifting global power dynamics and escalating conflicts, the need for international cooperation in safeguarding peace and stability has never been more critical. At the forefront of this effort in the Indo-Pacific region, Japan and New Zealand are forging a robust and increasingly integrated defence partnership. This collaboration, celebrating the 10th anniversary of Japan’s \"Free and Open Indo-Pacific (FOIP)\" vision, underscores their commitment as Strategic Cooperative Partners to a rules-based international order.\u003c/p\u003e\n\u003cp\u003eThe strengthening of ties is cemented by significant formal agreements. This March saw the implementation of a bilateral Information Security Agreement, establishing a legal framework for the secure exchange of classified information. Complementing this, the Acquisition and Cross-Servicing Agreement (ACSA) has been signed and submitted to the Japanese Diet, outlining procedures for logistical support during joint operations between the Japan Self-Defence Forces and the New Zealand Defence Force. These foundational agreements pave the way for seamless cooperation in complex security environments.\u003c/p\u003e\n\u003cp\u003eBeyond legal frameworks, both nations are actively \"walking the talk.\" New Zealand's Royal Navy and Air Force are playing a vital role through monitoring and surveillance activities supporting UN Security Council sanctions against North Korea. This operational collaboration is further highlighted by recent port calls in Wellington by Japanese frigates, including the JS Kumano, JS Ise, and JS Suzunami. Such visits demonstrate a tangible commitment to shared regional security responsibilities and enhanced interoperability.\u003c/p\u003e\n\u003cp\u003eA pivotal development in this partnership is Japan's recent revision of its defence equipment and technology transfer system. Enacted on April 21st, this update allows Japan to export defence equipment and technology to partner countries, provided their use aligns with the UN Charter. This strategic shift aims to enhance global and regional peace and stability by enabling partners to better defend themselves. New Zealand has welcomed this, notably by actively considering the Mogami-class frigate as a potential replacement for its Anzac frigates—a clear sign of deepening trust and alignment in future defence capabilities.\u003c/p\u003e\n\u003cp\u003eThe scope of this cooperation extends to broader regional security, with a strong emphasis on trilateral coordination. Japan, New Zealand, and Australia are committed to increasing interoperability and coordination to maintain peace and stability in the Indo-Pacific. The recent voyage of the JS Kumano, which symbolically stopped in Australia before reaching New Zealand, underscores this shared strategic path and the interconnectedness of their security interests. As Makoto Osawa, the Ambassador of Japan to New Zealand, emphasized, international partnerships are indispensable for safeguarding peace and stability in our dynamic global environment.\u003c/p\u003e\n\u003cp\u003eThe deepening defence ties between Japan and New Zealand represent a significant step towards a more resilient and prosperous Indo-Pacific. While social media sentiment largely reflects a positive reception to this enhanced cooperation, ongoing discussions highlight the thoughtful consideration of its implications for regional dynamics. This evolving partnership stands as a testament to the power of shared values and collective action in navigating the complexities of 21st-century security.\u003c/p\u003e\n","title":"A Deepening Alliance: Japan and New Zealand Forge Stronger Defence Ties in the Indo-Pacific","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-18T05:12:25Z","summary":"Amidst increasing global instability, Japan and New Zealand are significantly enhancing their defence and security cooperation, driven by Japan's \"Free and Open Indo-Pacific\" vision. This strategic alignment, marked by new agreements, joint operations, and defence technology transfers, aims to bolster regional peace and stability.","tags":["Japan","New Zealand","Defence","Security","Indo-Pacific","FOIP","International Relations","Military Cooperation","Geopolitics","UN"],"sources":[{"url":"https://www.nzherald.co.nz/nz/a-shared-security-path-how-japan-and-new-zealand-are-deepening-defence-ties-makoto-osawa/premium/3AKXZJSLDVB5BMANLKDQDRQL5Y/","title":"A shared security path: How Japan and New Zealand are deepening defence ties - Makoto Osawa"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-deepening-alliance-japan-and-new-zealand-forge-s"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
