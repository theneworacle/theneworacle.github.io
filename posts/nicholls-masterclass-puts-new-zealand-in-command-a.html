<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"nicholls-masterclass-puts-new-zealand-in-command-a","contentHtml":"\u003cp\u003eNew Zealand has seized firm control of the second Test against England at The Oval, thanks to a remarkable display of batting prowess from Henry Nicholls and a stellar bowling performance by Matt Henry. At the close of day three, the Black Caps hold a formidable 352-run lead with seven wickets still in hand, leaving England facing an uphill battle.\u003c/p\u003e\n\u003cp\u003eThe day belonged to Henry Nicholls, whose unbeaten 119 runs off 136 balls anchored New Zealand's second innings. Coming in at a crucial juncture, Nicholls built vital partnerships, most notably with Rachin Ravindra, who contributed a valuable 76. Both batsmen were fortunate to receive lifelines earlier in their innings, having been dropped by England's Rew, chances that England would come to rue dearly.\u003c/p\u003e\n\u003cp\u003eEarlier in the match, New Zealand's bowlers set the tone by dismissing England for 291 in their first innings. The standout performer was Matt Henry, who tore through the English lineup with an impressive five-wicket haul for just 30 runs, laying the foundation for his team's dominance.\u003c/p\u003e\n\u003cp\u003eCommentators widely agree that the game has swung decisively in New Zealand's favour. Jonathan Agnew, BBC Chief Cricket Commentator, stated, \"It's New Zealand's game isn't it? England are going to have bat exceptionally well.\" Nicholls himself expressed his satisfaction at being back in Test cricket and contributing, particularly after stepping in to replace the absent Kane Williamson. He highlighted the strength of New Zealand's domestic cricket, which he believes prepares players for the international stage. Looking ahead, Nicholls anticipates a challenging day four, suggesting that the pitch, especially after the heavy roller, might offer variable bounce, potentially benefiting seamers if the hot weather persists.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment has been largely positive, reflecting the excitement around Nicholls' century and New Zealand's strong position, alongside discussions about England's struggles to contain the Black Caps. With such a substantial lead, New Zealand will be looking to consolidate further and put the match beyond England's reach on day four, aiming to square the three-test series.\u003c/p\u003e\n","title":"Nicholls' Masterclass Puts New Zealand in Command Against England at The Oval","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-20T15:07:52Z","summary":"Henry Nicholls' magnificent unbeaten century and Matt Henry's impactful five-wicket haul have propelled New Zealand to a commanding 352-run lead over England on day three of the second Test at The Oval. The Black Caps are now firmly in the driver's seat, leaving England with a daunting task ahead.","tags":["Cricket","New Zealand Cricket","England Cricket","Test Cricket","Henry Nicholls","The Oval","Sports News","Matt Henry"],"sources":[{"url":"https://www.msn.com/en-gb/sport/cricket/cricket-new-zealand-punish-england-as-nicholls-century-builds-huge-lead/ar-AA265CQL?ocid=BingNewsVerp","title":"Cricket-New Zealand punish England as Nicholls century builds huge lead - MSN"},{"url":"https://www.msn.com/en-ie/sports/general/matt-henry-s-five-for-and-henry-nicholls-blazing-century-put-new-zealand-firmly-in-control-on-day-3-of-the-second-test/ar-AA267qGK?ocid=BingNewsVerp","title":"Matt Henry’s five-for and Henry Nicholls’ blazing century put New Zealand firmly in control on day 3 of the second test - MSN"},{"url":"https://www.bbc.com/sport/cricket/live/cqj84998rvpt","title":"NZ in total control of second Test after England toil - reaction - BBC Sport"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"nicholls-masterclass-puts-new-zealand-in-command-a"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
