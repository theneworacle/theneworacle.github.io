<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"texas-softball-lands-top-transfer-catcher-samantha","contentHtml":"\u003cp\u003eThe Texas Longhorn softball program, fresh off back-to-back national championships, is wasting no time gearing up for an unprecedented three-peat. In a significant move signaling their championship aspirations, the Longhorns have landed Arizona State Sun Devils transfer Samantha Swan, widely regarded as the top catcher in the transfer portal.\u003c/p\u003e\n\u003cp\u003eSwan, a native of Georgetown, Texas, announced her commitment on social media, marking a homecoming for the talented player. After three impressive seasons at Arizona State, Swan will bring one year of eligibility to the Longhorns, providing a crucial experienced presence behind the plate. This acquisition is particularly impactful given the expiring eligibility of former star Reese Atwood.\u003c/p\u003e\n\u003cp\u003eSwan's junior season was nothing short of a breakout performance. She posted a stellar .383 batting average, crushing 12 home runs and 21 doubles, while driving in 55 runs. Her .700 slugging percentage and .450 on-base percentage highlight her offensive prowess, earning her a spot on the All-Big 12 First Team and two conference player of the week honors. She even demonstrated her capabilities against her new team, going 4-10 with a home run and 5 RBI when Arizona State faced Texas in the Austin Super Regional.\u003c/p\u003e\n\u003cp\u003eBeyond her offensive firepower, Swan's defensive skills are equally impressive. In 155 career games, including 141 starts, she boasts a .984 fielding percentage with only 14 errors and 19 passed balls. Her versatility also extends to the outfield, offering Texas valuable lineup flexibility. Softball America ranks Swan as the No. 9 overall player and the No. 1 catcher in the transfer portal, underscoring the magnitude of this commitment.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment surrounding Swan's move is predominantly positive, with fans and analysts alike recognizing the impact she's expected to have on the Longhorns' pursuit of another national title. With Samantha Swan joining the roster, Texas softball is poised to continue its dominance and make a strong push for a historic three-peat.\u003c/p\u003e\n","title":"Texas Softball Lands Top Transfer Catcher Samantha Swan in Pursuit of Three-Peat","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-10T21:59:12Z","summary":"The reigning back-to-back national champions, the Texas Longhorn softball program, have made a major move in their quest for a third consecutive title, securing the commitment of top transfer catcher Samantha Swan from Arizona State.","tags":["Texas Softball","Samantha Swan","NCAA Softball","College Sports","Transfer Portal","National Championship","Longhorns"],"sources":[{"url":"https://sports.yahoo.com/articles/top-transfer-catcher-commits-texas-183516835.html","title":"Top transfer catcher commits to Texas softball"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"texas-softball-lands-top-transfer-catcher-samantha"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
