<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealand-dominates-lost-and-found-gravel-ryan-a","contentHtml":"\u003cp\u003eThe gravel racing world recently witnessed a remarkable display of talent from New Zealand as Ruby Ryan and Matthew Wilson clinched both the women's and men's titles at the Lost and Found Gravel race, part of the prestigious Gravel Earth Series.\u003c/p\u003e\n\u003cp\u003eHeld in Portola, California, the event saw Matthew Wilson (Scott Sports USA) ride to a commanding solo victory in the men's race. This win marks a spectacular run for Wilson, being his second triumph in as many weeks, following a memorable criterium victory at Tulsa Tough where he impressively adapted his gravel bike for road racing.\u003c/p\u003e\n\u003cp\u003eIn the women's category, Ruby Ryan, a mountain biker and participant in the Life Time Grand Prix series, secured her win in a thrilling two-way sprint finish. Ryan battled fiercely with her compatriot, Samara Sheppard, for much of the day, showcasing the depth of New Zealand's talent in gravel racing. \"I rode most of the day with my fellow kiwi Samara Sheppard, who finished second,\" Ryan commented. \"We got away at mile 66, and then we were just rotating. It was great to be with her at the end, and it came down to a sprint finish. I think that was my first sprint win, so I'm happy.\"\u003c/p\u003e\n\u003cp\u003eThis 'Kiwi sweep' at Lost and Found Gravel has generated significant buzz, with social media sentiment largely positive, celebrating the riders' exceptional achievements. The duo's success underscores New Zealand's growing presence and formidable skill in the international gravel racing scene, proving that their road trip after Unbound was well worth the effort.\u003c/p\u003e\n","title":"New Zealand Dominates Lost and Found Gravel: Ryan and Wilson Lead Kiwi Sweep","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-21T06:09:43Z","summary":"Kiwi riders Ruby Ryan and Matthew Wilson delivered a stunning performance at the Lost and Found Gravel race, securing a double victory for New Zealand in the demanding Gravel Earth Series.","tags":["Gravel Racing","New Zealand","Lost and Found Gravel","Gravel Earth Series","Ruby Ryan","Matthew Wilson","Cycling"],"sources":[{"url":"https://www.cyclingnews.com/pro-cycling/racing/gravel-earth-series-new-zealand-sweep-of-lost-and-found-gravel-as-ruby-ryan-and-matthew-wilson-clinch-victory/","title":"Gravel Earth Series: New Zealand sweep of Lost and Found Gravel as Ruby Ryan and Matthew Wilson clinch victory"},{"url":"https://www.msn.com/en-gb/sport/other/matthew-wilson-took-his-unbound-gravel-bike-to-the-top-of-a-criterium-podium-at-tulsa-tough/ar-AA25bOCG","title":"Matthew Wilson took his Unbound gravel bike to the top of a criterium podium at Tulsa Tough"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealand-dominates-lost-and-found-gravel-ryan-a"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
