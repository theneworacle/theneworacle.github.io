<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"us-and-iran-agree-to-tentative-60-day-truce-extens","contentHtml":"\u003cp\u003eThe United States and Iran have reportedly reached a tentative agreement for a 60-day extension of their current ceasefire, a move that would also pave the way for further negotiations regarding Iran's controversial nuclear program. This critical deal, however, hinges on the final approval of President Donald Trump.\u003c/p\u003e\n\u003cp\u003eThe agreement emerges from a period marked by heightened military actions and rhetoric. Recent weeks saw the US engage in what it described as 'self-defense strikes' against Iranian targets in the Strait of Hormuz, prompted by allegations of mine-laying and a missile targeting US warplanes. Concurrently, US forces intercepted Iranian drones, while Iran launched a ballistic missile at Kuwait, which was successfully intercepted.\u003c/p\u003e\n\u003cp\u003ePresident Trump has voiced a degree of discontent with the ongoing discussions, characterizing Iran as 'negotiating on fumes.' He has consistently reiterated the unwavering US stance that Iran must not possess nuclear weapons, warning that if an agreeable resolution isn't met, the US 'will have to just finish the job.'\u003c/p\u003e\n\u003cp\u003eOn the Iranian side, officials have clearly articulated their 'red lines.' Ebrahim Azizi, the head of the Iranian parliament’s national security committee, highlighted Iran's non-negotiable rights, including the right to enrich uranium, maintain enriched uranium stockpiles, control the strategically vital Strait of Hormuz, and demand the lifting of existing sanctions. Azizi views Trump's fluctuating threats and appeals for an agreement as an attempt to navigate a 'strategic deadlock.'\u003c/p\u003e\n\u003cp\u003eThe prospect of a truce extension and renewed talks has been met with a simulated 'mostly positive' social sentiment, though public discourse also reflects 'some debate' on the implications of this complex diplomatic endeavor.\u003c/p\u003e\n","title":"US and Iran Agree to Tentative 60-Day Truce Extension, Nuclear Talks on the Horizon","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-13T17:21:48Z","summary":"A significant development in US-Iran relations sees a preliminary agreement for a 60-day ceasefire extension and the initiation of nuclear program discussions, though President Trump's final approval remains the pivotal next step amidst lingering tensions.","tags":["US-Iran Relations","Ceasefire","Nuclear Program","Donald Trump","Middle East Diplomacy","International Relations","Strait of Hormuz"],"sources":[{"url":"https://www.msn.com/en-us/news/world/us-iran-agree-to-60-day-truce-renewal-pending-trump-signoff/ar-AA24haBs","title":"US, Iran agree to 60-day truce renewal pending Trump signoff"},{"url":"https://www.foxnews.com/politics/us-iran-reach-ceasefire-extension-pending-trumps-final-approval","title":"US and Iran reach ceasefire extension deal pending Trump's final approval"},{"url":"https://www.rigzone.com/news/wire/iran_us_tentatively_agree_to_renew_truce_for_60_days-29-may-2026-183804-article/","title":"Iran, US Tentatively Agree to Renew Truce for 60 Days"},{"url":"https://www.msn.com/en-us/news/world/us-iran-mou-on-60-day-ceasefire-extension-reached-but-trump-must-approve-sources-say/ar-AA24ivlo?ocid=BingNewsVerp","title":"US-Iran MOU on 60-day ceasefire extension reached, but Trump must approve, sources say"},{"url":"https://www.msn.com/en-ph/politics/government/us-iran-near-deal-but-trump-sign-off_awaited/ar-AA24jtFZ?ocid=BingNewsVerp","title":"US, Iran near deal but Trump sign-off awaited"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"us-and-iran-agree-to-tentative-60-day-truce-extens"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
