d for the 2027 World Cup. The selectors are expected to make big calls regarding the future involvement of experienced players like Kohli, Sharma, and Ravindra Jadeja. Virat Kohli himself has addressed the possibility of playing in the 2027 World Cup, stating that his participation hinges on whether he feels he can still 'prove his worth' – a sentiment that resonates with fans eager to see their idol continue to dominate.\u003c/p\u003e\n\u003cp\u003eSocial media has been a hive of activity, reflecting a largely positive sentiment around the topic. Fans are engaging in lively debates and expressing their anticipation, highlighting the immense interest and emotional investment in the careers of these cricketing stalwarts. As the New Zealand tour approaches, all eyes will be on Kohli and Sharma, watching to see if this series will indeed be their final, decisive mission on the road to the 2027 World Cup.\u003c/p\u003e\n","title":"Will India's Tour of New Zealand Be Kohli and Sharma's Road to the 2027 World Cup?","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-03T20:22:16Z","summary":"A historic 12-match tour in New Zealand could be the defining moment for cricket legends Virat Kohli and Rohit Sharma as they eye the 2027 World Cup, sparking anticipation and debate among fans.","tags":["Cricket","India","New Zealand","Virat Kohli","Rohit Sharma","2027 World Cup","Sports News"],"sources":[{"url":"https://www.msn.com/en-in/news/other/kohli-sharma-set-for-possible-final-new-zealand-tour-before-2027-world-cup/gm-GM3F342E84?ocid=BingNewsVerp","title":"India to play historic 12-match tour in New Zealand (MSN)"},{"url":"https://www.msn.com/en-in/sports/cricket/ind-vs-nz-full-schedule-2026-check-india-vs-new-zealand-t20-odi-test-start-date-india-time-venue-live-all-you-need-to-know/ar-AA24Is89?ocid=BingNewsVerp","title":"IND vs NZ full schedule 2026: Check India vs New Zealand T20, ODI, Test start date, India time, venue, live all you need to know (MS
