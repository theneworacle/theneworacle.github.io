out, including a debut for Liverpool's 17-year-old winger Rio Ngumoha in the second half.\u003c/p\u003e\n\u003cp\u003eConcerns were also raised about the newly-laid pitch at Raymond James Stadium, described by commentators like Ian Wright as \"very uneven and very dry,\" which undoubtedly affected the spectacle. Despite the less-than-ideal playing surface and the taxing heat, England emerged without injuries, a crucial outcome ahead of the main tournament.\u003c/p\u003e\n\u003cp\u003eTuchel used the friendly as an opportunity to assess various player combinations and formations. The left-back position saw Djed Spence impress in the first half with his attacking runs and assist for Kane's goal, while Tino Livramento took up the role in the second. The battle for the left-wing spot also continued, with Marcus Rashford and Anthony Gordon both getting minutes to stake their claim.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment regarding the match was largely positive, albeit with some debate surrounding the overall performance and the conditions. While not a dominant display, the victory provides England with winning momentum and invaluable experience in handling the anticipated climate challenges, giving Tuchel plenty to ponder as the Three Lions fine-tune their strategy for the World Cup.\u003c/p\u003e\n","title":"England Edge New Zealand in Scorching World Cup Warm-Up: Kane's Header and Tuchel's Tactical Tweaks","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-07T05:29:53Z","summary":"England secured a narrow 1-0 victory over New Zealand in a challenging World Cup warm-up friendly in Tampa, Florida. Harry Kane's decisive header proved the difference in a match heavily impacted by scorching 33-degree Celsius heat and a bobbly pitch, allowing manager Thomas Tuchel to experiment with his squad.","tags":["England","New Zealand","Football","World Cup","Harry Kane","Thomas Tuchel","Friendly","Soccer","Tampa","Florida","Heat","Warm-up","Djed S
