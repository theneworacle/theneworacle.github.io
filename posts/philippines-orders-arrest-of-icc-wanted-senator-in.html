<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-orders-arrest-of-icc-wanted-senator-in","contentHtml":"\u003cp\u003eThe political landscape in the Philippines is abuzz as Senator Ronald 'Bato' dela Rosa, former chief of the Philippine National Police under President Rodrigo Duterte, is now the subject of an International Criminal Court (ICC) arrest warrant. The warrant, issued for alleged crimes against humanity stemming from his prominent role in the deadly 'war on drugs' campaign between 2016 and 2022, has been met with an official order for his arrest from the Philippines’ Justice Department.\\n\\nDela Rosa's legal maneuvers to circumvent his apprehension and transfer to the ICC suffered a significant setback on May 20, 2026, when the Philippine Supreme Court denied his petition for a temporary restraining order in a 9-5-1 ruling. While this decision clears the immediate path for his potential arrest, the court clarified that it only addressed interim relief, leaving the core legal issues to be resolved in the main case.\\n\\nThe senator's current whereabouts remain unknown, following reports of his departure from the Senate building on May 14 after National Bureau of Investigation officers attempted to serve the ICC warrant. His re-emergence on May 11, after six months in hiding, was notably to cast a crucial vote in a Senate leadership change, which saw Alan Peter Cayetano, an ally of former President Duterte, assume the role of Senate President. This political chess move is widely interpreted as an attempt to derail the ongoing impeachment proceedings against Vice President Sara Duterte, the daughter of the former president.\\n\\nThis unfolding drama is not merely a legal battle but is deeply entrenched in a broader political rivalry between President Ferdinand Marcos Jr. and the Duterte family. Both factions are reportedly leveraging state institutions in a high-stakes struggle for political dominance, with an eye on the 2028 presidential election, for which Sara Duterte has already declared her candidacy.\\n\\nJustice Minister Fredderick Vida has unequivocally stated that the Philippines will comply with the ICC warrant. However, Senator Dela Rosa's legal team has affirmed their commitment to exhausting all available legal avenues, including filing a motion for reconsideration with the Supreme Court, asserting that the current resolution is not a 'judgment on the merits.'\\n\\nPublic sentiment, as simulated, indicates a 'Mostly positive, some debate' reaction to the developments, suggesting a predominantly favorable, yet not entirely unanimous, public response to the actions being taken against Senator Dela Rosa. As the legal and political battles continue, the nation watches closely how this significant case will shape the future of Philippine politics and international accountability.\u003c/p\u003e\n","title":"Philippines Orders Arrest of ICC-Wanted Senator in Landmark 'War on Drugs' Case","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-21T23:03:54Z","summary":"Senator Ronald 'Bato' dela Rosa, a key figure in former President Duterte's controversial 'war on drugs,' faces an International Criminal Court (ICC) arrest warrant, upheld by the Philippine Supreme Court, amid a deepening political feud within the nation's leadership.","tags":["Philippines","ICC","Ronald 'Bato' dela Rosa","War on Drugs","Rodrigo Duterte","Sara Duterte","Ferdinand Marcos Jr.","Supreme Court","Human Rights","International Law","Politics","Justice Department"],"sources":[{"url":"https://thediplomat.com/2026/05/philippine-supreme-court-rejects-fugitive-senators-challenge-to-icc-arrest-warrant/","title":"Philippine Supreme Court Rejects Fugitive Senator’s Challenge to ICC Arrest Warrant"},{"url":"https://www.straitstimes.com/asia/se-asia/philippine-supreme-court-denies-senators-bid-to-prevent-arrest-in-icc-case","title":"Philippine Supreme Court denies Senator Ronald dela Rosa’s bid to prevent arrest in ICC case"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-orders-arrest-of-icc-wanted-senator-in"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
