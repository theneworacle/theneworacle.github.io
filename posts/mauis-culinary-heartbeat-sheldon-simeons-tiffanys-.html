<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"mauis-culinary-heartbeat-sheldon-simeons-tiffanys-","contentHtml":"\u003cp\u003eMaui is synonymous with stunning beaches and luxurious resorts, but a culinary revolution is quietly taking hold in its vibrant local communities. At the forefront is \"Top Chef\" fan favorite and multiple James Beard Award semifinalist, Sheldon Simeon, whose restaurant, Tiffany's, in Wailuku, is successfully luring diners away from the resort-heavy coasts and into the island's authentic heart.\u003c/p\u003e\n\u003cp\u003eStep into Tiffany's on any given evening, and you'll immediately feel the infectious energy of a true neighborhood gathering place. From birthday celebrations to lively after-work banter, the dining room buzzes with a welcoming atmosphere that reflects Simeon's core philosophy: ohana (family) and community. In 2022, Simeon and his wife Janice took over this beloved Wailuku institution, which had been a local mainstay for two decades. They carefully preserved cherished crowd favorites like kimchi fried rice, honey walnut shrimp, and crispy pork belly, while also infusing the menu with Simeon's signature style.\u003c/p\u003e\n\u003cp\u003eHis cooking is a vibrant celebration of Hawaii's multicultural tapestry, featuring clear Filipino influences. The menu is thoughtfully organized, offering a diverse range from pupu (appetizers) like sashimi and mandoo, to green dishes such as garlic bok choy, and hearty meat plates including rib eye and BBQ teriyaki chicken. Country comforts like Wailuku saimin and oxtail soup round out the savory offerings. The crispy chicken, dusted with sinigang seasoning and fried twice for ultimate crispiness, is a standout – a dish Simeon describes as reminiscent of his Filipino grandmother's cooking. For dessert, the churro mochi munchkins, perfectly crisp and chewy, are a new favorite.\u003c/p\u003e\n\u003cp\u003eBeyond Tiffany's, Simeon also operates Tin Roof in Kahului, a casual takeout spot that has become a major draw for visitors seeking authentic local flavors, most notably its mochiko chicken, selling by the hundreds of pounds daily. His culinary approach, deeply rooted in family and travel experiences, is also captured in his cookbook, \"Ohana Style,\" which champions simple, everyday cooking.\u003c/p\u003e\n\u003cp\u003eSimeon credits Tiffany's growing popularity to a combination of enthusiastic word-of-mouth, consistent media exposure, and the enduring \"Top Chef\" machine. The public sentiment surrounding Simeon and his establishments is overwhelmingly positive, cementing his status as a chef who not only delivers exceptional food but also fosters a deep connection to his community and cultural heritage. For those seeking an authentic taste of Maui, far from the polished resort circuit, Tiffany's offers a genuine and unforgettable culinary experience.\u003c/p\u003e\n","title":"Maui's Culinary Heartbeat: Sheldon Simeon's Tiffany's Draws Diners Off the Resort Path","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-25T13:03:40Z","summary":"\"Top Chef\" fan favorite Sheldon Simeon is redefining Maui's dining scene, attracting locals and visitors alike to Tiffany's in Wailuku. His philosophy of ohana and community, combined with a menu celebrating Hawaii's diverse cultures, makes this neighborhood eatery a must-visit.","tags":["Maui","Sheldon Simeon","Tiffany's","Hawaiian cuisine","Filipino food","Top Chef","Wailuku","local dining","Ohana Style","Community","Foodie"],"sources":[{"url":"https://travel.yahoo.com/guides/articles/top-chef-star-pulling-diners-120000297.html;_ylt=A2RRDYpQRxRqcAIA1bPQtDMD;_ylu=Y29sbwN1cy1lYXN0LTEEcG9zAzcEdnRpZAMEc2VjA3Ny","title":"Top Chef' star is pulling diners away from Maui's resorts"},{"url":"https://www.sfgate.com/hawaii/article/sheldon-simeon-tiffanys-22265318.php","title":"One hour after opening, this Maui restaurant is already the place to be. (SFGATE)"},{"url":"https://www.aol.com/aloha-flavors-hawaii-14-recipes-145600728.html","title":"Say Aloha to the Flavors of Hawai'i With These 14 Recipes From Sheldon Simeon (AOL)"},{"url":"https://www.aol.com/articles/chef-sheldon-simeon-dihses-recipes-114101320.html","title":"Chef Sheldon Simeon dishes out recipes from his new cookbook 'Ohana Style' (AOL)"},{"url":"https://www.kitv.com/island-life/island-life-live/fan-favorite-chef-sheldon-simeon-shares-his-ohana-style-wisdom-and-new-cookbook/video_feb3c1be-403f-5654-b444-97d59055d79c.html","title":"Fan Favorite Chef Sheldon Simeon Shares His \"Ohana Style\" Wisdom and New Cookbook"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"mauis-culinary-heartbeat-sheldon-simeons-tiffanys-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
