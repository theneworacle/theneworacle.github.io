<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"super-typhoon-francisco-maintains-strength-nears-p","contentHtml":"\u003cp\u003eThe Philippines remains vigilant as Super Typhoon Francisco (international name: Mekkhala) holds its strength while navigating the waters east of Northern Luzon. As of early Tuesday morning, the super typhoon's eye was pinpointed approximately 410 km east of Aparri, Cagayan. Packing maximum sustained winds of 185 km/h and formidable gusts reaching up to 230 km/h, Francisco presents a significant, albeit distant, meteorological event for the archipelago.\u003c/p\u003e\n\u003cp\u003eThe Philippine Atmospheric, Geophysical and Astronomical Services Administration (PAGASA) has issued Signal No. 1 for parts of Batanes and the northeastern section of Cagayan, encompassing the eastern Babuyan Islands. However, there's positive news for these areas: the probability of Signal No. 2 being hoisted is diminishing as Francisco adopts a more pronounced northwestward path, steering it further away from the Philippine landmass.\u003c/p\u003e\n\u003cp\u003ePAGASA forecasts that Super Typhoon Francisco will continue its gradual deceleration, moving generally north-northwestward until Wednesday, June 24. Following this, it is expected to recurve towards the Ryukyu Islands in southern Japan and is projected to exit the Philippine Area of Responsibility (PAR) by Friday morning, June 26. While the typhoon might intensify or maintain its current strength until Tuesday afternoon, a weakening trend is anticipated afterward, attributed to increasingly unfavorable environmental conditions.\u003c/p\u003e\n\u003cp\u003eBeyond the immediate vicinity of the typhoon, its periphery, combined with the Southwest Monsoon (Habagat), is influencing weather across a broader spectrum of the Philippines. Strong to gale-force gusts are expected over vast areas, including most of Luzon, Visayas, Zamboanga Peninsula, Northern Mindanao, Surigao del Norte, Dinagat Islands, Davao Occidental, and Davao Oriental. Furthermore, rough seas are a significant concern, particularly over the eastern seaboards of Batanes and Babuyan Islands (up to 4 meters), the northeastern seaboard of mainland Cagayan (up to 3.5 meters), and other eastern seaboards including Isabela and northern Aurora (up to 3 meters). Mariners operating small seacrafts, especially those inexperienced or with ill-equipped vessels, are strongly cautioned against venturing out to sea under these hazardous conditions.\u003c/p\u003e\n\u003cp\u003eInterestingly, simulated social sentiment regarding Super Typhoon Francisco in the Philippines indicates a mostly positive outlook, with some ongoing public discussion and debate.\u003c/p\u003e\n","title":"Super Typhoon Francisco Maintains Strength, Nears Philippine Exit","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-05T09:17:17Z","summary":"Super Typhoon Francisco, internationally known as Mekkhala, continues its northwestward trajectory east of Northern Luzon. While maintaining its formidable strength, PAGASA indicates a decreasing likelihood of higher storm signals, with the typhoon expected to exit the Philippine Area of Responsibility by Friday. Mariners are warned of rough seas.","tags":["Philippines","Super Typhoon Francisco","PAGASA","Weather","Tropical Cyclone","Mekkhala","Luzon","Cagayan","Batanes","Southwest Monsoon","Habagat","Maritime Safety","Natural Disaster"],"sources":[{"url":"https://www.msn.com/en-ph/news/national/super-typhoon-spotted-far-east-of-philippines-pagasa/ar-AA27edNG","title":"Super typhoon spotted far east of Philippines — PAGASA"},{"url":"https://www.gmanetwork.com/news/weather/content/992380/super-typhoon-francisco-strength-signal/story/","title":"Super Typhoon Francisco slows down but maintains strength; Signal No. 1 still up"},{"url":"https://www.msn.com/en-ph/public-safety-and-emergencies/health-and-safety-alerts/pagasa-monitoring-potential-super-typhoon-that-could-enhance-habagat-next-week/ar-AA2728KS?ocid=BingNewsVerp","title":"PAGASA monitoring potential super typhoon that could enhance Habagat next week"},{"url":"https://www.msn.com/en-ph/public-safety-and-emergencies/natural-disasters/francisco-may-intensify-into-a-super-typhoon-within-12-hours-pagasa/ar-AA26fN0c?ocid=BingNewsVerp","title":"Francisco may intensify into a super typhoon within 12 hours — PAGASA"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"super-typhoon-francisco-maintains-strength-nears-p"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
