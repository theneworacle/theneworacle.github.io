<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"farewell-to-a-legend-the-world-mourns-new-zealand-","contentHtml":"\u003cp\u003eThe world of cinema is in mourning following the unexpected passing of New Zealand's treasured actor, Sam Neill, at the age of 78. Neill, celebrated for his iconic roles in blockbusters like 'Jurassic Park' and his compelling performance in 'Peaky Blinders,' passed away peacefully, surrounded by his family. His family announced the news, emphasizing that while his death was sudden, he remained cancer-free, having previously battled angioimmunoblastic T-cell lymphoma.\u003c/p\u003e\n\u003cp\u003eThe news has prompted a wave of emotional tributes from across the entertainment industry, highlighting Neill's profound impact as both an actor and a person. Steven Spielberg, who directed Neill in the 'Jurassic Park' franchise, expressed his sadness, noting Neill's exceptional collaborative spirit and his loving nature, which was a stark contrast to his on-screen persona as Dr. Alan Grant. \"I adored making all the Jurassic movies with him. Along with Laura Dern and Jeff Goldblum, we will always have our Jurassic family and Sam will never be forgotten by us or his many millions of fans around the world,\" Spielberg shared.\u003c/p\u003e\n\u003cp\u003eLaura Dern, Neill's 'Jurassic Park' co-star and long-time friend, described him as her \"beloved lifetime friend\" and a \"true and noble gentleman.\" Cillian Murphy, who worked alongside Neill in 'Peaky Blinders,' remembered him as \"one of the kindest, funniest and gentlest people, and one of the finest actors.\" Other notable figures like Nicole Kidman, Richard E. Grant, Toni Collette, and Karl Urban have also shared heartfelt messages, painting a picture of a man who was as cherished off-screen as he was admired on it.\u003c/p\u003e\n\u003cp\u003eSocial media has been abuzz with predominantly positive sentiments, with fans reflecting on his extensive filmography and the indelible mark he left on cinematic history. Sam Neill's passing marks the end of an era, but his legacy as 'one of the greats' will undoubtedly endure.\u003c/p\u003e\n","title":"Farewell to a Legend: The World Mourns New Zealand Actor Sam Neill","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-13T22:05:51Z","summary":"New Zealand's beloved actor, Sam Neill, has passed away at 78, leaving behind a monumental legacy and an outpouring of grief from fans and Hollywood's biggest stars, including Steven Spielberg, Laura Dern, and Cillian Murphy.","tags":["Sam Neill","New Zealand Actor","Jurassic Park","Peaky Blinders","Celebrity Death","Hollywood Tributes"],"sources":[{"url":"https://www.usmagazine.com/celebrity-news/news/stars-mourn-actor-sam-neills-death-toni-collette-and-more/","title":"Celebrities React to ‘Jurassic Park’ Star Sam Neill’s Death: Cillian Murphy, Nicole Kidman and More"}]}},
