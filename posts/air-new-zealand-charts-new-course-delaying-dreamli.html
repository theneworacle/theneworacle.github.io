d fuel costs that are expected to persist into 2027. This could potentially lead to further fare increases, though the airline is also mindful of the possibility of softening demand. Despite these pressures, there's positive news on the operational front: the percentage of Air New Zealand's grounded fleet has significantly decreased, falling from 20% to below 5%. While supplier compensation offers some relief for aircraft disruptions, it only partially mitigates the impact.\u003c/p\u003e\n\u003cp\u003eInitial social media sentiment regarding the Boeing 787 delays has been largely positive, suggesting a degree of understanding and support for the airline's proactive steps, albeit with some ongoing discussion. This strategic overhaul signals Air New Zealand's determination to build a more resilient and profitable future.\u003c/p\u003e\n","title":"Air New Zealand Charts New Course: Delaying Dreamliners and Targeting Premium Growth","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-02T15:22:28Z","summary":"Air New Zealand is embarking on a strategic reset, including delaying Boeing 787 deliveries and implementing cost cuts, as it aims for profitability within two years.","tags":["Air New Zealand","Boeing 787","airline industry","strategic reset","cost cuts","premium travel","New Zealand news"],"sources":[{"url":"https://www.msn.com/en-gb/news/other/air-new-zealand-seeks-to-delay-boeing-787-deliveries-cut-costs-in-strategic-reset/ar-AA26Rhc5?ocid=BingNewsVerp","title":"Air New Zealand seeks to delay Boeing 787 deliveries, cut costs in strategic reset"},{"url":"https://www.msn.com/en-nz/news/national/air-nz-delays-new-dreamliners-eyes-premium-push-in-strategy-reset/ar-AA26Qf2F?ocid=BingNewsVerp","title":"Air NZ delays new Dreamliners, eyes premium push in strategy reset"},{"url":"https://www.msn.com/en-gb/money/other/air-new-zealand-names-kris-cudmore-as-cfo-delays-boeing-787-deliveries/ar-AA26Q1n4?ocid=BingNewsVerp","title":"Air New Zealand name
