<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"troops-say-army-ignored-urgent-medical-support-req","contentHtml":"\u003cp\u003eA recent Iranian drone strike on a U.S. Army unit’s command post in Kuwait tragically claimed the life of a 39-year-old master sergeant and left several others wounded. Now, survivors and reports indicate a harrowing detail: troops had reportedly requested increased medical support weeks before the deadly attack, but their appeals were ignored by Army leadership.\u003c/p\u003e\n\u003cp\u003eThe incident, which resulted in the deadliest attack on American troops since the Iran war began, has sparked outrage and concern. Soldiers from the Iowa-based 103rd Sustainment Command, present at the forward operating base, claim their requests for more medical personnel and supplies were overlooked. They emphasize that a doctor, a fixed aid station, or even an additional ambulance could have made a critical difference in the outcome, particularly for Master Sgt. Nicole Amor, who fought to stay alive after being injured.\u003c/p\u003e\n\u003cp\u003eOne major, Stephen Ramsbottom, speaking to CBS News, expressed his dismay at the lack of immediate and adequate medical response. \"This was a failure,\" he stated, believing that with proper resources, Master Sgt. Amor's life could have been saved. Another master sergeant, Ann Marie Carrier, corroborated the account, noting Amor was still breathing as soldiers frantically transported her in vans to the nearest hospital, where she tragically succumbed to her injuries shortly after arrival.\u003c/p\u003e\n\u003cp\u003eThe Pentagon, through a spokesperson for U.S. Central Command, Captain Tim Hawkins, stated that \"extraordinary steps\" were taken to protect troops and dismissed accusations of \"blatant disregard\" as unfounded. An investigation into the Kuwait attack is reportedly ongoing. However, the firsthand accounts from the surviving soldiers paint a starkly different picture, raising serious questions about the prioritization of troop welfare and preparedness.\u003c/p\u003e\n\u003cp\u003eThe social sentiment surrounding this developing story is largely one of concern and debate, as the public grapples with the implications of such alleged oversights and the impact on military personnel and their families. This incident serves as a grim reminder of the critical importance of ensuring that our service members are equipped with all necessary resources, especially medical support, in hostile environments.\u003c/p\u003e\n","title":"Troops Say Army Ignored Urgent Medical Support Requests Before Deadly Attack","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-20T10:51:01Z","summary":"New allegations surface that the U.S. Army disregarded pleas for enhanced medical support from troops stationed in Kuwait, leading to tragic consequences in a fatal Iranian drone strike.","tags":["US Army","Iran","Drone Attack","Medical Support","Kuwait","Military","Soldier Safety","Negligence","Nicole Amor"],"sources":[{"url":"https://www.yahoo.com/news/articles/troops-army-ignored-request-more-115101942.html","title":"Troops say Army ignored request for more medical support before deadly attack"},{"url":"https://www.twincities.com/2026/05/19/nicole-amor-kuwait-attack-iran-war/","title":"Report: Troops say Army ignored request for medical support before attack that killed Nicole Amor"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"troops-say-army-ignored-urgent-medical-support-req"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
