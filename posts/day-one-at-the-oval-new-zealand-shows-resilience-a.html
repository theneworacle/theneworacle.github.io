<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"day-one-at-the-oval-new-zealand-shows-resilience-a","contentHtml":"\u003cp\u003eThe Kia Oval witnessed an eventful opening day of the second Test match between England and New Zealand, with the Blackcaps ending on a resilient 291-7. Despite a start described by some commentators as 'pedestrian' and some 'soft dismissals', New Zealand managed to post a competitive total, showcasing individual brilliance amidst broader team adjustments.\u003c/p\u003e\n\u003cp\u003eLeading the charge for New Zealand were Tom Blundell with a well-fought 51, and Glenn Phillips, who remained unbeaten on a crucial 49, navigating a fiery spell from England's Jofra Archer. Phillips's gutsy performance against short-pitched deliveries highlighted his growing prowess in Test cricket.\u003c/p\u003e\n\u003cp\u003eEngland's bowling attack, featuring several debutants, performed admirably. Jacob Bethell and Sonny Baker were the pick of the bowlers, each claiming two wickets. Baker, making his Test debut, expressed his excitement at getting on the board, while commentators like Michael Vaughan praised his potential, remarking that he 'looks every bit an England cricketer'. Archer, Josh Tongue, and Matthew Fisher also contributed with a wicket apiece, showcasing the depth of England's new-look side.\u003c/p\u003e\n\u003cp\u003eThe match unfolded with significant pre-game narratives. England faced a selection headache with the absence of Ollie Robinson, the player-of-the-match from the first Test. However, the biggest news impacting the series came from the New Zealand camp: the surprise immediate retirement of their all-time leading run-scorer and former captain, Kane Williamson, just days before the Test. Will Young stepped in as his replacement, adding another layer of challenge for the visiting side.\u003c/p\u003e\n\u003cp\u003eCommentators noted a sense of rustiness from New Zealand, suggesting that a more proactive team might have capitalized more on the conditions. However, the closing score indicates a fightback, making the second day's play crucial. With public sentiment generally positive about the unfolding drama, the series is poised for an engaging contest. Both teams, having navigated significant changes, are now in a position where day two could very well dictate the momentum of this pivotal Test.\u003c/p\u003e\n","title":"Day One at The Oval: New Zealand Shows Resilience Amidst Team Changes Against England","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-17T22:50:06Z","summary":"New Zealand closed day one of the second Test against England at 291-7, a respectable score despite perceived rustiness and significant team changes. With debutants shining for England and the absence of cricketing legend Kane Williamson for New Zealand, the match sets the stage for an intriguing series.","tags":["Cricket","New Zealand","England","Test Match","Kane Williamson","Ollie Robinson","Sports News"],"sources":[{"url":"https://www.bbc.com/sport/cricket/live/c7vqnjq1pv7t","title":"New Zealand close day one on 291-7 against England - as it happened"},{"url":"https://www.msn.com/en-gb/sport/cricket/cricket-england-s-robinson-ruled-out-of-second-test-against-new-zealand/ar-AA25EYbb?ocid=BingNewsVerp","title":"Cricket - England's Robinson ruled out of second Test against New Zealand"},{"url":"https://www.msn.com/en-gb/sport/cricket/new-zealand-s-all-time-leading-run-scorer-retires-from-cricket-days-before-england-test-match/ar-AA25teCd?ocid=BingNewsVerp","title":"New Zealand's all-time leading run scorer retires from cricket days before England Test match"},{"url":"https://www.msn.com/en-in/sports/cricket/who-is-kane-williamson-s-replacement-new-zealand-name-surprise-substitute-for-england-test/ar-AA25yzII?ocid=BingNewsVerp","title":"Who is Kane Williamson's replacement? New Zealand name surprise substitute for England Test"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"day-one-at-the-oval-new-zealand-shows-resilience-a"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
