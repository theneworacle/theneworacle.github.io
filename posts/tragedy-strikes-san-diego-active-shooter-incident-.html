 became clear. Authorities later confirmed that five people lost their lives in the attack. Among the deceased were two teenage gunmen who, after opening fire, reportedly took their own lives. This horrifying turn of events has led investigators to probe a potential hate motive behind the attack, adding another layer of despair to an already devastating situation.\u003c/p\u003e\n\u003cp\u003eThe rapid response from law enforcement ultimately led to the scene being contained, but the impact of such an act of violence against a house of worship will undoubtedly resonate deeply within San Diego and beyond. This tragedy serves as a stark reminder of the ongoing challenges communities face in combating hate and violence.\u003c/p\u003e\n","title":"Tragedy Strikes San Diego: Active Shooter Incident at Islamic Center Leaves Five Dead, Hate Motive Probed","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-19T07:45:02Z","summary":"San Diego is in mourning after an active shooter incident at the Islamic Center left five people dead, including two teenage gunmen. Authorities are investigating a possible hate motive in the tragic event that has profoundly impacted the community.","tags":["San Diego","Active Shooter","Islamic Center","Hate Crime","Tragedy","Law Enforcement","Community Safety"],"sources":[{"url":"https://www.msn.com/en-us/news/us/san-diego-police-respond-to-reports-of-active-shooter-at-san-diego-islamic-center/ar-AA23vdLG","title":"San Diego police respond to reports of active shooter at San Diego Islamic Center"},{"url":"https://www.foxnews.com/us/active-shooter-reported-san-diego-islamic-center-swat-emergency-crews-respond","title":"San Diego mosque shooting leaves 3 victims, 2 teen suspects dead, police say"},{"url":"https://www.msn.com/en-us/news/world/5-dead-including-teen-gunmen-at-san-diego-islamic-center-hate-motive-probed/ar-AA23vh1I?ocid=BingNewsVerp","title":"5 dead, including teen gunmen, at San Diego Islamic Center; hate motive probed"},{"url":"https://www.koat.com/article/san-diego-active-shooter-islamic-center/71341045","title":"Police and the FBI are investigating after three people were killed in a shooting at the Islamic Center of San Diego, and two teen suspects are dead."}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"tragedy-strikes-san-diego-active-shooter-incident-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
