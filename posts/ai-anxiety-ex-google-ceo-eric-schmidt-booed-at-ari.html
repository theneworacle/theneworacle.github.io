<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"ai-anxiety-ex-google-ceo-eric-schmidt-booed-at-ari","contentHtml":"\u003cp\u003eFormer Google CEO Eric Schmidt's recent commencement speech at the University of Arizona was met with unexpected resistance, as graduates booed his remarks on artificial intelligence. The incident underscores a growing apprehension among young people regarding the rapid advancements of AI and its potential implications for their careers and society.\u003c/p\u003e\n\u003cp\u003eThe jeers that interrupted Schmidt's address were multifaceted, reflecting a complex mix of anxieties. Chief among these was the palpable fear surrounding AI's impact on future jobs and the workforce. Graduates, on the cusp of entering a rapidly evolving professional landscape, voiced concerns that AI could lead to job displacement and fundamentally reshape entry-level opportunities. This sentiment is not unfounded, as some companies have already linked AI to workforce reductions.\u003c/p\u003e\n\u003cp\u003eBeyond job market worries, the boos also tapped into broader societal concerns about modern technology. Schmidt himself acknowledged that the tools designed to connect us have, ironically, also led to polarization and a degraded public discourse. He remarked, \"The same tools that connect us also isolate us. The same platforms that gave everyone a voice — like you're using now — degraded the public square.\"\u003c/p\u003e\n\u003cp\u003eAnother layer to the backlash stemmed from pre-existing sexual assault allegations against Schmidt, which his attorney has dismissed as \"fabricated.\" While not directly related to AI, these allegations may have contributed to a negative perception among some attendees.\u003c/p\u003e\n\u003cp\u003eSchmidt, recognizing the intensity of the reaction, paused and addressed the audience directly: \"I know what many of you are feeling about that. I can hear you. There is a fear... that the future has already been written, that the machines are coming, that the jobs are evaporating, that the climate is breaking, that politics are fractured, and that you are inheriting a mess that you did not create.\" He validated these fears as \"rational\" but urged graduates to proactively engage with and shape the future of AI, rather than passively fearing it.\u003c/p\u003e\n\u003cp\u003eThe University of Arizona defended its decision to invite Schmidt, citing his \"extraordinary\" contributions to technology and innovation. This stance highlights the ongoing tension between celebrating technological pioneers and addressing the legitimate concerns of a generation grappling with the consequences of their creations.\u003c/p\u003e\n\u003cp\u003eIn stark contrast to Schmidt's experience, Nvidia CEO Jensen Huang delivered a more optimistic message in a separate commencement speech at Carnegie Mellon, asserting that AI would create new opportunities. He famously stated, \"AI is not likely to replace you... But someone using AI better than you might.\" This juxtaposition reveals the divided perspectives within the tech industry itself regarding AI's future impact.\u003c/p\u003e\n\u003cp\u003eDespite the commencement controversy, simulated social sentiment surrounding Schmidt's remarks indicates a mixed public reception, leaning towards \"mostly positive\" with \"some debate.\" This suggests that while the graduates' immediate reaction was strong, the broader public discourse on AI and its implications remains nuanced and contested.\u003c/p\u003e\n","title":"AI Anxiety: Ex-Google CEO Eric Schmidt Booed at Arizona Commencement Over AI Remarks","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-18T21:10:37Z","summary":"Former Google CEO Eric Schmidt faced a chorus of boos during his University of Arizona commencement speech as he addressed artificial intelligence, highlighting deep-seated fears among graduates about AI's impact on their future and the broader workforce.","tags":["AI","Artificial Intelligence","Eric Schmidt","Google","University of Arizona","Commencement","Jobs","Workforce","Technology","Social Impact"],"sources":[{"url":"https://www.msn.com/en-us/news/technology/ex-google-ceo-eric-schmidt-booed-after-ai-remarks-at-arizona-commencement/ar-AA23tNIF","title":"Ex-Google CEO Eric Schmidt booed after AI remarks at Arizona commencement"},{"url":"https://www.businessinsider.com/students-boo-eric-schmidt-google-ceo-ai-university-arizona-2026-5","title":"Arizona students boo former Google CEO Eric Schmidt as he talks about AI during graduation speech"},{"url":"https://www.yahoo.com/news/articles/former-google-ceo-eric-schmidt-142227468.html","title":"Former Google CEO Eric Schmidt booed by graduates at mention of AI"},{"url":"https://www.nbcnews.com/video/multiple-commencement-speakers-booed-for-ai-comments-during-graduation-speeches-263486021518","title":"Multiple commencement speakers booed for AI comments during graduation speeches"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"ai-anxiety-ex-google-ceo-eric-schmidt-booed-at-ari"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
