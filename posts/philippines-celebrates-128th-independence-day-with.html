<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-celebrates-128th-independence-day-with","contentHtml":"\u003cp\u003eThe Philippines recently commemorated its 128th Independence Day, an occasion that resonated deeply both within the nation and across the international community. This year's celebrations were particularly noteworthy for the prominent involvement of its ASEAN neighbors and key ally, the United States, highlighting the nation's enduring diplomatic ties and strategic partnerships.\u003c/p\u003e\n\u003cp\u003ePresident Ferdinand Marcos Jr. led the national commemorations, urging Filipinos to champion truth and deepen their awareness, a powerful message delivered at the heart of the country's independence celebrations. The day was not only a reflection on the nation's journey to sovereignty but also a reaffirmation of its place on the global stage.\u003c/p\u003e\n\u003cp\u003eA significant aspect of the celebration was the unequivocal support from the United States. US Secretary of State Marco Rubio extended congratulations and, crucially, reiterated America's \"ironclad\" defense commitments to the Philippines. This reaffirmation underscores the long-standing alliance between the two nations, a partnership critical for regional security and stability. Similarly, the ASEAN Secretary-General also conveyed congratulatory messages, signifying the strong fraternal bonds within the Southeast Asian bloc.\u003c/p\u003e\n\u003cp\u003eHistorically, the Philippines' Independence Day has seen a fascinating evolution, with a period where it was observed on July 4th before its official date was moved to June 12th. This historical context adds another layer of depth to the annual observance, connecting contemporary celebrations with the nation's rich past.\u003c/p\u003e\n\u003cp\u003eBeyond the official ceremonies in the Philippines, the spirit of Independence Day transcended borders. Filipino communities worldwide, including a vibrant celebration at San Jose City Hall, joined in the festivities. These global commemorations, often marked by the hoisting of both the Philippine and local national anthems and cultural displays, serve as a testament to the strong cultural identity and resilience of Filipinos abroad.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment surrounding the 128th Philippine Independence Day, particularly concerning the involvement of ASEAN and the US, has been largely positive, reflecting widespread appreciation for the international recognition and strengthened alliances, albeit with some ongoing discussions.\u003c/p\u003e\n","title":"Philippines Celebrates 128th Independence Day with Strong ASEAN and US Support","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-13T11:54:44Z","summary":"The Philippines recently marked its 128th Independence Day, a celebration amplified by the significant participation of ASEAN nations and the United States, underscoring robust international alliances and a shared commitment to regional stability.","tags":["Philippines","Independence Day","ASEAN","US","International Relations","Diplomacy","Ferdinand Marcos Jr.","National Celebration"],"sources":[{"url":"https://www.msn.com/en-ph/news/other/asean-us-join-philippines-in-celebrating-128th-independence-day/ar-AA25tLSw","title":"ASEAN, US join Philippines in celebrating 128th Independence Day"},{"url":"https://www.msn.com/en-ph/news/other/us-reaffirms-ironclad-ties-on-ph-independence-day/ar-AA25vlCa","title":"US reaffirms 'ironclad' ties on PH Independence Day"},{"url":"https://www.msn.com/en-ph/news/other/explainer-why-the-philippines-for-some-time-marked-independence-day-on-july-4-instead-of-june-12/ar-AA25uLU4","title":"EXPLAINER: Why the Philippines for some time marked Independence Day on July 4 instead of June 12"},{"url":"https://www.msn.com/en-ph/news/national/on-128th-independence-day-marcos-calls-for-defense-of-truth/ar-AA25ryAt","title":"On 128th Independence Day, Marcos calls for defense of truth"},{"url":"https://www.mercurynews.com/2026/06/12/san-jose-city-hall-celebrates-128th-philippine-independence-day/","title":"San Jose City Hall Celebrates 128th Philippine Independence Day"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-celebrates-128th-independence-day-with"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
