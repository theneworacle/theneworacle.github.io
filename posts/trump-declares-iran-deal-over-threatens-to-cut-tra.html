dering Treasury Secretary Scott Bessent to cease all trade with the European nation. The justification for this drastic measure, according to reports, was Spain's perceived lack of support for the ongoing conflict in Iran. This move has drawn immediate concern from analysts, who warn of the potential for a wider trade war with the European Union and significant disruption to global markets. Indeed, following Trump's statements, US stock futures experienced a sharp decline, and oil prices surged, reflecting investor anxiety.\u003c/p\u003e\n\u003cp\u003eWhile social media sentiment appears to be largely positive with some areas of debate surrounding these announcements, the ramifications for international relations and economic stability are undoubtedly profound. The global community now watches closely to see how these declarations will unfold and what impact they will have on the geopolitical landscape.\u003c/p\u003e\n","title":"Trump Declares Iran Deal Over, Threatens to Cut Trade with Spain Amidst NATO Summit","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-08T13:55:13Z","summary":"US President Donald Trump announced the end of the Iran deal and threatened to cut all trade with Spain during a recent NATO summit, causing market volatility and international concern.","tags":["Donald Trump","Iran","Spain","NATO","Trade War","Geopolitics","Market Reaction"],"sources":[{"url":"https://www.msn.com/en-us/politics/government/replay-trump-says-deal-with-iran-is-over-to-cut-trade-with-spain/vi-AA27tAoi?ocid=BingNewsVerp","title":"Replay: Trump says deal with Iran is over, to cut trade with Spain"},{"url":"https://www.msn.com/en-gb/politics/international-relations/trump-says-iran-deal-is-over-after-us-strikes-tehran-and-blasts-spain-during-nato-summit/vi-AA27sVIw?ocid=BingNewsVerp","title":"Trump says IRAN deal 'is over' after US strikes Tehran and blasts Spain during NATO summit"},{"url":"https://economictimes.indiatimes.com/markets/us-stocks/news/dow-
