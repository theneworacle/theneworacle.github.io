<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealand-joins-global-outcry-against-irans-leth","contentHtml":"\u003cp\u003eIn a unified show of international resolve, New Zealand has joined 21 other countries in unequivocally condemning Iran for what they describe as \"lethal plotting\" and \"malign actions\" spanning Europe, North America, and Australia. The strong denouncement, released in a joint statement by the US State Department, highlights Iran's alleged attempts to \"kill, kidnap, harass, intimidate, or otherwise attack people\" on foreign soil.\u003c/p\u003e\n\u003cp\u003eThe collective statement specifically addresses a recent surge of attacks across Europe, which have targeted Jewish communities, Iranian journalists, and American interests. A shadowy, pro-Iran group known as Harakat Ashab al-Yamin al-Islamiya (HAYI) has reportedly claimed responsibility for some of these incidents. This group, which emerged online in March following the commencement of the US and Israel's war on Iran, has also been linked to attacks in Belgium, the Netherlands, and a thwarted plot against a Bank of America office in France.\u003c/p\u003e\n\u003cp\u003eThe international coalition expressed grave concern over the \"long-standing relationship between the Iranian security services and international and local criminal groups,\" deeming the exploitation of such groups \"deplorable.\" While Australia previously responded to similar accusations by expelling its Iranian ambassador after intelligence agencies linked Iran to anti-Semitic attacks, New Zealand's Foreign Minister Winston Peters, while condemning the \"state-sponsored\" attacks, chose not to follow suit in expelling the Iranian ambassador.\u003c/p\u003e\n\u003cp\u003eThe joint statement serves as a stark warning, emphasizing the participating nations' determination to protect their citizens and territories from these threats, and calling for an immediate cessation of Iran's actions. Social media sentiment surrounding New Zealand's condemnation of Iran's alleged plotting has been largely positive, reflecting international support for these diplomatic efforts, albeit with some ongoing debate.\u003c/p\u003e\n","title":"New Zealand Joins Global Outcry Against Iran's 'Lethal Plotting'","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-10T22:57:13Z","summary":"New Zealand, alongside 21 other nations, has issued a powerful joint statement condemning Iran's alleged \"lethal plotting\" and \"malign actions\" across Europe, North America, and Australia, marking a significant diplomatic stance against state-sponsored threats.","tags":["New Zealand","Iran","International Relations","Lethal Plotting","Diplomacy","Human Rights","Global Security","Middle East","Europe","North America","Australia","State-Sponsored Attacks","Harakat Ashab al-Yamin al-Islamiya","HAYI","Winston Peters"],"sources":[{"url":"https://www.msn.com/en-nz/politics/government/new-zealand-condemns-lethal-plotting-by-iran-in-joint-statement/ar-AA25ktHg?ocid=BingNewsVerp","title":"New Zealand condemns 'lethal plotting' by Iran in joint statement"},{"url":"https://www.rnz.co.nz/news/world/597873/new-zealand-condemns-lethal-plotting-by-iran-in-joint-statement","title":"New Zealand condemns 'lethal plotting' by Iran in joint statement"},{"url":"https://www.msn.com/en-ae/news/other/joint-statement-by-23-countries-condemns-iranian-threats-malign-actions-in-europe-north-america-and-australia/ar-AA25ixUg?ocid=BingNewsVerp","title":"Joint Statement by 23 countries condemns Iranian threats, malign actions in Europe, North America and Australia"},{"url":"https://www.msn.com/en-gb/news/world/allies-condemn-irans-lethal-plotting-in-us-europe-australia/ar-AA25irb3?ocid=BingNewsVerp","title":"Allies condemn Iran's 'lethal plotting' in US, Europe, Australia"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealand-joins-global-outcry-against-irans-leth"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
