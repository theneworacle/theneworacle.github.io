<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"orioles-at-a-crossroads-unpacking-their-top-trade-","contentHtml":"\u003cp\u003eAs the MLB trade deadline approaches, the Baltimore Orioles find themselves in a peculiar position. Currently below a .500 winning percentage, they are, against the odds, within striking distance—just 3.5 games—of a Wild Card spot in a somewhat weak American League. This close proximity to contention has ignited a crucial debate: will the Orioles make a push for reinforcements, or will they decide to offload talent and prepare for the future?\u003c/p\u003e\n\u003cp\u003eAccording to a recent analysis by Zachary D. Rymer of Bleacher Report, the Orioles possess three key players who could serve as valuable trade chips if the team opts to sell. These include promising catcher Adley Rutschman, versatile left fielder Taylor Ward, and right-handed pitcher Rico Garcia. These players represent assets that could net the Orioles a decent return, bolstering their farm system or providing pieces for future contention.\u003c/p\u003e\n\u003cp\u003eHowever, the situation surrounding left-handed pitcher Trevor Rogers presents a more complex challenge. Despite enjoying a \"brilliant run in 2025,\" Rogers has since regressed, with a concerning 5.83 ERA. Rymer notes that any team interested in acquiring Rogers would need to look beyond his current statistics, seeking underlying potential that could be 'fixable' to justify him as a rotation piece. This makes him a tougher sell at the deadline, potentially limiting the Orioles' leverage.\u003c/p\u003e\n\u003cp\u003eBeyond these core players, the Orioles also have a couple of relievers who could be moved: closer Ryan Helsley and Andrew Kittredge. While the expected trade packages for these bullpen arms may not be \"tremendous,\" acquiring any value in return for them could be a strategic move if the team decides to become sellers.\u003c/p\u003e\n\u003cp\u003eThe discussion around the Orioles' trade chips has naturally spilled over into social media. Simulated sentiment for \"Orioles trade chips\" shows a \"mostly positive, some debate\" outlook, suggesting a mix of optimism about potential acquisitions or satisfaction with current assets, coupled with healthy discussion. Interestingly, the sentiment for \"Trevor Rogers problem\" also registers as \"mostly positive, some debate.\" This could imply that fans are either hopeful for a turnaround, or there's an ongoing debate about the root causes of his performance issues and potential solutions.\u003c/p\u003e\n\u003cp\u003eIn conclusion, the Baltimore Orioles are at a pivotal moment. With some valuable, albeit few, trade assets and the significant hurdle of moving Trevor Rogers, their strategy at the trade deadline will largely dictate the immediate future of the franchise. Will they lean into their competitive proximity or make moves for long-term gain?\u003c/p\u003e\n","title":"Orioles at a Crossroads: Unpacking Their Top Trade Chips and the Trevor Rogers Conundrum","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-20T17:24:56Z","summary":"With the trade deadline looming, the Baltimore Orioles, despite a sub-.500 record, are surprisingly close to a Wild Card spot. This has sparked intense speculation about whether they'll be buyers or sellers. We delve into their potential trade assets, including Adley Rutschman, Taylor Ward, and Rico Garcia, and examine the significant challenge posed by Trevor Rogers' recent struggles.","tags":["Baltimore Orioles","MLB Trade Deadline","Adley Rutschman","Taylor Ward","Rico Garcia","Trevor Rogers","MLB","Baseball","Trade Rumors"],"sources":[{"url":"https://sports.yahoo.com/articles/orioles-top-3-trade-chips-155904819.html","title":"Orioles' top 3 trade chips revealed, with Trevor Rogers problem"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"orioles-at-a-crossroads-unpacking-their-top-trade-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
