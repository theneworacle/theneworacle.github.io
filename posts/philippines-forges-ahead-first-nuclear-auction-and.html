<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-forges-ahead-first-nuclear-auction-and","contentHtml":"\u003cp\u003eThe Philippines is taking a decisive leap towards a more diversified and robust energy landscape with the upcoming launch of its first nuclear energy auction. This initiative represents a significant step in the nation's strategy to bolster its power sources and ensure energy security.\u003c/p\u003e\n\u003cp\u003eGovernment support for this ambitious undertaking is evident through concerted efforts to streamline the licensing and permitting process for nuclear power plant projects. House Speaker Faustino “Bojie” Dy III has affirmed the country's readiness for the responsible utilization of nuclear energy, signaling a clear commitment from national leadership. Furthermore, the Philippines is actively exploring international partnerships, including a potential collaboration with Russia to study the feasibility of small modular reactors (SMRs), which could offer flexible and scalable power solutions.\u003c/p\u003e\n\u003cp\u003eThis foray into nuclear energy is not an isolated endeavor but rather a complementary pillar to the Philippines' ongoing and vigorous promotion of renewable energy. The nation has been conducting regular auctions for renewable energy capacity, successfully awarding gigawatts of solar, wind, and storage projects in recent rounds. While sometimes falling short of highly ambitious targets, these auctions underscore a strong commitment to green energy. The government has set a forward-looking goal to offer an impressive 25GW of renewable energy capacity annually through auctions until 2035.\u003c/p\u003e\n\u003cp\u003ePublic sentiment regarding nuclear energy in the Philippines appears largely positive, though naturally, discussions and debates on the topic are ongoing. This blend of nuclear and renewable energy initiatives highlights a comprehensive approach to meet the Philippines' growing energy demands, reduce reliance on traditional fossil fuels, and build a sustainable energy future.\u003c/p\u003e\n","title":"Philippines Forges Ahead: First Nuclear Auction and Renewable Energy Drive Signal Bold Future","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-19T13:35:24Z","summary":"The Philippines is set to hold its inaugural nuclear energy auction, marking a pivotal moment in its quest for energy diversification. This move, supported by streamlined licensing processes and international collaborations, runs parallel to an ambitious push for renewable energy, aiming to secure a sustainable and resilient power supply for the nation.","tags":["Philippines","Nuclear Energy","Renewable Energy","Energy Auction","Energy Security","Sustainable Energy","Small Modular Reactors"],"sources":[{"url":"https://www.msn.com/en-ph/news/national/doe-gears-up-for-philippines-first-nuclear-auction/ar-AA25Zewi?ocid=BingNewsVerp","title":"DOE gears up for Philippines' first nuclear auction"},{"url":"https://www.pv-magazine.com/2025/09/05/philippines-renewable-auction-awards-9-4-gw-short-of-10-6-gw-goal/","title":"Philippines renewables auction awards 9.4 GW, short of 10.6 GW goal"},{"url":"https://www.msn.com/en-ph/science/physics/ph-is-ready-for-responsible-nuclear-energy-use-dy/ar-AA1Rbdho?ocid=BingNewsVerp","title":"PH is ready for responsible nuclear energy use – Dy"},{"url":"https://www.world-nuclear-news.org/articles/philippines-streamlines-licensing-for-nuclear-projects","title":"Philippines streamlines licensing for nuclear projects"},{"url":"https://www.msn.com/en-ph/news/national/ph-eyes-russia-for-small-nuclear-reactor-study/ar-AA25T7c5?ocid=BingNewsVerp","title":"PH eyes Russia for small nuclear reactor study"},{"url":"https://www.pv-tech.org/philippines-government-auctions-to-offer-25gw-of-renewable-energy-capacity-a-year-until-2035/","title":"Philippines government auctions to offer 25GW of renewable energy capacity a year until 2035"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-forges-ahead-first-nuclear-auction-and"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
