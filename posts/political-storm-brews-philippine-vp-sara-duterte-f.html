<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"political-storm-brews-philippine-vp-sara-duterte-f","contentHtml":"\u003cp\u003eA high-stakes political drama is unfolding in the Philippines as Vice President Sara Duterte faces a second impeachment by the lower house. This new complaint comes just over a year after an initial impeachment attempt against her was voided on constitutional grounds, underscoring the persistent and intensifying political rift within the nation.\u003c/p\u003e\n\u003cp\u003eDuterte, the daughter of former president Rodrigo Duterte, is accused of several grave offenses, including the misuse of public funds, the accumulation of unexplained wealth, and allegedly threatening the lives of President Ferdinand Marcos Jr., the First Lady, and a former House Speaker. Unsurprisingly, the Vice President has vehemently denied all accusations, with her legal team dismissing the complaints as “defective” and characterizing the entire impeachment process as a “fishing expedition.”\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Road to a Senate Trial\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eAccording to the Philippine Constitution, once the House impeaches an official, the case is transferred to the Senate, which then convenes as an impeachment court. Senators will serve as judges, with the Senate President presiding over the proceedings. This time, there's a heightened expectation of a full Senate trial, a departure from the 2025 instance where the Senate returned an impeachment case against Duterte to the lower house for constitutional clarification.\u003c/p\u003e\n\u003cp\u003eHowever, the political currents within the Senate have shifted significantly. A recent leadership change saw key positions filled by Duterte allies, notably Alan Peter Cayetano, a staunch loyalist of the Duterte family, assuming the role of Senate President. This development could profoundly influence the trial's trajectory, as the presiding officer holds considerable sway over the proceedings. Adding to this complex web of alliances is Senator Ronald dela Rosa, another close Duterte associate, who made a sudden return to Senate sessions to cast a decisive vote backing Cayetano. Dela Rosa himself has been under legal pressure due to an International Criminal Court investigation into the “war on drugs” he oversaw as police chief.\u003c/p\u003e\n\u003cp\u003ePolitical science experts suggest that the Senate leadership's allegiances will play a crucial role in shaping how the proceedings unfold. The fluid nature of political loyalties in the Philippines also means that senators may adjust their positions with a keen eye on the upcoming 2028 presidential election, an election Sara Duterte has openly declared her intention to contest.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMarcos's Stance and the Path to Conviction\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003ePresident Marcos Jr. has publicly distanced himself from the impeachment efforts, framing it as a matter for Congress. Yet, this entire episode unfolds against a backdrop of a deepening and increasingly public rift between the President and his Vice President. While Marcos's communications undersecretary stopped short of explicitly endorsing a trial, she emphasized that all allegations should be subjected to proper proceedings and that accountability and truth are paramount.\u003c/p\u003e\n\u003cp\u003eFor a conviction, a two-thirds majority vote from the Senate is required, meaning at least 16 out of 24 senators must vote against Duterte. If convicted, she would be removed from office and potentially disqualified from holding any public office, effectively ending her presidential aspirations. Historically, successful convictions in impeachment trials are rare in the Philippines; only former Supreme Court Chief Justice Renato Corona has faced conviction among high-ranking officials. Other cases have seen officials resign or trials aborted.\u003c/p\u003e\n\u003cp\u003ePublic sentiment, as simulated, shows a predominantly positive reaction to the impeachment proceedings, albeit with some public debate. As the nation watches, the trial of Vice President Sara Duterte promises to be a pivotal moment, with potential repercussions for the future of Philippine politics and the integrity of its highest offices.\u003c/p\u003e\n","title":"Political Storm Brews: Philippine VP Sara Duterte Faces Second Impeachment Trial","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-24T15:03:04Z","summary":"Philippine Vice President Sara Duterte is at the center of a political firestorm, facing a second impeachment attempt by the lower house. Accusations of misused funds and alleged threats fuel the proceedings, setting the stage for a dramatic Senate trial that could redefine the nation's political landscape ahead of the 2028 elections.","tags":["Philippines","Sara Duterte","Impeachment","Politics","Government","Ferdinand Marcos Jr.","Senate Trial","2028 Elections"],"sources":[{"url":"https://www.asiaone.com/asia/how-philippine-vice-president-sara-dutertes-impeachment-could-proceed","title":"How Philippine Vice President Sara Duterte's impeachment could proceed"},{"url":"https://www.msn.com/en-us/news/world/philippine-vice-president-faces-impeachment-vote-in-congress-after-panel-find-probable-cause/ar-AA21ZdFk?ocid=BingNewsVerp","title":"Philippine vice president faces impeachment vote in Congress after panel find probable cause"},{"url":"https://www.msn.com/en-us/politics/government/philippine-vice-president-sara-duterte-impeached-for-second-time/ar-AA22VswU?ocid=BingNewsVerp","title":"Philippine Vice President Sara Duterte impeached for second time"},{"url":"https://www.msn.com/en-in/news/world/philippine-senate-convenes-impeachment-court-to-try-vice-president-as-political-storm-rages/ar-AA23ssXx?ocid=BingNewsVerp","title":"Philippine Senate convenes impeachment court to try Vice President as political storm rages"},{"url":"https://www.msn.com/en-us/politics/government/philippines-presidential-hopeful-sara-duterte-impeached-awaits-senate-trial/ar-AA22UfG7?ocid=BingNewsVerp","title":"Philippines presidential hopeful Sara Duterte impeached, awaits Senate trial"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"political-storm-brews-philippine-vp-sara-duterte-f"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
