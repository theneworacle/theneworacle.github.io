ollowed by a series of sharp snaps that further solidified the wave's perfection.\u003c/p\u003e\n\u003cp\u003eThe judges were unanimous: all five awarded Dora a perfect 10 – the first of the Championship Tour season. This remarkable feat not only secured his advancement to the semi-finals but also ignited the New Zealand crowd, which erupted in cheers for the Brazilian's audacious display.\u003c/p\u003e\n\u003cp\u003eReflecting on his incredible wave, Dora expressed his relief and determination: “I was just praying for an opportunity, I just needed a wave to really go for it. The last wave when I popped up, I saw that pocket forming and I said ‘OK, this is it, I’m going to throw it’. I went all the way to the flats and I stuck it perfectly.”\u003c/p\u003e\n\u003cp\u003eThe event also saw other thrilling contests, with Australian Morgan Cibilic delivering a clutch performance to advance in the men's draw, and surfing legends Carissa Moore and Sawyer Lindblad making their way to the women's final. Social media has been abuzz with largely positive sentiment regarding Dora's perfect 10, solidifying its place as a viral moment in the surfing world.\u003c/p\u003e\n\u003cp\u003eDora's unforgettable aerial in New Zealand serves as a powerful reminder of the incredible talent and drama that the World Surf League consistently delivers, leaving fans eagerly anticipating what's next.\u003c/p\u003e\n","title":"Yago Dora's Perfect 10: A Jaw-Dropping Aerial Ignites New Zealand CT","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-24T22:02:46Z","summary":"Reigning surfing world champion Yago Dora made history at the Corona Cero New Zealand Pro with a flawless full rotation aerial, earning the first perfect 10 of the Championship Tour season and sending the crowd into a frenzy.","tags":["Surfing","Yago Dora","Perfect 10","World Surf League","New Zealand","Manu Bay","Corona Cero New Zealand Pro","Aerial Surfing"],"sources":[{"url":"https://sports.yahoo.com/articles/yago-dora-perfect-10-aerial-155637883.html","title":"Yago Dora’s Perfect 10 Aerial Ignites New Zealand CT Crowd (Video)"},{"url":"https://www.theguardian.com/sport/2026/may/24/world-surf-league-yago-dora-perfect-10-wave-score-new-zealand-pro","title":"Yago Dora sends World Surf League into meltdown with perfect 10 aerial"},{"url":"https://home.nzcity.co.nz/news/article.aspx?id=446491","title":"A look down the line on Brazilian Yago Dora's perfect 10 wave to advance to the final four of the World Surf League New Zealand Pro"},{"url":"https://www.nzherald.co.nz/sport/world-surf-league-raglan-reigning-world-champion-yago-dora-lands-first-perfect-10-of-championship-tour-season/D2Q7KPDP4NGWZK3UTJF52FTMFY/","title":"World Surf League Raglan: Reigning world champion Yago Dora lands first perfect 10 of Championship Tour season"},{"url":"https://www.msn.com/en-au/news/other/yago-dora-sends-wsl-into-meltdown-with-crazy-aerial/ar-AA23V7gz?ocid=BingNewsVerp","title":"Yago Dora sends WSL into meltdown with crazy aerial"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"yago-doras-perfect-10-a-jaw-dropping-aerial-ignite"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
