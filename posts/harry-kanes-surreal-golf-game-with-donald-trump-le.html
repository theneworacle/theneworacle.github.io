sident.\u003c/p\u003e\n\u003cp\u003eFan reactions, as noted in various online comments, largely mirrored the sentiments of May and Clarkson, with many expressing disapproval over Kane's choice of golfing companion. Trump himself, however, took to social media to commend Kane's football prowess and golf skills, boasting about their shared round.\u003c/p\u003e\n\u003cp\u003eWhile a simulated social sentiment analysis on the reaction to Kane and Trump's golf game showed a 'mostly positive, some debate' outlook, the outspoken 'shivering' from the 'Top Gear' personalities highlights a significant vein of public opinion that found the encounter less than savory. This unusual intersection of sports, politics, and celebrity continues to generate discussion, proving that sometimes, a simple round of golf can cause quite a stir.\u003c/p\u003e\n","title":"Harry Kane's 'Surreal' Golf Game with Donald Trump Leaves Top Gear Stars 'Shivering'","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-13T14:25:54Z","summary":"England captain Harry Kane's revelation about a past golf game with former U.S. President Donald Trump has stirred up a range of reactions, notably drawing strong disapproval from former 'Top Gear' presenters James May and Jeremy Clarkson.","tags":["Harry Kane","Donald Trump","Top Gear","James May","Jeremy Clarkson","Golf","Celebrity News","Football","Politics","Social Media Reaction"],"sources":[{"url":"https://www.express.co.uk/celebrity-news/2228623/top-gear-stars-left-shivering-harry-kane-donald-trump","title":"Top Gear stars left 'shivering' over Harry Kane's link to Donald Trump"},{"url":"https://www.msn.com/en-us/sports/fifa_world_cup/england-star-harry-kane-confirms-he-played-golf-with-donald-trump/ar-AA27FGG7?ocid=BingNewsVerp","title":"England star Harry Kane confirms he played golf with Donald Trump"},{"url":"https://larrybrownsports.com/soccer/england-harry-kane-confirms-golf-donald-trump-surreal-experience/761402","title":"England’s Ha
