<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"all-whites-announce-26-man-squad-for-2026-world-cu","contentHtml":"\u003cp\u003eThe anticipation has been building, and finally, New Zealand's head coach Darren Bazeley has confirmed the 26 players who will represent the All Whites at the 2026 World Cup. This squad carries the hopes of a nation, as the lowest-ranked team in the tournament (world No. 85) seeks to make history by securing their first-ever World Cup finals win and a coveted spot in the knockout stage.\u003c/p\u003e\n\u003cp\u003eLeading the charge is captain Chris Wood, the All Whites' all-time top goalscorer. The Nottingham Forest striker has successfully overcome a knee injury, ensuring his crucial presence on the pitch. Wood, alongside the seasoned Tommy Smith of English fifth-tier club Braintree Town, is poised to etch their names in the record books as the first New Zealand players to participate in two World Cups. This remarkable achievement speaks volumes about their enduring dedication and talent.\u003c/p\u003e\n\u003cp\u003eSmith's inclusion, however, has ignited some discussion. At 36 years old and playing in a lower division, Bazeley clarified that Smith's role extends beyond the field, describing him as a 'cultural architect' off the pitch. This strategic decision, focused on team cohesion and mentorship, meant that players like former Charlotte and Portland centre-back Bill Tuiloma were omitted from the squad.\u003c/p\u003e\n\u003cp\u003eOn a more positive note, the consistent strong form of 23-year-old midfielder Lachlan Bayliss has been duly rewarded with a well-deserved call-up, a testament to his rapid development over the past year. Furthermore, key players such as Wrexham's Liberato Cacace and midfielder Sarpreet Singh have successfully proven their fitness after recent injury concerns, adding depth and experience to the team.\u003c/p\u003e\n\u003cp\u003eWhile the overall squad selection presented few major surprises, the starting lineup for New Zealand's opening Group D match against Iran remains a subject of intense speculation. Competition is fierce, particularly among overseas-based players vying for spots in goal, central defense, and central midfield. This healthy internal rivalry is expected to push the team to its best.\u003c/p\u003e\n\u003cp\u003eTo fine-tune their preparations, the All Whites are scheduled for two crucial warm-up matches in Florida. They will face Haiti on June 3rd at Chase Stadium, Fort Lauderdale, followed by a showdown with England on June 7th at Raymond James Stadium, Tampa. These matches will be vital for Bazeley to assess his squad and finalize his tactics.\u003c/p\u003e\n\u003cp\u003eSocial media has reacted largely positively to the announcement, reflecting the excitement and anticipation surrounding the team. While some debates have naturally arisen concerning specific player selections, the overall sentiment is one of optimism and support for the All Whites as they embark on this historic journey. The team has spent years building towards this moment, and now, as Coach Bazeley stated, 'the time for discussions is over, we need to head to the tournament and take the opportunity in front of us to make history for New Zealand.'\u003c/p\u003e\n","title":"All Whites Announce 26-Man Squad for 2026 World Cup: History Makers and Key Selections Revealed","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-16T18:00:44Z","summary":"New Zealand has unveiled its 26-man squad for the upcoming 2026 World Cup, with captain Chris Wood and veteran Tommy Smith set to make history. The squad features a mix of experienced players and rising stars, alongside some controversial selections, as the All Whites aim for their first World Cup finals win.","tags":["New Zealand","World Cup","Football","All Whites","Chris Wood","Tommy Smith","Squad Announcement","Sports News"],"sources":[{"url":"https://www.nytimes.com/athletic/7278656/2026/05/14/new-zealand-world-cup-squad-2026/","title":"New Zealand name World Cup squad: Chris Wood, Tommy Smith to make history"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"all-whites-announce-26-man-squad-for-2026-world-cu"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
