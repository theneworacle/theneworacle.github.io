<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"sleep-in-the-sky-air-new-zealand-unveils-world-fir","contentHtml":"\u003cp\u003eFor too long, the idea of a good night's sleep on an economy flight has been little more than a dream. But Air New Zealand is changing the game with its groundbreaking 'Skynest' – a world-first bunk-bed style sleeping pod designed specifically for economy passengers on ultra-long-haul flights.\u003c/p\u003e\n\u003cp\u003eSet to launch in November 2026, these innovative pods will first appear on the arduous 17-hour Auckland-New York route, nestled within the airline's new Boeing 787-9 Dreamliners. The Skynest features six full-length, lie-flat sleeping pods, providing a much-needed sanctuary for rest.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eYour Personal Sky Sanctuary\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eEach Skynest pod is meticulously designed to offer a private 'nest' experience. Passengers can look forward to fresh bedding, a privacy curtain, and ambient lighting, along with an amenity kit containing eye-masks, skincare products, earplugs, and socks. For added convenience, each pod includes its own ventilation unit, USB and USB-C charging ports, and a personal reading light. Air New Zealand's Chief Customer Officer, Jeremy O’Brien, notes that the design takes inspiration from sleeper trains and Japanese capsule hotels, aiming for a truly private space.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBooking Your Slumber in the Clouds\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eAccessing this new luxury comes at an additional cost, with a four-hour session in a Skynest pod priced from NZ$495 (approximately US$292). It's important to note that passengers must still purchase a traditional economy or premium economy seat and are limited to one session per flight. To ensure a peaceful environment, the airline strictly prohibits 'double-bunking,' eating snacks, or bringing children into the pods. While snoring is acknowledged as a natural possibility (with earplugs provided), passengers are encouraged to be mindful of strong perfumes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInnovation for the Long Haul\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThis initiative underscores Air New Zealand's commitment to enhancing the travel experience, especially for a nation as geographically remote as New Zealand. As CEO Nikhil Ravishankar states, \"the journey matters,\" and making long-haul travel more comfortable is key to enticing visitors. Skynest builds upon the success of Air New Zealand's earlier innovation, the 'Skycouch,' which allows a row of economy seats to convert into a flat surface, ideal for families or those seeking more space. Other airlines, like United and Qantas, are also exploring similar concepts, indicating a growing trend towards improving economy comfort on extended flights.\u003c/p\u003e\n\u003cp\u003eDespite challenges facing the airline industry, such as rising fuel costs and geopolitical tensions, the introduction of Skynest has garnered a largely positive social media response. This pioneering move by Air New Zealand promises to redefine economy travel, offering a genuine opportunity for rest and rejuvenation on even the longest journeys.\u003c/p\u003e\n","title":"Sleep in the Sky: Air New Zealand Unveils World-First Skynest Bunk Beds for Economy","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-20T22:29:29Z","summary":"Say goodbye to cramped long-haul flights! Air New Zealand is revolutionizing economy travel with its new 'Skynest' sleep pods, offering a lie-flat bunk bed experience on ultra-long routes like Auckland to New York. Discover how these innovative pods are set to transform your journey.","tags":["Air New Zealand","Skynest","Economy Class","Long-haul Flights","Travel Innovation","Aviation","New Zealand","Sleep Pods"],"sources":[{"url":"https://www.theguardian.com/business/2026/apr/15/air-new-zealand-skynest-bunk-beds-sleep-pods-economy","title":"No double-bunking or snacks - but snoring is fine: Air New Zealand’s economy sleep pods set for launch"},{"url":"https://www.wlky.com/article/air-new-zealand-economy-skynest-sleeping-pods/71028687","title":"Bunk beds for economy passengers take off on Air New Zealand’s new planes"},{"url":"https://www.msn.com/en-us/travel/news/air-new-zealand-s-skynest-economy-bunk-beds-now-available-to-book-from-290/ar-AA20TYHV","title":"Air New Zealand's Skynest economy bunk beds now available to book from $290"},{"url":"https://www.aol.com/articles/air-zealand-debuts-world-first-164432000.html","title":"Air New Zealand Debuts World-First Skynest Bunk Beds for $495 a Session"},{"url":"https://www.forbes.com/sites/forbestravelguide/2026/05/15/what-you-should-know-about-air-new-zealands-new-bunk-beds/","title":"What You Should Know About Air New Zealand’s New Bunk Beds"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"sleep-in-the-sky-air-new-zealand-unveils-world-fir"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
