<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"glenn-phillips-gritty-maiden-test-ton-lifts-new-ze","contentHtml":"\u003cp\u003eIn a display of remarkable resilience and skill, New Zealand all-rounder Glenn Phillips etched his name into the record books with a magnificent maiden Test century against England at The Oval. This pivotal knock was instrumental in guiding the Black Caps to a commanding first-innings total of 391, shifting the momentum firmly in their favour during the second Test.\u003c/p\u003e\n\u003cp\u003ePhillips' achievement is even more significant as it makes him only the third New Zealand batter in history to score international centuries across all three formats of the game – Tests, One-Day Internationals (ODIs), and Twenty20 Internationals (T20Is). He now stands alongside cricketing legends Brendon McCullum and Martin Guptill in this exclusive club, a testament to his versatility and growing prowess.\u003c/p\u003e\n\u003cp\u003eThe foundation of Phillips' century was laid during a gripping and at times brutal final session on Day 1. Facing a revitalised Jofra Archer, who bowled with blistering pace in his comeback series, Phillips endured an unrelenting barrage of short-pitched deliveries. In a memorable moment of defiance, he even opted to bat with sunglasses to combat the harsh evening glare, taking multiple blows to the body and famously offering a defiant thumbs-up to Archer after being knocked flat on his back.\u003c/p\u003e\n\u003cp\u003eResuming on Day 2, Phillips capitalized on a tactical shift from England's stand-in captain Joe Root, who initially held Archer back. Alongside tail-ender Kyle Jamieson (who contributed a crucial 41), Phillips launched a brilliant counter-attack, adding 87 runs for the eighth wicket and extending New Zealand's advantage. His century, ultimately reaching an even 100 runs adorned with 18 boundaries, came off Archer's bowling, a fitting conclusion to a battle of wills.\u003c/p\u003e\n\u003cp\u003eThis performance marks a significant step in Phillips' career, firmly establishing him as a dependable Test match-winner for the Black Caps, a role made even more crucial in the absence of veteran Kane Williamson. The cricketing world, including social media, has largely reacted positively to Phillips' gritty display, with some healthy debate around his unique approach and the context of such a high-stakes game. His 'stylish defiance' has undoubtedly given New Zealand a massive foothold in the series.\u003c/p\u003e\n","title":"Glenn Phillips' Gritty Maiden Test Ton Lifts New Zealand at The Oval","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-18T23:00:54Z","summary":"New Zealand's Glenn Phillips defied a hostile English attack, including a fiery Jofra Archer, to score his maiden Test century at The Oval. This historic knock not only propelled the Black Caps to a strong first-innings total of 391 but also cemented Phillips as only the third Kiwi to achieve international centuries across all three formats.","tags":["Cricket","New Zealand","England","Glenn Phillips","Test Cricket","The Oval","Black Caps","Maiden Century"],"sources":[{"url":"https://www.msn.com/en-in/sports/cricket/eng-vs-nz-glenn-phillips-smashes-maiden-test-ton-as-new-zealand-post-391-in-1st-innings/ar-AA25Yu9u?ocid=BingNewsVerp","title":"ENG vs NZ: Glenn Phillips smashes maiden Test ton as New Zealand post 391 in 1st innings"},{"url":"https://www.newsbytesapp.com/news/sports/glenn-phillips-slams-his-maiden-test-ton/story","title":"England vs New Zealand: Glenn Phillips slams maiden Test ton"},{"url":"https://www.indiatoday.in/sports/cricket/story/glenn-phillips-maiden-test-century-new-zealand-all-format-hundred-treble-2929270-2026-06-18","title":"Shades for Archer, history for New Zealand: Glenn Phillips completes century treble"},{"url":"https://www.msn.com/en-gb/sport/cricket/cricket-new-zealand-dismissed-for-391-after-maiden-phillips-century/ar-AA25XdgT?ocid=BingNewsVerp","title":"Cricket-New Zealand dismissed for 391 after maiden Phillips century"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"glenn-phillips-gritty-maiden-test-ton-lifts-new-ze"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
