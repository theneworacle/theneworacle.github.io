dvised to check their flight statuses due to the unforeseen delays.\u003c/p\u003e\n\u003cp\u003eThe exact cause of the fire is currently under investigation, as authorities work to determine the source of the blaze that caused such widespread disruption. Despite the inconvenience to travelers, initial social media sentiment surrounding the airport's handling of the crisis has been largely positive, highlighting the effective emergency response.\u003c/p\u003e\n","title":"Wellington Airport Fire Disrupts Flights, Evacuations Underway","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-13T22:10:45Z","summary":"A fire at Wellington Airport on Friday led to the evacuation of terminals and significant flight disruptions, though no injuries were reported.","tags":["New Zealand","Wellington","Airport","Fire","Flight Disruption","Evacuation","Air New Zealand","Emergency Response"],"sources":[{"url":"https://www.msn.com/en-nz/news/national/stranded-travellers-return-to-wellington-airport-after-fire-disruption/ar-AA25vqMe","title":"Wellington Airport fire which caused flight disruption started in a 'difficult location', CEO says"},{"url":"https://www.devdiscourse.com/article/business/3934214-blaze-at-wellington-airport-causes-chaos-flights-diverted-terminal-evacuation","title":"Blaze at Wellington Airport Causes Chaos: Flights Diverted, Terminal Evacuation"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"wellington-airport-fire-disrupts-flights-evacuatio"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
