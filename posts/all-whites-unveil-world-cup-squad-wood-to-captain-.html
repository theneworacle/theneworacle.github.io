<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"all-whites-unveil-world-cup-squad-wood-to-captain-","contentHtml":"\u003cp\u003eThe anticipation is building as New Zealand's national football team, the All Whites, has officially named its 26-player squad for the highly anticipated World Cup. Headlining the selection is Nottingham Forest striker Chris Wood, who will don the captain's armband despite facing an injury-disrupted season in the Premier League.\u003c/p\u003e\n\u003cp\u003eWood, a pivotal figure for the All Whites, will be joined by 36-year-old defender Tommy Smith. Both players share the unique distinction of being the only New Zealand men to participate in two World Cups, having previously represented their nation at the 2010 tournament in South Africa. Smith's recall from England's fifth-tier National League underscores his continued value to the squad.\u003c/p\u003e\n\u003cp\u003eCoach Darren Bazeley revealed the lineup in Auckland, acknowledging the rigorous process of narrowing down the squad from a pool of 40 players who have featured for the All Whites over the past 15 months. Bazeley expressed unwavering confidence in his chosen team's ability to navigate the challenging group stage, a milestone New Zealand has yet to achieve in its two previous World Cup appearances.\u003c/p\u003e\n\u003cp\u003eThe All Whites, currently ranked 85th globally, face a formidable challenge in Group G. They are set to compete against football giants: No. 9 Belgium, No. 20 Iran, and No. 29 Egypt. It's a tough draw, but one the team is eager to embrace.\u003c/p\u003e\n\u003cp\u003eIn a pre-recorded video message, Captain Chris Wood shared his excitement, telling fans, “I can’t wait to share the moment with you all, and create some history. I hope we can do you all proud, and show the world what we’re capable of.”\u003c/p\u003e\n\u003cp\u003eThe squad also introduces fresh talent, including 23-year-old midfielder Lachlan Bayliss, who caught attention with his breakout season for the Newcastle Jets in Australia's A-League. Bayliss, though born in Australia, qualifies for the All Whites through his New Zealand father, representing the growing depth of talent.\u003c/p\u003e\n\u003cp\u003eThe full 26-man squad is a testament to the blend of experience and potential that Coach Bazeley hopes will propel New Zealand to new heights on the global stage:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGoalkeepers:\u003c/strong\u003e Max Crocombe, Alex Paulsen, Michael Woud.\n\u003cstrong\u003eDefenders:\u003c/strong\u003e Tyler Bindon, Michael Boxall, Liberato Cacace, Francis de Vries, Callan Elliot, Tim Payne, Nando Pijnaker, Tommy Smith, Finn Surman.\n\u003cstrong\u003eMidfielders:\u003c/strong\u003e Lachlan Bayliss, Joe Bell, Matt Garbett, Ben Old, Alex Rufer, Sarpreet Singh, Marko Stamenic, Ryan Thomas.\n\u003cstrong\u003eForwards:\u003c/strong\u003e Kosta Barbarouses, Eli Just, Callum McCowatt, Jesse Randall, Ben Waine, Chris Wood.\u003c/p\u003e\n\u003cp\u003eEarly social media sentiment regarding the squad announcement has been largely positive, reflecting optimism among fans, though some discussions and debates naturally continue around the selections. As the World Cup approaches, all eyes will be on the All Whites as they prepare to take on the world's best and strive to create a memorable chapter in New Zealand football history.\u003c/p\u003e\n","title":"All Whites Unveil World Cup Squad: Wood to Captain Historic Campaign","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-18T12:39:46Z","summary":"New Zealand's All Whites have announced their 26-member squad for the upcoming World Cup, with veteran striker Chris Wood leading the team as captain. The squad features a blend of experienced players and promising young talent, all aiming to make history by advancing beyond the group stage for the first time.","tags":["New Zealand","World Cup","All Whites","Soccer","Football","Chris Wood","Tommy Smith","Squad Announcement","FIFA"],"sources":[{"url":"https://apnews.com/article/world-cup-new-zealand-wood-c4dd0d0ee26cb25e8e319a84487c7aac","title":"Chris Wood to lead New Zealand at the World Cup after an injury-troubled Premier League campaign"},{"url":"https://www.reuters.com/sports/soccer/new-zealand-pick-veteran-smith-wood-captained-world-cup-squad-2026-05-13/","title":"New Zealand pick veteran Smith in Wood-captained World Cup squad"},{"url":"https://www.msn.com/en-us/sports/soccer/new-zealand-2026-world-cup-preview-ready-to-enjoy-the-ride-of-a-lifetime/ar-AA23aeP2?ocid=BingNewsVerp","title":"New Zealand 2026 World Cup Preview: Ready to Enjoy the Ride of a Lifetime"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"all-whites-unveil-world-cup-squad-wood-to-captain-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
