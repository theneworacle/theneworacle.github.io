<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"hollywood-takes-over-aotearoa-stars-descend-on-new","contentHtml":"\u003cp\u003eA wave of Tinseltown glamour has swept across New Zealand's North Island, transforming picturesque landscapes into a bustling backdrop for the sequel to the \u003cem\u003eMinecraft Movie\u003c/em\u003e. Production for the much-anticipated film, slated for a theatrical release on July 23, 2027, officially kicked off in late April, bringing with it a host of A-list celebrities.\u003c/p\u003e\n\u003cp\u003eFrom the serene Viaduct Harbour in Auckland to the charming town centre of Thames, stars are making their presence felt. Among the earliest arrivals was James Bond legend Pierce Brosnan, who has been seen enjoying leisurely meals, exploring Northland's fish and chip shops, and even trying his hand at artisan bladesmithing. His relaxed interactions with locals have been a highlight.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eSpider-Man\u003c/em\u003e alum Kirsten Dunst, who has confirmed her role as Alex in the film, was recently spotted in Thames, dining casually with crew members. Her understated appearance allowed her to almost go unnoticed, but restaurant owner Kishan Raikwar described her as a 'pretty nice lady' who graciously posed for photos with his wife. Dunst's low-key visit underscored the celebrities' comfort in New Zealand's welcoming environment.\u003c/p\u003e\n\u003cp\u003eThe comedic genius Jack Black has also been captured on film in Thames, waving to onlookers from a distinctive red-and-white striped 'Steve’s Lava Chicken' campervan, adding a touch of playful excitement to the local scene. \u003cem\u003eWhite Lotus\u003c/em\u003e star Jennifer Coolidge charmed Aucklanders with a visit to a vintage store in Grey Lynn, where staff eagerly snapped photos, sharing their delight on social media. Jason Momoa is also associated with the film, adding to the star-studded cast.\u003c/p\u003e\n\u003cp\u003eThe influx of these prominent figures is not just creating a stir among fans; it's also delivering a significant boost to local economies. Small towns, in particular, are relishing the unexpected attention and the financial benefits brought by the production and celebrity spending. As one local observed, it 'put us back on the map and bring some money into town, so that’s pretty good.'\u003c/p\u003e\n\u003cp\u003eSocial media is alight with positive sentiment surrounding the filming and celebrity sightings, showcasing a mix of excitement and appreciation for the stars' respectful engagement with the local culture. While some discussions are ongoing, the overall mood is one of thrill and pride as New Zealand once again proves itself a desirable destination for major international film productions.\u003c/p\u003e\n","title":"Hollywood Takes Over Aotearoa: Stars Descend on New Zealand for Minecraft Movie Sequel","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-21T22:27:13Z","summary":"New Zealand is abuzz as a constellation of Hollywood stars, including Pierce Brosnan, Jack Black, and Kirsten Dunst, have been spotted across the North Island for the filming of the highly anticipated Minecraft movie sequel. Get the details on celebrity sightings, production updates, and the local buzz.","tags":["New Zealand","Hollywood","Minecraft Movie","Celebrity Sightings","Film Production","Pierce Brosnan","Jack Black","Kirsten Dunst","Jennifer Coolidge","Jason Momoa","Auckland","Waikato","Thames","Entertainment News"],"sources":[{"url":"https://www.nzherald.co.nz/entertainment/hollywood-stars-in-new-zealand-a-listers-spotted-in-waikato-and-auckland-for-minecraft-movie-sequel/STGOBAY3NRGKXK7MZJTWIDZJBA/","title":"Hollywood stars in New Zealand: A-listers spotted in Waikato and Auckland for Minecraft movie sequel"},{"url":"https://www.msn.com/en-us/movies/news/jack-blacks-new-video-game-movie-sequel-has-officially-starting-filming/ar-AA23bz3G","title":"Jack Black's New Video Game Movie Sequel Has Officially Starting Filming"},{"url":"https://www.msn.com/en-gb/entertainment/movies/a-minecraft-movie-2-release-date-cast-plot-and-everything-else-we-know so-far-about-the-sequel/ar-AA1OB1p5","title":"A Minecraft Movie 2 release date, cast, plot, and everything else we know so far about the sequel"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"hollywood-takes-over-aotearoa-stars-descend-on-new"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
