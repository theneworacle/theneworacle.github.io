<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"a-royal-connection-new-zealands-mori-queen-meets-k","contentHtml":"\u003cp\u003eIn a significant diplomatic and cultural event, New Zealand's Māori Queen, Te Arikinui Kuini Nga wai hono i te po, recently held a pivotal meeting with King Charles III at Buckingham Palace. This marks their first official encounter since Te Arikinui ascended to the throne in 2024, continuing a rich tradition of engagement between the Kiingitanga (Māori King Movement) and the British Royal Household that spans eight generations.\u003c/p\u003e\n\u003cp\u003eThe discussions underscored the paramount importance of fostering strong relationships between peoples, a sentiment particularly relevant as Aotearoa New Zealand anticipates the 200-year anniversary of the signing of Te Tiriti o Waitangi (the Treaty of Waitangi) in 2040.\u003c/p\u003e\n\u003cp\u003eDuring her visit, Te Arikinui, accompanied by an eight-person delegation, also graced a garden party celebrating the 50th anniversary of The King's Trust. This charitable organization, founded by King Charles in 1976, focuses on empowering individuals by developing essential life skills and facilitating access to employment opportunities. The Māori Queen also attended a special event acknowledging young people in New Zealand who have significantly improved their lives through the support of The King's Trust Aotearoa New Zealand.\u003c/p\u003e\n\u003cp\u003ePrior to her audience with King Charles, Te Arikinui engaged in a \"meaningful kōrero\" (conversation) with Prince William at Windsor Castle. Their dialogue reportedly highlighted a mutual passion for environmental solutions, emphasizing the powerful synergy between indigenous knowledge and Western science. Te Arikinui firmly expressed her belief in the capacity of indigenous wisdom and intergenerational stewardship to effectively address the pressing environmental and social challenges facing the world today.\u003c/p\u003e\n\u003cp\u003eThis historic visit has been met with a largely positive reception, sparking discussions and debate, yet reinforcing the enduring ties and shared aspirations between two distinct yet interconnected cultures.\u003c/p\u003e\n","title":"A Royal Connection: New Zealand's Māori Queen Meets King Charles at Buckingham Palace","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-16T04:34:51Z","summary":"Te Arikinui Kuini Nga wai hono i te po's historic visit underscores a long-standing relationship between the Kiingitanga and the British Royal Household, fostering dialogue on shared values and future collaborations.","tags":["Māori Queen","King Charles III","Buckingham Palace","New Zealand","Kiingitanga","Te Arikinui","Prince William","Royal Family","Treaty of Waitangi","Indigenous Knowledge","Environmental Solutions","Diplomacy","Cultural Exchange"],"sources":[{"url":"https://www.nzherald.co.nz/nz/maori-queen-te-arikinui-nga-wai-hono-i-te-po-meets-king-charles-at-buckingham-palace/SJXJBPNJVBAVXJEBP7IM7YZLFQ/","title":"Māori Queen Te Arikinui Nga wai hono i te po meets King Charles at Buckingham Palace"},{"url":"https://www.yahoo.com/news/articles/zealands-m-ori-queen-meets-024403838.html","title":"New Zealand's Māori Queen meets King Charles at Buckingham Palace"},{"url":"https://www.aol.com/articles/zealand-maori-queen-holds-heartfelt-064447000.html","title":"New Zealand's Maori Queen holds 'heartfelt' discussions with King Charles at Buckingham Palace"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-royal-connection-new-zealands-mori-queen-meets-k"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
