\u003e\n\u003cp\u003eThe incident has sparked considerable discussion, especially given prior controversies surrounding player conduct. While social media sentiment shows a mix of reactions, a generally positive tone with some debate has been observed. The England and Wales Cricket Board (ECB) has confirmed that Stokes and Atkinson were not made available for selection due to the ongoing investigation.\u003c/p\u003e\n\u003cp\u003eThe full details of the \"breach of protocols\" are still emerging, but reports indicate an altercation at a Chelsea nightclub following England's victory in the first Test at Lord's. The absence of Stokes, a pivotal all-rounder and leader, will undoubtedly impact England's strategy for the crucial second Test. The cricket world watches to see how this situation will unfold and what further implications it may have for the players and the team.\u003c/p\u003e\n","title":"Ben Stokes Dropped, Joe Root Returns as England Captain Amidst Nightclub Incident","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-11T22:55:01Z","summary":"England cricket faces turmoil as Ben Stokes is sidelined for the second Test against New Zealand due to a 'breach of protocols,' with Joe Root stepping up as interim captain.","tags":["England Cricket","Ben Stokes","Joe Root","New Zealand Test","Cricket Controversy","Sports News","ECB","Gus Atkinson"],"sources":[{"url":"https://www.skysports.com/cricket/news/12123/13552805/englands-test-captain-conundrum-ben-stokes-harry-brook-joe-root-or-someone-else","title":"England's Test captain conundrum: Ben Stokes, Harry Brook, Joe Root or someone else?"},{"url":"https://www.nytimes.com/athletic/7347892/2026/06/10/stokes-root-england-atkinson-oval-dropped/","title":"Ben Stokes and Gus Atkinson dropped by England for Oval Test, Joe Root named interim captain"},{"url":"https://sports.yahoo.com/articles/ben-stokes-dropped-joe-root-194500950.html","title":"Ben Stokes dropped, Joe Root returns as Test captain after nightclub row rocks England cricket"},{"url":"https://www.theguardian.com/sport/2026/jun/10/ben-stokes-left-out-england-joe-root-captain-new-zealand-cricket-second-test","title":"Stokes out of second Test with New Zealand over nightclub incident as Root made captain"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"ben-stokes-dropped-joe-root-returns-as-england-cap"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
