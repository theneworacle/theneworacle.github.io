<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"chaos-in-manila-gunfire-impeachment-and-a-fugitive","contentHtml":"\u003cp\u003eManila, Philippines – A dramatic political saga unfolded in the Philippines this week, as Senator Ronald 'Bato' Dela Rosa, a key ally of former President Rodrigo Duterte, initially sought refuge in the Senate complex to evade an International Criminal Court (ICC) arrest warrant, only to flee the building amidst a chaotic shooting incident.\u003c/p\u003e\n\u003cp\u003eThe tension, already high from Dela Rosa's two-night refuge since Monday, May 11th, erupted dramatically on Wednesday night, May 13th, with reports of gunshots echoing through the legislative building. According to the country’s interior secretary, unidentified armed men attempted to enter the Senate’s second floor. They were reportedly met by a warning shot from a member of the Office of the Sergeant-at-Arms. The armed men then retreated, firing shots into the air, leaving at least one windowpane riddled with a dozen bullet holes. One man has since been arrested in connection with the incident, though no casualties were reported. Philippine President Ferdinand Marcos Jr. quickly denied any government personnel involvement in the shooting, urging for calm.\u003c/p\u003e\n\u003cp\u003eFollowing the chaos, Senate President Alan Peter Cayetano confirmed Dela Rosa had fled the complex, with his wife also verifying his escape via text message. Dela Rosa's lawyer, Israelito Torreon, however, denied speculation that the shooting was a diversion tactic to aid his client's departure. Hours before the shooting, Dela Rosa had urged his supporters to gather for a vigil outside the Senate, reiterating his stance that the ICC lacked jurisdiction to arrest him.\u003c/p\u003e\n\u003cp\u003eThe ICC warrant for Senator Dela Rosa stems from his alleged role in the brutal 'war on drugs' under Duterte's presidency, which Human Rights Watch claims involved widespread extrajudicial killings through tactics like 'Oplan Tokhang' – a strategy where police would coerce dealers to surrender then summarily execute them. Dela Rosa, who served as police chief during much of this period, has consistently denied the allegations. This current standoff is particularly poignant given that former President Rodrigo Duterte himself was dramatically arrested at Manila’s international airport in March 2025 and subsequently flown to The Hague to face trial at the ICC, setting a significant precedent for high-ranking officials.\u003c/p\u003e\n\u003cp\u003eFurther compounding the nation's political turmoil, the Senate has concurrently received articles of impeachment against Vice President Sara Duterte. The legislative body is now preparing to convene as a trial court to address these charges, signaling a potential for significant political upheaval. Senator Dela Rosa himself is noted for his role in a 'power grab' that led to the installation of the current Senate President, Alan Peter Cayetano.\u003c/p\u003e\n\u003cp\u003eAmidst these high-stakes events, simulated social sentiment indicates a mixed public reaction, described as 'mostly positive, some debate,' reflecting the deep divisions and strong opinions surrounding these political figures and the ICC's involvement. As the Philippines navigates this period of intense political and legal challenges, the eyes of the nation, and indeed the world, remain fixed on Manila, awaiting the next developments in this unfolding drama.\u003c/p\u003e\n","title":"Chaos in Manila: Gunfire, Impeachment, and a Fugitive Senator Evades ICC Arrest","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-16T22:44:08Z","summary":"The Philippine Senate became the scene of a dramatic standoff, with Senator Ronald 'Bato' Dela Rosa initially seeking refuge from an ICC arrest warrant, only to flee amidst reports of gunfire. This unfolds alongside impeachment proceedings against Vice President Sara Duterte, adding layers to the nation's political crisis.","tags":["Philippines","Bato Dela Rosa","ICC","International Criminal Court","Senate","Gunfire","Sara Duterte","Impeachment","Political Crisis","Manila","Rodrigo Duterte","War on Drugs"],"sources":[{"url":"https://www.philstar.com/headlines/2026/05/14/2527718/live-developments-senate-dela-rosa-faces-arrest","title":"LIVE: Developments at Senate as Dela Rosa faces arrest"},{"url":"https://edition.cnn.com/2026/05/13/asia/gunshots-philippine-senate-dela-rosa-intl","title":"Gunshots fired in Philippines parliament as senator wanted by ICC resists arrest"},{"url":"https://www.msn.com/en-us/politics/government/gunfire-erupts-in-philippines-senate-after-lawmaker-allegedly-evades-arrest/ar-AA236OKQ?ocid=BingNewsVerp","title":"Gunfire erupts in Philippines’ Senate after lawmaker allegedly evades arrest"},{"url":"https://www.msn.com/en-ph/news/news/videos-drama-at-the-senate-over-bato-dela-rosa-s-icc-arrest/ar-AA2369l5?ocid=BingNewsVerp","title":"Videos: Drama at the Senate over Bato dela Rosa’s ICC arrest"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"chaos-in-manila-gunfire-impeachment-and-a-fugitive"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
