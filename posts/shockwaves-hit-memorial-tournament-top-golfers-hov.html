rovide a specific reason for Knapp's withdrawal, it's understood he has been battling a strained thumb injury. This injury has already forced him to miss six consecutive events, including two $20 million signature events and the PGA Championship.\u003c/p\u003e\n\u003cp\u003eDespite the injury, recent social media posts by Knapp show him practicing his swing, seemingly unhampered, adding a layer of intrigue to his sudden exit. Knapp had an impressive start to the season, finishing in the top 12 in six out of seven tournaments. His only previous appearance at the Memorial Tournament in 2024 saw him miss the cut.\u003c/p\u003e\n\u003cp\u003eThe news of these withdrawals has generated considerable discussion across social media, with sentiment generally leaning positive, though some debate surrounds the circumstances of the players' decisions. Golf enthusiasts will undoubtedly be watching closely to see how these significant changes impact the dynamics of the Memorial Tournament.\u003c/p\u003e\n","title":"Shockwaves Hit Memorial Tournament: Top Golfers Hovland and Knapp Withdraw","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-02T22:23:35Z","summary":"The Memorial Tournament has been rocked by the unexpected withdrawals of former champion Viktor Hovland and rising star Jake Knapp, leaving fans and analysts buzzing about the reasons behind their sudden exits.","tags":["Golf","PGA Tour","Memorial Tournament","Viktor Hovland","Jake Knapp","Golf Withdrawals","Sports News"],"sources":[{"url":"https://www.newsweek.com/sports/golf/top-golfer-suddenly-withdraws-from-memorial-tournament-12022546","title":"Top Golfer Suddenly Withdraws From Memorial Tournament"},{"url":"https://www.msn.com/en-us/sports/cycling/pga-tour-shock-former-champion-viktor-hovland-withdraws-as-memorial-tournament-stars-arrive-what-happened/ar-AA24sfHk?ocid=BingNewsVerp","title":"PGA Tour shock: Former champion Viktor Hovland withdraws as Memorial Tournament stars arrive. What happened?"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"shockwaves-hit-memorial-tournament-top-golfers-hov"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
