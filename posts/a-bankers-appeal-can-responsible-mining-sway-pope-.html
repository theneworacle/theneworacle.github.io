<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"a-bankers-appeal-can-responsible-mining-sway-pope-","contentHtml":"\u003cp\u003eIn a private audience this week, Ilan Goldfajn, the President of the Inter-American Development Bank (IADB), made a compelling argument to Pope Leo XIV for the potential benefits of rare earth mining in Latin America. Goldfajn emphasized that with stringent safeguards—including robust labor and environmental standards, strong governance, and a commitment to local value addition—the extraction of critical minerals could be a boon for the region.\u003c/p\u003e\n\u003cp\u003eThis overture comes at a pivotal time, as the Vatican has consistently voiced strong opposition to multinational mining corporations, particularly in Latin America, citing their historical detriment to Indigenous communities and their ancestral lands. Pope Leo XIV's perspective is deeply rooted in his personal experiences, having spent two decades as a missionary in Peru, a nation rich in copper and gold deposits. During his time, he witnessed firsthand the profound environmental and social consequences of extractive industries.\u003c/p\u003e\n\u003cp\u003eFurther solidifying the Vatican's stance, a campaign encouraging divestment from mining companies was launched just two months prior to Goldfajn's visit. Pope Leo XIV has also publicly condemned the 'colonization' of Africa's minerals by mining interests, underscoring a consistent theme in his papacy regarding environmental justice and the exploitation of natural resources.\u003c/p\u003e\n\u003cp\u003eDespite these strong moral and ethical positions from the Holy See, Goldfajn's initiative highlights a complex dilemma: the global demand for rare earth minerals, essential for modern technologies like smartphones, electric vehicles, and semiconductors. The IADB currently oversees a significant pipeline of critical mineral projects, totaling approximately $4 billion, primarily in Chile, Argentina, and Brazil, with a substantial portion involving private companies. Goldfajn believes the IADB possesses the tools to ensure these projects are executed responsibly.\u003c/p\u003e\n\u003cp\u003eWhile the Pope had a reportedly 'very constructive' private audience with top mining executives earlier in the year, the challenge remains formidable. Predecessor Pope Francis, in his 2015 encyclical 'Laudato Si'', also underscored the devastating impact of mining and stressed the indispensable role of Indigenous communities as principal dialogue partners in decisions affecting their lands. The Vatican’s communication about the specific details of Leo XIV’s recent meeting with Goldfajn remains private.\u003c/p\u003e\n\u003cp\u003eThe global discourse around Pope Leo XIV and mining indicates a generally positive sentiment, albeit with ongoing debate. The question remains whether the promise of responsible development, championed by figures like Goldfajn, can genuinely reconcile with the Vatican's unwavering commitment to environmental protection and social justice for the most vulnerable populations affected by the mining industry.\u003c/p\u003e\n","title":"A Banker's Appeal: Can Responsible Mining Sway Pope Leo XIV?","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-20T13:54:49Z","summary":"Ilan Goldfajn, head of the Inter-American Development Bank, has presented a case for responsible rare earth mining in Latin America to Pope Leo XIV, challenging the Vatican's long-standing critique of the industry amidst a global tech boom.","tags":["Pope Leo XIV","Rare Earth Mining","Latin America","Inter-American Development Bank","Vatican","Indigenous Rights","Environmental Protection","Sustainable Development"],"sources":[{"url":"https://apnews.com/article/rare-earth-minerals-leo-mining-goldfajn-8a44b7e7f89fb84d77f2d6cf472d600d","title":"A top banker tried to sway Pope Leo XIV on rare earth mining"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-bankers-appeal-can-responsible-mining-sway-pope-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
