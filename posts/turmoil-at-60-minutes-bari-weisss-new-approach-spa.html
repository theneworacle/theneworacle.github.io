ecame a forum for discontent.\u003c/p\u003e\n\u003cp\u003eAmong the significant changes, former executive producer Tanya Simon was terminated. Additionally, reporters Cecilia Vega and Sharyn Alfonsi have also parted ways with '60 Minutes', with Vega alleging she was 'fired' and citing 'efforts to insert political bias into our stories' in recent months. These departures and accusations paint a picture of a newsroom grappling with fundamental shifts in editorial vision.\u003c/p\u003e\n\u003cp\u003eWeiss's leadership at CBS News and the subsequent overhaul at '60 Minutes' follow Paramount Skydance's acquisition of her news and opinion site, The Free Press, in October 2024. This context suggests a broader strategic move to reshape the network's journalistic identity. While the internal reaction has been sharp, social media sentiment regarding these changes is reportedly 'mostly positive, with some debate,' indicating a divided public opinion on the shake-up at the venerable news institution.\u003c/p\u003e\n\u003cp\u003eThe future of '60 Minutes' under this 'new approach' remains to be seen, but it's clear that the changes initiated by Bari Weiss are redefining the landscape of one of television's most respected news programs.\u003c/p\u003e\n","title":"Turmoil at '60 Minutes': Bari Weiss's 'New Approach' Sparks Outcry and Departures","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-07T17:16:25Z","summary":"CBS News leader Bari Weiss's 'new approach' at '60 Minutes' has led to significant internal upheaval, including executive producer replacements and a strong rebuke from veteran correspondent Scott Pelley.","tags":["CBS News","60 Minutes","Bari Weiss","Scott Pelley","Media","Journalism","News Industry"],"sources":[{"url":"https://people.com/scott-pelley-cbs-news-boss-murdering-60-minutes-staff-meeting-11988397","title":"Scott Pelley Claimed CBS News Boss Is 'Murdering' 60 Minutes During Heated Staff Meeting: Report"},{"url":"https://www.yahoo.com/e
