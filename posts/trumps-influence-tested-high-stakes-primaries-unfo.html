<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"trumps-influence-tested-high-stakes-primaries-unfo","contentHtml":"\u003cp\u003eSix U.S. states are abuzz with primary election activity, but it's the high-stakes battle in Kentucky that has captured national attention. Former President Donald Trump has made it his mission to unseat incumbent Republican Representative Thomas Massie, transforming the Kentucky primary into a crucial barometer of Trump's influence within the GOP.\u003c/p\u003e\n\u003cp\u003eTrump has leveraged his Truth Social platform to rally voters against Massie, whom he has publicly labeled a \"thorn in the president’s side.\" The former president's grievances stem from Massie's stances on several key issues, including his push for the release of the Jeffrey Epstein files, opposition to the Iran war, and a vote against Trump's signature tax legislation. Despite this formidable opposition, Massie remains confident in his prospects for victory. The primary in Massie's district has become one of the most expensive House primaries in recent years, underscoring the intensity of the contest. Voter sentiment in Kentucky appears to be mixed, with some constituents expressing dissatisfaction over Massie's past actions, such as a controversial Christmas photo featuring semi-automatic rifles and his perceived lack of support for certain Trump administration policies. Trump has thrown his support behind challenger Ed Gallrein.\u003c/p\u003e\n\u003cp\u003eBeyond Kentucky, other significant primary races are unfolding:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePennsylvania:\u003c/strong\u003e Democrats are making a concerted effort to target Republican Rep. Brian Fitzpatrick in what is considered a crucial swing district.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOregon:\u003c/strong\u003e Incumbent Governor Tina Kotek is widely expected to secure the Democratic primary nomination, while a crowded field of Republican hopefuls vies for the opportunity to challenge her in the general election.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlabama:\u003c/strong\u003e The state's primaries are grappling with considerable voter confusion and postponed U.S. House races due to ongoing redistricting disputes, sparking concerns about the potential dilution of the Black vote.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGeorgia:\u003c/strong\u003e Brad Raffensperger, who gained national prominence for defending the state's 2020 election system against Trump's challenges, is now campaigning for governor. Separately, current Governor Brian Kemp is endorsing an outsider candidate for the Senate, highlighting a different facet of Republican primary dynamics.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTrump's active role in these primaries is not unprecedented; his past endorsements have proven decisive, as seen in Indiana where state senators who defied him lost their primaries, and in Louisiana, where Senator Bill Cassidy, who voted to convict Trump during an impeachment trial, was defeated. These elections serve as a vital indicator of the evolving political landscape and the enduring power of endorsements from prominent figures within both parties.\u003c/p\u003e\n","title":"Trump's Influence Tested: High-Stakes Primaries Unfold Across Six States","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-19T21:18:40Z","summary":"As voters in six U.S. states head to the polls for primary elections, the spotlight is firmly on Kentucky, where former President Donald Trump is aggressively campaigning to oust incumbent Republican Representative Thomas Massie, setting the stage for a significant test of his enduring political power.","tags":["US Primaries","Donald Trump","Thomas Massie","Kentucky Politics","Elections 2026","Republican Party","Political Influence"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/six-us-states-hold-primaries-as-trump-urges-kentucky-voters-to-oust-massie/ar-AA23xZCe","title":"Six US states hold primaries as Trump urges Kentucky voters to oust Massie"},{"url":"https://apnews.com/live/election-primary-05-19-2026","title":"Live updates: Massie tests Trump’s strength on blockbuster primary day"},{"url":"https://www.courier-journal.com/story/News/politics/elections/2026/05/18/trump-truth-social-post-thomas-massie-ed-gallrein/90148925007/","title":"On Truth Social, Trump asks Kentucky voters to support Massie challenger"},{"url":"https://www.msn.com/en-us/news/politics/trump-calls-out-rep-thomas-massie-kentucky-get-this-loser-out-of-politics-tuesday/ar-AA23p7jU?ocid=BingNewsVerp","title":"Trump calls out Rep Thomas Massie: 'Kentucky, get this LOSER out of politics' Tuesday"},{"url":"https://www.msn.com/en-us/news/politics/massie-defiant-as-trump-seeks-to-oust-him-in-primary-im-going-to-win/ar-AA23vH7C?ocid=BingNewsVerp","title":"Massie defiant as Trump seeks to oust him in primary: \"I'm going to win\""},{"url":"https://www.nytimes.com/2026/05/19/us/politics/trump-massie-kentucky-primary-spending.html","title":"Trump’s Push to Defeat Massie Is the Most Expensive House Primary in Recent Years"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"trumps-influence-tested-high-stakes-primaries-unfo"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
