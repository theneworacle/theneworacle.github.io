<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"aftershocks-beyond-borders-hawaii-filipinos-react-","contentHtml":"\u003cp\u003eA devastating 7.8-magnitude earthquake, the strongest to strike the Philippines this year, recently rattled the southern island of Mindanao, triggering a tsunami warning that briefly extended across the Pacific to Hawai'i. While Hawai'i was ultimately spared from a tsunami threat, the seismic event has left a profound impact on the ground, with a rising death toll of at least 37 and nearly 500 injured, alongside significant structural damage.\u003c/p\u003e\n\u003cp\u003eFor the vibrant Filipino community in Hawai'i, the news sparked immediate alarm and a wave of concern for family and friends in the affected regions. Many scrambled to connect with loved ones, facing the challenge of disrupted phone lines in some areas. Natalia Roxas, a Waialua resident, shared her personal experience, recounting how she instantly reached out to ensure her family's safety and witnessed jarring videos of the earthquake's impact, including a makeshift school shelter collapsing with children huddled inside. Having grown up with earthquakes in the Philippines, Roxas is no stranger to the country's location within the 'Ring of Fire,' a tectonically active zone prone to frequent seismic activity.\u003c/p\u003e\n\u003cp\u003eThe disaster has also underscored the existing economic disparities within the Philippines, particularly affecting Indigenous communities in Mindanao. Lydia Querian, an O'ahu resident and founder of House of Gongs, collaborates with Indigenous weavers from the region. While their weaving centers were reported safe, Querian voiced her apprehension for the artisans, noting that these communities are often the most vulnerable during natural disasters due to land exploitation and slower governmental response times.\u003c/p\u003e\n\u003cp\u003eThe Philippine Consulate General in Honolulu has confirmed that damage assessments are ongoing. President Ferdinand Marcos Jr. has mobilized various government agencies to prioritize search and rescue operations, emergency relief, and the restoration of essential public services. However, a definitive recovery timeline remains elusive, contingent on the thorough assessment of damages and the subsequent rehabilitation requirements.\u003c/p\u003e\n\u003cp\u003eDespite the initial tsunami alert for Hawai'i being canceled, the emotional aftershocks continue to resonate deeply within the Filipino diaspora, demonstrating the unbreakable bonds that connect communities across vast distances in times of crisis.\u003c/p\u003e\n","title":"Aftershocks Beyond Borders: Hawai'i Filipinos React to Philippines Earthquake","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-11T17:38:30Z","summary":"A powerful 7.8 magnitude earthquake in the Southern Philippines has sent ripples of concern through the Filipino community in Hawai'i, prompting frantic calls to loved ones and highlighting the vulnerabilities of remote indigenous communities.","tags":["Philippines","Earthquake","Hawaii","Mindanao","Disaster Relief","Tsunami","Filipino Community","Indigenous Communities","Natural Disaster"],"sources":[{"url":"https://www.hawaiipublicradio.org/local-news/2026-06-09/filipinos-in-hawaii-react-to-devastating-earthquake-in-the-philippines","title":"Filipinos in Hawai‘i react to devastating earthquake in the Philippines"},{"url":"https://www.kitv.com/news/local/no-tsunami-threat-for-hawaii-after-8-2-magnitude-quake-hits-philippines/article_284168de-c108-4076-992e-b280556f2409.html","title":"NO Tsunami threat for Hawaii after 8.2 magnitude quake hits Philippines"},{"url":"https://www.msn.com/en-au/news/news/7-8-magnitude-earthquake-rocks-the-philippines-triggering-tsunami-warnings-across-the-region/ar-AA253Zux?ocid=BingNewsVerp","title":"7.8 magnitude earthquake rocks the Philippines, triggering tsunami warnings across region"},{"url":"https://www.msn.com/en-in/news/world/massive-82-magnitude-earthquake-hits-southern-philippines-tsunami-alerts-issued/ar-AA254nET?ocid=BingNewsVerp","title":"Massive 8.2 magnitude earthquake hits southern Philippines, tsunami alerts issued"},{"url":"https://www.msn.com/en-nz/news/other/video-shows-moment-7-8-magnitude-quake-hit-philippines/vi-AA256DkS?ocid=BingNewsVerp","title":"Video shows moment 7.8 magnitude quake hit Philippines"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"aftershocks-beyond-borders-hawaii-filipinos-react-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
