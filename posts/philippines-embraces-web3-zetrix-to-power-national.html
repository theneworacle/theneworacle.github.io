<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-embraces-web3-zetrix-to-power-national","contentHtml":"\u003cp\u003eIn a landmark move towards digital transformation, the Philippines government, through its Department of Information and Communications Technology (DICT), has signed a Memorandum of Understanding (MOU) with Malaysia's Zetrix AI Berhad group, Zetrix Philippines Inc., and My Blockchain Infrastructure Sdn. Bhd. This pivotal agreement positions the Zetrix Layer-1 public blockchain platform as the foundational protocol for the Philippines' new public blockchain infrastructure.\u003c/p\u003e\n\u003cp\u003eThis strategic collaboration is designed to enhance the portability of trust across various systems and international borders. A core objective is to facilitate the secure and efficient digital verification of government-issued credentials, promising to streamline citizen access to essential services by significantly reducing bureaucratic hurdles. Zetrix brings a robust track record to this partnership, having already served as the core chain for Malaysia's national blockchain and operating as the international supernode for China's national Xinghuo Blockchain Infrastructure and Facility. This extensive experience solidifies Zetrix's standing as a global leader in sovereign-issued digital identities.\u003c/p\u003e\n\u003cp\u003eThe initial phase of deployment will focus on several key applications. These include fostering cross-border interoperability between the national digital IDs of Malaysia and the Philippines, enabling seamless issuance, verification, and authentication of Philippine government credentials, and facilitating smoother trade operations. Zetrix AI Berhad, with nearly a decade of experience as a prominent digital government service enabler in the Philippines, is spearheading this Web3 revolution for the Filipino populace.\u003c/p\u003e\n\u003cp\u003eThe announcement has garnered a generally positive reaction on social media, reflecting optimism about the potential for technological advancement and improved public services, though some ongoing discussions and debates are also observed.\u003c/p\u003e\n","title":"Philippines Embraces Web3: Zetrix to Power National Public Blockchain","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-09T12:45:17Z","summary":"The Philippines government has officially partnered with Malaysia's Zetrix AI Berhad to establish a public blockchain infrastructure, marking a significant step into the Web3 era for the nation. This collaboration aims to revolutionize digital trust, credential verification, and cross-border interoperability.","tags":["Philippines","Blockchain","Zetrix","DICT","Web3","Digital Transformation","Government","Malaysia","Cross-border","Digital ID","Trade Facilitation"],"sources":[{"url":"https://www.manilatimes.net/2026/07/08/tmt-newswire/pr-newswire/zetrix-to-power-public-blockchain-for-the-philippines-government/2380387","title":"ZETRIX TO POWER PUBLIC BLOCKCHAIN FOR THE PHILIPPINES GOVERNMENT"},{"url":"https://www.morningstar.com/news/pr-newswire/20260414hk32611/zetrix-caicts-astron-unveil-blockchain-ai-trust-layer-for-agentic-ai-ecosystem","title":"Zetrix, CAICT's Astron Unveil Blockchain-AI Trust Layer for Agentic AI Ecosystem"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-embraces-web3-zetrix-to-power-national"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
