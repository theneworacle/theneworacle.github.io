<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-rejects-chinese-scholars-claims-on-bat","contentHtml":"\u003cp\u003eManila, Philippines – The Philippine government has issued a resolute rejection of assertions made by Chinese scholars that its island province of Batanes is part of Chinese territory. The contentious claims, reportedly put forth by academics from institutions including Nanjing University, argued that Batanes is a natural extension of Taiwan, and by extension, belongs to China.\u003c/p\u003e\n\u003cp\u003eIn a unified front, Philippine defense officials and the Department of Foreign Affairs (DFA) have unequivocally stated that the country's sovereignty over Batanes is 'settled and not up for debate.' This strong stance underscores the Philippines' commitment to its territorial integrity, particularly for an island group that holds significant strategic importance due to its proximity to Taiwan.\u003c/p\u003e\n\u003cp\u003eThe National Historical Commission of the of the Philippines (NHCP) has also weighed in, refuting and condemning the claims. This broad rejection from various government bodies highlights the gravity with which Manila views any challenge to its sovereign territory.\u003c/p\u003e\n\u003cp\u003eThe Chinese scholars' argument, framing Batanes as a geological extension of Taiwan, has been met with a firm reminder from Manila that such interpretations do not supersede established international law and historical claims. The Philippines has long maintained its sovereignty over the Batanes islands, a vibrant province known for its unique culture and challenging geography.\u003c/p\u003e\n\u003cp\u003eSocial media response to the Philippines' rejection of these claims has been largely positive, reflecting widespread public support for the government's position, though discussions on the geopolitical implications continue. This incident further complicates the already sensitive relationship between the Philippines and China, particularly concerning maritime and territorial disputes in the region.\u003c/p\u003e\n","title":"Philippines Rejects Chinese Scholars' Claims on Batanes: Sovereignty 'Not Up for Debate'","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-12T22:46:00Z","summary":"The Philippines has firmly dismissed claims by Chinese scholars suggesting its northernmost island province of Batanes, strategically located near Taiwan, belongs to China. Philippine officials have reiterated that the nation's sovereignty over Batanes is 'settled and not up for debate.'","tags":["Philippines","China","Batanes","Sovereignty","Territorial Dispute","Taiwan","International Relations","South China Sea"],"sources":[{"url":"https://www.yahoo.com/news/articles/philippines-rejects-chinese-scholars-claim-090339485.html","title":"Philippines rejects Chinese scholars' claim over its island province near Taiwan"},{"url":"https://www.msn.com/en-ph/news/national/philippines-rejects-claims-that-batanes-belongs-to-china-says-sovereignty-not-up-for-debate/ar-AA27zbMB?ocid=BingNewsVerp","title":"Philippines rejects claims that Batanes belongs to China; says sovereignty not up for debate"},{"url":"https://www.pna.gov.ph/articles/1279206","title":"NHCP refutes scholars' claim that Batanes belongs to China"},{"url":"https://www.msn.com/en-my/news/other/philippines-rejects-chinese-scholars-claim-over-island-province-near-taiwan/ar-AA27yfSC?ocid=BingNewsVerp","title":"Philippines rejects Chinese scholars’ claim over island province near Taiwan"},{"url":"https://www.msn.com/en-ph/news/other/philippines-shoots-down-claims-that-batanes-is-chinas/ar-AA27BGTk?ocid=BingNewsVerp","title":"Philippines shoots down claims that Batanes is China's"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-rejects-chinese-scholars-claims-on-bat"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
