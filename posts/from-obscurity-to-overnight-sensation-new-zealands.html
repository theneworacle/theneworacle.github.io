<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"from-obscurity-to-overnight-sensation-new-zealands","contentHtml":"\u003cp\u003eIn a truly unexpected twist ahead of the 2026 FIFA World Cup, New Zealand's Tim Payne has transformed from a relatively unknown right-back into an international social media sensation. The Wellington Phoenix player, who was once just one of many hopefuls heading to the global tournament, found himself at the center of a viral campaign that catapulted his online presence to unprecedented heights.\u003c/p\u003e\n\u003cp\u003eThe extraordinary journey began when Argentine social media influencer Valen Scarsini, known online as 'elscarso', identified Payne as the 'least known' player participating in the upcoming World Cup. In an ingenious move, Scarsini called upon his vast following to 'explode his posts with likes and comments' and boost Payne's online visibility.\u003c/p\u003e\n\u003cp\u003eThe response was nothing short of phenomenal. Within a mere 48 hours, Payne's Instagram follower count surged from approximately 4,000 to over one million. This incredible growth not only made him New Zealand's most followed football account but also saw him surpass the likes of national team captain Chris Wood and even the official All Whites team account.\u003c/p\u003e\n\u003cp\u003eOverwhelmed by the outpouring of support, Payne took to social media to express his gratitude to Scarsini and his newfound global fanbase. Acknowledging the 'pretty crazy 48 hours,' he also reiterated his immense pride in representing New Zealand on the world stage.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment surrounding Payne's story has been overwhelmingly positive, sparking widespread discussion about the power of online communities and the unpredictable nature of viral fame. As New Zealand prepares to face Iran, Egypt, and Belgium in Group G, all eyes will undoubtedly be on Tim Payne, the unlikely star who found fame before even kicking a ball.\u003c/p\u003e\n","title":"From Obscurity to Overnight Sensation: New Zealand's Tim Payne Becomes a World Cup Social Media Star","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-02T12:48:33Z","summary":"New Zealand footballer Tim Payne, initially dubbed the 'least known' player ahead of the 2026 FIFA World Cup, has unexpectedly skyrocketed to global social media fame thanks to an Argentine influencer's viral campaign.","tags":["Tim Payne","New Zealand","FIFA World Cup 2026","Social Media","Football","Viral Sensation","Valen Scarsini"],"sources":[{"url":"https://sports.yahoo.com/articles/zealand-world-cup-player-becomes-235152003.html","title":"New Zealand World Cup player becomes social media star with influencer help"},{"url":"https://www.msn.com/en-au/news/other/new-zealand-s-payne-an-unlikely-social-media-star-ahead-of-world-cup/ar-AA24lZIe?ocid=BingNewsVerp","title":"New Zealand’s Payne an unlikely social media star ahead of World Cup"},{"url":"https://www.msn.com/en-in/news/world/who-is-tim-payne-the-least-known-world-cup-player-who-gained-almost-1-million-followers-overnight/ar-AA24izEl?ocid=BingNewsVerp","title":"Who is Tim Payne? The 'least-known' World Cup player who gained almost 1 million followers overnight"},{"url":"https://sports.yahoo.com/articles/world-cup-player-goes-unknown-123842496.html","title":"World Cup player goes from unknown to 1.5m Instagram followers in 48 hours"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"from-obscurity-to-overnight-sensation-new-zealands"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
