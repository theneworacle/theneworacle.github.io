<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"2028-watch-vance-aoc-and-newsom-in-early-president","contentHtml":"\u003cp\u003eThe 2028 presidential race might seem a distant blip on the political radar, but early predictions and polling are already setting the stage for what promises to be a fascinating contest. Recent discussions have been ignited by Senator JD Vance, who has publicly stated his belief that Representative Alexandria Ocasio-Cortez (AOC) will emerge as the leading Democratic candidate in 2028, rather than California Governor Gavin Newsom.\u003c/p\u003e\n\u003cp\u003eAdding fuel to the speculative fire, AOC herself has hinted at a potential run, even expressing a desire to face Vance on the national stage. This exchange underscores the high-profile nature of these figures, even in the nascent stages of the election cycle.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNew Hampshire Poll Reveals Shifting Sands\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eA recent poll conducted in New Hampshire (June 24-25, 2026) by the Saint Anselm College Survey Center offers a glimpse into these early dynamics:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDemocratic Primary:\u003c/strong\u003e Former Transportation Secretary Pete Buttigieg currently holds the lead with 29%. However, AOC has shown a significant surge, rising to second place with 17% (up from 10% in March), now surpassing Gavin Newsom, who sits at 11% (down from 15% in March).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRepublican Primary:\u003c/strong\u003e On the Republican side, Vice President JD Vance leads the field with 37%, followed by Secretary of State Marco Rubio at 30%. Notably, Vance's lead has narrowed from 19 points in March to a tighter 7 points.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eBroader Political Climate\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe poll also provided insights into the general political landscape:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePresident Donald Trump's approval and favorability ratings have seen a notable decline, dropping to 38% and 37% respectively, a departure from his historical stability on these metrics.\u003c/li\u003e\n\u003cli\u003eDemocrats currently hold a lead on the generic ballot (49% to 39% Republican), with this gap widening by two points since the last survey.\u003c/li\u003e\n\u003cli\u003eVoters express greater trust in Democrats regarding affordability issues, and Democratic voters demonstrate higher enthusiasm for the upcoming elections.\u003c/li\u003e\n\u003cli\u003eDespite the broader challenges for Republicans, New Hampshire's Republican Governor Kelly Ayotte remains a strong contender, maintaining a positive approval rating (49%) and leading her Democratic challenger (45% to 37%) for re-election.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhile no candidates have officially declared their intentions for 2028, these early indicators suggest a dynamic political environment, with new faces and evolving voter sentiments already shaping the narrative for the next presidential election.\u003c/p\u003e\n","title":"2028 Watch: Vance, AOC, and Newsom in Early Presidential Scramble","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-14T20:59:19Z","summary":"Early polling for the 2028 presidential election is stirring the pot, with JD Vance predicting an AOC-led Democratic field and a new New Hampshire poll showing shifting dynamics for both parties. While it's still years away, the battle lines for the next White House race are already being drawn.","tags":["2028 Election","JD Vance","AOC","Gavin Newsom","Pete Buttigieg","Republican Primary","Democratic Primary","New Hampshire Poll","US Politics"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/jd-vances-chances-of-beating-aoc-and-newsom-in-new-2028-poll/ar-AA27U1G7","title":"JD Vance's chances of beating AOC and Newsom in new 2028 poll"},{"url":"https://www.msn.com/en-us/politics/elections/aoc-presidential-chances-after-jd-vance-makes-2028-prediction/ar-AA26ZBCI?ocid=BingNewsVerp","title":"AOC presidential chances after JD Vance makes 2028 prediction"},{"url":"https://www.usatoday.com/story/news/politics/2026/07/06/buttigieg-newsom-aoc-who-will-win-the-2028-presidential-primaries/90819433007/","title":"NH poll takes early look at 2028 presidential race. Who’s in the lead?"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"2028-watch-vance-aoc-and-newsom-in-early-president"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
