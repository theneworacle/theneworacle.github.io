 incident has sent shockwaves through the community, highlighting concerns about construction safety standards and the well-being of workers in such projects. As rescue efforts continue, the nation watches with bated breath, hoping for more good news amidst the tragedy. The social sentiment surrounding the event has been largely positive, focusing on the heroic rescue efforts, though some debate is present, likely around the causes and implications of the collapse.\u003c/p\u003e\n","title":"Philippines Building Collapse: Death Toll Rises to Four, Rescue Efforts Continue for 17 Missing","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-25T06:27:08Z","summary":"A devastating nine-story building collapse in Angeles City, Philippines, has seen the death toll rise to four, with rescue teams relentlessly searching for 17 individuals still missing after the structure crumbled during a thunderstorm.","tags":["Philippines","Building Collapse","Angeles City","Rescue","Construction Safety","Disaster","Tragedy"],"sources":[{"url":"https://www.msn.com/en-us/news/world/two-trapped-people-alive-after-philippines-building-collapse-rescue-continues/ar-AA23W13C?ocid=BingNewsVerp","title":"Two trapped people alive after Philippines building collapse, rescue continues"},{"url":"https://www.msn.com/en-ph/news/news/2-confirmed-dead-18-still-missing-in-pampanga-building-collapse-as-rescue-enters-second-day/ar-AA23YH9j?ocid=BingNewsVerp","title":"2 confirmed dead, 18 still missing in Pampanga building collapse as rescue enters second day"},{"url":"https://www.msn.com/en-us/news/news/death-toll-rises-to-three-with-17-still-missing-after-philippine-building-collapse/ar-AA23Z572?ocid=BingNewsVerp","title":"Death toll rises to three with 17 still missing after Philippine building collapse"},{"url":"https://www.freepressjournal.in/world/philippines-building-collapse-dozens-feared-trapped-as-9-storey-structure-crumbles-in-angeles-city","title":"Philippines Building Co
