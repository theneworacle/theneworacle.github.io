<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"tragedy-strikes-angeles-city-hotel-collapse-claims","contentHtml":"\u003cp\u003eANGELES CITY, Philippines – A devastating incident unfolded in Angeles City, Pampanga Province, on Sunday, May 25, 2026, when a nine-story hotel, still under construction, dramatically collapsed before dawn following a fierce thunderstorm. The catastrophic event has claimed the lives of 28 people, predominantly construction workers who were sleeping on the ground floor of the unfinished structure.\u003c/p\u003e\n\u003cp\u003eInitial reports indicated at least one Malaysian tourist dead and 21, mostly workers, trapped beneath the immense pile of concrete slabs, twisted iron bars, and aluminum scaffolding. Rescue operations, spearheaded by firefighters and police, were fraught with peril. Rescuers moved cautiously due to large, precariously held concrete sections that threatened further collapse. Early efforts focused on live rescues, with emergency personnel attempting to provide water and medicine intravenously to those trapped in the scorching summer heat. However, despite their desperate attempts, many did not survive.\u003c/p\u003e\n\u003cp\u003eThe emotional toll on families waiting for news was palpable. Lea Mendoza Casilao, a 47-year-old sardine factory worker, shared her agonizing wait for her boyfriend, a mason among the missing. She expressed diminishing hope as the slow and dangerous rescue work continued.\u003c/p\u003e\n\u003cp\u003eAs days passed, the grim reality set in, and the operation shifted from rescue to body retrieval. The death toll steadily climbed, eventually reaching 28. The incident has prompted a thorough investigation by national police chief Gen. Jose Melencio Nartatez Jr. to determine the precise cause of the collapse and identify any potential violations of safety and building regulations.\u003c/p\u003e\n\u003cp\u003eAngeles City, a bustling hub with a history tied to the former U.S. Clark Air Base, is a significant commercial and tourism center in the northern Philippine region of Luzon. The tragic collapse casts a somber shadow over the city, highlighting critical questions about infrastructure development and worker safety in rapidly expanding urban areas.\u003c/p\u003e\n","title":"Tragedy Strikes Angeles City: Hotel Collapse Claims 28 Lives","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-06T23:03:03Z","summary":"A fierce thunderstorm preceded the collapse of a nine-story hotel under construction in Angeles City, Philippines, on May 25, 2026, leading to the deaths of 28 individuals, mostly construction workers. Rescuers faced immense challenges amid unstable debris as investigations into building safety violations are underway.","tags":["Philippines","Angeles City","Hotel Collapse","Construction Accident","Pampanga","Building Safety","Disaster","Worker Safety"],"sources":[{"url":"https://apnews.com/article/philippines-building-collapse-angeles-city-pampanga-clark-6a04bcd1f62ad8d625ab58a87512cd5c","title":"4 dead, 17 mostly workers still missing, in collapse of unfinished hotel in the Philippines"},{"url":"https://www.msn.com/en-ph/news/news/death-toll-from-the-angeles-city-building-collapse-rises-to-28/ar-AA24ZGIu?ocid=BingNewsVerp","title":"Death toll from the Angeles City building collapse rises to 28"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"tragedy-strikes-angeles-city-hotel-collapse-claims"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
