<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"78-magnitude-earthquake-rocks-southern-philippines","contentHtml":"\u003cp\u003eThe southern Philippines was hit by a devastating 7.8-magnitude earthquake on June 8, 2026, originating offshore Mindanao. This seismic event, the strongest to impact the archipelago this year, has left a trail of destruction, claiming at least 35 lives and injuring many more. The quake triggered deadly landslides, particularly in mountainous towns like Glan in Sarangani province, where 13 villagers perished as their homes were engulfed.\u003c/p\u003e\n\u003cp\u003eMajor port cities, including General Santos, a vital hub for the tuna export industry, experienced significant damage with buildings collapsing or being severely compromised. Rescue efforts were immediately launched, with reports of students potentially trapped in a collapsed two-story school and search and rescue operations underway in damaged commercial buildings and warehouses.\u003c/p\u003e\n\u003cp\u003eAdding to the immediate dangers, the earthquake generated small tsunamis. Waves reaching up to 4.6 feet were observed in coastal areas like Kiamba town in Sarangani, while smaller waves were detected as far as Indonesia, Palau, and even southern Japan. Philippine officials, however, lifted the tsunami warning by mid-afternoon as the immediate threat subsided, approximately five hours after the initial tremor. The region also braced for and experienced powerful aftershocks, some as strong as 6.5 magnitude, further jeopardizing damaged structures and ongoing rescue operations.\u003c/p\u003e\n\u003cp\u003eIn response to the unfolding crisis, Philippine President Ferdinand Marcos Jr. swiftly ordered the cancellation of classes across the nation and directed disaster-response agencies to provide immediate assistance to the affected provinces. The international airport in General Santos was temporarily shut down, leading to the cancellation of 17 domestic flights, underscoring the severe disruption to daily life and commerce.\u003c/p\u003e\n\u003cp\u003eThe Philippines' vulnerability to such powerful seismic events is a stark reality, given its location on the Pacific 'Ring of Fire' – an arc of seismic faults prone to frequent earthquakes and volcanic eruptions. Amidst the tragedy, social media sentiment largely reflected an outpouring of concern and support for the affected communities, highlighting a collective sense of solidarity.\u003c/p\u003e\n\u003cp\u003eAs the nation grapples with the aftermath, the focus remains on search and rescue, providing aid to the displaced, and beginning the long process of recovery and rebuilding in the hard-hit southern regions.\u003c/p\u003e\n","title":"7.8 Magnitude Earthquake Rocks Southern Philippines, Triggers Tsunamis and Landslides, Kills Dozens","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-11T07:50:26Z","summary":"A powerful 7.8-magnitude earthquake struck off the coast of Mindanao, Philippines, on June 8, 2026, causing widespread destruction, deadly landslides, and small tsunamis. The strongest quake to hit the archipelago this year has claimed at least 35 lives, disrupted critical infrastructure, and sparked a nationwide response.","tags":["Philippines","Earthquake","Mindanao","Tsunami","Landslide","Natural Disaster","General Santos","Sarangani","Emergency Response"],"sources":[{"url":"https://www.cbsnews.com/news/earthquake-southern-philippines-tsunami-warnings/","title":"Philippines earthquake kills at least 35 people, unleashes small tsunami"},{"url":"https://www.independent.co.uk/asia/southeast-asia/philippines-earthquake-map-where-indonesia-japan-b2991584.html","title":"Mapped: Philippines regions hit hardest by 7.8-magnitude earthquake that left 32 dead"},{"url":"https://www.msn.com/en-sg/news/other/78-magnitude-earthquake-rocks-the-philippines-triggering-tsunami-warnings-across-the-region/ar-AA253Zva?ocid=BingNewsVerp","title":"7.8 magnitude earthquake rocks the Philippines, triggering tsunami warnings across region"},{"url":"https://www.msn.com/en-us/news/news/videos-from-thailand-and-japan-falsely-linked-to-philippine-earthquake/ar-AA25Q4CO?ocid=BingNewsVerp","title":"Videos from Thailand and Japan falsely linked to Philippine earthquake"},{"url":"https://www.channelnewsasia.com/asia/live-philippines-mindanao-earthquake-tsunami-6168141","title":"As it happened: Magnitude 7.8 earthquake strikes southern Philippines, triggering tsunami warnings"},{"url":"https://www.msn.com/en-in/news/world/permanent-coastal-uplift-why-the-sea-wont-return-after-the-78-magnitude-philippines-earthquake/ar-AA263qRK?ocid=BingNewsVerp","title":"Permanent coastal uplift: Why the sea won't return after the 7.8 magnitude Philippines earthquake"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"78-magnitude-earthquake-rocks-southern-philippines"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
