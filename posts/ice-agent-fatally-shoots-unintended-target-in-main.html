<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"ice-agent-fatally-shoots-unintended-target-in-main","contentHtml":"\u003cp\u003eBIDDEFORD, Maine – A traffic stop in Biddeford, Maine, turned fatal when a U.S. Immigration and Customs Enforcement (ICE) agent shot and killed a 26-year-old Colombian national. Initial reports from lawmakers and immigration advocates confirm the victim was not the intended target of the ICE operation, sparking outrage and calls for a thorough investigation.\u003c/p\u003e\n\u003cp\u003eThe deceased, identified by the Maine Immigrants’ Rights Coalition as a 26-year-old Colombian authorized to work in the U.S., was described as \"a member of our community, a neighbor, and a human being whose life was cut tragically short.\" According to Homeland Security Secretary Markwayne Mullin, the ICE agent involved claimed the man 'weaponized' his vehicle, leading to the shooting. However, critical details of the encounter are challenged by witness accounts and a significant lack of transparency.\u003c/p\u003e\n\u003cp\u003eEyewitness Daniel Boucher recounted hearing what sounded like firecrackers, then seeing a white SUV, presumably driven by ICE, ram a smaller white car. He observed an officer pull the man out, who, with blood on his face, reportedly stated, “But I tried to stop.” Another witness, Mary Hayes, emotionally described seeing the victim's wife \"fall to her knees looking at her husband's dead body on the ground\" and a \"little girl crying with a little pink backpack on because she's never going to see her father again.\"\u003c/p\u003e\n\u003cp\u003eFurther compounding concerns about accountability, Senator Angus King, I-Maine, revealed that the ICE agents involved in the shooting were \u003cstrong\u003enot wearing body cameras\u003c/strong\u003e, despite DHS distributing them elsewhere. King, who initially received incorrect information from Secretary Mullin that the victim was the target of a warrant, later confirmed the man was not, emphasizing the need for a \"full, fair, and transparent\" investigation.\u003c/p\u003e\n\u003cp\u003eThis tragic event comes less than a week after another man, Lorenzo Salgado Araujo, was fatally shot by an ICE officer in Houston, who was also not the intended target. This pattern, coupled with past instances where ICE's initial statements on use of force were contradicted by evidence, fuels skepticism and demands for answers. Democratic U.S. Representative Chellie Pingree, representing Biddeford, expressed her anger and deep disturbance, questioning ICE's presence and tactics in Maine.\u003c/p\u003e\n\u003cp\u003ePublic reaction has been swift and strong. Protests erupted in Biddeford, with demonstrators gathering at a park and marching to Senator Susan Collins' office, chanting \"ICE out!\" and \"Vote her out!\". The Maine Immigrants’ Rights Coalition and Presente! Maine declared themselves \"devastated and outraged,\" while Maine AFL-CIO President Cynthia Phinney condemned it as an \"unnecessary tragedy\" resulting from ICE’s \"reign of terror and intimidation,\" asserting that \"ICE’s actions on our streets are making them less safe.\" Biddeford Mayor Liam LaFountain has also called for a \"full, thorough, and transparent\" investigation, stating the community deserves clear answers.\u003c/p\u003e\n\u003cp\u003eAdding to the context, internal data indicates that ICE arrests in Maine have more than quadrupled since early June, reaching approximately 70 per day in early July, highlighting an intensifying enforcement presence in the state.\u003c/p\u003e\n","title":"ICE Agent Fatally Shoots Unintended Target in Maine Traffic Stop; Calls for Transparency Mount","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-14T09:56:44Z","summary":"A 26-year-old Colombian national, authorized to work in the U.S. and not the intended target of an operation, was fatally shot by an ICE agent during a traffic stop in Biddeford, Maine. This incident, just days after a similar fatal shooting in Houston, has ignited protests, widespread condemnation from officials and advocacy groups, and raised critical questions about ICE's use of force and lack of body cameras.","tags":["ICE","Fatal Shooting","Maine","Biddeford","Immigration Enforcement","Police Brutality","Human Rights","Accountability","Body Cameras","Social Justice"],"sources":[{"url":"Colombian national killed by ICE agent during operation in Maine","title":"Colombian national killed by ICE agent during operation in Maine"},{"url":"Man fatally shot by ICE during Maine traffic stop, lawmakers say","title":"Man fatally shot by ICE during Maine traffic stop, lawmakers say"},{"url":"ICE agent fatally shoots man during encounter in Maine","title":"ICE agent fatally shoots man during encounter in Maine"},{"url":"Fatal shooting involving ICE officers under investigation in Maine","title":"Fatal shooting involving ICE officers under investigation in Maine"},{"url":"Man fatally shot by ICE in Maine was not arrest target, Rep. Pingree says","title":"Man fatally shot by ICE in Maine was not arrest target, Rep. Pingree says"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"ice-agent-fatally-shoots-unintended-target-in-main"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
