<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"three-lions-face-all-whites-in-crucial-world-cup-w","contentHtml":"\u003cp\u003eEngland is set to face New Zealand in a significant pre-World Cup warm-up match this Saturday, June 6, 2026. The clash will take place at the Raymond James Stadium, with kick-off scheduled for 21:00 BST.\u003c/p\u003e\n\u003cp\u003eHead coach Thomas Tuchel views this fixture as crucial for building definitive tactical momentum, especially after an uninspiring spring campaign that saw the Three Lions draw against Uruguay and suffer a surprise defeat to Japan. Tuchel will be keen to use this high-stakes encounter to solidify his tournament plans and foster immediate cohesion within the squad.\u003c/p\u003e\n\u003cp\u003eHistorically, England boasts an impressive record against lower-ranked opposition, having won 37 consecutive games against teams outside the top 84. Furthermore, they have never failed to score against the All Whites in their previous international meetings, a statistic that will undoubtedly boost confidence within the camp.\u003c/p\u003e\n\u003cp\u003eHowever, Tuchel faces several high-profile selection challenges. Key Arsenal stars – Bukayo Saka, Declan Rice, Eberechi Eze, and Noni Madueke – will be absent. They have been granted an extended rest period following their recent Champions League final commitments and only joined the training camp on Saturday. Their absence leaves Tuchel with limited natural options on the right wing, potentially seeing Morgan Rogers or Marcus Rashford deployed in this role.\u003c/p\u003e\n\u003cp\u003eIn midfield, an experimental pairing of Kobbie Mainoo and Elliot Anderson could start. Jude Bellingham is expected to compete with Rogers for the creative number 10 position, playing behind captain Harry Kane. Kane, fresh off a spectacular club season with 61 goals for Bayern Munich, will lead the line and has a strong record of nine goals in nine international appearances against non-European teams. Defensively, Ezri Konsa and Marc Guéhi are slated to start at centre-back, with Jordan Pickford in goal. Understudy goalkeepers Dean Henderson and James Trafford are also expected to get minutes in the second half.\u003c/p\u003e\n\u003cp\u003eThe international friendly will be broadcast live on ITV1 in the UK, while viewers in the United States can stream the entire match live through the Prime Video application. Social media sentiment surrounding the match is largely positive, with some healthy debate among fans.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEngland Predicted XI:\u003c/strong\u003e Pickford; James, Konsa, Guehi, O’Reilly; Anderson, Mainoo; Rogers, Bellingham, Rashford; Kane.\u003c/p\u003e\n","title":"Three Lions Face All Whites in Crucial World Cup Warm-up: England vs. New Zealand Preview","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-06T14:48:06Z","summary":"England's Thomas Tuchel prepares his squad for a vital pre-World Cup friendly against New Zealand. Despite key absences, the Three Lions aim to build momentum and solidify tactical plans ahead of the tournament. Get the predicted lineup, team news, and where to watch this anticipated clash.","tags":["England Football","New Zealand Football","International Friendly","World Cup Warm-up","Thomas Tuchel","Harry Kane","Team News","Predicted Lineup"],"sources":[{"url":"https://sports.yahoo.com/articles/england-vs-zealand-predicted-lineup-063000593.html","title":"England vs New Zealand – Predicted lineup and team news"},{"url":"https://www.sportsmole.co.uk/football/england/predicted-lineups/arsenal-quartet-absent-predicted-england-xi-vs-new-zealand_598648.html","title":"England lineup vs. New Zealand: Predicted XI for international friendly as Arsenal quartet miss out"},{"url":"https://www.msn.com/en-za/news/other/england-v-new-zealand-prediction-team-news-lineups-and-odds/ar-AA24JHwp?ocid=BingNewsVerp","title":"MSN"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"three-lions-face-all-whites-in-crucial-world-cup-w"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
