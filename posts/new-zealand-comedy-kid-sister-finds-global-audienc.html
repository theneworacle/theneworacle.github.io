<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealand-comedy-kid-sister-finds-global-audienc","contentHtml":"\u003cp\u003eThe heartwarming and humorous New Zealand comedy series \"Kid Sister,\" created, written, and executive produced by the talented Simone Nathan, is making its way to a global audience. ChaiFlicks, a streaming platform dedicated to Jewish content from around the world, has acquired exclusive SVOD (Subscription Video On Demand) rights for both seasons of the hit show in the U.S., U.K., and Australia. Viewers can look forward to its debut this fall.\u003c/p\u003e\n\u003cp\u003eOriginally commissioned by TVNZ in New Zealand, \"Kid Sister\" offers a semi-autobiographical glimpse into the life of Lulu (played by Nathan), a 29-year-old unmarried woman living with her Jewish family in Auckland. The series deftly navigates Lulu's internal and external struggles as she attempts to reconcile her family's strong push to preserve tradition with her secret relationship with her non-Jewish boyfriend, Ollie. It's a relatable journey of a young woman striving to chart her own course amidst cultural expectations and her desire for independence.\u003c/p\u003e\n\u003cp\u003eSimone Nathan brings a wealth of experience to \"Kid Sister,\" having previously contributed her writing and producing talents to notable American television productions such as HBO Max’s “Our Flag Means Death,” Comedy Central’s “Inside Amy Schumer,” and Netflix’s “Bloodline.” Her distinctive voice, described by ChaiFlicks co-founder Neil Friedman as a blend of Lena Dunham and Jenny Slate, promises a smart, fearless, and refreshingly original comedic experience.\u003c/p\u003e\n\u003cp\u003eComprising two seasons with a total of ten 20-minute episodes, \"Kid Sister\" delves into universal pressures many individuals face from family and society to settle down, regardless of their background or beliefs. Nathan herself expressed her hope for a broader audience connection, stating, \"At its core, the show explores the universal pressure many people face from family and society to settle down, regardless of their religion, background, or gender.\"\u003c/p\u003e\n\u003cp\u003eSocial sentiment surrounding the series and its international acquisition has been largely positive, with ongoing discussions highlighting its appeal and relevant themes. This deal marks a significant moment for New Zealand comedy, bringing a unique and authentic story to a wider international viewership through ChaiFlicks.\u003c/p\u003e\n","title":"New Zealand Comedy 'Kid Sister' Finds Global Audience on ChaiFlicks","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-10T15:36:13Z","summary":"Simone Nathan's critically acclaimed New Zealand comedy series, \"Kid Sister,\" is set to debut for international audiences this fall, as ChaiFlicks secures exclusive streaming rights for the U.S., U.K., and Australia. The semi-autobiographical show, which explores themes of cultural identity, family expectations, and modern relationships with sharp wit, has garnered a positive reception.","tags":["New Zealand","Comedy","Simone Nathan","Kid Sister","ChaiFlicks","TVNZ","SVOD","Jewish Content","Auckland","Family","Culture","Relationships"],"sources":[{"url":"https://variety.com/2026/global/global/simone-nathan-kid-sister-chaiflicks-1236806400/","title":"Simone Nathan’s New Zealand Comedy ‘Kid Sister’ Lands at ChaiFlicks in Deal With Seven.One Studios International (EXCLUSIVE)"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealand-comedy-kid-sister-finds-global-audienc"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
