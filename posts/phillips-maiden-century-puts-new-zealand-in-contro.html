<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"phillips-maiden-century-puts-new-zealand-in-contro","contentHtml":"\u003cp\u003eNew Zealand has seized control of the second Test against England at Kennington Oval, largely thanks to a magnificent maiden Test century from all-rounder Glenn Phillips and a relentless bowling performance. At the close of Day 2, England finds themselves in a precarious position, reeling at 222 for 6, still trailing New Zealand's first-innings total by a substantial 169 runs.\u003c/p\u003e\n\u003cp\u003eThe morning session belonged unequivocally to Phillips. Resuming at an overnight score of 291 for 7, Phillips showcased exceptional grit and attacking prowess, braving England's pace attack to reach a memorable 100 runs. His crucial innings, supported by Tom Blundell's steady 51 and some valuable lower-order contributions, propelled New Zealand to a formidable first-innings total of 391.\u003c/p\u003e\n\u003cp\u003eIn reply, England's new-look batting line-up endured a challenging period. Despite a positive start and a resilient knock of 53 from debutant opener Emilio Gay, the hosts struggled to build significant partnerships. New Zealand's bowlers maintained disciplined lines and lengths, consistently applying pressure. Pace spearhead Matt Henry was particularly effective, dismantling England's middle order by claiming two crucial wickets, including that of interim captain Joe Root for 46. The collapse saw England slide dramatically, leaving debutants James Rew and Jordan Cox to offer some late resistance with a 40-run stand, though Rew was eventually dismissed after a dropped catch lifeline.\u003c/p\u003e\n\u003cp\u003eWith England facing a monumental task to bridge the 169-run deficit, New Zealand will head into Day 3 with a significant upper hand. The social sentiment surrounding the match has been largely positive, reflecting the exciting cricket on display and New Zealand's dominant performance.\u003c/p\u003e\n","title":"Phillips' Maiden Century Puts New Zealand in Control Against England","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-20T11:24:42Z","summary":"Glenn Phillips' superb maiden Test century and a disciplined bowling attack have given New Zealand a commanding lead over England on Day 2 of the second Test at Kennington Oval. England faces a daunting task on Day 3, trailing by 169 runs.","tags":["Cricket","New Zealand","England","Test Match","Glenn Phillips","Sports","Kennington Oval"],"sources":[{"url":"https://sports.yahoo.com/articles/eng-vs-nz-2nd-test-013700396.html","title":"ENG vs NZ, 2nd Test: Glenn Phillips's century, Matt Henry's dual strikes put Kiwis in Command on Day 2"},{"url":"https://www.theguardian.com/sport/live/2026/jun/18/england-v-new-zealand-second-mens-test-day-two-live","title":"England v New Zealand: second men’s Test, day two – as it happened"},{"url":"https://www.msn.com/en-us/sports/other/ton-up-phillips-stars-for-new-zealand-against-england/ar-AA25XF5Q?ocid=BingNewsVerp","title":"Ton-up Phillips stars for New Zealand against England"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"phillips-maiden-century-puts-new-zealand-in-contro"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
