<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"pldt-targets-400-million-from-historic-data-center","contentHtml":"\u003cp\u003eMANILA, Philippines – In a landmark move for the Philippine financial market and the telecommunications industry, PLDT Inc., the nation's leading digital services provider, is gearing up for a substantial Real Estate Investment Trust (REIT) listing of its highly valuable data center assets. The initiative, expected to launch by the fourth quarter of 2026, aims to generate between $300 million and $400 million, marking a significant step for the company and the first data center REIT on the Philippine Stock Exchange (PSE).\u003c/p\u003e\n\u003cp\u003eThis strategic decision by PLDT underscores the growing importance of digital infrastructure and data management in the Philippines. With an increasing demand for connectivity and data storage, PLDT's data centers represent a crucial backbone for the country's digital economy. By listing these assets as a REIT, PLDT is not only looking to unlock significant capital but also to allow investors to participate directly in the booming digital infrastructure sector.\u003c/p\u003e\n\u003cp\u003eThe proceeds from this offering are expected to fuel further expansion and modernization of PLDT's network and data center capabilities, reinforcing its position as a key player in the region's digital transformation. The move is also anticipated to set a precedent for other companies with substantial real estate assets, particularly in the tech and infrastructure sectors, to explore similar capital-raising avenues through REITs.\u003c/p\u003e\n\u003cp\u003eEarly indications suggest a predominantly positive social sentiment surrounding the PLDT REIT listing, with market observers and potential investors showing interest in this innovative financial instrument. While discussions are ongoing, the overall outlook points towards a keen anticipation for this offering, highlighting investor confidence in PLDT's assets and the long-term growth potential of the Philippine digital economy.\u003c/p\u003e\n","title":"PLDT Targets $400 Million from Historic Data Center REIT Listing","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-16T07:25:51Z","summary":"Philippine telecommunications giant PLDT Inc. is set to make waves on the Philippine Stock Exchange with a pioneering Real Estate Investment Trust (REIT) listing of its data center assets, aiming to raise a significant $300 million to $400 million by the fourth quarter of this year.","tags":["Philippines","PLDT","REIT","Data Center","Telecommunications","Investment","Philippine Stock Exchange","PSE"],"sources":[{"url":"https://manilastandard.net/business/314750938/pldt-eyes-400m-from-reit-offering.html","title":"PLDT eyes $400m from REIT offering"},{"url":"https://www.msn.com/en-ph/money/technology/pldt-eyes-400-million-in-data-center-listing/ar-AA25d9pu","title":"PLDT eyes $400 million in data center listing"},{"url":"https://www.msn.com/en-ph/money/economy/pldt-preps-data-center-unit-for-400-m-reit-ipo-by-q4/ar-AA25d0MI","title":"PLDT preps data center unit for $400-M REIT IPO by Q4"},{"url":"https://www.msn.com/en-ph/money/economy/pldt-oks-reit-listing-plan-for-data-center-unit-eyes-raising-300m-400m/ar-AA25cdNr","title":"PLDT OKs REIT listing plan for data center unit, eyes raising $300M-$400M"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"pldt-targets-400-million-from-historic-data-center"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
