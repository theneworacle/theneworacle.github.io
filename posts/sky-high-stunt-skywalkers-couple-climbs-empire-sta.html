erformative' and 'egregious,' speculating about potential jail time.\u003c/p\u003e\n\u003cp\u003eThis incident highlights the growing phenomenon of 'daredevil' stunts used to deliver messages or create viral content, often blurring the lines between personal expression, public spectacle, and legal boundaries. As discussions continue about the implications for urban safety and the motivations behind such high-stakes displays, one thing is clear: the 'Skywalkers' have once again left an indelible mark on the public consciousness, literally from the top of New York City.\u003c/p\u003e\n","title":"Sky-High Stunt: 'Skywalkers' Couple Climbs Empire State Building for Proposal and Peace Banner","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-02T02:51:52Z","summary":"A well-known daredevil couple, featured in the Netflix documentary 'Skywalkers,' recently scaled the iconic Empire State Building antenna in New York City, not only for a daring marriage proposal but also to unfurl a powerful peace banner. The audacious act, while gaining significant social media attention, also led to their arrest, sparking debate about performative activism and public safety.","tags":["Empire State Building","Daredevils","Skywalkers","Marriage Proposal","Peace Banner","NYC","Netflix","Viral News","Activism"],"sources":[{"url":"https://www.msn.com/en-us/tv/news/netflixs-skywalkers-couple-get-engaged-atop-empire-state-building/ar-AA270Gzi","title":"Netflix's Skywalkers Couple Get Engaged Atop Empire State Building"},{"url":"https://www.msn.com/en-us/news/us/two-people-in-custody-after-scaling-to-top-of-empire-state-building/ar-AA270g06","title":"Two people in custody after scaling to top of Empire State Building"},{"url":"https://www.msn.com/en-us/news/offbeat/kissing-daredevils-scale-empire-state-building-antenna-hanging-flag-1454-feet-over-nyc-with-cringe-message/ar-AA270dwF","title":"Kissing daredevils scale Empire State Building antenna, hanging flag 1,454 feet over NYC with cringe message"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"sky-high-stunt-skywalkers-couple-climbs-empire-sta"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
