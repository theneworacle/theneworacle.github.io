<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-gripped-as-vice-president-sara-duterte","contentHtml":"\u003cp\u003eThe Philippines is currently captivated by the commencement of Vice President Sara Duterte's impeachment trial in Manila, a politically charged event with profound implications for her future and the country's leadership.\u003c/p\u003e\n\u003cp\u003eDuterte, daughter of former President Rodrigo Duterte, was conspicuously absent on the trial's opening day, opting to be represented by her legal team. She stands accused of serious allegations including corruption, bribery, and even an assassination plot against her one-time ally, President Ferdinand Marcos Jr. – all charges she vehemently denies.\u003c/p\u003e\n\u003cp\u003eThis high-profile trial is more than just a legal battle; it's a pivotal moment that could reshape the 2028 presidential election landscape. Duterte is a leading contender for the presidency, and a conviction by a two-thirds vote in the deeply divided 24-seat Senate would not only strip her of the vice presidency but also permanently bar her from holding any elected office.\u003c/p\u003e\n\u003cp\u003eThe proceedings highlight the increasingly fractured political alliance between the powerful Duterte and Marcos dynasties. What began as a joint ticket in 2022 has devolved into a bitter feud, intensified by former President Rodrigo Duterte's arrest and transfer to International Criminal Court (ICC) custody on murder charges related to his controversial 'war on drugs'.\u003c/p\u003e\n\u003cp\u003eThe Senate itself is a battleground, reflecting the nation's political schisms. Recent events, such as the arrest of a Duterte-ally senator on plunder charges shortly before the trial, and shifts in Senate leadership, underscore the contentious nature of the proceedings and the high stakes involved for all parties.\u003c/p\u003e\n\u003cp\u003eDespite the gravity of the accusations and the potential for political upheaval, simulated social sentiment surrounding the trial appears largely positive, albeit with some public debate. Thousands of police have been deployed around the Senate, anticipating potential protests as the nation watches to see how this 'trial of the century' will unfold.\u003c/p\u003e\n","title":"Philippines gripped as Vice President Sara Duterte's Impeachment Trial Begins","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-07-12T11:11:55Z","summary":"Vice President Sara Duterte faces a high-stakes impeachment trial in the Philippines, accused of corruption, bribery, and even an assassination plot. Her absence on the first day underscores the political drama unfolding as her fate – and the nation's political future – hangs in the balance.","tags":["Philippines","Sara Duterte","Impeachment Trial","Philippine Politics","Ferdinand Marcos Jr.","Corruption","Political Dynasty"],"sources":[{"url":"https://www.aljazeera.com/news/2026/7/6/impeachment-trial-of-philippine-vice-president-sara-duterte-begins","title":"Impeachment trial of Philippine Vice President Sara Duterte begins"},{"url":"https://www.actionnewsjax.com/news/world/philippine-senate/BHZ7M44BY44NNPMVBW3AJDUCIM/","title":"Philippine Senate opens the impeachment trial of Vice President Sara Duterte"},{"url":"https://www.aljazeera.com/news/2026/7/6/philippine-vice-president-dutertes-impeachment-trial-begins-what-we-know","title":"Philippine Vice President Duterte’s impeachment trial begins: What we know"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-gripped-as-vice-president-sara-duterte"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
