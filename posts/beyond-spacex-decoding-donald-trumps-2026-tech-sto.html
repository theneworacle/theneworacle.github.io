<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"beyond-spacex-decoding-donald-trumps-2026-tech-sto","contentHtml":"\u003cp\u003eIn early 2026, former President Donald Trump made a significant splash in the stock market, particularly within the booming technology and artificial intelligence sectors. Recent disclosures illuminate a vigorous trading period, with investments ranging from an estimated $220 million to $750 million in just the first quarter.\u003c/p\u003e\n\u003cp\u003eInitially, attention was drawn to a claim suggesting Trump had invested in Iridium Communications (NASDAQ:IRDM), touted as a 'top space stock.' While direct confirmation of a personal acquisition by Trump within his disclosed trades for Iridium Communications remains elusive in detailed filings, the company was indeed highlighted within a broader 'Donald Trump Stock Portfolio: 5 Best AI and Tech Stock Picks in 2026' – indicating its relevance to investment strategies associated with him.\u003c/p\u003e\n\u003cp\u003eHowever, what is unequivocally clear from ethics filings is Trump's expansive engagement with other major tech players. His portfolio swelled with shares in industry titans such as Amazon, Meta, Oracle, Broadcom, Motorola, and Dell. These moves underscore a keen interest in, and perhaps confidence in, the sustained growth of the tech landscape and the escalating demand for AI-driven solutions.\u003c/p\u003e\n\u003cp\u003eThe sheer volume of his trading activity, with thousands of buy and sell orders executed daily, has drawn both scrutiny and admiration. Social sentiment surrounding these revelations has been largely positive, with some debate regarding the implications of a public figure, especially a former president, actively trading stocks in companies that could be influenced by policy. Indeed, some reports indicate that some of his trades were in companies whose fortunes could be directly impacted by his past or potential future decisions.\u003c/p\u003e\n\u003cp\u003eThis aggressive foray into the stock market paints a picture of a proactive investor capitalizing on market dynamics, particularly in the tech and AI space. Regardless of individual stock performance – as some reports also detailed his less successful ventures – Trump's substantial investments in this sector reflect a broader trend of high-profile engagement with the technologies shaping our future.\u003c/p\u003e\n","title":"Beyond SpaceX: Decoding Donald Trump's 2026 Tech Stock Playbook","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-06-20T03:55:28Z","summary":"New disclosures reveal Donald Trump's extensive foray into the tech and AI stock market in early 2026, with investments potentially totaling hundreds of millions. While some reports link him to Iridium Communications, his broader portfolio includes giants like Amazon, Meta, and Nvidia, sparking debate and positive sentiment.","tags":["Donald Trump","Stock Market","AI","Tech Investment","Iridium Communications","2026"],"sources":[{"url":"https://finance.yahoo.com/markets/stocks/articles/forget-spacex-hype-donald-trump-154556812.html","title":"Forget SpaceX Hype: Donald Trump Bought This Top Space Stock in 2026"},{"url":"https://www.euronews.com/business/2026/05/15/trump-discloses-stock-trades-revealing-massive-gains-in-2026-with-bets-on-big-tech","title":"Stock trade disclosure reveals Trump made massive gains on Big Tech bets"},{"url":"https://www.cnbc.com/2026/05/15/trump-stock-trade-tech-oge.html","title":"Trump went big on tech stocks in first quarter of 2026, new filings show"},{"url":"https://apnews.com/article/stock-trading-trump-nvidia-apple-defense-1bd6e661929430892ae8f1eced3e0df8","title":"Trump discloses thousands of stock trades, some in companies directly influenced by his policies"},{"url":"https://www.forbes.com/sites/kylemullins/2026/06/02/here-are-donald-trumps-10-worst-stock-trades-of-2026/","title":"Here Are Donald Trump’s 10 Worst Stock Trades Of 2026"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"beyond-spacex-decoding-donald-trumps-2026-tech-sto"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
