<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"sam-altman-under-scrutiny-lying-accusations-rock-o","contentHtml":"\u003cp\u003eThe tech world is abuzz as OpenAI CEO Sam Altman finds himself at the center of a contentious legal battle, with accusations of lying and a 'toxic culture of lying' coming to light during a lawsuit brought by Elon Musk. The dispute, which has unfolded in an Oakland, California, federal court, sees Musk suing OpenAI and Altman for alleged breach of charitable trust and unjust enrichment.\u003c/p\u003e\n\u003cp\u003eMusk's lawsuit claims he was manipulated into contributing $38 million to OpenAI, under the premise that it would remain a nonprofit dedicated to safe artificial intelligence for humanity's benefit. However, he alleges that the company shifted to a for-profit model, enriching investors like Microsoft, which has poured over $100 billion into its partnership with OpenAI. Musk is seeking approximately $150 billion in damages, to be paid to OpenAI's nonprofit, and calls for the removal of Altman and OpenAI president Greg Brockman from their positions.\u003c/p\u003e\n\u003cp\u003eDuring the trial, Musk's attorney, Steven Molo, presented testimony from five witnesses, including Musk himself and former OpenAI board members, who reportedly testified to Altman's alleged dishonesty. Molo highlighted Altman's reluctance to unequivocally affirm his trustworthiness during cross-examination, stating that Altman's credibility is 'directly at issue in this case.' The defense also challenged Brockman's financial motivations, citing his own OpenAI stake, reportedly valued at nearly $30 billion.\u003c/p\u003e\n\u003cp\u003eOpenAI's legal team, however, has vehemently denied the accusations. They argue that Musk delayed filing his lawsuit, having been aware of the company's evolving business model for years. OpenAI's lawyers contend that Musk himself sought to control the company and merge it with Tesla, and that other founders resisted handing over the 'keys of AGI' (artificial general intelligence) to one individual. They also accused Musk of 'selective amnesia,' particularly regarding a 2018 term sheet that outlined plans for external investments.\u003c/p\u003e\n\u003cp\u003eThe financial stakes are immense, with OpenAI preparing for a potential initial public offering that could value the company at an astounding $1 trillion. Meanwhile, Musk's rival AI venture, xAI, now part of SpaceX, is also gearing up for its own potential IPO.\u003c/p\u003e\n\u003cp\u003eThe trial's timing underscores broader public anxieties surrounding AI, including concerns about job displacement and a general distrust of the technology. With closing arguments concluded, the nine-person jury is expected to deliberate soon, determining the future structure of OpenAI and potential damages if Musk prevails.\u003c/p\u003e\n\u003cp\u003eDespite the serious allegations and ongoing legal drama, social media sentiment regarding 'Sam Altman lying accusations' is reported as 'Mostly positive, some debate,' suggesting a mixed but generally favorable view towards Altman or OpenAI among online discussions.\u003c/p\u003e\n","title":"Sam Altman Under Scrutiny: Lying Accusations Rock OpenAI Trial","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-16T20:45:14Z","summary":"OpenAI CEO Sam Altman is facing intense scrutiny over allegations of dishonesty and a 'toxic culture of lying' in a high-stakes lawsuit filed by Elon Musk. The trial, nearing its conclusion, delves into OpenAI's transformation from a nonprofit to a trillion-dollar for-profit entity, with Musk seeking significant damages and leadership changes.","tags":["Sam Altman","OpenAI","Elon Musk","AI","Lawsuit","Technology","Silicon Valley","Artificial Intelligence"],"sources":[{"url":"https://www.msn.com/en-us/money/companies/sam-altmans-on-top-in-silicon-valley-former-colleagues-keep-saying-that-hes-a-liar/ar-AA23kmUV","title":"Sam Altman's on top in Silicon Valley. Former colleagues keep saying that he's a liar"},{"url":"https://www.msn.com/en-us/money/companies/sam-altman-faces-awkward-grilling-over-toxic-culture-of-lying/ar-AA231zo4?ocid=BingNewsVerp","title":"Sam Altman faces awkward grilling over 'toxic culture of lying'"},{"url":"https://www.msn.com/en-us/money/companies/sam-altman-claims-elon-musk-declared-openai-control-would-go-to-his-kids-if-he-died-bombshell-testimony/ar-AA231MKq?ocid=BingNewsVerp","title":"Sam Altman claims Elon Musk declared OpenAI control would go to his kids if he died: bombshell testimony"},{"url":"https://www.thejakartapost.com/business/2026/05/15/musk-accused-of-selective-amnesia-altman-of-lying-as-openai-trial-nears-end.html","title":"Musk accused of 'selective amnesia,' Altman of lying as OpenAI trial nears end"},{"url":"https://www.nytimes.com/live/2026/05/12/technology/openai-trial-sam-altman-elon-musk","title":"Sam Altman Testifies That Elon Musk Wanted Control of OpenAI"},{"url":"https://www.aol.com/articles/ronan-farrow-sam-altman-fight-203049352.html","title":"Ronan Farrow on Sam Altman and the Fight Over AI’s Future"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"sam-altman-under-scrutiny-lying-accusations-rock-o"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
