<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"us-military-strike-kills-notorious-tren-de-aragua-","contentHtml":"\u003cp\u003ePresident Donald Trump announced a 'swift and lethal kinetic' U.S. military strike in Venezuela that successfully killed Héctor Rusthenford Guerrero Flores, widely known as 'Niño Guerrero,' the notorious leader of the Tren de Aragua criminal gang. The operation, which took place earlier this week in Venezuela's southeastern state of Bolivar, signals an unprecedented level of cooperation between the United States and Venezuela.\u003c/p\u003e\n\u003cp\u003eThe Tren de Aragua gang has been officially designated as a terrorist organization by the U.S. government. Guerrero Flores was a wanted fugitive, facing federal charges in a New York court for racketeering conspiracy and other serious crimes, including providing material support to terrorists. The gang's criminal enterprise spans North America, South America, and Europe, where it is responsible for countless acts of violence, extortion, and drug trafficking.\u003c/p\u003e\n\u003cp\u003ePresident Trump emphasized the strike as a critical step in combating the drug dealing and violence that Tren de Aragua has inflicted, asserting that these 'vicious murderers and drug lords' would no longer find safe haven. A substantial $5 million reward had been offered by the U.S. State Department for information leading to Guerrero Flores's arrest or conviction.\u003c/p\u003e\n\u003cp\u003eBoth the U.S. and Venezuelan governments confirmed their participation in the joint operation, underscoring a shared commitment to dismantle narco-terrorist networks in the hemisphere. This collaboration is particularly notable given the often-strained diplomatic relations between the two nations.\u003c/p\u003e\n\u003cp\u003eOriginating more than a decade ago from a Venezuelan prison, Tren de Aragua expanded its influence significantly as millions of Venezuelans migrated across the continent. The gang leveraged this migration to extend its reach, engaging in various illicit activities including gold mining and controlling drug corridors. While its exact size remains unclear, countries like Peru and Colombia have attributed numerous acts of violence in the region to the group.\u003c/p\u003e\n\u003cp\u003eSocial media response to the news has been predominantly positive, with some ongoing debate surrounding the implications of such an operation and the future of U.S.-Venezuelan relations in the fight against transnational crime.\u003c/p\u003e\n","title":"US Military Strike Kills Notorious Tren de Aragua Leader 'Niño Guerrero'","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-13T13:54:25Z","summary":"A high-profile U.S. military strike in Venezuela has eliminated Héctor Rusthenford Guerrero Flores, alias 'Niño Guerrero,' the infamous leader of the Tren de Aragua gang. The operation, conducted in cooperation with Venezuelan authorities, marks a significant blow against the U.S.-designated terrorist organization known for widespread violence and drug trafficking.","tags":["Tren de Aragua","Niño Guerrero","US Military Strike","Venezuela","Terrorism","Drug Trafficking","Donald Trump","International Cooperation"],"sources":[{"url":"https://www.wral.com/news/ap/344db-trump-says-us-military-strike-killed-leader-of-tren-de-aragua-gang-with-help-from-venezuela/","title":"Trump says US military strike killed leader of Tren de Aragua gang with help from Venezuela"},{"url":"https://nypost.com/2026/06/12/us-news/tren-de-aragua-leader-nino-guerrero-killed-in-us-airstrike-trump-says/","title":"Tren de Aragua leader killed in dramatic US airstrike — marking new level of cooperation with Venezuela"},{"url":"https://www.foxnews.com/politics/trump-says-us-military-eliminated-infamous-tren-de-aragua-leader-lethal-strike","title":"Trump says US military eliminated 'infamous' Tren de Aragua leader in lethal strike"},{"url":"https://www.yahoo.com/news/politics/articles/trump-says-us-military-killed-015012960.html","title":"Trump says US military killed Venezuelan gang leader"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"us-military-strike-kills-notorious-tren-de-aragua-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
