<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"fox-news-hosts-under-fire-for-outrageous-attacks-o","contentHtml":"\u003cp\u003eA firestorm has erupted around Fox News as several of its prominent hosts are being heavily criticized for what are being described as 'outrageous attacks' on James Talarico, a Democratic Texas Senate candidate. The controversy highlights a disturbing trend of personal and often mocking remarks from news personalities directed at political figures.\u003c/p\u003e\n\u003cp\u003eAt the center of the controversy is Emily Compagno, who has drawn significant condemnation for her comments regarding Talarico. While the full context of her remarks could not be obtained due to technical limitations in article scraping, the public reaction indicates a strong negative sentiment towards her statements.\u003c/p\u003e\n\u003cp\u003eOther Fox News hosts have also contributed to the escalating criticism. Johnny “Joey” Jones reportedly suggested that Talarico has 'mommy issues,' a deeply personal and irrelevant attack. Jesse Watters took aim at Talarico's personal life, even questioning the authenticity of his girlfriend in a segment that many found to be in poor taste.\u003c/p\u003e\n\u003cp\u003eBeyond these specific instances, reports indicate that some Fox News personalities have 'melted down' on air, with one even allegedly referring to Talarico as a 'demon in human skin.' Additionally, there has been an unusual and puzzling focus by Republicans on Talarico's eating habits, particularly his vegan status, which has become an oddly critical detail in some discussions.\u003c/p\u003e\n\u003cp\u003eThe public response to these attacks has been swift and largely critical, with many condemning the Fox News hosts for engaging in what appears to be a coordinated effort to personally disparage Talarico rather than engage in substantive political discourse. A simulated social sentiment analysis revealed a 'mostly positive, some debate' response, suggesting a significant portion of the public supports Talarico or disapproves of the hosts' tactics, while others are engaging in discussions, possibly defending the commentators.\u003c/p\u003e\n\u003cp\u003eThe repeated nature of these personal and often mocking attacks by multiple Fox News personalities against James Talarico raises questions about the standards of political commentary and the increasing polarization of media discourse. As the debate continues, the focus remains on the ethical boundaries of news commentary and the impact such rhetoric has on political candidates and the broader public.\u003c/p\u003e\n","title":"Fox News Hosts Under Fire for 'Outrageous Attacks' on James Talarico","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-04T10:11:14Z","summary":"Several Fox News personalities, including Emily Compagno, Johnny “Joey” Jones, and Jesse Watters, are facing backlash for a series of \"outrageous attacks\" and disparaging comments directed at Democratic Texas Senate candidate James Talarico.","tags":["Fox News","James Talarico","Emily Compagno","Johnny Joey Jones","Jesse Watters","Political Commentary","Media Criticism"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/sick-sick-people-critics-torch-fox-news-host-after-outrageous-attack-on-james-talarico/ar-AA27bkDa","title":"MSN News"},{"url":"https://www.yahoo.com/news/politics/articles/sick-sick-people-critics-torch-030753304.html","title":"https://www.yahoo.com/news/politics/articles/sick-sick-people-critics-torch-030753304.html"},{"url":"https://www.yahoo.com/news/politics/articles/fox-news-host-mommy-issues-134224324.html","title":"https://www.yahoo.com/news/politics/articles/fox-news-host-mommy-issues-134224324.html"},{"url":"https://www.yahoo.com/news/politics/articles/fox-host-melts-down-over-204221441.html","title":"https://www.yahoo.com/news/politics/articles/fox-host-melts-down-over-204221441.html"},{"url":"https://www.yahoo.com/entertainment/celebrity/articles/jesse-watters-mocks-james-talarico-230654635.html","title":"https://www.yahoo.com/entertainment/celebrity/articles/jesse-watters-mocks-james-talarico-230654635.html"},{"url":"https://www.yahoo.com/news/politics/articles/why-republicans-cant-stop-talking-163203314.html","title":"https://www.yahoo.com/news/politics/articles/why-republicans-cant-stop-talking-163203314.html"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"fox-news-hosts-under-fire-for-outrageous-attacks-o"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
