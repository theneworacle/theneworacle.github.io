<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"leila-de-lima-leads-charge-for-philippines-return-","contentHtml":"\u003cp\u003eFormer Senator Leila de Lima is making a powerful push for the Philippines to re-engage with the International Criminal Court (ICC). In a significant legislative move, De Lima has filed House Resolution 1056, calling upon President Ferdinand Marcos Jr. and the Department of Foreign Affairs to initiate the process of re-establishing the Philippines' membership in the international body.\u003c/p\u003e\n\u003cp\u003eDe Lima argues that rejoining the ICC is not merely a diplomatic formality but a vital step towards reaffirming the nation's commitment to justice, accountability, human rights, and the rule of law. She believes that such a move would act as a crucial deterrent against grave international crimes and help restore public trust in the country's institutions of justice. Furthermore, it would bolster the Philippines' standing on the global stage as a state that champions its obligations under international law and defends human dignity.\u003c/p\u003e\n\u003cp\u003eThe Philippines initially became an ICC State Party in 2011, a decision made during the administration of the late President Benigno S. Aquino III. However, this commitment was dramatically reversed under former President Rodrigo Duterte, who ordered the country’s unilateral withdrawal from the Rome Statute. De Lima has consistently viewed Duterte's withdrawal as an attempt to evade potential prosecution by the international court, particularly concerning his controversial 'war on drugs'.\u003c/p\u003e\n\u003cp\u003eRecent developments have brought this issue into sharper focus, with reports indicating that former President Duterte has been flown to The Hague following an arrest related to the alleged extrajudicial killings during his tenure. This event underscores the ICC's continued interest and jurisdiction over these matters, despite the Philippines' previous withdrawal.\u003c/p\u003e\n\u003cp\u003eHowever, the path to re-accession is not without its challenges. Vice President Sara Duterte has openly expressed her opposition to cooperating with the ICC, labeling it an 'affront' to the Philippines' sovereignty. This sentiment reflects a broader debate within the country regarding the balance between national sovereignty and international accountability. The implications of the ICC's involvement also extend to other Philippine officials, such as Senator Ronald 'Bato' dela Rosa, who has also faced or is facing ICC warrants, highlighting the far-reaching impact of this ongoing discussion.\u003c/p\u003e\n\u003cp\u003eDespite these divisions, the simulated social sentiment surrounding De Lima's call for the Philippines to return to the ICC is largely positive, albeit with ongoing discussions and debates. As the nation grapples with its past and future, the decision to rejoin the ICC remains a pivotal point in its commitment to human rights and international justice.\u003c/p\u003e\n","title":"Leila de Lima Leads Charge for Philippines' Return to ICC Amidst Accountability Debates","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-05T19:52:27Z","summary":"Former Senator Leila de Lima is spearheading efforts for the Philippines to rejoin the International Criminal Court (ICC), citing the crucial need for justice, accountability, and the protection of human rights. This move comes years after the country's controversial withdrawal under former President Rodrigo Duterte, whose 'war on drugs' is now under international scrutiny.","tags":["Philippines","ICC","Leila de Lima","Human Rights","Accountability","Rodrigo Duterte","International Law","Justice"],"sources":[{"url":"https://www.manilatimes.net/2026/06/05/news/de-lima-bats-for-philippines-return-to-icc/2359493","title":"De Lima bats for Philippines' return to ICC"},{"url":"https://www.msn.com/en-ph/politics/government/de-lima-bats-for-philippines-return-to-icc/ar-AA24UUjL?ocid=BingNewsVerp","title":"De Lima bats for Philippines' return to ICC"},{"url":"https://newsinfo.inquirer.net/2227103/what-went-before-de-lima-trillanes-arrests-resurface-as-dela-rosa-escapes-icc-arrest","title":"WHAT WENT BEFORE: De Lima, Trillanes arrests recalled as dela Rosa faces ICC warrant"},{"url":"https://www.yahoo.com/news/rodrigo-duterte-philippine-war-drugs-041834115.html","title":"Former Philippines president flown to Hague after arrest over ‘war on drugs’ kil..."},{"url":"https://www.yahoo.com/news/duterte-jarring-testimony-drug-killings-101759654.html","title":"Duterte’s jarring testimony into drug killings in Philippines relives a nightmar..."}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"leila-de-lima-leads-charge-for-philippines-return-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
