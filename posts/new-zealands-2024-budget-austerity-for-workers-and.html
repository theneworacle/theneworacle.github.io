<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealands-2024-budget-austerity-for-workers-and","contentHtml":"\u003cp\u003eNew Zealand's right-wing coalition government is poised to unveil a 2024 budget described by some as a sharp acceleration of its assault on the working class. Set for formal release on May 28, the budget's announced measures indicate a clear prioritization: safeguarding the wealth of the super-rich and dramatically increasing military spending, reportedly in preparation for future conflicts.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAusterity Measures and Public Sector Cuts\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eOperational spending is slated for a meager 1.4% increase, less than half the current inflation rate, signaling significant cuts across public services. The government plans to eliminate approximately 8,700 government jobs over three years, a 14% reduction in staff. While healthcare workers, teachers, police, and military personnel are reportedly exempt from layoffs, the specific roles targeted for reduction remain unclear. This move is expected to exacerbate New Zealand's already rising unemployment rate.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStudent Hardship and Soaring Debt\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYoung people face a major setback as the government confirms it will scrap the fee-free third year of study. This policy reversal will add up to $12,000 to the cost of a university degree. This comes at a time when student debt is already substantial, with over 618,000 students and former students owing a collective $16.1 billion. A recent University of Auckland survey highlighted the grim reality for many, finding 45% of students to be 'food insecure'. Further tightening the screws, 18- and 19-year-olds will be pushed off welfare benefits, despite youth unemployment sitting around 15%.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAttacks on Welfare and Housing Support\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe budget also includes severe measures targeting the country's poorest. Rents for around 84,000 families and individuals in public or social housing will increase from 25% to 30% of their income, an average rise of $31 per week. While the Accommodation Supplement for low-income private renters will see a modest $15 weekly increase, almost 10,000 recipients, predominantly families with children, will lose their eligibility due to adjusted asset and income thresholds, resulting in an average loss of $42 per week. Additionally, the 'last resort' Temporary Additional Support (TAS) for the poorest welfare recipients will be cut, reducing the maximum benefit a person can receive. These cuts are projected to intensify New Zealand's severe social crisis, where one in five children lives in poverty, half a million rely on food banks, and 100,000 experience severe housing deprivation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMassive Military Expansion\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eIn stark contrast to the cuts affecting ordinary citizens, the government is funneling billions into the armed forces. A previous announcement outlined plans to double military spending from 1% to 2% of GDP over four years, amounting to over $12 billion. More recently, $1.6 billion has been allocated for naval upgrades and the acquisition of drones. Defence Minister Chris Penk emphasized the need for a 'combat capable New Zealand Defence Force', anticipating increased deployment in challenging international circumstances. Prime Minister Christopher Luxon has justified this militarization by citing the international situation, including China's expanding influence and the war in Ukraine, drawing parallels to World Wars I and II.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePolitical Backlash and Social Sentiment\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe budget has ignited criticism from the Labour Party, the Greens, and union organizations, with protests planned for May 28. Labour leader Chris Hipkins has publicly opposed some cuts, although past Labour governments have also implemented austerity measures and supported military alliances. Despite the controversy, simulated social sentiment regarding the budget is described as 'mostly positive, some debate'.\u003c/p\u003e\n\u003cp\u003eThis budget marks a pivotal moment for New Zealand, balancing fiscal conservatism with a significant pivot towards increased military engagement on the global stage, all while asking a substantial sacrifice from its most vulnerable citizens.\u003c/p\u003e\n","title":"New Zealand's 2024 Budget: Austerity for Workers and Students, Billions for the Military","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-25T22:14:34Z","summary":"New Zealand's upcoming 2024 budget signals a significant shift towards austerity, with deep cuts to public services, welfare, and student support, while simultaneously committing billions to military expansion. Critics argue this budget prioritizes the wealthy and defense over the needs of working-class citizens.","tags":["New Zealand","Budget 2024","Austerity","Military Spending","Public Sector Cuts","Student Debt","Welfare Cuts","Housing Crisis","Government Policy"],"sources":[{"url":"https://www.wsws.org/en/articles/2026/05/25/mtlo-m25.html","title":"New Zealand budget attacks workers and students, boosts the military"},{"url":"https://www.msn.com/en-us/money/economy/nz-trims-new-spending-sticks-to-surplus-path-as-global-risks-heighten/ar-AA233BcA?ocid=BingNewsVerp","title":"NZ trims new spending, sticks to surplus path as global risks heighten"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealands-2024-budget-austerity-for-workers-and"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
