<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"news-outlets-demand-sanctions-against-openai-in-la","contentHtml":"\u003cp\u003eThe battle between traditional journalism and burgeoning artificial intelligence has escalated, with a formidable group of news organizations urging a federal judge to impose sanctions on OpenAI. At the heart of this legal showdown is the accusation that OpenAI, the creator of ChatGPT, has engaged in 'discovery misconduct' by allegedly concealing and destroying crucial evidence related to how its AI systems were trained on millions of copyrighted news articles.\u003c/p\u003e\n\u003cp\u003eThe New York Times, the Daily News, and other media outlets contend that OpenAI's AI chatbots unfairly compete with their services, siphoning off valuable web traffic and advertising revenue without contributing to the rigorous journalistic work required to gather news. The plaintiffs argue that evidence, including datasets and ChatGPT logs, would reveal the extent of this alleged infringement. According to a filing in a Manhattan federal courthouse, OpenAI 'chose obstruction' over transparency, with a recent deposition of an OpenAI employee reportedly contradicting earlier corporate claims.\u003c/p\u003e\n\u003cp\u003eSteven Lieberman, an attorney representing the Daily News, stated that OpenAI has been making 'misrepresentations' for two years regarding its ability to search for copyrighted content within its AI training data. He emphasized that the motion seeks to 'punish OpenAI for hiding and destroying evidence showing how ChatGPT was trained on stolen journalism.' The New York Times alone has already invested over $28 million in legal fees to combat AI companies, and the current motion seeks attorney fees to cover their efforts to secure the allegedly withheld evidence.\u003c/p\u003e\n\u003cp\u003eOpenAI, however, vehemently denies these allegations. A spokesperson for the company, Drew Pusateri, asserted that the Times' case is weakening and that these efforts represent an attempt to 'invade the privacy of people who have nothing to do with this case.' OpenAI maintains that its AI training practices are protected under the 'fair use' doctrine of U.S. copyright law and cites user privacy as the reason for its limitations in sharing ChatGPT logs.\u003c/p\u003e\n\u003cp\u003eThis lawsuit is a significant chapter in a broader legal narrative, as various creative industries – including visual artists, novelists, and music labels – are challenging AI companies in court over copyright issues. The legal landscape is still forming, with mixed results in similar cases. Notably, OpenAI rival Anthropic recently agreed to a $1.5 billion settlement with authors for training its chatbot, Claude, on pirated works. Interestingly, while this lawsuit intensifies, some media organizations, like The Associated Press, have opted for licensing agreements with OpenAI and other AI companies, allowing their content to be used for AI training in exchange for a fee.\u003c/p\u003e\n\u003cp\u003ePublic sentiment regarding this ongoing dispute is largely positive towards the news organizations' stance, though debate exists. As the legal proceedings unfold, the outcome of this high-stakes copyright fight could profoundly shape the future of both artificial intelligence development and the news industry's sustainability in the digital age.\u003c/p\u003e\n","title":"News Outlets Demand Sanctions Against OpenAI in Landmark Copyright Battle","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-16T02:45:52Z","summary":"A coalition of prominent news organizations, including The New York Times and the Daily News, are seeking severe sanctions against OpenAI, alleging 'discovery misconduct' and the destruction of evidence in a high-stakes copyright infringement lawsuit.","tags":["AI","Copyright","OpenAI","New York Times","Daily News","Sanctions","Journalism","Fair Use","Lawsuit"],"sources":[{"url":"https://apnews.com/article/openai-new-york-times-ai-copyright-lawsuit-7ce19c7a25aad60d4c94556d36e96cc9","title":"News outlets urge a judge to sanction OpenAI in a high-stakes AI copyright fight"},{"url":"https://www.nydailynews.com/2026/07/09/daily-news-seeks-serious-sanctions-against-openai-as-deception-alleged-in-copyright-lawsuit/","title":"Daily News seeks ‘serious sanctions’ against OpenAI as deception alleged in copyright lawsuit"},{"url":"https://www.msn.com/en-us/money/companies/new-york-times-and-news-outlets-demand-legal-sanctions-against-openai/ar-AA27zypG?ocid=BingNewsVerp","title":"New York Times and News Outlets Demand Legal Sanctions Against OpenAI"},{"url":"https://www.bostonglobe.com/2026/07/09/business/news-outlets-openai-copyright-fight/","title":"News outlets urge a judge to sanction OpenAI in a high-stakes AI copyright fight"},{"url":"https://whtc.com/2026/07/09/new-york-times-led-group-asks-court-to-sanction-openai-in-us-copyright-dispute/","title":"New York Times-led group asks court to sanction OpenAI in US copyright dispute"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"news-outlets-demand-sanctions-against-openai-in-la"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
