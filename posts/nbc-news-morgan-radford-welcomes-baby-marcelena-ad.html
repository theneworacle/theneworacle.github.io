<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"nbc-news-morgan-radford-welcomes-baby-marcelena-ad","contentHtml":"\u003cp\u003eNBC News Daily co-anchor Morgan Radford and her husband, David Williams, are joyfully celebrating the newest addition to their family, a beautiful baby girl named Marcelena Adelola \"Lola\" Radford Williams. Born on Wednesday, May 20, she weighed a healthy 8 lbs., 2 oz. and measured 20 1⁄4 inches long.\u003c/p\u003e\n\u003cp\u003eRadford shared that she made the heartfelt decision to give birth in Atlanta, surrounded by her family and a medical team acutely aware of the critical issue of Black female mortality rates in the country. Her experience at Northside Hospital, guided by Dr. Sarah Rose Lane and her diverse team, was \"exceptional,\" making her feel like a \"superhero\" through the labor.\u003c/p\u003e\n\u003cp\u003eThe couple meticulously chose Lola's name, imbuing it with deep cultural significance. 'Marcelena' was discovered during Radford's family research for her debut novel, 'Now Then,' tracing back to her father's Jamaican and Cuban ancestry, including a Spanish-Jewish lineage. Remarkably, Marcelena's birth coincided with Cuban Independence Day. 'Adelola,' meaning 'the crown brings honor and wealth' in Yoruba, pays homage to her husband's Nigerian roots, specifically his father's heritage.\u003c/p\u003e\n\u003cp\u003eThe new arrival has brought immense joy, especially to Lola's 3-year-old big sister, Lana. Radford described Lana's pure excitement upon meeting \"her baby\" and her pride in introducing \"mi hermanita\" to everyone at the hospital. Radford herself feels \"better than ever\" and \"overwhelmingly blessed\" by this new chapter.\u003c/p\u003e\n\u003cp\u003eWhile social media sentiment around the news has been largely positive, with some minor debate, the overwhelming reaction celebrates the family's happiness and the thoughtful tribute to their heritage embodied in little Lola's name. This personal milestone comes shortly after the May 6 release of Radford's debut novel, 'Now Then,' marking a period of both professional and personal fulfillment for the accomplished journalist.\u003c/p\u003e\n","title":"NBC News' Morgan Radford Welcomes Baby Marcelena Adelola, A Name Steeped in Heritage","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-22T14:33:45Z","summary":"NBC News Daily co-anchor Morgan Radford and husband David Williams celebrate the arrival of their second daughter, Marcelena Adelola, whose name honors both families' rich cultural backgrounds.","tags":["Morgan Radford","NBC News","Celebrity Babies","Family","Cultural Heritage","Marcelena Adelola Williams"],"sources":[{"url":"https://people.com/morgan-radford-welcomes-baby-no-2-with-husband-david-williams-exclusive-11981621","title":"NBC News' Morgan Radford Welcomes Baby No. 2 with Husband David Williams..."},{"url":"https://www.msn.com/en-us/entertainment/general/nbc-news-anchor-morgan-radford-announces-birth-of-second-child/ar-AA23Pl0U?ocid=BingNewsVerp","title":"NBC News anchor Morgan Radford announces birth of second child"},{"url":"https://www.msn.com/en-us/entertainment/general/nbc-news-anchor-welcomes-second-child-with-husband/ar-AA23KNPR?ocid=BingNewsVerp","title":"NBC News anchor welcomes second child with husband"},{"url":"https://www.msn.com/en-us/tv/celebrity/nbc-news-morgan-radford-welcomes-baby-no-2-with-husband-david-williams-exclusive/ar-AA23LuGB?ocid=BingNewsVerp","title":"NBC News' Morgan Radford welcomes baby no. 2 with husband David Williams (exclusive)"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"nbc-news-morgan-radford-welcomes-baby-marcelena-ad"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
