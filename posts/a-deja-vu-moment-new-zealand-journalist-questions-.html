ational tours, highlighting a consistent pattern since he last held a formal press conference in 2014.\u003c/p\u003e\n\u003cp\u003eThe repeated questioning of PM Modi's media policy underscores an ongoing debate about transparency and the role of unscripted interactions with the press for a national leader. While the diplomat's response points to a preference for direct public connection, critics argue that press conferences are crucial for accountability and allowing journalists to pose unfiltered questions on behalf of the public.\u003c/p\u003e\n\u003cp\u003eSocial media reactions to this event have been largely positive, though a significant degree of debate also exists. This suggests a mixed public perception, with some potentially supporting the direct communication approach, while others advocate for more traditional media scrutiny. As diplomatic visits continue to serve as platforms for diverse exchanges, the conversation around leaders' engagement with the press remains a focal point for international observers and media alike.\u003c/p\u003e\n","title":"A 'Deja Vu' Moment: New Zealand Journalist Questions PM Modi's Media Approach","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-11T22:00:11Z","summary":"During a recent official visit to New Zealand, Indian Prime Minister Narendra Modi's long-standing practice of not holding press conferences was once again brought into question by a local journalist, sparking renewed debate on media engagement and transparency.","tags":["PM Modi","New Zealand","India","Press Conference","Media Engagement","Diplomacy","Freedom of Press"],"sources":[{"url":"https://www.msn.com/en-in/news/other/new-zealand-journalist-asks-why-pm-modi-doesn-t-hold-press-conferences-diplomat-s-response-is-this/ar-AA27Gs0T?ocid=BingNewsVerp","title":"New Zealand journalist asks why PM Modi doesn't hold press conferences. Diplomat's response is this"},{"url":"https://www.telegraphindia.com/world/why-doesnt-pm-modi-do-press-conferences-from-new-zealand-here-comes-a-new-angle/cid/2169622","title":"Why doesn't PM Modi do press conferences? From New Zealand, here comes a new angle"},{"url":"https://pragativadi.com/why-doesnt-pm-modi-hold-press-conferences-new-zealand-journalists-question-draws-diplomats-response/","title":"‘Why Doesn’t PM Modi Hold Press Conferences?’ New Zealand Journalist’s Question Draws Diplomat’s Response"},{"url":"https://www.firstpost.com/world/pm-modi-prefers-direct-contact-mea-after-journalists-query-on-media-engagements-14030694.html","title":"'PM Modi prefers direct contact': MEA after journalist's query on Media engagements"},{"url":"https://www.deccanherald.com/world/deja-vu-indian-diplomat-jokes-as-journalist-in-new-zealand-asks-why-pm-modi-doesn-t-hold-press-conferences-4070150","title":"'Deja vu': Indian diplomat jokes as journalist in New Zealand asks why PM Modi doesn't hold press conferences"},{"url":"https://www.msn.com/en-in/news/other/helle-lyng-who-questioned-pm-modi-s-media-policy-in-norway-hails-redux-in-australia-nz-impact-spreading/ar-AA27GkDL?ocid=BingNewsVerp","title":"Helle Lyng, who questioned PM Modi's media policy in Norway, hails redux in Australia, NZ: 'Impact spreading'"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"a-deja-vu-moment-new-zealand-journalist-questions-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
