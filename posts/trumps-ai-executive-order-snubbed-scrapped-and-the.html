<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"trumps-ai-executive-order-snubbed-scrapped-and-the","contentHtml":"\u003cp\u003eIn a surprising turn of events, President Donald Trump abruptly called off a scheduled signing of an executive order (EO) intended to regulate artificial intelligence. The cancellation, which occurred just hours before the event, was reportedly influenced by a last-minute snub from top AI firm CEOs who declined to attend, despite only receiving 24 hours' notice. Trump reportedly expressed his displeasure at their absence.\u003c/p\u003e\n\u003cp\u003eBeyond the attendance issue, President Trump publicly stated that he 'didn't like certain aspects of it' and voiced concerns that the order could act as a 'blocker' to the United States' lead in the global AI race against China. The executive order's core objective was to grant the government authority to test advanced AI models before their public release. This proactive measure aimed to identify security vulnerabilities and implement necessary patches in systems safeguarding critical infrastructure, such as banks and utilities.\u003c/p\u003e\n\u003cp\u003eThe tech industry, however, appears to have heavily lobbied against the order. Reports suggest figures like xAI founder Elon Musk and Meta CEO Mark Zuckerberg (though Musk later denied knowledge of the EO's contents) played a role in urging Trump to call it off. Their concerns largely revolved around the potential for government-mandated safety testing to cause significant delays in model launches and generally impede the rapid pace of AI development. A key point of contention was the proposed timeline for government testing; the administration sought up to 90 days for evaluation, while AI labs advocated for a much shorter 14-day window.\u003c/p\u003e\n\u003cp\u003eThis push for government intervention was sparked by internal administration concerns, particularly after Anthropic flagged cybersecurity risks associated with its Mythos AI model. This incident underscored a clear divide within Trump's team: security-focused agencies championed immediate governance, while others, like the Commerce Department and the Office of Science and Technology Policy, favored a more light-touch approach to regulation to encourage innovation.\u003c/p\u003e\n\u003cp\u003eIn stark contrast to the US's hesitant and often reactive stance, China is reportedly accelerating its AI regulatory process. Beijing has already mandated the establishment of internal 'artificial intelligence ethics review committees' for domestic AI firms and outlined comprehensive legislation for sound AI development. Interestingly, President Trump had previously agreed with Chinese President Xi Jinping to initiate an intergovernmental dialogue on AI to collectively address emerging national security risks.\u003c/p\u003e\n\u003cp\u003eSimulated social sentiment surrounding the cancellation indicates a generally positive reaction, with some ongoing debate about the implications of the decision. As the world grapples with the dual promise and peril of artificial intelligence, Trump's move leaves the future of AI regulation in the US uncertain, highlighting the complex tightrope walk between fostering innovation and ensuring robust safety measures.\u003c/p\u003e\n","title":"Trump's AI Executive Order: Snubbed, Scrapped, and the Shifting Sands of Regulation","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-05-22T17:57:42Z","summary":"President Trump abruptly canceled an executive order aimed at regulating AI, citing a lack of attendance from top tech CEOs and concerns it could hinder US innovation. This move highlights the growing tension between fostering AI development and ensuring its safety, contrasting sharply with China's proactive regulatory approach.","tags":["AI","Artificial Intelligence","Regulation","Executive Order","Trump Administration","Tech Policy","Cybersecurity","US-China Tech Race","Innovation"],"sources":[{"url":"https://arstechnica.com/tech-policy/2026/05/trump-canceled-ai-safety-testing-eo-after-snub-from-tech-ceos/","title":"Trump delays AI safety testing EO, claiming it would be an innovation “blocker.”"},{"url":"https://www.msn.com/en-us/news/us/trump-abruptly-scraps-signing-of-landmark-executive-order-regulating-ai/ar-AA23KAs5?ocid=BingNewsVerp","title":"Trump abruptly scraps signing of landmark executive order regulating AI"},{"url":"https://www.mercurynews.com/2026/05/21/ai-executive-order/","title":"Trump postpones signing an executive order on AI out of concern it would hurt AI industry"},{"url":"https://www.bloomberg.com/news/articles/2026-05-21/white-house-postpones-ai-cybersecurity-order-signing-by-trump","title":"Trump Postpones Signing AI Security Order Over Parts He Disliked"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"trumps-ai-executive-order-snubbed-scrapped-and-the"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
