ent underscores New Zealand's commitment to upholding principles of free speech, while also clarifying that the scale and representation of the protests should not be overstated. This diplomatic clarification comes at a crucial time, serving to reinforce the positive bilateral relations between India and New Zealand as high-level discussions are anticipated during PM Modi's visit.\u003c/p\u003e\n\u003cp\u003eWhile social sentiment surrounding the pro-Khalistan protests in New Zealand shows a mixed reception, with opinions ranging from mostly positive to some debate, MP Parmar's intervention provides a clear governmental stance, distinguishing fringe elements from the collective voice of the Sikh community.\u003c/p\u003e\n","title":"New Zealand MP Dismisses Pro-Khalistan Protests as 'Fringe View' Ahead of Modi Visit","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-10T08:28:59Z","summary":"New Zealand MP Parmjeet Parmar asserts that recent pro-Khalistan protests involve a \"very small number\" of individuals and do not reflect the broader sentiment of the Sikh community in New Zealand, particularly as Prime Minister Modi's visit approaches.","tags":["New Zealand","India","Khalistan","Sikh Community","Parmjeet Parmar","PM Modi","Diplomacy","Protests","Free Speech"],"sources":[{"url":"https://www.msn.com/en-in/news/India/khalistan-protesters-a-very-small-number-says-nz-mp-parmjeet-parmar/ar-AA27wsAW","title":"Khalistan protesters a 'very small number', says NZ MP Parmjeet Parmar"},{"url":"https://www.msn.com/en-in/news/other/very-small-number-do-not-represent-sikh-community-s-views-new-zealand-mp-on-pro-khalistan-protests/ar-AA27wCoo?ocid=BingNewsVerp","title":"'Very small number', do not represent Sikh community's views: New Zealand MP on 'pro-Khalistan protests'"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealand-mp-dismisses-pro-khalistan-protests-as"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"sc
