tain for the upcoming Test. Root's return to leadership will undoubtedly be a focal point as England seeks to navigate this latest challenge.\u003c/p\u003e\n\u003cp\u003eThis incident further compounds a period of unease for English cricket, following what has been described as a recent 'Ashes debacle.' The team will now be under intense pressure to perform against New Zealand while dealing with the fallout from this internal disciplinary matter.\u003c/p\u003e\n\u003cp\u003eSocial media reaction to the news has been mixed, with sentiment described as 'mostly positive, some debate.' This suggests a divided public opinion, with many likely supporting the disciplinary action while others may question its timing or severity. As the second Test approaches, all eyes will be on how England responds both on and off the field.\u003c/p\u003e\n","title":"Curfew Breach Rocks England Cricket: Stokes and Atkinson Dropped Ahead of New Zealand Test","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-13T11:21:53Z","summary":"England's cricket squad faces fresh scrutiny as captain Ben Stokes and bowler Gus Atkinson are sidelined for the upcoming Test against New Zealand following a breach of team protocol. The incident, involving a curfew violation, sees Joe Root step in as captain, adding another layer of controversy to English cricket's recent struggles.","tags":["England Cricket","Ben Stokes","Gus Atkinson","New Zealand Cricket","Joe Root","Cricket News","Team Protocol","Curfew Breach"],"sources":[{"url":"https://sports.yahoo.com/articles/stokes-atkinson-dropped-england-second-142709328.html","title":"Stokes and Atkinson dropped by England for second test against New Zealand while under investigation"},{"url":"https://www.nytimes.com/athletic/7347892/2026/06/10/stokes-root-england-atkinson-oval-dropped/","title":"Ben Stokes and Gus Atkinson dropped by England for Oval Test, Joe Root named interim captain"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":
