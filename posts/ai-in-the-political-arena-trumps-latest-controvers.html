<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"ai-in-the-political-arena-trumps-latest-controvers","contentHtml":"\u003cp\u003eFormer President Donald Trump recently ignited a fresh wave of controversy with a weekend 'AI posting spree,' utilizing a barrage of AI-generated images and video clips to attack political adversaries and issue aggressive threats towards Iran. The posts, numbering over two dozen within a short timeframe, specifically targeted figures such as former Presidents Barack Obama and Joe Biden, California Governor Gavin Newsom, House Minority Leader Hakeem Jefferies, Illinois Governor JB Pritzker, and Senator Bill Cassidy.\u003c/p\u003e\n\u003cp\u003eThe content of these AI-generated messages was often bizarre and highly provocative. One notable image depicted the Lincoln Memorial Reflecting Pool as a sewage dump, with Obama and Biden seemingly swimming in it. Governor Newsom was portrayed in a series of unflattering AI images, including as a zombie and in a padded room within a mental health facility. The spree also included an image of Trump walking alongside a handcuffed alien, a seemingly odd reference following his administration's recent UFO file release.\u003c/p\u003e\n\u003cp\u003eBeyond domestic politics, Trump's AI offensive extended to international relations, with a series of posts directed at Iran. These included AI-generated depictions of the Iranian navy being destroyed, U.S. drones obliterating Iranian fast boats, and a U.S. ship shooting down an Iranian drone with a laser – accompanied by an audio clip of Trump exclaiming 'boom.' Some posts even suggested a Space Force attack from orbit, resulting in a mushroom cloud on Earth.\u003c/p\u003e\n\u003cp\u003eThis isn't Trump's first foray into controversial AI-generated content. He has previously faced significant backlash and been compelled to delete posts, most notably one depicting himself as Jesus Christ, amidst a feud with Pope Leo XIV. Other past AI posts included images of him and cabinet members swimming in the Lincoln Memorial reflecting pool, and a caricature of President Biden asleep at his desk, surrounded by Obama and Hillary Clinton, pushing unsubstantiated claims about 'autopen' signatures.\u003c/p\u003e\n\u003cp\u003eReactions to the latest spree have been swift. Governor Newsom's press office publicly mocked Trump's posts, questioning his mental state. Meanwhile, Iran's foreign ministry spokesperson subtly responded by sharing a clip from 'The Apprentice' on X, appearing to mock the former president's 'claim victory and never admit defeat' mantra. While widespread news coverage confirms the controversial nature of these AI-generated messages, simulated social media sentiment suggests a largely positive reception among supporters, though not without considerable debate.\u003c/p\u003e\n\u003cp\u003eThis trend underscores a growing challenge in the digital age: the increasingly sophisticated use of AI to create and disseminate political messaging, blurring the lines between reality and fabrication, and prompting serious questions about truth, propaganda, and the future of political discourse.\u003c/p\u003e\n","title":"AI in the Political Arena: Trump's Latest Controversial Posting Spree","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-05-18T18:08:02Z","summary":"Former President Donald Trump has once again leveraged AI-generated imagery in a series of social media posts, targeting prominent Democrats and issuing stark warnings to Iran. This latest 'AI posting spree' has sparked widespread debate and criticism, highlighting the increasingly complex role of artificial intelligence in political discourse.","tags":["AI","Donald Trump","Political Messaging","Artificial Intelligence","Controversy","Social Media","US Politics","Iran","Gavin Newsom"],"sources":[{"url":"https://www.forbes.com/sites/siladityaray/2026/05/18/trump-attacks-obama-newsom-and-other-democrats-in-another-weekend-ai-posting-spree/","title":"Trump Attacks Obama, Newsom And Other Democrats In Another Weekend AI Posting Spree"},{"url":"https://www.yahoo.com/news/articles/trump-posts-ai-photo-himself-084427635.html","title":"Trump posts AI images of himself with buff alien and space lasers in latest..."},{"url":"https://www.yahoo.com/news/articles/trump-targets-obama-newsom-alex-113502069.html","title":"Trump Targets Obama, Newsom, and New Alex Pretti Video in Another Late-Night..."},{"url":"https://www.yahoo.com/news/articles/donald-trump-keeps-posting-ai-073415770.html","title":"Donald Trump Keeps Posting AI Images of Space"},{"url":"https://www.yahoo.com/news/articles/trump-79-regurgitates-crackpot-nuclear-232356581.html","title":"Trump, 79, Regurgitates Crackpot Nuclear Slop in Wild Posting Spree"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"ai-in-the-political-arena-trumps-latest-controvers"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
