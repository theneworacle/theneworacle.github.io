<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"from-obscurity-to-overnight-sensation-how-an-argen","contentHtml":"\u003cp\u003eIn a remarkable display of social media's power, New Zealand soccer player Tim Payne has gone from relative obscurity to a viral sensation, all thanks to an Argentine social media influencer. Defender for Wellington Phoenix and the national 'All Whites' team, Payne's Instagram follower count skyrocketed from a modest 4,715 to an astonishing 660,000 in just a few days.\u003c/p\u003e\n\u003cp\u003eThe catalyst for this meteoric rise was Valen Scarsini, an Argentine content creator known as \"elscarso\" across Instagram and TikTok. Scarsini launched a playful campaign, challenging his massive audience to lend their support to Payne, whom he dubbed the 'least known' player at the upcoming World Cup in the United States.\u003c/p\u003e\n\u003cp\u003eThe response was overwhelming. Payne’s newfound fame even saw his follower count surpass those of prominent New Zealand figures, including Prime Minister Christopher Luxon and All Blacks rugby star Ardie Savea. A clearly delighted Payne acknowledged Scarsini’s efforts, sending a message of gratitude: “Appreciate the love! Gracias, hermano.”\u003c/p\u003e\n\u003cp\u003eWhile his recent viral fame is a new chapter, Payne, 32, has had a career marked by both quiet dedication and a past incident. In 2020, he faced charges for a drink-driving offense after breaking quarantine in Australia. Since then, he has maintained a relatively low profile, focusing on his game. He is now set to earn his 50th cap for New Zealand at the World Cup, where the lowest-ranked team will face Iran, Egypt, and Belgium in Group G.\u003c/p\u003e\n\u003cp\u003eThe story of Tim Payne and Valen Scarsini is a testament to the unpredictable and far-reaching influence of digital culture, turning a fringe player into a global talking point and demonstrating how quickly online communities can rally behind an unexpected hero.\u003c/p\u003e\n","title":"From Obscurity to Overnight Sensation: How an Argentine Influencer Made a New Zealand Soccer Star Go Viral","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-05T22:21:04Z","summary":"New Zealand defender Tim Payne's social media presence exploded from thousands to millions of followers in days, thanks to an unexpected campaign by an Argentine influencer. This is the story of how the 'least known' World Cup player became a global internet sensation.","tags":["Tim Payne","Valen Scarsini","New Zealand Soccer","World Cup","Viral","Social Media","Influencer","Football"],"sources":[{"url":"https://sports.yahoo.com/articles/soccer-least-known-world-cup-081426689.html","title":"Soccer-'Least known' World Cup player goes viral with help from Argentine influencer"},{"url":"https://www.msn.com/en-us/sports/other/viral-new-zealand-soccer-star-meets-argentine-social-media-influencer-who-boosted-following-to-5m/ar-AA24SCUF?ocid=BingNewsVerp","title":"Viral New Zealand soccer star meets Argentine social media influencer who boosted following to 5M"},{"url":"https://www.msn.com/en-us/sports/other/nz-football-star-meets-influencer-behind-viral-fame/ar-AA24Mlzj","title":"Thanks millions! New Zealand footballer meets influencer behind viral fame"},{"url":"https://www.msn.com/en-us/sports/soccer/5000-to-5-million-least-known-world-cup-star-meets-influencer-who-made-him-famous/ar-AA24TtY9","title":"5000 to 5 million: Least-known World Cup star meets influencer who made him famous"},{"url":"https://onefootball.com/en/news/who-is-tim-payne-the-new-zealander-who-went-viral-via-an-argentine-42947307","title":"Who is Tim Payne, the New Zealander who went viral via an Argentine | OneFootball"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"from-obscurity-to-overnight-sensation-how-an-argen"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
