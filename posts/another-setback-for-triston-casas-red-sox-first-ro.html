is left knee, an_injury that prematurely ended his 2025 season. His return this year was already delayed by an intercostal strain discovered in early April, an issue that saw him transferred to the 60-day injured list. Adding to this challenging history, Casas also battled a rib injury in 2024, limiting him to just 63 games.\u003c/p\u003e\n\u003cp\u003eDrafted by the Red Sox 26th overall in the 2018 MLB Draft, Triston Casas made a strong impression in 2023, hitting .263 with 24 home runs and an .856 OPS over 132 games, finishing third in American League Rookie of the Year voting. However, that stellar season remains his only full healthy year at the major league level. His career, spanning 251 games across four seasons, shows a .241 batting average and 45 home runs, but it's the consistent battle with injuries that has largely defined his tenure in Boston.\u003c/p\u003e\n\u003cp\u003eThe repeated trips to the injured list raise critical questions about Casas's long-term durability and his ability to fulfill the immense potential that made him a first-round selection. While social media sentiment regarding his situation appears largely supportive, with some debate, the practical implications for both Casas and the Red Sox are undeniable.\u003c/p\u003e\n\u003cp\u003eAs the Red Sox navigate a pivotal stretch of their season, the uncertainty surrounding Casas's return leaves a significant void. The organization, and Casas himself, now face the daunting challenge of overcoming another physical hurdle, hoping he can finally string together healthy seasons and consistently contribute at the level expected of a top draft pick.\u003c/p\u003e\n","title":"Another Setback for Triston Casas: Red Sox First-Round Pick Plagued by Injuries","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-06T08:19:01Z","summary":"Boston Red Sox first-round pick Triston Casas faces yet another hurdle in his promising but injury-riddled career, with a newly surfaced wrist problem
