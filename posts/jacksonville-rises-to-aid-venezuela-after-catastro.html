<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"jacksonville-rises-to-aid-venezuela-after-catastro","contentHtml":"\u003cp\u003eJacksonville, FL – In a heartwarming display of community spirit and international solidarity, Action News Jax and Telemundo Jacksonville have launched a joint earthquake relief drive for Venezuela. This initiative comes in response to the catastrophic earthquakes that have recently rocked the South American nation, causing widespread devastation and a significant loss of life.\u003c/p\u003e\n\u003cp\u003eThe powerful tremors have inflicted immense suffering, with Venezuela's Health Minister reporting approximately 235 fatalities and over 4,300 injuries. Thousands more are reported missing, and critical infrastructure, including the country's main airport, has sustained damage, complicating relief efforts.\u003c/p\u003e\n\u003cp\u003eIn the wake of this disaster, the United States has pledged a substantial and rapid response. Secretary of State Marco Rubio affirmed a \"whole-of-government response\" that promises to be \"big, fast, and effective.\" This commitment includes the allocation of $150 million to various aid groups and UN agencies, alongside the deployment of Disaster Assistant Response Teams and search and rescue teams from Virginia and California, complete with specialized K9 units.\u003c/p\u003e\n\u003cp\u003eHere in Jacksonville, the relief drive, hosted at the Telemundo Jacksonville studios, aims to gather much-needed supplies to assist the affected families. The community's response has been largely positive on social media, with many expressing support for the humanitarian effort, though some discussions and debates are also present.\u003c/p\u003e\n\u003cp\u003eThis concerted effort by local media, combined with international aid, underscores a collective resolve to provide urgent assistance and support to Venezuela during this challenging time.\u003c/p\u003e\n","title":"Jacksonville Rises to Aid Venezuela After Catastrophic Earthquakes","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-03T10:40:51Z","summary":"Action News Jax and Telemundo Jacksonville are spearheading a relief drive to support Venezuelan families devastated by recent powerful earthquakes that have left hundreds dead and thousands injured.","tags":["Venezuela","Earthquake Relief","Action News Jax","Telemundo Jacksonville","Humanitarian Aid","US Aid"],"sources":[{"url":"https://www.msn.com/en-us/travel/news/today-donate-supplies-to-the-venezuela-relief-effort-at-telemundo-jacksonville-studios/ar-AA26ZO7o","title":"Today: Donate supplies to the Venezuela relief effort at Telemundo Jacksonville studios"},{"url":"https://www.msn.com/en-us/news/news/action-news-jax-hosts-earthquake-relief-drive-for-venezuela/vi-AA2763TI","title":"Action News Jax hosts earthquake relief drive for Venezuela"},{"url":"https://www.actionnewsjax.com/news/world/venezuela-reeling/LGIMJPMW3I427EUVKIMMS7BNPU/","title":"Venezuela health minister says around 235 people dead and 4,300 injured in catastrophic earthquakes"},{"url":"https://www.npr.org/2026/06/26/nx-s1-5870652/venezuela-earthquake-usaid-u-s-aid","title":"U.S. pledges generous earthquake relief to Venezuela"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"jacksonville-rises-to-aid-venezuela-after-catastro"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
