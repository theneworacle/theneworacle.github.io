This represents a significant leap forward from previous seasons where his strikeout numbers were considerably higher, and walks were fewer, indicating a more mature and selective approach at the plate while maintaining his potent power.\u003c/p\u003e\n\u003cp\u003eHis arrival is expected to provide an immediate offensive boost. Valdez could fill the designated hitter spot, potentially taking over from Marcell Ozuna, or slide into right field, especially with Ryan O'Hearn currently on the injured list. This versatility offers manager Derek Shelton valuable flexibility in constructing his lineup.\u003c/p\u003e\n\u003cp\u003eValdez's promotion is also part of a broader youth movement within the Pirates organization. Just recently, another promising outfield prospect, 23-year-old Jhostynxon Garcia, also received his call-up to the big leagues. This dual promotion underscores the team's commitment to developing its young talent and integrating them into the core of the MLB roster. As these young stars begin to make their mark, the future looks increasingly bright for the Pittsburgh Pirates.\u003c/p\u003e\n","title":"Pirates Ignite Offense with Top Prospect Esmerlyn Valdez Call-Up","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-22T21:09:46Z","summary":"The Pittsburgh Pirates are injecting a much-needed offensive spark into their lineup by promoting 22-year-old top outfield prospect Esmerlyn Valdez to the Major League roster. Fresh off a stellar Triple-A performance, Valdez brings an improved plate discipline and formidable power, signaling a strategic youth movement for the struggling Pirates.","tags":["MLB","Pittsburgh Pirates","Baseball","Prospects","Esmerlyn Valdez","Youth Movement","Sports News"],"sources":[{"url":"https://www.wkbn.com/sports/pirates-promote-top-10-prospect-to-mlb-roster-2/","title":"Pirates promote top-10 prospect to MLB roster"},{"url":"https://sports.yahoo.com/articles/pirates-promote-22-old-outfielder-205943898.html","title":"Pirates to promote 22-year-old outfielder with .887 OPS to Majors"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"pirates-ignite-offense-with-top-prospect-esmerlyn-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
