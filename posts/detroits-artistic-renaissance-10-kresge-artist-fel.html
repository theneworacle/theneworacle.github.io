<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"detroits-artistic-renaissance-10-kresge-artist-fel","contentHtml":"\u003cp\u003eDetroit's dynamic arts scene continues to thrive, thanks in part to the generous support of the Kresge Foundation. This year, ten exceptional Detroit-based artists have been named Kresge Artist Fellows for 2026, each receiving a substantial $50,000 award to further their creative endeavors. These no-strings-attached cash prizes, administered by the College for Creative Studies, aim to empower artists and acknowledge their significant contributions to the community.\u003c/p\u003e\n\u003cp\u003eThe 2026 cohort represents a rich tapestry of artistic disciplines, including performance art, dance, choreography, music composition and performance, film directing, screenwriting, and interdisciplinary work. Among the notable fellows are:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGalaxy:\u003c/strong\u003e A captivating spoken word artist, also serving as a teaching artist with InsideOut Literary Arts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEd Miller:\u003c/strong\u003e The Inkster native who founded the iconic Funkateer Dancers, pioneering a unique dance style in the 1970s and '80s.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKaren Prall:\u003c/strong\u003e A Detroiter who established the Art of Motion Dance Theatre and now serves as an associate professor of dance at Wayne State University.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSalar Ansari:\u003c/strong\u003e An Iranian musician, DJ, producer, and recording engineer, known for running Detroit's Feeder Loft recording studio.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJeremy Brockman:\u003c/strong\u003e A Detroit filmmaker dedicated to exploring the lives of Black men and challenging stereotypes.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMaurice \"Pirahnahead\" Herd:\u003c/strong\u003e A Detroit-based producer, orchestrator, and string arranger blending soul, orchestration, and modern R\u0026#x26;B.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMitch McCabe:\u003c/strong\u003e A Detroit-based artist, filmmaker, educator, and 2026 Guggenheim fellow whose thought-provoking films have aired on HBO, Showtime, and PBS.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShahida Nurullah:\u003c/strong\u003e A Detroit-born jazz vocalist whose career began in 1977, inspired by legends like Charlie Parker and Sarah Vaughan.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAckeem Salmon:\u003c/strong\u003e A Kingston, Jamaica native now based in Detroit, utilizing visual art, music, performance, and film to explore themes of migration and identity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFrisly Soberanis:\u003c/strong\u003e A Guatemala-born new media artist, director, and producer whose work focuses on migration, multigenerational homes, and collective memory.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBeyond the financial award, these fellows will benefit from a comprehensive support package, including legal and accounting assistance, professional coaching, and promotional support from Kresge Arts in Detroit. Their work will also be highlighted in a series of films, offering a broader platform for their artistic expressions.\u003c/p\u003e\n\u003cp\u003eIn addition to the fellowships, Kresge Arts in Detroit also recognized ten early-career artists with the Gilda Snowden Emerging Artist Awards. These $5,000 prizes honor artists who are gaining career momentum, taking creative risks, and pushing artistic boundaries, named after the esteemed Detroit artist and mentor Gilda Snowden.\u003c/p\u003e\n\u003cp\u003eSince its inception in 2008, Kresge Arts in Detroit has invested a remarkable $10.6 million into the artistic communities of Wayne, Oakland, and Macomb counties. This commitment extends to the Kresge Eminent Artist Award, with Tyree Guyton, founder of the renowned Heidelberg Project, receiving the $100,000 prize in January 2026.\u003c/p\u003e\n\u003cp\u003eThe announcement of these awards has generated largely positive sentiment within the community, sparking discussions about the significant impact and selection process of these vital artistic grants.\u003c/p\u003e\n","title":"Detroit's Artistic Renaissance: 10 Kresge Artist Fellows Awarded $50,000 Each","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-13T02:18:33Z","summary":"The Kresge Foundation has announced its 2026 Kresge Artist Fellows, providing ten Detroit artists with $50,000 no-strings-attached prizes to support their groundbreaking work across diverse disciplines. This year's awards celebrate the vibrant artistic talent shaping the city's cultural landscape.","tags":["Detroit","Arts","Kresge Foundation","Artist Fellows","Gilda Snowden Awards","Music","Film","Dance","Performance Art","Community","Culture"],"sources":[{"url":"https://www.msn.com/en-us/music/news/2026-kresge-fellowships-and-snowden-emerging-artist-awards-announced/ar-AA2733yF?ocid=BingNewsVerp","title":"2026 Kresge Fellowships and Snowden Emerging Artist Awards announced"},{"url":"https://bearswire.usatoday.com/story/entertainment/arts/2026/07/03/kresge-foundation-awards-10-detroit-artists-50000-fellowships/90791645007/","title":"10 Detroiters named Kresge Artist Fellows, get $50,000 prizes"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"detroits-artistic-renaissance-10-kresge-artist-fel"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
