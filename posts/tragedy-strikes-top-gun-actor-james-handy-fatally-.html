<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"tragedy-strikes-top-gun-actor-james-handy-fatally-","contentHtml":"\u003cp\u003eLos Angeles is reeling from the tragic news of veteran actor James Handy's death. The 81-year-old character actor, recognized for his memorable performances in films like 'Top Gun: Maverick,' 'Jumanji,' and 'Arachnophobia,' as well as numerous television appearances including 'NCIS: Los Angeles,' 'CSI: New York,' and 'NYPD Blue,' was found fatally stabbed outside his Tarzana home on Wednesday morning.\u003c/p\u003e\n\u003cp\u003eAuthorities swiftly responded to a 911 call made by 44-year-old Michael Gledhill, the son of Handy's girlfriend. Gledhill reportedly identified himself as the perpetrator during the call, making a chilling statement about killing 'the man of sin.' Upon arrival, officers found Handy unconscious with a stab wound to his chest. He was rushed to a nearby hospital but was pronounced dead.\u003c/p\u003e\n\u003cp\u003eGledhill, who resides at the same address as his mother and Handy, was arrested at the scene and has since been charged with one count of murder. Police are treating this as an isolated incident, assuring the public there is no ongoing danger.\u003c/p\u003e\n\u003cp\u003eHandy's career spanned decades, leaving a significant mark on both film and television. His final film appearance was as Jimmy, a bartender, in the critically acclaimed 2022 blockbuster 'Top Gun: Maverick.' The news of his passing has sent shockwaves through the entertainment community, with many remembering his versatile talent and extensive body of work. Social media sentiment on the incident has been largely mournful, with some debate surrounding the circumstances.\u003c/p\u003e\n","title":"Tragedy Strikes: 'Top Gun' Actor James Handy Fatally Stabbed, Girlfriend's Son Arrested","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-05T14:43:37Z","summary":"Veteran actor James Handy, known for his roles in 'Top Gun: Maverick,' 'Jumanji,' and 'Arachnophobia,' has died at 81 after being fatally stabbed outside his Los Angeles home. His girlfriend's son, Michael Gledhill, has been arrested and charged with murder.","tags":["James Handy","Top Gun: Maverick","Actor","Stabbing","Murder","Los Angeles","Crime News","Jumanji","Arachnophobia","Hollywood"],"sources":[{"url":"https://www.rawstory.com/james-hardy-actor/","title":"Top Gun actor found stabbed to death outside LA home: police"},{"url":"https://www.mlive.com/crime/2026/06/jumanji-top-gun-actor-stabbed-to-death-girlfriends-son-arrested-on-murder-charge.html","title":"'Jumanji,' 'Top Gun' actor stabbed to death, girlfriend's son arrested on murder charge"},{"url":"https://www.nytimes.com/2026/06/05/us/james-handy-stabbed-dead-la-top-gun-jumanji.html","title":"James Handy, Veteran Actor, Is Stabbed to Death"},{"url":"https://www.msn.com/en-us/news/crime/actor-james-handy-stabbed-to-death-in-los-angeles/ar-AA24T1qn","title":"Actor James Handy stabbed to death in Los Angeles"},{"url":"https://www.bbc.com/news/articles/czd2dj24jgdo","title":"US actor James Handy stabbed to death, with girlfriend's son arrested"},{"url":"https://www.yahoo.com/news/us/article/top-gun-maverick-actor-james-handy-stabbed-to-death-in-la-girlfriends-son-is-arrested-091453918.html","title":"'Top Gun: Maverick' actor James Handy stabbed to death in L.A.; girlfriend's son is arrested"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"tragedy-strikes-top-gun-actor-james-handy-fatally-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
