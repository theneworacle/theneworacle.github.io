<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippines-rocked-by-devastating-78-magnitude-ear","contentHtml":"\u003cp\u003eThe southern Philippines was hit by a catastrophic 7.8 magnitude earthquake on Monday, sending shockwaves through the Mindanao region. Occurring at approximately 7:37 a.m. local time at a depth of 35 kilometers (21.7 miles), the powerful tremor has claimed the lives of at least 37 people, with authorities still working to confirm the full extent of injuries.\u003c/p\u003e\n\u003cp\u003eThe seismic event unleashed widespread panic as buildings crumbled and emergency sirens blared across parts of the archipelago. General Santos City in Sarangani province, near the earthquake's offshore epicenter, bore the brunt of the destruction, with reports of collapsed convenience stores and layers of concrete debris. Harrowing social media footage captured terrified elementary schoolchildren crouching outdoors as the ground violently swayed in Davao Occidental, while a high school campus roof collapsed in Davao Del Sur, thankfully without reported injuries.\u003c/p\u003e\n\u003cp\u003eThe immediate aftermath saw a barrage of 138 aftershocks, with authorities warning residents to prepare for more. The tremor also triggered tsunami warnings across the wider Pacific, leading to small waves being recorded in Indonesia, Palau, and southern Japan. While the primary tsunami threat largely subsided after about five hours, local authorities urged continued vigilance as sea levels could fluctuate.\u003c/p\u003e\n\u003cp\u003ePhilippine President Ferdinand Marcos Jr. swiftly responded, directing all relevant government agencies to initiate immediate evacuation and rescue operations. He issued a direct plea to affected citizens: \"To our kababayans (countrymen) in the affected provinces, please heed the tsunami warning. Move to higher ground now. Do not wait. Your life is more important than anything left behind.\"\u003c/p\u003e\n\u003cp\u003eThis devastating event underscores the Philippines' precarious position within the Pacific \"Ring of Fire,\" an arc of fault lines highly susceptible to frequent earthquakes and volcanic activity. As rescue efforts intensify, the nation unites to cope with the profound impact of this natural disaster.\u003c/p\u003e\n","title":"Philippines Rocked by Devastating 7.8 Magnitude Earthquake, Dozens Dead","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-06-12T12:56:30Z","summary":"A powerful 7.8 magnitude earthquake has struck the southern Philippines, leaving a trail of destruction, dozens dead, and prompting widespread tsunami alerts. The nation, situated on the volatile 'Ring of Fire,' is now grappling with extensive damage and ongoing rescue efforts.","tags":["Philippines","earthquake","Mindanao","natural disaster","tsunami","General Santos City","Ring of Fire","disaster relief"],"sources":[{"url":"https://www.cnn.com/2026/06/07/asia/southern-philippines-mindanao-earthquake-intl-hnk","title":"Dozens killed after deadly 7.8 magnitude earthquake hits southern Philippines"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippines-rocked-by-devastating-78-magnitude-ear"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
