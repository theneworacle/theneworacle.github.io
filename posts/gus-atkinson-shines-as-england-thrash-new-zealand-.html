<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"gus-atkinson-shines-as-england-thrash-new-zealand-","contentHtml":"\u003cp\u003eEngland's Test summer has begun with a bang, as the team secured a commanding 115-run victory against New Zealand in the first Test at Lord's. The hero of the hour was undoubtedly Gus Atkinson, whose exceptional five-wicket haul (5-30) not only propelled England to victory but also earned him a coveted spot on the Lord's honours board once again.\u003c/p\u003e\n\u003cp\u003eThe match, played on a pitch described as a \"bowlers' paradise,\" saw wickets tumble frequently, making for a low-scoring but captivating contest. Despite the challenging conditions that proved difficult for batters, England demonstrated remarkable resilience and strategic execution to overcome the Black Caps.\u003c/p\u003e\n\u003cp\u003eAtkinson's brilliant spell was complemented by other strong performances. Player of the Match, Ollie Robinson, made a memorable return to the England squad, bagging three wickets in his very first over after a two-year absence and contributing to a career-best match haul. On the batting front, Emilio Gay and Jamie Smith played crucial innings under immense pressure, helping England establish a defendable lead.\u003c/p\u003e\n\u003cp\u003eCaptain Ben Stokes praised his team's adaptability and calmness, emphasizing the importance of quick thinking in Test cricket. While acknowledging the difficulties posed by the pitch, he highlighted the team's clear plans and outstanding execution, particularly from the bowling attack. Head coach Brendon McCullum echoed these sentiments, commending the bravery shown by his batters in manipulating their play on a tricky surface.\u003c/p\u003e\n\u003cp\u003eThis decisive victory hands England a 1-0 lead in the three-match Test series, providing a much-needed boost after their previous Ashes campaign. Cricket fans can look forward to the second Test, which is set to commence on Wednesday, June 17, at The Oval, where conditions are expected to be different.\u003c/p\u003e\n\u003cp\u003eSocial sentiment around the match was largely positive, celebrating Atkinson's heroics and England's dominant performance, though discussions about the Lord's pitch conditions were also prevalent.\u003c/p\u003e\n","title":"Gus Atkinson Shines as England Thrash New Zealand in Lord's Test Opener","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-07T14:58:14Z","summary":"England kickstarted their Test summer with a dominant 115-run victory over New Zealand at Lord's, thanks in large part to Gus Atkinson's stellar five-wicket haul. The win gives England a crucial 1-0 lead in the three-match series, despite challenging pitch conditions that favored bowlers.","tags":["England Cricket","New Zealand Cricket","Gus Atkinson","Lord's Test","Cricket News","Ben Stokes","Ollie Robinson","Test Series","Sports"],"sources":[{"url":"https://www.msn.com/en-au/sport/cricket/gus-atkinson-on-lord-s-honours-board-again-as-england-thrash-new-zealand/ar-AA251QUh?ocid=BingNewsVerp","title":"Gus Atkinson on Lord’s honours board again as England thrash New Zealand"},{"url":"https://www.bbc.com/sport/cricket/live/c0e7lxy9wp2t","title":"England beat New Zealand by 115 runs in first Test - as it happened"},{"url":"https://inews.co.uk/sport/cricket/england-player-ratings-new-zealand-first-test-4451773?ico=in-line_link","title":"Root 3, Smith 6, Bashir 5 – England player ratings from first Test vs New Zealand"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"gus-atkinson-shines-as-england-thrash-new-zealand-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
