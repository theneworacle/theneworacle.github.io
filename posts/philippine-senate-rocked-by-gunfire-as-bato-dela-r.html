<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippine-senate-rocked-by-gunfire-as-bato-dela-r","contentHtml":"\u003cp\u003eManila, Philippines – A dramatic and chaotic scene unfolded within the Philippine Senate complex recently, thrusting the nation’s political landscape into further turmoil. Senator Ronald “Bato” Dela Rosa, a staunch ally of former President Rodrigo Duterte and a central figure in his controversial “war on drugs,” reportedly evaded arrest by agents of the National Bureau of Investigation (NBI).\u003c/p\u003e\n\u003cp\u003eThe attempted apprehension stemmed from an International Criminal Court (ICC) arrest warrant, charging Dela Rosa with crimes against humanity for his alleged role in the deadly anti-drug campaign that claimed thousands of lives. Witnesses described a tense standoff, complete with reports of gunfire near a neighboring government building, as Senate security personnel and NBI agents clashed. Dela Rosa, whose whereabouts are currently undisclosed, reportedly escaped amidst the chaos.\u003c/p\u003e\n\u003cp\u003eThis incident underscores the deep political fissures within the Philippines, particularly between the factions supporting President Ferdinand Marcos Jr. and Vice-President Sara Duterte. Dela Rosa’s brief reappearance in the Senate, after months in hiding, was reportedly to cast a critical vote in a leadership contest that aimed to bolster a pro-Duterte bloc, further intertwining this international legal matter with domestic political power struggles.\u003c/p\u003e\n\u003cp\u003eDespite the dramatic evasion, Philippine Justice Secretary Fredderick Vida has affirmed the government's commitment to cooperating with the ICC's request, acknowledging the validity of the arrest warrant. However, a legal challenge remains, as the government awaits a decision from the Philippine Supreme Court on Dela Rosa's petition against the warrant's legality. For his part, Senator Dela Rosa has publicly vowed to exhaust all available legal avenues to prevent his transfer to the ICC.\u003c/p\u003e\n\u003cp\u003eThe ICC’s persistent pursuit of accountability for the fatalities during Duterte's anti-drug campaign remains a significant point of national and international focus. Social media sentiment surrounding the incident appears predominantly positive, indicating a strong public desire for justice and accountability. Yet, a noticeable debate also reflects differing political allegiances and complex perspectives on national sovereignty versus international legal jurisdiction.\u003c/p\u003e\n\u003cp\u003eAs the nation watches, the saga of Senator Dela Rosa's ICC warrant continues to unfold, a testament to the ongoing quest for justice and the intricate dance of power within Philippine politics.\u003c/p\u003e\n","title":"Philippine Senate Rocked by Gunfire as 'Bato' Dela Rosa Evades ICC Arrest","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-16T11:03:08Z","summary":"Philippine politics was rocked by a dramatic confrontation in the Senate as National Bureau of Investigation agents attempted to arrest Senator Ronald 'Bato' Dela Rosa, wanted by the International Criminal Court for alleged crimes against humanity. Gunfire, an escape, and a nation's divided sentiments mark this high-stakes legal and political battle.","tags":["Philippines","ICC","Bato Dela Rosa","Duterte","Human Rights","Drug War","Philippine Politics","Arrest Warrant"],"sources":[{"url":"https://econotimes.com/ICC-Arrest-Drama-Deepens-as-Philippine-Senator-Bato-Dela-Rosa-Escapes-Amid-Senate-Gunfire-1741875","title":"ICC Arrest Drama Deepens as Philippine Senator Bato Dela Rosa Escapes Amid Senate Gunfire"},{"url":"https://www.aljazeera.com/news/2026/5/15/philippines-vows-to-hand-fugitive-senator-to-icc-following-shootout","title":"Philippines vows to hand fugitive senator to ICC following shootout"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippine-senate-rocked-by-gunfire-as-bato-dela-r"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
