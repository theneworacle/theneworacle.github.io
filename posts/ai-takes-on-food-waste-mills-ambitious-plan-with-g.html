<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"ai-takes-on-food-waste-mills-ambitious-plan-with-g","contentHtml":"\u003cp\u003eThe staggering amount of food wasted globally presents not just an environmental crisis but also a significant economic drain. From uneaten restaurant plates to expiring grocery produce, the scale of the problem is immense. Enter Mill, an AI-powered startup that has already made a name for itself with its clever in-home food waste solutions. Having successfully raised over $250 million since its inception in 2020, Mill is now setting its sights on a larger target: commercial food waste in restaurants and grocery stores.\u003c/p\u003e\n\u003cp\u003eIn a significant move, Mill has announced a partnership with Google's prestigious AI Futures Fund. This collaboration aims to develop a cutting-edge, Gemini-enabled visual waste characterization system. This technology promises to bring unprecedented precision to understanding and managing food waste, allowing businesses to identify patterns, predict demand more accurately, and ultimately, drastically reduce what ends up in landfills. Imagine an AI system that can 'see' and categorize wasted food, providing actionable insights for chefs and store managers to optimize their operations.\u003c/p\u003e\n\u003cp\u003eThis initiative by Mill is part of a growing trend where artificial intelligence is being harnessed to combat food waste across the industry. Major players like Kroger are already leveraging AI to manage perishable inventory more effectively, finding value for food that would otherwise be discarded and gaining an edge in competitive markets. The data generated by these AI systems is proving invaluable, transforming how food is managed from farm to fork.\u003c/p\u003e\n\u003cp\u003ePublic sentiment surrounding Mill's efforts and the broader application of AI in food waste reduction is largely positive, reflecting a collective desire for sustainable solutions. While some discussions and debates naturally arise with new technologies, the overall consensus points towards a hopeful future where AI plays a crucial role in creating a more efficient and less wasteful food system. Mill's journey, bolstered by Google's AI expertise, represents a significant step forward in this vital global endeavor.\u003c/p\u003e\n","title":"AI Takes on Food Waste: Mill's Ambitious Plan with Google and Gemini","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-07-10T03:32:21Z","summary":"Food waste is a colossal global challenge, but AI startup Mill is stepping up its game. Known for its innovative home kitchen food waste bins, Mill is now expanding its fight against waste into commercial kitchens and grocery aisles, powered by significant funding and a new strategic partnership with Google's AI Futures Fund to develop a Gemini-enabled waste characterization system.","tags":["AI","Food Waste","Sustainability","Technology","Google","Mill","Gemini","Restaurants","Grocery Stores","Innovation"],"sources":[{"url":"https://www.fastcompany.com/91569600/mill-ai-powered-plan-eliminate-restaurant-waste","title":"Inside Mill’s AI-powered plan to help restaurants and grocery stores stop wasting food"},{"url":"https://www.morningstar.com/news/pr-newswire/20260423la41337/mill-joins-googles-ai-futures-fund-to-advance-food-waste-characterization-technology-using-gemini","title":"Mill joins Google's AI Futures Fund to advance food waste characterization technology using Gemini"},{"url":"https://www.fastcompany.com/91529436/an-ai-fix-for-americas-27-billion-grocery-waste-problem","title":"An AI fix for America’s $27 billion grocery waste problem"},{"url":"https://www.cnbc.com/video/2026/04/17/ai-is-giving-kroger-an-edge-in-grocery-prices-solving-for-food-waste.html","title":"How AI is giving Kroger an edge in the grocery price wars and helping to curb food waste"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"ai-takes-on-food-waste-mills-ambitious-plan-with-g"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
