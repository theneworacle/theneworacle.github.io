<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"lords-test-england-crumbles-for-140-new-zealand-st","contentHtml":"\u003cp\u003eThe iconic Lord's cricket ground witnessed a captivating and chaotic opening day of the Test series between England and New Zealand. After winning the toss and electing to bowl, the New Zealand pace attack, led by a brilliant Kyle Jamieson who claimed five wickets for 62 runs, tore through England's batting lineup, dismissing the hosts for a paltry 140 runs in just 39.4 overs.\u003c/p\u003e\n\u003cp\u003eEngland's innings was a tale of struggle, with only Harry Brook offering significant resistance with a hard-fought half-century. However, the murky and overcast conditions perfectly suited the Blackcaps' quicks, who exploited the movement on offer to leave England's top order in disarray. Debutant Emilio Gay's stay was short-lived, and key batsmen like Ben Duckett and Joe Root also fell cheaply.\u003c/p\u003e\n\u003cp\u003eJust when it seemed New Zealand had seized complete control, England's bowlers fought back with determination. The spotlight then shifted to the returning Ollie Robinson, who made a sensational comeback after an extended absence. Robinson, with head-shaking figures of 4-10 from six overs, including three wickets in his very first over, ripped through the New Zealand top order. Devon Conway, Kane Williamson, and Rachin Ravindra were among his victims, sending the home crowd into a frenzy.\u003c/p\u003e\n\u003cp\u003eNew Zealand found themselves reeling at 61-6 at stumps, with Glenn Phillips leading a late counterattack on 31 not out. The day, marred by rain and bad light, saw a staggering 16 wickets fall, highlighting the dominance of the bowlers on both sides. While social media sentiment remains largely positive, fans are buzzing with discussions and debates about the unexpected turns of events.\u003c/p\u003e\n\u003cp\u003eAs day two approaches, both teams will have much to ponder. England, despite their low first-innings total, will be buoyed by Robinson's heroics and will look to continue pressing their advantage with the ball. New Zealand, still trailing by 79 runs, will need their remaining batsmen to show resilience and build a substantial lead to capitalize on their initial bowling brilliance.\u003c/p\u003e\n","title":"Lord's Test: England Crumbles for 140, New Zealand Stumbles to 61-6 on Chaotic Day One","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-04T22:27:26Z","summary":"A dramatic opening day at Lord's saw England bowled out for a mere 140 runs by a formidable New Zealand bowling attack. However, the Blackcaps then faced their own struggles, reaching 61-6 at stumps, largely due to a remarkable four-wicket haul by England's returning paceman, Ollie Robinson.","tags":["Cricket","New Zealand Cricket","England Cricket","Lord's","Test Match","Ollie Robinson","Kyle Jamieson","Blackcaps","Sports News"],"sources":[{"url":"https://www.chron.com/sports/article/new-zealand-wins-toss-and-bowls-first-against-22290797.php","title":"England’s Robinson takes 4-10 as New Zealand slumps to 61-6 at Lord’s"},{"url":"https://www.cbs8.com/article/syndication/associatedpress/new-zealand-wins-toss-and-bowls-first-against-england-in-test-series-opener-at-lords/616-0e24b710-d075-49d2-8e81-93bfd4a90ec7","title":"New Zealand wins toss and bowls first against England in test series opener at Lord’s"},{"url":"https://www.chron.com/sports/article/ollie-robinson-s-dream-england-comback-3-22291849.php","title":"Ollie Robinson’s dream England comeback: 3 wickets in a maiden first over at Lor…"},{"url":"https://sports.yahoo.com/articles/ollie-robinson-shines-england-return-183929801.html","title":"Ollie Robinson shines on England return during wicket-ladened first day at Lord’s"},{"url":"https://sports.yahoo.com/articles/england-struggling-first-test-zealand-151307637.html","title":"England struggling in first Test as New Zealand pick apart shaky batting lineup"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"lords-test-england-crumbles-for-140-new-zealand-st"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
