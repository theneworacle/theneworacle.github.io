<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealands-black-foils-make-dramatic-return-to-s","contentHtml":"\u003cp\u003eThe New Zealand 'Black Foils' SailGP team is set to make a dramatic return to competition this weekend at the Canada Sail Grand Prix in Halifax, Nova Scotia. Their comeback follows a catastrophic high-speed collision in February that left their F50 catamaran destroyed and one of their crew members seriously injured.\u003c/p\u003e\n\u003cp\u003eThe incident, which occurred during a race in Auckland in front of their home crowd, saw the Black Foils' boat nosedive and corkscrew directly into the path of the French team. The impact had severe consequences, sending one crew member from each team to the hospital. Black Foils grinder Louis Sinclair sustained fractures to both legs and is currently continuing his recovery.\u003c/p\u003e\n\u003cp\u003eUnable to compete without a boat, the team embarked on a journey to rebuild. Their brand new F50 catamaran, aptly named Manawatītī, was built in the UK and has been successfully delivered, blessed, and launched in Halifax. Stewart Dodson has joined the team as a replacement for Sinclair for the remainder of the season.\u003c/p\u003e\n\u003cp\u003eBlair Tuke, the Black Foils Co-CEO and wing trimmer, acknowledged the challenging period away from the water. \"It’s been a tough few months, but we are full focus ahead now,\" he told The Athletic, emphasizing the team's motivation to get back to putting in strong performances. While the Black Foils still have a mathematical chance of qualifying for the season-deciding final race in Abu Dhabi, Tuke is playing down immediate expectations, focusing instead on achieving solid starts and smart sailing rather than trying to do too much too soon.\u003c/p\u003e\n\u003cp\u003eThe broader SailGP league has also faced its share of drama this season. Changes are being considered for the American team's setup due to a lack of a strategist, which was cited as a factor in a recent collision. The Brazilian team has also switched its driver and strategist roles in a bid to improve performance. SailGP CEO Russell Coutts has defended the high-speed start format, placing the onus on sailors to maintain awareness of their surroundings, and a proposal is being mooted for a strategist to be present on all boats at all times.\u003c/p\u003e\n\u003cp\u003eDespite the challenges and the time away, social sentiment regarding the Black Foils' return is largely positive, reflecting the anticipation for their comeback. As the team finds its rhythm with the new Manawatītī, all eyes will be on Halifax to see if the Kiwis can recapture their form and make a significant impact in the latter half of the season.\u003c/p\u003e\n","title":"New Zealand's 'Black Foils' Make Dramatic Return to SailGP After Catastrophic Crash","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-19T12:53:31Z","summary":"Four months after a high-speed collision sidelined them, the New Zealand 'Black Foils' SailGP team is back on the water with a new F50 catamaran and renewed determination at the Canada Sail Grand Prix.","tags":["New Zealand","SailGP","Black Foils","Sailing","Canada Sail Grand Prix","Boat Racing","Sports","Comeback","Crash","Manawatītī"],"sources":[{"url":"https://www.nytimes.com/athletic/7369707/2026/06/19/new-zealand-return-canada-sailgp/","title":"Canada Sail Grand Prix: After a catastrophic crash, New Zealand are back on the water"},{"url":"https://www.msn.com/en-nz/sports/motorsports/black-foils-to-return-to-sail-gp-next-month-after-february-crash/ar-AA24osKf?ocid=BingNewsVerp","title":"Black Foils to return to Sail GP next month after February crash"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealands-black-foils-make-dramatic-return-to-s"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
