imposing target of 373. It was Mitchell’s sixth Test century and his fourth against England, underscoring his crucial role in the series.\u003c/p\u003e\n\u003cp\u003eThe match was imbued with further drama by England captain Ben Stokes’ surprising mid-match announcement of his retirement from international cricket. In a twist of fate, it was Mitchell who took the tumbling catch that ended Stokes’ final Test innings, a poignant moment that added another layer to an already unforgettable day. Stokes' decision, and his subsequent explosive batting as an opener in his last innings, captivated the cricketing world.\u003c/p\u003e\n\u003cp\u003eNew Zealand ultimately sealed a commanding 160-run victory, completing a comeback after being 1-0 down in the series. The win was a testament to the team's unwavering spirit and tactical acumen, delighting fans and generating overwhelmingly positive sentiment across social media, albeit with some lively debate around the specifics of the match and Stokes' departure. This series win will undoubtedly be remembered as a pivotal moment for New Zealand cricket, showcasing their ability to perform under immense pressure and against top-tier opposition.\u003c/p\u003e\n","title":"Blackcaps Triumph: Mitchell's Heroic Century Seals Historic Series Win in England Amidst Stokes' Farewell","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-05T05:04:29Z","summary":"Daryl Mitchell's defiant unbeaten century powered New Zealand to a memorable Test series victory over England, a triumph of resilience achieved on a dramatic day that also saw England captain Ben Stokes announce his shock retirement from international cricket.","tags":["Cricket","New Zealand","England","Daryl Mitchell","Ben Stokes","Test Cricket","Sports","Historic Win"],"sources":[{"url":"https://apnews.com/article/mitchell-newzealand-england-hundred-515f73e2957053e6a06149c3c91409c7","title":"Battered but unbowed, Daryl Mitchell’s unbeaten 100 puts New Zealand on brink"},{"url":"https://www.nytimes.com/athletic/7405569/2026/06/29/new-zealand-england-series-win/","title":"New Zealand complete historic series win in England, Tom Latham hails ‘old-school Test cricket’"},{"url":"https://apnews.com/article/england-newzealand-test-trent-bridge-42a7003e8765b57a21d1093cccf92bc6","title":"Stokes makes remarkable mid-match retirement call as New Zealand closes on series-clinching win"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"blackcaps-triumph-mitchells-heroic-century-seals-h"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
