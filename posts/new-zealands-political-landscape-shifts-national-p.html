<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"new-zealands-political-landscape-shifts-national-p","contentHtml":"\u003cp\u003eNew Zealand's political arena is buzzing with speculation as the governing National Party faces its lowest poll numbers in five years. The latest 1News Verian poll, released less than five months before a crucial general election, shows the National Party's support dropping to a mere 29%, a significant dip from its previous standing.\u003c/p\u003e\n\u003cp\u003eThis decline isn't isolated. The main opposition Labour Party also saw a fall, dropping five points to 32%. The combined support for these two major parties now stands at 61%, marking the lowest level of joint backing since 1996, underscoring a growing fragmentation in the New Zealand political landscape.\u003c/p\u003e\n\u003cp\u003eThe findings heap further pressure on Prime Minister Christopher Luxon, who is campaigning for a second term. His administration has been grappling with a sluggish economy and a persistent rise in the cost of living, issues that are clearly resonating with voters. The poll was conducted prior to the National Party's announcement of a new policy aimed at boosting savings through the KiwiSaver worker pension plan, the potential impact of which is yet to be seen.\u003c/p\u003e\n\u003cp\u003eIn New Zealand's proportional representation system, the current poll results suggest a significant shift in parliamentary power. While National's coalition partners, New Zealand First and the ACT Party, registered 11% and 6% respectively, their combined strength would not secure a parliamentary majority. Instead, the numbers point towards a potential coalition government formed by Labour, alongside the Green Party (whose support rose to 13%) and Te Pāti Māori (polling at 2%).\u003c/p\u003e\n\u003cp\u003eAdding another layer of intrigue, The Opportunity Party demonstrated a notable surge in support, reaching 4.6%. This places them just shy of the 5% threshold required to enter Parliament, indicating a potential for new players to emerge in the next election. Despite the National Party's declining numbers, simulated social sentiment around the poll indicates a 'Mostly positive, some debate' public reaction, suggesting a nuanced discussion unfolding across social platforms.\u003c/p\u003e\n\u003cp\u003eAs the election draws nearer, all eyes will be on how these trends evolve and whether Prime Minister Luxon's government can regain public confidence amid economic headwinds and a shifting political tide.\u003c/p\u003e\n","title":"New Zealand's Political Landscape Shifts: National Party Hits Lowest Poll Since 2021 Ahead of General Election","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-04T04:41:18Z","summary":"With less than five months until the general election, New Zealand's governing National Party has seen its support drop to the lowest level since 2021, according to the latest 1News Verian poll. This significant decline, coupled with a dip for the opposition Labour Party, paints a complex picture for the upcoming electoral contest and puts Prime Minister Christopher Luxon under increasing pressure amidst a sluggish economy and rising cost of living.","tags":["New Zealand","Politics","Elections","Polls","National Party","Labour Party","Christopher Luxon","Cost of Living","Economy"],"sources":[{"url":"https://www.straitstimes.com/asia/australianz/new-zealands-national-party-hits-lowest-poll-level-since-2021","title":"New Zealand’s National Party hits lowest poll level since 2021"},{"url":"https://www.msn.com/en-nz/news/national/labour-national-downplay-tepid-results-in-1news-verian-poll/ar-AA26nspX?ocid=BingNewsVerp","title":"Labour, National downplay tepid results in 1News Verian poll"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"new-zealands-political-landscape-shifts-national-p"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
