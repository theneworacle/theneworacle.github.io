<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"house-divided-bid-to-curb-trumps-iran-war-powers-f","contentHtml":"\u003cp\u003eThe halls of the U.S. House of Representatives recently witnessed another fiercely contested vote, as a resolution aimed at curbing the President's powers to initiate military action against Iran was narrowly defeated. This marks the third instance where such a measure has failed to pass, underscoring the persistent and profound divisions within Congress regarding foreign policy and the scope of presidential authority.\u003c/p\u003e\n\u003cp\u003eThe vote was exceptionally close, with reports indicating at least one instance resulting in a 212-212 tie. This razor-thin margin reveals a notable dynamic: a small contingent of Republican lawmakers broke ranks, aligning with Democrats in an effort to limit the executive branch's ability to engage in military conflict without explicit congressional approval. Their defection, while significant, ultimately wasn't enough to sway the outcome.\u003c/p\u003e\n\u003cp\u003eThe repeated failure of these resolutions highlights a complex interplay of political strategy, party loyalty, and constitutional interpretation. While proponents argue for a more robust congressional role in war-making decisions, citing the constitutional prerogative of Congress to declare war, opponents often emphasize the need for presidential agility in responding to national security threats.\u003c/p\u003e\n\u003cp\u003ePublic sentiment surrounding 'Trump Iran war powers' has been observed as largely positive, though not without its share of debate. This mixed public reaction mirrors the divisions seen within the legislative body itself, indicating a nuanced national conversation on the delicate balance between presidential power and congressional oversight in matters of war and peace.\u003c/p\u003e\n","title":"House Divided: Bid to Curb Trump's Iran War Powers Fails Yet Again","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-15T17:28:45Z","summary":"For the third time, a resolution to restrict the President's authority on Iran war powers has been narrowly rejected by the US House of Representatives, highlighting deep political divides.","tags":["US House","Iran","War Powers","Trump","Congress","Foreign Policy","Politics"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/us-house-narrowly-rejects-bid-to-rein-in-trump-iran-war-powers/ar-AA23dxQE","title":"US House narrowly rejects bid to rein in Trump Iran war powers"},{"url":"https://www.msn.com/en-us/news/politics/house-vote-on-iran-war-powers-resolution-fails-for-third-time/ar-AA23dbi9?ocid=BingNewsVerp","title":"House vote on Iran war powers resolution fails for third time"},{"url":"https://www.nytimes.com/2026/05/15/us/politics/iran-war-powers-congress.html","title":"Republicans Waited to Challenge Trump on the Iran War. Now It May Be Too Late."},{"url":"https://www.msn.com/en-us/news/politics/the-gop-rebels-who-is-voting-to-strip-trump-of-his-iran-war-powers/ar-AA23dqMv?ocid=BingNewsVerp","title":"The GOP rebels: Who is voting to strip Trump of his Iran war powers?"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"house-divided-bid-to-curb-trumps-iran-war-powers-f"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
