ut his aspirations for the monument. He has previously shared edited images depicting his face alongside those of George Washington, Thomas Jefferson, Theodore Roosevelt, and Abraham Lincoln.\u003c/p\u003e\n\u003cp\u003eKilmeade's comments underscore a moment where even within traditionally supportive media, certain proposals may meet with resistance, highlighting the ongoing public discourse surrounding historical monuments and presidential legacies.\u003c/p\u003e\n","title":"Fox News Host Breaks Rank, Dismisses Trump's Mount Rushmore Ambition","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-04T02:32:19Z","summary":"In a notable departure from common network sentiment, Fox News host Brian Kilmeade recently rejected the notion of adding Donald Trump's likeness to Mount Rushmore, sparking conversation and debate across social media.","tags":["Politics","Media","Donald Trump","Mount Rushmore","Fox News","Brian Kilmeade"],"sources":[{"url":"https://www.msn.com/en-us/news/politics/let-s-just-keep-the-guys-we-ve-got-fox-news-host-shoots-down-idea-of-trump-s-face-on-mt-rushmore/ar-AA278Oao?ocid=BingNewsVerp","title":"‘Let’s Just Keep The Guys We’ve Got’: Fox News Host Shoots Down Idea of Trump’s Face on Mt. Rushmore"},{"url":"https://www.msn.com/en-us/news/politics/trump-to-speak-at-mount-rushmore-one-monument-he-can-t-remake/ar-AA27aCZS?ocid=BingNewsVerp","title":"Trump to speak at Mount Rushmore, one monument he can’t remake"},{"url":"https://www.yahoo.com/news/politics/articles/donald-trump-mount-rushmore-plans-142125205.html","title":"Donald Trump Mount Rushmore Plans and Speech: What To Know"},{"url":"https://www.msn.com/en-nz/news/other/trump-sparks-controversy-after-posting-image-with-his-face-on-mount-rushmore/ar-AA24JQY5?ocid=BingNewsVerp","title":"Trump sparks controversy after posting image with his face on Mount Rushmore"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"fox-news-host-breaks-rank-dismisses-trumps-mount-r"},"buil
