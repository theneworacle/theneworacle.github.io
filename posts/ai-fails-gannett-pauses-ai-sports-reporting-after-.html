<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"ai-fails-gannett-pauses-ai-sports-reporting-after-","contentHtml":"\u003cp\u003eGannett, the parent company behind USA Today and numerous local newspapers, has paused its artificial intelligence experiment following a wave of criticism over its AI-generated sports articles. The initiative, which aimed to automate local sports reporting, ran into significant hurdles when readers encountered awkwardly phrased sentences and outright factual errors.\u003c/p\u003e\n\u003cp\u003eAmong the most cited examples of the AI's missteps were descriptions of high school football games as 'high school football action' and a 'close encounter of the athletic kind.' Even more strikingly, one article published by The Columbus Dispatch on August 19th failed to generate names for sports mascots, instead comically stating: 'The Worthington Christian [[WINNING_TEAM_MASCOT]] defeated the Westerville North [[LOSING_TEAM_MASCOT]] 2-1 in an Ohio boys soccer game on Saturday.' These 'goofy mistakes' quickly became fodder for social media, where readers openly mocked the bizarre reporting.\u003c/p\u003e\n\u003cp\u003eThe AI-generated pieces were a result of Gannett's partnership with LedeAI, a technology company that aims to provide 'reliable, readable, accurate local reporting readers want, but newsrooms struggle to provide.' Following the backlash, Gannett confirmed the pause, stating they will 'continue to evaluate vendors as we refine processes to ensure all the news and information we provide meets the highest journalistic standards.' LedeAI CEO Jay Allred expressed regret for the errors, acknowledging that 'some glitches can occur' with new technological advances and that his team is working around the clock to correct the issues. Allred also noted that the online criticism sparked a 'useful' conversation about the technology's current state and potential.\u003c/p\u003e\n\u003cp\u003eThis incident underscores the ongoing challenges and learning curve associated with integrating generative AI into content creation, particularly in fields requiring nuance and factual precision like journalism. While some media companies, such as German publisher Axel Springer, have explored the idea of AI potentially replacing journalists, Gannett's experience serves as a reminder of the vital role human oversight and editorial rigor play. LedeAI, however, remains optimistic, believing 'content automation is part of the future of local newsrooms,' envisioning a future where AI handles basic data-driven reporting, freeing human journalists for more in-depth, impactful work. The mixed public sentiment surrounding Gannett's experiment — reported as 'mostly positive, some debate' — reflects the broader societal discussion about AI's role in our daily lives.\u003c/p\u003e\n","title":"AI Fails: Gannett Pauses AI Sports Reporting After 'Goofy Mistakes'","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-05-25T21:12:51Z","summary":"Newspaper giant Gannett halted its AI experiment for sports articles after a series of awkward phrases and factual errors led to widespread reader mockery, highlighting the challenges and current limitations of integrating artificial intelligence into journalism.","tags":["AI","Artificial Intelligence","Journalism","News","Gannett","LedeAI","Sports Reporting","Media Ethics","Technology"],"sources":[{"url":"https://www.foxnews.com/tech/newspaper-giant-pauses-ai-experiment-readers-mock-bizarre-sports-reporting","title":"Series of goofy mistakes brings major newspapers AI experiment to screeching halt"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"ai-fails-gannett-pauses-ai-sports-reporting-after-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
