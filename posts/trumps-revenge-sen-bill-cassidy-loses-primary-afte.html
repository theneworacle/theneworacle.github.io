<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"trumps-revenge-sen-bill-cassidy-loses-primary-afte","contentHtml":"\u003cp\u003eLouisiana Republican Senator Bill Cassidy, a two-term incumbent, has lost his primary election, failing to secure a spot in the upcoming runoff. This significant defeat comes in the wake of Cassidy's decision to vote for former President Donald Trump's conviction on impeachment charges following the January 6, 2021, Capitol riot.\u003c/p\u003e\n\u003cp\u003eThe outcome further solidifies Trump's formidable grip on the Republican Party, as he had actively campaigned against Cassidy, endorsing challengers such as Representative Julia Letlow and state Treasurer John Fleming. Both Letlow and Fleming will now advance to a June 27 runoff, with Trump celebrating Cassidy's political demise on Truth Social.\u003c/p\u003e\n\u003cp\u003eIn his election night speech, Cassidy made thinly veiled remarks aimed at Trump and the persistent claims of a stolen 2020 election. \"When you participate in democracy, sometimes it doesn’t turn out the way you want it to. But you don’t pout, you don’t whine, you don’t claim the election was stolen, you don’t find a reason, you don’t manufacture some excuse,\" Cassidy stated, emphasizing his loyalty to the Constitution above any single individual.\u003c/p\u003e\n\u003cp\u003eTrump, in turn, lauded Letlow as a \"fantastic person\" and lambasted Cassidy for his \"disloyalty,\" declaring his political career \"OVER!\" This result serves as another stark reminder of the electoral consequences faced by Republicans who have crossed the former president.\u003c/p\u003e\n\u003cp\u003eThe broader implications for the GOP are clear: fealty to Donald Trump remains a powerful, often decisive, factor in primary elections. Cassidy's loss adds his name to a growing list of Republicans who have seen their careers curtailed after defying the former president.\u003c/p\u003e\n","title":"Trump's Revenge: Sen. Bill Cassidy Loses Primary After Impeachment Vote","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-18T02:54:05Z","summary":"Louisiana's Republican Senator Bill Cassidy, who voted to convict Donald Trump in his 2021 impeachment trial, has been defeated in his primary, underscoring Trump's enduring influence within the GOP.","tags":["Bill Cassidy","Donald Trump","Republican Primary","Impeachment","Louisiana","GOP","US Politics"],"sources":[{"url":"https://www.msn.com/en-us/politics/elections/gop-incumbent-senator-who-voted-to-impeach-trump-loses-primary/ar-AA23pUYk?ocid=BingNewsVerp","title":"GOP incumbent senator who voted to impeach Trump loses primary"},{"url":"https://www.msn.com/en-us/news/politics/gop-sen-cassidy-loses-primary-after-defying-trump/ar-AA23niGQ?ocid=BingNewsVerp","title":"GOP Sen. Cassidy loses primary after defying Trump"},{"url":"https://www.msn.com/en-us/news/politics/trump-gets-revenge-against-republican-who-voted-to-convict-him/ar-AA23nfGq?ocid=BingNewsVerp","title":"Trump gets revenge on Republican who voted to convict him"},{"url":"https://www.nbcnews.com/politics/2026-election/live-blog/louisiana-election-bill-cassidy-live-updates-rcna344986","title":"Louisiana election live updates: Sen. Bill Cassidy loses primary as two candidates advance to runoff"},{"url":"https://www.nytimes.com/2026/05/16/us/politics/republicans-trump-cassidy-conviction-impeachment.html","title":"7 Republicans Voted to Convict Trump. Most Are No Longer in Office."}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"trumps-revenge-sen-bill-cassidy-loses-primary-afte"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
