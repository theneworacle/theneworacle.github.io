<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"mavericks-morez-johnson-jr-silences-critics-with-e","contentHtml":"\u003cp\u003eThe Dallas Mavericks' bold move in selecting Morez Johnson Jr. as their top draft pick at No. 9 was met with immediate skepticism, with many pundits labeling it a \"massive reach.\" However, the rookie forward has wasted no time in silencing his critics, delivering an explosive professional debut that has the Mavericks' front office looking like geniuses.\u003c/p\u003e\n\u003cp\u003eJohnson Jr., who previously played under new Mavericks head coach Dusty May during a college national championship run at Michigan, faced doubts primarily due to his modest collegiate statistics (13.1 points, 7.3 rebounds) and perceived lack of outside shooting. But in his Summer League debut against the Golden State Warriors, he defied expectations, putting on a show with a stat line that screamed potential: 27 points on an efficient 12-of-17 shooting, accompanied by 8 rebounds, 3 assists, 3 steals, and 2 blocks. Despite a team loss, Johnson Jr. was undeniably the most impactful player on the court.\u003c/p\u003e\n\u003cp\u003eHis dominant performance validated the Mavericks' pre-draft conviction, echoing the sentiment from Coach May's staff: \"We have 'Rez, and they don't.\" Draft analyst Rich Stayman also joined the chorus, assuring Dallas fans they have every reason to be excited. Johnson Jr.'s high-energy style, his ability to score through hustle, floor running, and offensive rebounding, and his effectiveness without needing the ball, make him a perfect fit for the team, even alongside a player like Cooper Flagg. Team President Masai Ujiri's draft night gamble is already looking like a brilliant decision, and social media sentiment has shifted from debate to widespread approval following Johnson Jr.'s stellar outing. The future looks bright in Dallas with Morez Johnson Jr. leading the charge.\u003c/p\u003e\n","title":"Mavericks' Morez Johnson Jr. Silences Critics with Explosive Debut","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-10T21:05:48Z","summary":"Initially deemed a \"massive reach\" in the NBA Draft, Morez Johnson Jr. has vindicated the Dallas Mavericks' front office with a dominant Summer League performance, proving doubters wrong.","tags":["NBA","Dallas Mavericks","Morez Johnson Jr.","NBA Draft","Summer League","Basketball","Sports"],"sources":[{"url":"https://sports.yahoo.com/articles/mavericks-front-office-looks-genius-205710978.html","title":"Mavericks front office looks genius after their top pick puts on a show against Warriors"},{"url":"https://sports.yahoo.com/articles/morez-johnson-jr-scouts-mavs-153027751.html","title":"Morez Johnson Jr. Scouts Mavs Summer League Debut, Rivalry with College Teammate"},{"url":"https://www.msn.com/en-us/sports/basketball/3-overreactions-from-morez-johnson-s-nba-summer-league-debut-as-mavs-lose-to-warriors/ar-AA27BQy6","title":"3 overreactions from Morez Johnson's NBA Summer League debut as Mavs lose to Warriors"},{"url":"https://www.msn.com/en-us/sports/nba/morez-johnson-jr-dominates-in-nba-summer-league-debut/ar-AA27DDsw","title":"Morez Johnson Jr. dominates in NBA Summer League debut"},{"url":"https://www.nytimes.com/athletic/7435727/2026/07/10/morez-johnson-jr-mavericks-yaxel-lendeborg-michigan-teammate-nba/","title":"Yaxel Lendeborg predicts Michigan teammate Morez Johnson Jr. will become a ‘monster’ in NBA"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"mavericks-morez-johnson-jr-silences-critics-with-e"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
