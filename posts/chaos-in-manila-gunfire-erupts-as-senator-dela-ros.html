<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"chaos-in-manila-gunfire-erupts-as-senator-dela-ros","contentHtml":"\u003cp\u003eManila experienced dramatic and chaotic events on May 13, 2026, when volleys of gunshots were fired within the Philippine Senate building. This occurred during a tense attempt by government agents to arrest Senator Ronald 'Bato' dela Rosa, who has since fled the Senate premises, with his current whereabouts unknown.\u003c/p\u003e\n\u003cp\u003eReports indicate that the gunshots were fired by the Senate's security personnel during an argument with government agents positioned in an adjacent building. This chaotic scene reportedly aided Senator Dela Rosa's escape.\u003c/p\u003e\n\u003cp\u003eThe former national police chief, a key figure in then-President Rodrigo Duterte's controversial anti-drug campaign, is sought by the International Criminal Court (ICC) on charges of crimes against humanity, specifically the murder of at least 32 individuals between July 2016 and April 2018. Dela Rosa had initially sought refuge and protective custody within the Senate from allied lawmakers after National Bureau of Investigation agents first attempted to serve the arrest warrant on May 11.\u003c/p\u003e\n\u003cp\u003eSenate President Alan Cayetano confirmed the gunshots, stating that the Senate was 'under attack' and expressing the high emotions surrounding the incident. Following Dela Rosa's departure, Cayetano further asserted that 'There is no obstruction of justice' and maintained that the senator was free to leave the premises, indicating the Senate did not recognize an official ICC arrest warrant.\u003c/p\u003e\n\u003cp\u003eThe ICC unsealed the arrest warrant, originally issued in November, detailing the grave accusations against Dela Rosa. In defiance, the Senator has vowed to exhaust all legal remedies and had called upon his supporters to gather at the Senate to prevent his arrest, underscoring the political and legal complexities of the situation.\u003c/p\u003e\n\u003cp\u003eSocial sentiment regarding the events has been described as 'mostly positive, some debate.' This suggests a polarized public reaction, with a segment of the population likely supporting Dela Rosa, possibly viewing the ICC warrant as politically motivated or an infringement on national sovereignty. Conversely, the 'debate' aspect points to strong dissenting voices and concerns over accountability for the drug war's human rights abuses. This ongoing saga not only has significant implications for Senator Dela Rosa but also for the Philippines' relationship with international legal bodies and the legacy of its past administration's policies.\u003c/p\u003e\n","title":"Chaos in Manila: Gunfire Erupts as Senator Dela Rosa Evades ICC Arrest","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-17T08:19:10Z","summary":"Gunshots rang out and volleys were exchanged in the Philippine Senate as authorities attempted to apprehend Senator Ronald 'Bato' dela Rosa, who has since fled the premises. He is wanted by the International Criminal Court for alleged crimes against humanity during the Duterte administration's anti-drug crackdown.","tags":["Philippines","Ronald dela Rosa","ICC","Senate","Gunfire","Human Rights","Duterte","Drug War","International Criminal Court"],"sources":[{"url":"https://www.upi.com/Top_News/World-News/2026/05/13/philippines-gunshots-senate-dela-rosa/2691778685077/","title":"Gunshots heard in Philippines senate building where senator is hiding"},{"url":"https://www.thejakartapost.com/world/2026/05/17/philippines-asks-top-court-to-allow-icc-drug-war-arrest-of-senator.html","title":"Philippines asks top court to allow ICC drug war arrest of senator"},{"url":"https://www.nytimes.com/2026/05/13/world/asia/duterte-icc-bato-delarosa-philippines-senate-shooting.html","title":"Chaos in Philippines Senate as Duterte Ally Faces Arrest"},{"url":"https://www.newsday.com/news/nation/philippines-dela-rosa-senate-icc-killings-c13515","title":"Philippine senator wanted by the International Criminal Court flees from Senate"},{"url":"https://www.cbsnews.com/news/philippine-senate-shots-fired-authorities-arrest-wanted-senator/","title":"Shots fired in Philippine Senate, where authorities have tried to detain a senator on international charges"},{"url":"https://www.msn.com/en-us/news/world/gunshots-fired-in-standoff-at-philippine-senate-over-icc-suspect/ar-AA237IOG?ocid=BingNewsVerp","title":"Gunshots fired in standoff at Philippine Senate over ICC suspect"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"chaos-in-manila-gunfire-erupts-as-senator-dela-ros"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
