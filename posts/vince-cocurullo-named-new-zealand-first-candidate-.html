<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"vince-cocurullo-named-new-zealand-first-candidate-","contentHtml":"\u003cp\u003eFormer Whangārei mayor Vince Cocurullo has been officially announced as New Zealand First's candidate for the Whangārei electorate. The reveal took place at a party rally in Whangārei, a location significant as the birthplace of party leader Winston Peters.\u003c/p\u003e\n\u003cp\u003eCocurullo, an IT expert with a track record of one mayoral term and three as a councillor in Whangārei, aligns strongly with New Zealand First's platform, particularly its emphasis on regional development and crucial infrastructure projects. He has been a vocal advocate for initiatives such as the four-laning of State Highway 1, the establishment of a rail spur to Marsden Point, and the much-needed rebuild of Whangārei Hospital. Cocurullo has openly expressed frustration over the perceived slow progress of these vital projects, stating that a 12-year timeframe for SH1 development to reach Whangārei is 'unacceptable.'\u003c/p\u003e\n\u003cp\u003eBeyond his political endeavors, Cocurullo has recently been involved with GoNorth Limited, a company dedicated to converting plastics into diesel—a venture he champions as a realistic and necessary alternative fuel source for industries in Northland. He describes himself as a 'man of action,' citing the removal of over 50 tonnes of e-waste in Whangārei this year.\u003c/p\u003e\n\u003cp\u003eCocurullo will be contending for the Whangārei seat against a new field of political aspirants, as the long-serving incumbent National MP, Dr. Shane Reti, is stepping down. Among his competitors are Labour's Dr. Gary Payinda and National's real estate expert, Lloyd Budd.\u003c/p\u003e\n\u003cp\u003eInitial social sentiment surrounding his candidacy appears largely positive, albeit with some ongoing discussion. This development marks a significant step for New Zealand First in the Whangārei electorate, introducing a well-known local figure with a strong commitment to the region's growth and development.\u003c/p\u003e\n","title":"Vince Cocurullo Named New Zealand First Candidate for Whangārei","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-24T10:47:27Z","summary":"Former Whangārei mayor Vince Cocurullo will represent New Zealand First in the upcoming election, bringing his focus on regional development and infrastructure to the national stage.","tags":["New Zealand Politics","Whangārei","Vince Cocurullo","New Zealand First","Regional Development","Infrastructure","Election 2026"],"sources":[{"url":"https://www.nzherald.co.nz/northern-advocate/news/new-zealand-first-picks-ex-whangarei-mayor-vince-cocurullo-for-electorate/244JL4KZWFE3JGLDHQVVRKHPNI/","title":"New Zealand First picks ex-Whangārei mayor Vince Cocurullo for electorate"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"vince-cocurullo-named-new-zealand-first-candidate-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
