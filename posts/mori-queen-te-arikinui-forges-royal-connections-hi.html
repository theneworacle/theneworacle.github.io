<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"mori-queen-te-arikinui-forges-royal-connections-hi","contentHtml":"\u003cp\u003eIn a significant diplomatic and cultural engagement, Te Arikinui Kuini Nga wai hono i te po, the Māori Queen, recently embarked on her first official visit to London since her ascension to the throne in 2024. Her visit culminated in a historic meeting with King Charles III at Buckingham Palace, a moment that underscored the vital importance of Te Tiriti o Waitangi (the Treaty of Waitangi), Māori leadership, and the ongoing relationship between Māori and the British Crown. This engagement comes at a crucial time, as Aotearoa New Zealand prepares to commemorate the Treaty's 200-year anniversary in 2040.\u003c/p\u003e\n\u003cp\u003eAccompanied by an eight-person delegation, Te Arikinui also attended a celebratory garden party marking the 50th anniversary of The King’s Trust. This initiative, founded by His Majesty, focuses on empowering individuals by developing essential life skills and facilitating access to job opportunities, particularly for young people.\u003c/p\u003e\n\u003cp\u003ePrior to her meeting with King Charles, the Māori Queen held a 'meaningful kōrero' (discussion) with Prince William, the Prince of Wales, at Windsor Castle. Their conversation reportedly delved into a shared passion for environmental solutions, effectively bridging indigenous knowledge with Western scientific approaches, and addressing a variety of pressing global topics. Te Arikinui affirmed her belief in the power of indigenous knowledge and intergenerational stewardship to help solve the world’s environmental and social challenges.\u003c/p\u003e\n\u003cp\u003eThese royal engagements are not isolated events but rather continue a rich legacy of interaction between the Kīngitanga (Māori King Movement) and the British royal household, a tradition that spans eight generations. Te Arikinui Kuini Nga wai hono i te po assumed her esteemed role as the Māori Queen following the passing of her revered father, Kīngi Tūheitia Pōtatau Te Wherowhero.\u003c/p\u003e\n\u003cp\u003eInitial social media sentiment regarding these high-profile meetings has been largely positive, reflecting a broad appreciation for the reinforcement of these historical and contemporary ties.\u003c/p\u003e\n","title":"Māori Queen Te Arikinui Forges Royal Connections, Highlights Treaty of Waitangi in London Visit","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-05-15T15:22:56Z","summary":"Te Arikinui Kuini Nga wai hono i te po, the Māori Queen, recently made her inaugural visit with King Charles III and Prince William, reaffirming the enduring relationship between Māori and the British Crown and emphasizing the significance of Te Tiriti o Waitangi.","tags":["New Zealand","Māori","Māori Queen","King Charles III","Prince William","Buckingham Palace","Windsor Castle","Te Tiriti o Waitangi","Indigenous Leadership","Royal Family","Diplomacy"],"sources":[{"url":"https://www.msn.com/en-us/news/world/new-zealands-māori-queen-meets-king-charles-at-buckingham-palace/ar-AA23ejlD","title":"New Zealand's Māori Queen meets King Charles at Buckingham Palace"},{"url":"https://www.nzherald.co.nz/nz/maori-queen-te-arikinui-nga-wai-hono-i-te-po-meets-king-charles-at-buckingham-palace/SJXJBPNJVBAVXJEBP7IM7YZLFQ/","title":"Māori Queen Te Arikinui Nga wai hono i te po meets King Charles at Buckingham Palace"},{"url":"https://www.stuff.co.nz/world-news/360979147/te-tiriti-and-two-crowns-maori-queen-meets-king-charles-london","title":"Te Tiriti and two crowns: Māori Queen meets King Charles in London"},{"url":"https://www.rnz.co.nz/news/world/595335/te-arikinui-kuini-nga-wai-hono-i-te-po-meets-king-charles","title":"Te Arikinui Kuini Nga wai hono i te po meets King Charles"},{"url":"https://www.townandcountrymag.com/society/tradition/a71270140/maori-queen-prince-william-london-meeting-2026/","title":"Māori Queen Meets with Prince William in London"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"mori-queen-te-arikinui-forges-royal-connections-hi"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
