er to..."}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"from-banker-to-barista-navigating-a-soul-destroyin"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
