<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"turbulence-at-cbs-news-leadership-shake-ups-and-ra","contentHtml":"\u003cp\u003eCBS News finds itself in a whirlwind of change, with recent developments signaling a turbulent transition for its flagship programs, '60 Minutes' and 'CBS Evening News.' This era is defined by aggressive leadership shifts and persistent battles for viewership, all under the scrutinizing gaze of the public and industry insiders.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e'60 Minutes' Undergoes a Radical 'Housecleaning'\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eOne of the most dramatic shifts has occurred at the venerable '60 Minutes.' Longtime correspondent and former 'CBS Evening News' anchor Scott Pelley was reportedly ousted following a heated confrontation with the new guard, including CBS News head Bari Weiss and '60 Minutes' Executive Producer Nick Bilton. This incident is part of a broader 'housecleaning' initiative, signaling a decisive move by Weiss, whose leadership is backed by Paramount CEO David Ellison.\u003c/p\u003e\n\u003cp\u003eReports indicate that tensions between Weiss and the '60 Minutes' correspondents have been simmering for over a year, culminating in these recent firings. The upheaval has reportedly prompted the remaining correspondents to hold discussions about their future with the program, highlighting the significant internal impact of these changes. Even the Writers Guild of America, East, has weighed in on the situation, underscoring its industry-wide reverberations. Public sentiment regarding these firings appears to be 'mostly positive, some debate,' suggesting a divided opinion on the necessity and execution of these leadership decisions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e'CBS Evening News' Grapples with Ratings Challenges\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eMeanwhile, 'CBS Evening News' continues to face an uphill battle in the fiercely competitive evening news ratings. The program has consistently lagged behind its rivals, NBC and ABC, struggling to gain significant traction. While anchor Tony Dokoupil has seen individual viewership boosts at times, the newscast's overall performance has been challenging, with its lead over previous iterations shrinking.\u003c/p\u003e\n\u003cp\u003eNotably, 'CBS Evening News' reportedly hit a historic low during a week where Fox News Channel surpassed ABC in primetime viewership. Some analyses have also linked Dokoupil's perceived 'MAGA-coded' persona to the program's ratings struggles. Similar to the '60 Minutes' situation, simulated social sentiment concerning 'CBS Evening News' ratings is 'mostly positive, some debate,' which might suggest an underlying optimism or a polarized view among the audience, despite the reported difficulties.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA 'New Approach' and an Uncertain Future\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe changes at '60 Minutes' and the ongoing ratings struggles for 'CBS Evening News' paint a picture of a CBS News division in the throes of a major transformation. The 'new approach' championed by Bari Weiss is clearly an attempt to redefine the network's journalistic direction and appeal. However, the path forward is fraught with challenges, as evidenced by internal strife and the persistent struggle to capture a larger audience share. The coming months will undoubtedly reveal the long-term impact of these significant shifts on both the content and the standing of CBS News in the evolving media landscape.\u003c/p\u003e\n","title":"Turbulence at CBS News: Leadership Shake-Ups and Ratings Battles Define a New Era","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-04T14:54:49Z","summary":"CBS News is navigating a period of significant upheaval, marked by high-profile firings at '60 Minutes' and ongoing struggles for 'CBS Evening News' in the competitive ratings landscape. New leadership under Bari Weiss is driving a 'new approach,' but not without internal friction and mixed public reaction.","tags":["CBS News","60 Minutes","CBS Evening News","Scott Pelley","Bari Weiss","Nick Bilton","Tony Dokoupil","TV Ratings","Media Industry","Journalism","News Leadership"],"sources":[{"url":"https://www.msn.com/en-us/tv/news/fired-60-minutes-star-scott-pelley-shames-cbs-new-boss/ar-AA24HBm6?ocid=BingNewsVerp","title":"Fired '60 Minutes' star Scott Pelley shames CBS' new boss"},{"url":"https://www.detroitnews.com/story/business/2026/06/04/three-60-minutes-reporters-were-fired-and-the-result-has-been-chaos/90401574007/","title":"Three ‘60 Minutes’ reporters were fired, and the result has been chaos"},{"url":"https://www.msn.com/en-us/news/politics/the-big-unanswered-questions-about-60-minutes-after-scott-pelleys-firing/ar-AA24K44Z?ocid=BingNewsVerp","title":"The big unanswered questions about ‘60 Minutes’ after Scott Pelley’s firing"},{"url":"https://www.hollywoodreporter.com/tv/tv-news/scott-pelley-fired-60-minutes-heated-meeting-cbs-news-1236610557/","title":"Scott Pelley Fired From ‘60 Minutes’ After Ripping New Leadership in Tense Meeting"},{"url":"https://www.msn.com/en-us/entertainment/news/why-was-scott-pelley-fired-explaining-recent-60-minutes-controversy/ar-AA24KzOp?ocid=BingNewsVerp","title":"Why was Scott Pelley fired? Explaining recent '60 Minutes' controversy"},{"url":"https://www.msn.com/en-us/entertainment/general/nbc-abc-cbs-evening-news-ratings-surprise-who-s-viewership-is-up/ar-AA23Pgf8?ocid=BingNewsVerp","title":"NBC, ABC \u0026 CBS evening news: Whose ratings are up?"},{"url":"https://www.aol.com/news/tv-ratings-war-fox-news-210057812.html","title":"TV Ratings War: Fox News Crushes ABC In Primetime As CBS Slumps To Historic Low"},{"url":"https://www.msn.com/en-us/tv/news/maga-coded-cbs-anchor-trails-behind-competition-in-ratings-struggle/ar-AA247nyw?ocid=BingNewsVerp","title":"MAGA-coded CBS anchor trails behind competition in ratings struggle"},{"url":"https://www.msn.com/en-us/entertainment/news/nbc-abc-cbs-evening-news-ratings-tony-dokoupil-gets-big-boost/ar-AA22Vcwi?ocid=BingNewsVerp","title":"NBC, ABC \u0026 CBS evening news ratings: Tony Dokoupil gets big boost"},{"url":"https://www.msn.com/en-us/tv/news/the-cbs-evening-news-has-had-a-tough-month-in-ratings/ar-AA21zwNS?ocid=BingNewsVerp","title":"The 'CBS Evening News' Has Had a Tough Month in Ratings"},{"url":"https://www.yahoo.com/entertainment/tv/articles/scott-pelley-issues-statement-firing-171835186.html","title":"Scott Pelley Issues Statement After Firing from ’60 Minutes’: Read in Full"},{"url":"https://www.yahoo.com/entertainment/tv/articles/cbs-news-fires-longtime-60-034256862.html","title":"CBS News fires longtime 60 Minutes correspondent Scott Pelley"},{"url":"https://nypost.com/2026/06/04/media/60-minutes-correspondents-met-to-discuss-futures-after-scott-pelley-firing-report/","title":"‘60
