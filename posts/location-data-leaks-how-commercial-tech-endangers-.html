<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"location-data-leaks-how-commercial-tech-endangers-","contentHtml":"\u003cp\u003eA startling revelation from the Pentagon has confirmed what many have warned about for years: commercially available location data is being exploited by foreign adversaries to target and surveil US military personnel in war zones. This alarming development underscores a gaping hole in national security, a vulnerability that the Department of Defense (DoD) has reportedly been aware of for nearly a decade, yet has failed to adequately address.\u003c/p\u003e\n\u003cp\u003eUS Central Command (USCENTCOM) has received \"multiple threat reports concerning adversary exploitation of commercial location data to target or surveil US personnel in theater.\" This data, harvested from everyday smartphones through apps and advertising profiles, is readily available for purchase from data brokers, essentially creating a blueprint of troop movements and patterns of life. Such information can be used for targeted attacks, including missiles, drones, and roadside bombs, as well as for counterintelligence purposes.\u003c/p\u003e\n\u003cp\u003eThis isn't a new threat. As far back as 2016, government contractors briefed military leadership on the ease with which smartphones belonging to service members could be tracked. Despite these warnings and past incidents—like workout tracking apps inadvertently revealing military base layouts—the Pentagon has been slow to treat this as a \"five-alarm fire.\"\u003c/p\u003e\n\u003cp\u003eLawmakers have expressed frustration over the DoD's lagging response. Existing guidance to disable geolocation features on personal devices has proven insufficient, and even government-issued smartphones have had deficiencies, with ad targeting information not fully disabled. While USCENTCOM has recently rolled out the capability to switch off location sharing on government devices, this comes roughly a decade after the initial warnings.\u003c/p\u003e\n\u003cp\u003eThe situation is further complicated by the US Army's move towards a \"Bring Your Own Device\" (BYOD) policy, encouraging soldiers to use personal phones for work. While the Army aims to wall off work apps, data brokers face no such barriers, leaving soldiers' personal devices, and by extension their locations, exposed.\u003c/p\u003e\n\u003cp\u003eIn response to this ongoing threat, a bipartisan group of lawmakers has urged the Pentagon to implement long-overdue measures, including disabling advertising IDs on military phones, replacing Google Chrome with privacy-focused browsers on government devices, and enrolling service members in state data-broker opt-out systems. The message is clear: the adtech industry, in its current unregulated form, poses a direct national security threat.\u003c/p\u003e\n\u003cp\u003eThe safety of our military personnel should be paramount. The continued failure to implement robust, comprehensive cyber defenses against the exploitation of commercial location data is unacceptable. It's time for the Pentagon to move beyond guidance and adopt stringent policies and technological safeguards that genuinely protect those who serve.\u003c/p\u003e\n","title":"Location Data Leaks: How Commercial Tech Endangers US Troops in War Zones","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-06-08T08:54:07Z","summary":"A recent Pentagon letter confirms a long-feared vulnerability: foreign adversaries are using commercially available location data to track and target US military personnel in active war zones. This critical issue, known for nearly a decade, highlights significant gaps in military cybersecurity and calls for urgent, comprehensive action to protect our service members.","tags":["US Military","Location Data","Cybersecurity","National Security","Pentagon","Data Privacy","Adtech","War Zones","Troop Safety"],"sources":[{"url":"https://www.msn.com/en-us/news/us/us-military-personnel-are-being-targeted-using-location-data-pentagon-letter-shows/ar-AA24iHwP","title":"US military personnel are being targeted using location data, Pentagon letter shows"},{"url":"https://www.msn.com/en-us/news/us/exclusive-pentagon-says-us-military-personnel-are-reportedly-being-targeted-using-location-data/ar-AA24gzwD?ocid=BingNewsVerp","title":"Exclusive: Pentagon says US military personnel are reportedly being targeted using location data"},{"url":"https://www.theregister.com/security/2026/05/28/troops-phones-leaked-location-data-to-foreign-adversaries/5248108","title":"Lawmakers push DoD to tighten smartphone controls after adversaries exploited commercial tracking data"},{"url":"https://www.wired.com/story/the-pentagon-knew-enemies-could-track-troops-phones-for-years-now-they-are/","title":"The Pentagon Knew Enemies Could Track Troops’ Phones for Years. Now They Are"},{"url":"https://indianexpress.com/article/world/us-military-personnel-targeted-smartphone-location-data-adtech-threat-10712733/","title":"How US troops are targeted in war zones using ads on their phones, report reveals"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"location-data-leaks-how-commercial-tech-endangers-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
