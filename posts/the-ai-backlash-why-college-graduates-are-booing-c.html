<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"the-ai-backlash-why-college-graduates-are-booing-c","contentHtml":"\u003cp\u003eA new ritual is emerging at college commencements: booing any mention of Artificial Intelligence. What began as scattered jeers has evolved into a clear, stadium-wide expression of anxiety and frustration from the graduating class of 2026. This palpable backlash against AI-centric pep talks highlights a generation grappling with an uncertain future, a tough job market, and a perceived hypocrisy in the academic world.\u003c/p\u003e\n\u003cp\u003eThe core of this discontent stems from a deep-seated fear about the job market. A staggering 70% of college students view AI as a direct threat to their career prospects, according to a 2025 poll by the Harvard Kennedy School. With the unemployment rate for 22-27 year olds at a 12-year high, the specter of AI automating entry-level positions only amplifies existing anxieties. Graduates, after years of study, are entering a landscape where job descriptions demand 'collaboration with AI' – a concept often at odds with classroom policies that penalize or restrict AI usage. This creates a significant disconnect, leaving students feeling unprepared and wary.\u003c/p\u003e\n\u003cp\u003eSeveral high-profile instances underscore this sentiment. Former Google CEO Eric Schmidt faced repeated jeers at the University of Arizona when discussing the rise of AI. Students like Olivia Malone, a 22-year-old law school bound graduate, found his speech 'incredibly disrespectful,' especially given the academic bans on AI. Adding to the controversy, Schmidt's name appeared in connection with the Jeffrey Epstein files, leading to shouts from the audience and a perception that his speech was a 'self-serving advertisement.'\u003c/p\u003e\n\u003cp\u003eSimilar reactions met real estate executive Gloria Caulfield at the University of Central Florida and music executive Scott Borchetta at Middle Tennessee State University. Both were met with boos when touting AI's transformative power in their respective industries. Borchetta's advice to 'deal with it… Do something about it. It’s a tool. Make it work for you,' fell flat with a generation that feels they haven't been adequately equipped to 'make it work.' Even Adobe's AI evangelist, Chris Duffey, was booed at Marquette University, despite attempting to inspire graduates with messages about innovation and choice.\u003c/p\u003e\n\u003cp\u003eThe negative attitudes toward AI are not isolated. A recent Gallup poll of Gen Z (14-29) revealed increasing anger and declining excitement about the technology compared to a year ago, despite half of them using AI daily or weekly. This suggests a growing disillusionment that goes beyond mere apprehension.\u003c/p\u003e\n\u003cp\u003eWhile commencement speakers attempt to frame AI as an opportunity, a tool, or an inevitable force, their messages are often perceived as tone-deaf and disconnected from the realities faced by graduates. For a generation already navigating a complex and competitive professional landscape, the celebratory day of graduation is, for many, becoming another reminder of an uncertain future shaped by AI.\u003c/p\u003e\n","title":"The AI Backlash: Why College Graduates Are Booing Commencement Speakers","authors":[{"username":"@alanaturner","name":"Alana Turner"}],"date":"2026-05-20T10:56:48Z","summary":"From stadium-wide boos to cries of 'Epstein files!', recent college commencements have seen an unexpected surge of protest against Artificial Intelligence. Graduates are expressing deep anxiety about their future job prospects, feeling a disconnect between academic restrictions on AI and industry demands, and facing an already challenging job market.","tags":["AI","Artificial Intelligence","College Graduates","Commencement","Job Market","Student Anxiety","Future of Work","Education","Technology","Gen Z"],"sources":[{"url":"https://www.msn.com/en-us/money/other/the-new-college-graduation-ritual-booing-ai/ar-AA23AFpa?ocid=BingNewsVerp","title":"The new college graduation ritual: booing AI"},{"url":"https://www.boston.com/news/education/2026/05/19/graduates-are-booing-pep-talks-on-artificial-intelligence-at-college-commencements-ai/","title":"Graduates are booing pep talks on artificial intelligence at college commencements"},{"url":"https://www.msn.com/en-us/money/markets/ai-sparks-backlash-from-new-graduates-how-deep-does-the-disapproval-go/ar-AA23AzHV?ocid=BingNewsVerp","title":"AI sparks backlash from new graduates. How deep does the disapproval go?"},{"url":"https://www.nytimes.com/2026/05/18/opinion/ai-boo-commencement-speeches.html","title":"Why College Grads Are Booing Their Commencement Speakers"},{"url":"https://www.msn.com/en-us/news/us/contributor-hecklers-veto-turned-commencements-into-disinvitation-season/ar-AA23DTdD?ocid=BingNewsVerp","title":"Contributor: 'Heckler's veto' turned commencements into disinvitation season"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"the-ai-backlash-why-college-graduates-are-booing-c"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
