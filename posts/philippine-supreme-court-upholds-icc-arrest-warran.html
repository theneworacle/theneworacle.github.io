<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"philippine-supreme-court-upholds-icc-arrest-warran","contentHtml":"\u003cp\u003eThe Philippine Supreme Court has delivered a landmark decision, rejecting Senator Ronald dela Rosa’s petition to block the enforcement of an International Criminal Court (ICC) arrest warrant. By a decisive 9-5-1 majority, the court denied his request for a temporary restraining order, a ruling that permits law enforcement to proceed with his arrest based solely on the ICC warrant, without requiring additional domestic court authorization. The full reasoning behind this pivotal decision is anticipated to be released on May 25th.\u003c/p\u003e\n\u003cp\u003eSenator dela Rosa is a central figure in the ICC's investigation, wanted for crimes against humanity stemming from his tenure as police chief during former President Rodrigo Duterte’s brutal “war on drugs.” This campaign, marked by widespread controversy and international condemnation, resulted in over 12,000 deaths, with at least 2,555 killings directly attributed to the Philippine National Police (PNP).\u003c/p\u003e\n\u003cp\u003eThe ICC’s Pre-Trial Chamber found substantial grounds to believe that an attack targeting the civilian population occurred and that dela Rosa made “essential contributions” to the crime of murder. These contributions reportedly include using his position to enable and order killings, promoting violence through public statements, providing personnel and weapons, rewarding killings, encouraging false self-defense scenarios to legitimize police actions, and promising impunity to those involved.\u003c/p\u003e\n\u003cp\u003eDela Rosa’s legal team had argued that the ICC lacked jurisdiction over him, citing the Philippines' withdrawal from the court in 2019. However, this contention mirrors a similar argument previously put forth by former President Duterte, which was also rejected by the ICC. The Supreme Court's current ruling effectively dismisses this jurisdictional challenge, aligning with the international court's stance.\u003c/p\u003e\n\u003cp\u003eHuman rights organizations have been vocal in their calls for accountability. Amnesty International, through its executive director Ritz Lee Santos III, has specifically urged President Ferdinand Marcos Jr. to ensure dela Rosa’s arrest, emphasizing that no one should be above the law. Santos highlighted dela Rosa’s key role in the “war on drugs” and his apparent intent to evade justice, underscoring the broader importance of impartial and independent trial proceedings in The Hague for victims, survivors, and their families.\u003c/p\u003e\n\u003cp\u003eAdding another layer of intrigue to the situation, Senator dela Rosa’s current whereabouts are unknown. This follows a reported shootout in the state senate building on May 13th, an incident that authorities are now investigating as a possible staged event designed to facilitate his escape. The charges against dela Rosa are strikingly similar to those faced by former President Duterte, who was arrested in March 2025 under similar ICC warrants. The United Nations has consistently documented the “staggering number of unlawful deaths and police killings” during Duterte’s presidency, advocating for the accountability of all individuals involved.\u003c/p\u003e\n\u003cp\u003eSocial media sentiment surrounding the ICC warrant for Senator Ronald dela Rosa reflects a mixed public reaction, with both support for the court's decision and ongoing debate on the matter.\u003c/p\u003e\n\u003cp\u003eThis ruling by the Philippine Supreme Court represents a crucial step forward in the pursuit of justice for the thousands of lives lost during the “war on drugs.” It reinforces the principle that even high-ranking officials can be held accountable for grave crimes, regardless of domestic political challenges or attempts to evade international jurisdiction.\u003c/p\u003e\n","title":"Philippine Supreme Court Upholds ICC Arrest Warrant for Senator Dela Rosa: A Landmark Ruling for Accountability","authors":[{"username":"@miguelreyes","name":"Miguel Reyes"}],"date":"2026-05-22T22:56:36Z","summary":"In a significant development for justice in the Philippines, the Supreme Court has rejected Senator Ronald dela Rosa's attempt to block an International Criminal Court (ICC) arrest warrant against him. This decision paves the way for his potential arrest for alleged crimes against humanity during the controversial 'war on drugs.'","tags":["Philippines","ICC","Ronald dela Rosa","War on Drugs","Supreme Court","Accountability","Human Rights","International Criminal Court","Rodrigo Duterte","Justice"],"sources":[{"url":"https://www.jurist.org/news/2026/05/philippines-top-court-rejects-senators-bid-to-challenge-icc-warrant/","title":"Philippines top court rejects senator's bid to challenge ICC warrant"},{"url":"https://manilastandard.net/news/crime-courts/314742007/sc-denies-batos-plea-for-TRO-vs-icc-arrest.html","title":"SC denies Bato’s plea for TRO vs. ICC arrest"},{"url":"https://thediplomat.com/2026/05/philippine-government-urges-supreme-court-to-reject-fugitive-senators-icc-appeal/","title":"Philippine Government Urges Supreme Court to Reject Fugitive Senator’s ICC Appeal"},{"url":"https://apnews.com/article/philippines-dela-rosa-senate-icc-killings-fd768b3cf67a4a3b3246140e83baebae","title":"Philippine senator wanted by the International Criminal Court flees from Senate"},{"url":"https://www.msn.com/en-ph/politics/government/osg-no-legal-impediment-to-icc-warrant-enforcement-vs-bato/ar-AA23GYPa?ocid=BingNewsVerp","title":"OSG: No legal impediment to ICC warrant enforcement vs Bato"},{"url":"https://manilastandard.net/news/314740689/solgen-asks-sc-to-allow-arrest-of-bato-for-icc.html","title":"SolGen asks SC to allow arrest of Bato for ICC"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"philippine-supreme-court-upholds-icc-arrest-warran"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
