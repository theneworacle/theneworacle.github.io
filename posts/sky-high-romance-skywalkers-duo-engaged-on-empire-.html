<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"sky-high-romance-skywalkers-duo-engaged-on-empire-","contentHtml":"\u003cp\u003eIn a spectacle that blurred the lines between audacious romance and blatant disregard for the law, Angela Nikolau and Ivan Beerkus, the daredevil couple featured in the Netflix documentary 'Skywalkers: A Love Story,' recently took their high-rise antics to new heights – literally – atop the iconic Empire State Building.\u003c/p\u003e\n\u003cp\u003eThe duo, renowned for their perilous urban explorations, illegally scaled the historic New York City landmark, unfurling a banner emblazoned with a powerful message: 'When the power of love beats the love of power, the world knows peace.' This breathtaking display culminated in a truly unique proposal, as Beerkus got down on one knee amidst the clouds, asking for Nikolau's hand in marriage. She reportedly said yes, adding a thrilling chapter to their already extraordinary love story.\u003c/p\u003e\n\u003cp\u003eHowever, the romantic gesture was quickly followed by a less glamorous descent into police custody. Upon reaching a lower platform, law enforcement officers were waiting to take the couple into arrest, highlighting the illegal nature of their stunt.\u003c/p\u003e\n\u003cp\u003eReactions to the event have been decidedly mixed. While many on social media have been captivated by the sheer audacity and romanticism of the act, leading to a 'mostly positive, with some debate' sentiment, critics have been vocal. CNN's senior national security analyst Juliette Kayyem slammed the stunt as 'performative' and 'egregious,' predicting a future behind bars for the couple. The Empire State Building, in a more measured response, acknowledged the incident while subtly reminding the public of 'practical ways for the most memorable marriage proposals' that don't involve trespassing.\u003c/p\u003e\n\u003cp\u003eIt's worth noting that this particular sky-high stunt was not part of their 2024 Netflix documentary, which chronicled their illegal ascent of the 2,227-foot Merdeka 118 skyscraper in Kuala Lumpur, Malaysia. Yet, it perfectly encapsulates the 'Skywalkers' brand – a blend of extreme adventure, love, and a willingness to push boundaries, even if it means confronting legal repercussions. As the world watches to see what consequences await the engaged duo, one thing is certain: Angela Nikolau and Ivan Beerkus continue to command attention, one dizzying height at a time.\u003c/p\u003e\n","title":"Sky-High Romance: 'Skywalkers' Duo Engaged on Empire State Building, Sparks Debate","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-07-01T21:27:45Z","summary":"Angela Nikolau and Ivan Beerkus, stars of Netflix's 'Skywalkers: A Love Story,' illegally scaled the Empire State Building for a daring proposal and peace message, facing arrest but captivating audiences worldwide.","tags":["Angela Nikolau","Ivan Beerkus","Empire State Building","Skywalkers: A Love Story","Netflix","Engagement","Daredevils","Urban Exploration","Viral News"],"sources":[{"url":"https://www.yahoo.com/entertainment/celebrity/articles/couple-netflixs-skywalkers-documentary-engaged-192426539.html","title":"Couple from Netflix's “Skywalkers ”documentary get engaged on top of Empire Stat..."},{"url":"https://www.hollywoodreporter.com/news/general-news/netflix-skywalkers-couple-empire-state-building-engaged-1236635111/","title":"New Heights: Netflix’s Daredevil Couple Get Engaged Atop Empire State Building"},{"url":"https://lamag.com/crimeinla/couple-from-netflixs-skywalkers-doc-illegally-climb s-empire-state-building/","title":"Couple From Netflix’s ‘Skywalkers’ Doc Illegally Climbs Empire State Building"},{"url":"https://www.msn.com/en-us/movies/news/who-climbed-empire-state-building-couple-from-netflix-documentary/ar-AA2706b3","title":"Who Climbed Empire State Building? Couple From Netflix Documentary"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"sky-high-romance-skywalkers-duo-engaged-on-empire-"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
