<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"soaring-to-new-heights-new-zealands-most-exclusive","contentHtml":"\u003cp\u003eFor those seeking the pinnacle of luxury and an escape into nature, ROKI Collection Queenstown has unveiled an extraordinary offering: 'Rees Valley by ROKI.' This exclusive experience transports guests via a private helicopter ride to a gourmet lunch nestled deep within the untouched wilderness of New Zealand's Southern Alps, specifically the remote Rees Valley.\u003c/p\u003e\n\u003cp\u003eAccessible only by a picturesque 10-minute helicopter flight, this unique dining adventure is designed to provide unparalleled tranquility and a profound connection with nature, all while indulging in world-class luxury. Guests are welcomed with Champagne upon arrival at ROKI's custom-built wilderness lodge. Designed by acclaimed New Zealand interior designer Virginia Fisher, the lodge is a forest sanctuary featuring crackling fireplaces, warm natural materials, and expansive views of the dramatic, unspoiled landscape characterized by an emerald-green river, ancient beech forests, and stunning alpine ridgelines.\u003c/p\u003e\n\u003cp\u003eAt the heart of the experience is a gourmet lunch curated by ROKI's Culinary Director, Paul Froggatt, who holds two Michelin stars for the hotel's acclaimed restaurant, Essence. Chef Froggatt's seasonal menus showcase his produce-driven philosophy, highlighting locally sourced ingredients and flavors inspired by New Zealand's diverse environment. This one-of-a-kind culinary journey begins at NZD $11,000 for two guests, covering all land and air transfers, as well as food and beverages.\u003c/p\u003e\n\u003cp\u003eROKI Collection Queenstown, which debuted in September 2025, has swiftly established itself as a premier luxury destination. Beyond the helicopter lunch, the intimate 15-suite property offers an exceptionally high staff-to-guest ratio, spacious rooms with gas fireplaces, plush furnishings, and sweeping Lake Wakatipu views. Guests can also savor a ten-course fine dining experience at Essence, explore other curated dining options like The Terrace and The Library, or unwind at ROKI Pure Spa, which offers cutting-edge treatments like the 'Sleep and Soothe Remedy.'\u003c/p\u003e\n\u003cp\u003eThe introduction of such ultra-luxurious experiences by ROKI Collection Queenstown aligns with a broader trend in the region, as Queenstown increasingly positions itself to attract ultra-wealthy visitors, with discussions often including high-end offerings like heli-golf and multi-thousand-dollar-per-night accommodations. Social media sentiment regarding 'New Zealand helicopter lunch luxury' is predominantly positive, reflecting the allure of these exclusive, high-end adventures, though some minor debate is present, typical of such niche luxury markets.\u003c/p\u003e\n","title":"Soaring to New Heights: New Zealand's Most Exclusive Lunch is a Helicopter Away","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-02T22:15:16Z","summary":"ROKI Collection Queenstown introduces an unparalleled dining experience: a luxurious, Michelin-starred lunch in the remote Rees Valley, accessible only by a scenic helicopter journey. Discover the epitome of pampered disconnection amidst New Zealand's breathtaking Southern Alps.","tags":["New Zealand","Luxury Travel","Fine Dining","Helicopter Experience","Queenstown","ROKI Collection","Rees Valley","Michelin Star","Paul Froggatt","Exclusive Experiences"],"sources":[{"url":"https://www.forbes.com/sites/katiebell/2026/07/01/new-zealands-most-luxurious-lunch-is-only-by-helicopter-at-this-hotel/","title":"New Zealand’s Most Luxurious Lunch Is Only By Helicopter At This Hotel"},{"url":"https://au.lifestyle.yahoo.com/zealand-most-luxurious-lunch-only-160309058.html","title":"New Zealand's Most Luxurious Lunch Is Only By Helicopter At This Hotel"},{"url":"https://www.msn.com/en-nz/news/national/heli-golf-aston-martin-tours-how-queenstown-is-courting-ultra-wealthy-visitors/ar-AA1TPEC0","title":"Heli-golf, Aston Martin tours: How Queenstown is courting ultra-wealthy visitors"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"soaring-to-new-heights-new-zealands-most-exclusive"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
