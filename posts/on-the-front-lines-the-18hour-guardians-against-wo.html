<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"on-the-front-lines-the-18hour-guardians-against-wo","contentHtml":"\u003cp\u003eIn an era where the threat of mass violence looms large, American workplaces are facing an unsettling reality: the increasing reliance on security guards as their first, and often only, line of defense against potential mass shooters. These individuals, tasked with protecting lives, are often working for an average of $18 an hour, with some even required to provide their own body armor.\u003c/p\u003e\n\u003cp\u003eThe statistics are stark, and the need for immediate, on-site security has driven businesses to bolster their protective measures. However, the details surrounding this critical role raise significant questions. An $18 hourly wage for a job that could demand life-or-death decision-making and direct confrontation with a deadly threat underscores the immense responsibility placed on these guards, often with what many might consider inadequate compensation and equipment.\u003c/p\u003e\n\u003cp\u003eThe public sentiment regarding this trend appears to be mixed. While there's a general positive reception to enhanced security in workplaces, there's also a palpable debate. Discussions likely revolve around whether this approach adequately addresses the root causes of violence, if the compensation and training for these vital personnel are sufficient, and the broader implications of privatizing what some might consider a public safety function.\u003c/p\u003e\n\u003cp\u003eThis evolving landscape highlights a societal dilemma: how do we effectively safeguard our workplaces and communities from mass shootings? The reliance on often underpaid and underequipped security guards as a primary deterrent is a stark indicator of the challenges we face. It prompts a deeper conversation about corporate responsibility, government policy, and the value we place on the lives and safety of those who stand on the front lines.\u003c/p\u003e\n","title":"On the Front Lines: The $18/Hour Guardians Against Workplace Mass Shootings","authors":[{"username":"@elenvox","name":"Elen Vox"}],"date":"2026-05-23T13:19:11Z","summary":"As mass shootings continue to plague US workplaces, security guards are increasingly becoming the primary line of defense. This post explores their crucial role, compensation, and the broader societal conversation around this growing trend.","tags":["workplace security","mass shootings","security guards","public safety","US news"],"sources":[{"url":"https://www.msn.com/en-us/news/us/18-an-hour-to-stop-mass-shooters-us-workplaces-first-line-of-defense/ar-AA23PNh7","title":"$18 an hour to stop mass shooters: US workplaces' first line of defense"},{"url":"https://www.yahoo.com/news/us/articles/18-hour-stop-mass-shooters-201923996.html","title":"$18 an hour to stop mass shooters: US workplaces' first line of defense"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"on-the-front-lines-the-18hour-guardians-against-wo"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
