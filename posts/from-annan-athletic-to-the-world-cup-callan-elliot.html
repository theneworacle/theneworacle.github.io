<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/0f953e58cdaad9b8.css" as="style"/><link rel="stylesheet" href="/_next/static/css/0f953e58cdaad9b8.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" noModule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-cfb97e7cd53c187e.js" defer=""></script><script src="/_next/static/chunks/framework-2f335d22a7318891.js" defer=""></script><script src="/_next/static/chunks/main-dbd0de0e54d73d4c.js" defer=""></script><script src="/_next/static/chunks/pages/_app-e000f3c4926d5b9b.js" defer=""></script><script src="/_next/static/chunks/pages/posts/%5Bslug%5D-9d8f6c641f7ffc28.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_buildManifest.js" defer=""></script><script src="/_next/static/NkVW-B-nOhMqWXBn4mt8A/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":{"id":"from-annan-athletic-to-the-world-cup-callan-elliot","contentHtml":"\u003cp\u003eThe FIFA World Cup stage is set, and amidst the global footballing spectacle, a remarkable story unfolds – that of Callan Elliot, a Scottish-born footballer now proudly wearing the colours of New Zealand. His journey from the humble grounds of Annan Athletic in Scotland to the colossal SoFi Stadium in Los Angeles is a testament to passion, perseverance, and a unique choice of allegiance.\u003c/p\u003e\n\u003cp\u003eCallan’s footballing roots trace back to Annan Athletic, where he first kicked a ball at the tender age of four. However, his path took a significant turn when his family relocated to Nelson, New Zealand, when he was just seven. It was in New Zealand that Callan truly blossomed as a player, developing his skills across various sports before ultimately committing to football at age 12.\u003c/p\u003e\n\u003cp\u003eHis decision to represent New Zealand, the nation that fostered his talent, over his birth country, Scotland, was a pragmatic one. As his father, Steve Elliot, noted, playing for New Zealand offered opportunities like the U20 World Cup and Olympics, which Scotland had not qualified for. This choice has now culminated in Callan achieving his \"big goal\" – a spot in the World Cup squad for the tournament spanning the USA, Mexico, and Canada.\u003c/p\u003e\n\u003cp\u003eThe depth of his family's support is truly heartwarming. Callan's parents, Steve and Susan Elliot, have embarked on an approximately 6,500-mile journey to witness their son's World Cup debut against Iran. \"It's not easy to put into words how both his mum and I feel – proud, amazed, a football parent's dream,\" shared Steve, encapsulating the surreal joy of seeing their son on football's biggest stage. His partner, Keany Morey, and siblings are also rallying behind him, with some even residing in the United States to offer close support.\u003c/p\u003e\n\u003cp\u003eAs an attacking right-back, Callan is determined to secure his place in the starting lineup and help New Zealand navigate a challenging group stage, which includes fixtures against Iran, Egypt, and footballing powerhouse Belgium. The aspiration is clear: to progress beyond the group stages and etch a new chapter in New Zealand's footballing history.\u003c/p\u003e\n\u003cp\u003eThe narrative of Callan Elliot's World Cup journey has resonated widely, with social media sentiment predominantly positive, reflecting admiration for his dedication and unique story. It's a reminder that the World Cup isn't just about established stars, but also about the incredible, often unexpected, journeys of individuals who make the global game so captivating.\u003c/p\u003e\n","title":"From Annan Athletic to the World Cup: Callan Elliot's Remarkable Journey with New Zealand","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-06-15T06:32:38Z","summary":"Scottish-born Callan Elliot, who honed his early skills at Annan Athletic, is now living a World Cup dream, representing New Zealand on the global stage. His journey, marked by a move at age seven and a strategic decision to play for his adopted nation, is a testament to dedication and family support.","tags":["New Zealand Football","World Cup 2026","Callan Elliot","Annan Athletic","All Whites","Football Journey","Sports Story","International Football"],"sources":[{"url":"https://www.bbc.com/news/articles/c862qvexd31o","title":"From Annan Athletic to the World Cup: The Scot playing for New Zealand"},{"url":"https://sports.yahoo.com/articles/zealand-2026-world-cup-squad-053000766.html","title":"New Zealand: 2026 World Cup Squad, Fixtures and Schedule"},{"url":"https://sports.yahoo.com/articles/inside-zealands-world-cup-roster-060001058.html","title":"Inside New Zealand's World Cup roster 2026: Chris Wood leads All Whites squad aiming for best ever FIFA finals"},{"url":"https://sports.yahoo.com/articles/zealand-world-cup-2026-squad-153122829.html","title":"New Zealand World Cup 2026 squad: Darren Bazeley's final selection"},{"url":"https://sports.yahoo.com/articles/chris-wood-lead-zealand-world-002621672.html","title":"Chris Wood to lead New Zealand at the World Cup after an injury-troubled Premier League campaign"}]}},"__N_SSG":true},"page":"/posts/[slug]","query":{"slug":"from-annan-athletic-to-the-world-cup-callan-elliot"},"buildId":"NkVW-B-nOhMqWXBn4mt8A","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
