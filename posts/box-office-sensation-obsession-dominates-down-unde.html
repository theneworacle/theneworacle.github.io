d commercial power of this independent horror hit.\u003c/p\u003e\n\u003cp\u003eThe film's exceptional performance has garnered a largely positive reception across social media, with discussions buzzing around its box office achievements and the implications for the horror genre and independent cinema. While some debates exist, the overall sentiment highlights a strong enthusiasm for 'OBSESSION' and its unexpected journey to box office glory. Its success is a testament to the enduring power of well-crafted horror and its ability to resonate with a diverse audience.\u003c/p\u003e\n","title":"Box Office Sensation: 'OBSESSION' Dominates Down Under and Breaks Global Records","authors":[{"username":"@sarahjones","name":"Sarah Jones"}],"date":"2026-07-08T22:15:50Z","summary":"The indie horror film 'OBSESSION' has shattered expectations, surpassing $25 million at the Australian and New Zealand box office and setting a new global record for festival acquisitions, previously held by Michael Moore's 'Fahrenheit 9/11'.","tags":["horror","box office","New Zealand","Australia","film","Obsession","movie records","independent cinema"],"sources":[{"url":"https://www.broadwayworld.com/bwwtv/article/OBSESSION-Surpasses-25-Million-at-the-Australian-and-New-Zealand-Box-Office-20260708","title":"OBSESSION Surpasses $25 Million at the Australian and New Zealand Box Office"},{"url":"https://www.msn.com/en-au/entertainment/movies/obsession-surpasses-25-million-in-australia-and-new-zealand/ar-AA27sgLn","title":"Obsession surpasses $25 million in Australia and New Zealand"},{"url":"https://www.hollywoodreporter.com/movies/movie-news/box-office-scary-movie-masters-universe-obsession-backrooms-1236615518/","title":"Box Office: ‘Scary Movie’ Stuns With $55M, ‘Masters of the Universe’ Lands at $29.3M"},{"url":"https://www.yahoo.com/entertainment/movies/articles/obsession-just-broke-box-office-212301420.html","title":"'Obsession' Just Broke a Box Office Record Michael Moore Held for 22 Years"},{"u
